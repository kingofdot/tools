name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build version (prisma-architect)
        shell: bash
        run: |
          SHA="${GITHUB_SHA}"
          TIME=$(date -u +"%Y-%m-%d %H:%MZ")
          FILE="tools/prisma-architect/js/version.js"
          sed -i "s|__BUILD_SHA__|${SHA}|g" "$FILE"
          sed -i "s|__BUILD_TIME__|${TIME}|g" "$FILE"
          echo "Injected SHA=${SHA:0:7} TIME=${TIME} into ${FILE}"

      - name: Generate tool catalog
        shell: pwsh
        run: ./scripts/build-tool-catalog.ps1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
