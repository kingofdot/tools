<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="tool-name" content="Magic Builder">
<meta name="tool-tag" content="Magic">
<meta name="tool-description" content="스킬과 마법 계열 정의를 다루는 포지형 HTML 툴">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKILL FORGE — 스킬 정의 에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0a10;--bg2:#11101a;--bg3:#1a1826;
  --border:#2d2a42;--border2:#3d3a58;
  --accent:#8b6cf7;--accent2:#b09cff;--accent-dim:#4a3a8a;--aglow:rgba(139,108,247,.14);
  --text:#d8d4f0;--text-dim:#6a6488;--text-muted:#38344e;
  --danger:#d4506a;--success:#50d4a0;--warn:#d4a850;
  --active-c:#50c8d4;--passive-c:#7ed478;
  --r:5px;
  --font-t:'Cinzel',serif;--font-b:'Noto Sans KR',sans-serif;--font-m:'JetBrains Mono',monospace;
  --hh:46px;--sw:246px;--ow:358px;
}
*{box-sizing:border-box;margin:0;padding:0;}
::selection{background:rgba(139,108,247,.3);color:#fff;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:12px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 35% at 15% 15%,rgba(139,108,247,.055) 0%,transparent 70%),radial-gradient(ellipse 45% 55% at 85% 85%,rgba(80,200,212,.035) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(139,108,247,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(139,108,247,.013) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header{height:var(--hh);flex-shrink:0;background:linear-gradient(180deg,#16122a,var(--bg2));border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 14px rgba(0,0,0,.5),0 1px 0 rgba(139,108,247,.1);}
.logo{font-family:var(--font-t);font-size:14px;font-weight:700;color:var(--accent2);letter-spacing:3px;white-space:nowrap;text-shadow:0 0 18px rgba(139,108,247,.5);}
.logo small{display:block;font-size:8px;letter-spacing:2px;color:var(--text-dim);font-weight:400;margin-top:-1px;}
.hs{width:1px;height:24px;background:var(--border);}
.ha{display:flex;gap:5px;align-items:center;margin-left:auto;}
#saveStatus{font-family:var(--font-m);font-size:9px;color:var(--text-dim);white-space:nowrap;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;font-family:var(--font-b);font-size:11px;font-weight:500;transition:all .12s;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn svg{width:11px;height:11px;}
.btn-p{background:linear-gradient(135deg,#8b6cf7,#5a3ac8);border-color:var(--accent2);color:#fff;box-shadow:0 2px 8px rgba(139,108,247,.28);}
.btn-p:hover{box-shadow:0 2px 16px rgba(139,108,247,.48);filter:brightness(1.08);}
.btn-g{background:transparent;border-color:var(--border);color:var(--text-dim);}
.btn-g:hover{border-color:var(--border2);color:var(--text);background:var(--bg3);}
.btn-d{background:transparent;border-color:#4a1e28;color:var(--danger);}
.btn-d:hover{background:rgba(212,80,106,.1);border-color:var(--danger);}
.btn-s{background:transparent;border-color:#1e4a36;color:var(--success);}
.btn-s:hover{background:rgba(80,212,160,.1);border-color:var(--success);}

/* BODY */
.body-row{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sbh{padding:8px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sbt{font-family:var(--font-t);font-size:9px;letter-spacing:2px;color:var(--accent);flex:1;}
.sbc{font-family:var(--font-m);font-size:9px;color:var(--text-dim);}
.frow{padding:5px 9px;border-bottom:1px solid var(--border);display:flex;gap:3px;flex-shrink:0;}
.chip{padding:2px 7px;border-radius:20px;font-size:9px;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);transition:all .11s;font-family:var(--font-m);}
.chip:hover{border-color:var(--border2);color:var(--text);}
.chip.ca{color:var(--accent2);border-color:var(--accent-dim);background:var(--aglow);}
.chip.cact{color:var(--active-c);border-color:rgba(80,200,212,.35);background:rgba(80,200,212,.07);}
.chip.cpas{color:var(--passive-c);border-color:rgba(126,212,120,.35);background:rgba(126,212,120,.07);}
.sbsearch{padding:5px 9px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sbsearch input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:5px 8px;font-family:var(--font-b);font-size:10px;outline:none;transition:border-color .12s;}
.sbsearch input:focus{border-color:var(--accent-dim);}
.sbsearch input::placeholder{color:var(--text-muted);}
.sklist{flex:1;overflow-y:auto;padding:3px 0;}
.sklist::-webkit-scrollbar{width:3px;}
.sklist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.ske{padding:5px 11px;cursor:pointer;border-left:3px solid transparent;transition:all .1s;display:flex;align-items:center;gap:7px;}
.ske:hover{background:rgba(255,255,255,.022);}
.ske.on{background:rgba(139,108,247,.07);border-left-color:var(--accent);}
.ski{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--border);background:var(--bg3);position:relative;overflow:hidden;}
.ski img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.ski .ef{position:relative;z-index:1;}
.skinfo{flex:1;min-width:0;}
.skn{font-size:10px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.skm{font-size:8px;color:var(--text-dim);margin-top:1px;display:flex;gap:3px;align-items:center;}
.tp{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.tpa{background:var(--active-c);}.tpp{background:var(--passive-c);}

/* EDITOR */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.edt{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tbsep{width:1px;height:18px;background:var(--border);}
#editingId{margin-left:auto;font-family:var(--font-m);font-size:9px;color:var(--text-dim);}

/* PANEL GRID — fixed, no scroll */
.edbody{
  flex:1;overflow:hidden;padding:8px;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:auto auto auto auto;
  gap:7px;
}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.ph{padding:5px 11px;border-bottom:1px solid var(--border);flex-shrink:0;background:linear-gradient(90deg,rgba(139,108,247,.055),transparent);display:flex;align-items:center;}
.pt{font-family:var(--font-t);font-size:8px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
.pb{padding:8px 11px;flex:1;overflow:hidden;display:flex;flex-direction:column;gap:6px;}
.span2{grid-column:1/-1;}

/* FORM */
label.lbl{display:block;font-size:8px;font-weight:500;color:var(--text-dim);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase;}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:4px 7px;font-family:var(--font-b);font-size:11px;outline:none;transition:border-color .12s,box-shadow .12s;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent-dim);box-shadow:0 0 0 2px rgba(139,108,247,.09);}
select{cursor:pointer;}select option{background:var(--bg3);}
textarea{resize:none;font-size:11px;line-height:1.45;}
input[type=number]{font-family:var(--font-m);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.fld{display:flex;flex-direction:column;}

/* CLASS PALETTE */
.cpal{display:flex;flex-wrap:wrap;gap:4px;}
.cbtn{padding:3px 9px;border-radius:3px;font-size:9px;cursor:pointer;border:1px solid;font-family:var(--font-m);font-weight:600;transition:all .11s;opacity:.35;background:transparent;letter-spacing:.3px;}
.cbtn:hover{opacity:.6;}
.cbtn.on{opacity:1;box-shadow:0 0 7px currentColor;}

/* ICON */
.irow{display:flex;gap:7px;align-items:center;}
.iprev{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);background:var(--bg3);flex-shrink:0;position:relative;overflow:hidden;}
.iprev img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.iprev .ef{position:relative;z-index:1;}
.ihint{font-size:8px;color:var(--text-muted);font-family:var(--font-m);margin-top:2px;}

/* EFFECT TYPE TABS */
.etabs{display:flex;gap:3px;margin-bottom:6px;flex-shrink:0;}
.etab{padding:2px 9px;border-radius:3px;font-size:9px;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font-m);transition:all .11s;}
.etab:hover{border-color:var(--border2);color:var(--text);}
.etab.ed{color:#e07850;border-color:rgba(224,120,80,.4);background:rgba(224,120,80,.07);}
.etab.eh{color:var(--success);border-color:rgba(80,212,160,.4);background:rgba(80,212,160,.07);}
.etab.eb{color:var(--accent2);border-color:rgba(139,108,247,.4);background:var(--aglow);}
.etab.edb{color:var(--danger);border-color:rgba(212,80,106,.4);background:rgba(212,80,106,.07);}

/* OUTPUT */
.outp{width:var(--ow);flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;}
.outp.collapsed{width:0;overflow:hidden;border:none;}
.outh{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.outtl{font-family:var(--font-t);font-size:9px;letter-spacing:2px;color:var(--accent);flex:1;}
.outtabs{display:flex;gap:2px;padding:0 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.outtab{padding:5px 10px;font-size:9px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-dim);font-family:var(--font-m);transition:all .12s;}
.outtab.on{color:var(--accent2);border-bottom-color:var(--accent);}
.outtab:hover:not(.on){color:var(--text);}
.outw{flex:1;overflow:auto;}
.outw::-webkit-scrollbar{width:3px;height:3px;}
.outw::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
pre.outcode{padding:12px;font-family:var(--font-m);font-size:10px;line-height:1.7;color:var(--text);white-space:pre;}

/* PREVIEW */
.pcard{margin:10px;border-radius:7px;overflow:hidden;background:linear-gradient(145deg,#16122a,#0e0c18);border:1px solid var(--border);box-shadow:0 5px 20px rgba(0,0,0,.5),0 0 16px rgba(139,108,247,.1);}
.pdh{padding:10px 12px;border-bottom:1px solid var(--border);position:relative;}
.pdh::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,108,247,.07),transparent);pointer-events:none;}
.pico{font-size:20px;display:block;position:relative;z-index:1;margin-bottom:5px;}
.pico-img{width:28px;height:28px;border-radius:5px;object-fit:cover;display:block;margin-bottom:5px;border:1px solid var(--border);}
.pname{font-family:var(--font-t);font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:4px;position:relative;z-index:1;}
.pbadges{display:flex;gap:4px;flex-wrap:wrap;position:relative;z-index:1;}
.badge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:8px;font-weight:600;letter-spacing:1px;font-family:var(--font-t);text-transform:uppercase;}
.bact{background:rgba(80,200,212,.1);color:var(--active-c);border:1px solid rgba(80,200,212,.28);}
.bpas{background:rgba(126,212,120,.1);color:var(--passive-c);border:1px solid rgba(126,212,120,.28);}
.pdesc{padding:8px 12px;font-size:10px;color:var(--text-dim);line-height:1.6;border-bottom:1px solid var(--border);}
.pstats{padding:8px 12px;}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(45,42,66,.35);}
.sr:last-child{border-bottom:none;}
.sk{color:var(--text-dim);}.sv{font-family:var(--font-m);font-size:9px;color:var(--accent2);}
.sv.g{color:var(--success);}.sv.o{color:var(--warn);}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--bg3);border:1px solid var(--accent-dim);border-radius:6px;padding:8px 14px;font-size:11px;color:var(--text);box-shadow:0 5px 20px rgba(0,0,0,.5);z-index:1000;opacity:0;transform:translateY(7px);transition:all .17s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:480px;max-width:90vw;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.8);}
.mhd{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.mttl{font-family:var(--font-t);font-size:9px;letter-spacing:2px;color:var(--accent);flex:1;}
.mbd{padding:12px 16px;}
.mft{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;}

.kw{color:#c084fc;}.str{color:#86efac;}.num{color:#fb923c;}.key{color:#93c5fd;}
*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-dim);grid-column:1/-1;grid-row:1/-1;}
.eico{font-size:36px;opacity:.22;}.etxt{font-family:var(--font-t);font-size:10px;letter-spacing:2px;opacity:.35;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">SKILL FORGE<small>SKILL DEFINITION EDITOR</small></div>
  <div class="hs"></div>
  <div class="ha">
    <button class="btn btn-g" id="btnImport"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10v3h12v-3M8 2v8M5 7l3 3 3-3"/></svg>가져오기</button>
    <button class="btn btn-p" id="btnExport"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10v3h12v-3M8 10V2M5 5l3-3 3 3"/></svg>내보내기</button>
    <div class="hs"></div>
    <span id="saveStatus">저장 없음</span>
    <button class="btn btn-d" id="btnReset" style="font-size:9px;padding:3px 8px;">초기화</button>
    <div class="hs"></div>
    <button class="btn btn-g" id="btnToggleOut" style="font-size:10px;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:10px;height:10px;"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M5 6l2 2-2 2M9 10h2"/></svg>코드</button>
  </div>
</header>

<div class="body-row">

  <div class="sidebar">
    <div class="sbh">
      <span class="sbt">Skills</span>
      <span class="sbc" id="skillCount">0</span>
      <button class="btn btn-p" id="btnNew" style="padding:3px 8px;font-size:9px;">+신규</button>
    </div>
    <div class="frow">
      <div class="chip ca" data-f="all">전체</div>
      <div class="chip" data-f="active">active</div>
      <div class="chip" data-f="passive">passive</div>
    </div>
    <div class="sbsearch"><input id="searchInput" type="text" placeholder="이름·ID·직업 검색…"></div>
    <div class="sklist" id="skillList"></div>
  </div>

  <div class="editor">
    <div class="edt">
      <button class="btn btn-g" id="btnDupe" style="font-size:10px;padding:3px 9px;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:10px;height:10px;"><rect x="4" y="4" width="9" height="9" rx="1"/><path d="M3 12H2a1 1 0 01-1-1V3a1 1 0 011-1h8a1 1 0 011 1v1"/></svg>복제</button>
      <button class="btn btn-d" id="btnDel"  style="font-size:10px;padding:3px 9px;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:10px;height:10px;"><path d="M3 4h10M5 4V2h6v2M6 7v5M10 7v5M4 4l1 9h6l1-9"/></svg>삭제</button>
      <div class="tbsep"></div>
      <button class="btn btn-s" id="btnSave" style="font-size:10px;padding:3px 9px;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:10px;height:10px;"><path d="M13 13H3a1 1 0 01-1-1V4l3-3h8a1 1 0 011 1v10a1 1 0 01-1 1z"/><path d="M10 3v3H5V3M5 13V9h6v4"/></svg>저장 (Ctrl+S)</button>
      <span id="editingId">— 선택 없음</span>
    </div>
    <div class="edbody" id="edBody">
      <div class="empty"><div class="eico">✨</div><div class="etxt">스킬을 선택하거나 새로 만드세요</div></div>
    </div>
  </div>

  <div class="outp" id="outputPanel">
    <div class="outh">
      <span class="outtl">OUTPUT</span>
      <button class="btn btn-g" id="btnCopy" style="font-size:9px;padding:3px 8px;">복사</button>
    </div>
    <div class="outtabs">
      <div class="outtab on" data-tab="all">전체</div>
      <div class="outtab" data-tab="single">현재</div>
      <div class="outtab" data-tab="preview">미리보기</div>
    </div>
    <div class="outw" id="outWrap"><pre class="outcode" id="outCode"></pre></div>
  </div>

</div>
</div>
<div class="toast" id="toast"></div>

<div class="mov" id="importModal">
  <div class="mbox">
    <div class="mhd"><span class="mttl">JSON / JS 가져오기</span><button id="closeImp" class="btn btn-g" style="padding:2px 8px;font-size:9px;">✕</button></div>
    <div class="mbd">
      <p style="font-size:10px;color:var(--text-dim);margin-bottom:7px;">var SKILLS = [...] 또는 배열·단일 객체를 붙여넣으세요.</p>
      <textarea id="impTA" style="height:160px;font-family:var(--font-m);font-size:10px;" placeholder="[{ id: 'fireball', ... }]"></textarea>
    </div>
    <div class="mft"><button id="closeImp2" class="btn btn-g">취소</button><button id="doImp" class="btn btn-p">가져오기</button></div>
  </div>
</div>

<script>
const LS='skillforge_v3';
const CID=['warrior','knight','mage','support','rogue','archer','paladin','voodoo','lord'];
const CCOL={warrior:'#e05050',knight:'#4a90d9',mage:'#9b59b6',support:'#2ecc71',rogue:'#e67e22',archer:'#27ae60',paladin:'#f1c40f',voodoo:'#8e44ad',lord:'#c0392b'};
const MOVT=['none','fly_to_enemy','fall_on_enemy','expand','meteor','rise','quake','lava'];
const ORGT=['self','ally_front','enemy_front','center'];
const EFFT=['damage','heal','buff','debuff'];
const TGTT=['front_enemy','all_enemies','self','all_allies','random_enemy','front_ally'];
const TRGT=['on_hit','on_kill','on_damaged','interval'];
const STAT=['meleeAtk','rangedAtk','magicAtk','def','magicDef','atkSpeed','meleeAtkSpeed','rangedAtkSpeed','magicAtkSpeed','healPerSec','critChance','baseHp'];
const ATKT=['meleeAtk','rangedAtk','magicAtk'];

// PERSIST
function persist(){try{localStorage.setItem(LS,JSON.stringify({skills,curId,at:Date.now()}));}catch(e){toast('저장 실패');}}
function loadLS(){try{const r=localStorage.getItem(LS);if(!r)return null;const d=JSON.parse(r);return d.skills?.length?d:null;}catch(e){return null;}}
function updateSS(){
  try{const r=localStorage.getItem(LS);const e=$('saveStatus');if(!e)return;
  if(r){const d=new Date(JSON.parse(r).at),p=n=>String(n).padStart(2,'0');e.textContent=`저장:${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;e.style.color='var(--success)';}
  else{e.textContent='저장 없음';e.style.color='var(--text-dim)';}}catch(e){}
}

// SIDEBAR
function renderSB(q=''){
  const query=q.toLowerCase();
  const f=skills.filter(s=>{
    const mq=!query||s.id.toLowerCase().includes(query)||s.name.toLowerCase().includes(query)||(s.learnableBy||[]).some(c=>c.includes(query));
    return mq&&(filterType==='all'||s.type===filterType);
  });
  $('skillCount').textContent=f.length;
  $('skillList').innerHTML=f.map(s=>{
    const cl=(s.learnableBy||[]).slice(0,3).map(c=>`<span style="font-size:7px;padding:1px 4px;border-radius:2px;font-family:var(--font-m);border:1px solid ${CCOL[c]||'#888'}50;color:${CCOL[c]||'#888'};background:${CCOL[c]||'#888'}12;">${c}</span>`).join('');
    return `<div class="ske${curId===s.id?' on':''}" data-id="${s.id}">
      <div class="ski" style="border-color:${s.type==='active'?'rgba(80,200,212,.28)':'rgba(126,212,120,.28)'}">
        <img src="assets/sprites/skills/${s.id}.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="display:block">
        <span class="ef" style="display:none">${s.sprite||'✨'}</span>
      </div>
      <div class="skinfo">
        <div class="skn">${s.name}</div>
        <div class="skm"><span class="tp ${s.type==='active'?'tpa':'tpp'}"></span><span style="color:${s.type==='active'?'var(--active-c)':'var(--passive-c)'};font-size:8px;">${s.type}</span><span style="color:var(--text-muted)">·</span>${cl}</div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.ske').forEach(el=>el.addEventListener('click',()=>selectSkill(el.dataset.id)));
}

function bindED(){
  // class palette
  document.querySelectorAll('.cbtn').forEach(btn=>btn.addEventListener('click',()=>{
    const s=gsk(curId);if(!s)return;
    const c=btn.dataset.cls;s.learnableBy=s.learnableBy||[];
    if(s.learnableBy.includes(c)){s.learnableBy=s.learnableBy.filter(x=>x!==c);btn.classList.remove('on');}
    else{s.learnableBy.push(c);btn.classList.add('on');}
    renderSB($('searchInput').value);refreshOut();
  }));

  // effect type tabs
  document.querySelectorAll('#etabs .etab').forEach(tab=>tab.addEventListener('click',()=>{
    const s=gsk(curId);if(!s)return;
    s.effect=s.effect||{};s.effect.type=tab.dataset.et;
    renderED();refreshOut();
  }));

  // type select
  $('f_ty')?.addEventListener('change',()=>{readForm();renderED();});

  // sprite preview
  $('f_sp')?.addEventListener('input',()=>{const em=$('iemj');if(em)em.textContent=$('f_sp')?.value||'✨';});

  // all inputs
  ['f_id','f_nm','f_dt','f_at','f_rl','f_ml','f_sp',
   'f_cd','f_spd','f_mov','f_orig','f_als',
   'f_trig','f_ti','f_ls',
   'f_tgt','f_bd','f_coef','f_lc','f_hv','f_hls','f_bstat','f_bval','f_bdur','f_desc'
  ].forEach(id=>{const el=$(id);if(el)el.addEventListener(el.tagName==='SELECT'?'change':'input',readForm);});
}

function readForm(){
  const s=gsk(curId);if(!s)return;
  const old=s.id;
  s.id=V('f_id')||s.id;s.name=V('f_nm')||s.name;
  s.type=V('f_ty')||'active';s.damageType=V('f_dt')||'none';s.atkType=V('f_at')||null;
  s.requireLevel=I('f_rl')||1;s.maxLevel=I('f_ml')||5;s.sprite=V('f_sp')||'✨';s.desc=V('f_desc')||'';
  if(s.type==='active'){
    s.cooldown=I('f_cd');s.speed=I('f_spd');s.movement=V('f_mov')||'none';s.origin=V('f_orig')||null;
    s.trigger=null;s.triggerInterval=null;const a=$('f_als');if(a)s.levelScale=parseFloat(a.value)||null;
  }else{
    s.cooldown=null;s.movement=null;s.origin=null;s.speed=null;
    s.trigger=V('f_trig')||null;s.triggerInterval=I('f_ti')||null;const l=$('f_ls');if(l)s.levelScale=parseFloat(l.value)||null;
  }
  const et=s.effect?.type||'damage';s.effect=s.effect||{type:et,target:'front_enemy'};s.effect.target=V('f_tgt')||'front_enemy';
  if(et==='damage'){s.effect.baseDmg=N('f_bd');s.effect.coef=N('f_coef');s.effect.levelCoef=N('f_lc');}
  else if(et==='heal'){s.effect.value=N('f_hv');const h=$('f_hls');if(h)s.levelScale=parseFloat(h.value)||null;}
  else{s.effect.stat=V('f_bstat')||'def';s.effect.value=N('f_bval');s.effect.duration=I('f_bdur');}
  if(old!==s.id){curId=s.id;$('editingId').textContent=`editing: ${s.id}`;const img=$('iimg');if(img){img.src=`assets/sprites/skills/${s.id}.png`;img.style.display='block';const em=$('iemj');if(em)em.style.display='none';}}
  renderSB($('searchInput').value);refreshOut();
}

function refreshOut(){
  if(curTab==='preview'){renderPrev();return;}
  const s=gsk(curId);const arr=curTab==='single'?(s?[s]:[]):skills;
  $('outCode').innerHTML=synHL(fmtJS(arr));
}

function fmtJS(arr){
  let o='var SKILLS = [\n';
  arr.forEach((s,i)=>{
    o+='  {\n';
    const sf=(k,v)=>{if(v!==undefined)o+=`    ${k}: ${v===null?'null':`'${String(v).replace(/'/g,"\\'")}'`},\n`;};
    const nf=(k,v)=>{if(v!=null)o+=`    ${k}: ${v},\n`;else o+=`    ${k}: null,\n`;};
    const af=(k,v)=>{ o+=`    ${k}: [${(v||[]).map(x=>`'${x}'`).join(', ')}],\n`;};
    sf('id',s.id);sf('name',s.name);sf('type',s.type);
    s.atkType?sf('atkType',s.atkType):o+='    atkType: null,\n';
    sf('damageType',s.damageType);af('learnableBy',s.learnableBy);
    nf('requireLevel',s.requireLevel);nf('maxLevel',s.maxLevel);
    nf('cooldown',s.cooldown);s.movement?sf('movement',s.movement):o+='    movement: null,\n';
    s.origin?sf('origin',s.origin):o+='    origin: null,\n';
    nf('speed',s.speed);s.trigger?sf('trigger',s.trigger):o+='    trigger: null,\n';
    nf('triggerInterval',s.triggerInterval);nf('levelScale',s.levelScale);sf('sprite',s.sprite);
    const e=s.effect;
    if(e){o+=`    effect: { type: '${e.type}', target: '${e.target}'`;
      if(e.type==='damage')o+=`, baseDmg: ${e.baseDmg??0}, coef: ${e.coef??1}, levelCoef: ${e.levelCoef??0}`;
      else if(e.type==='heal')o+=`, value: ${e.value??0}`;
      else o+=`, stat: '${e.stat}', value: ${e.value??0}, duration: ${e.duration??3000}`;
      o+=' },\n';}
    sf('desc',s.desc);o+=`  }${i<arr.length-1?',':''}\n`;
  });
  return o+'];';
}

function synHL(c){
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\b(var|const|let|null|true|false)\b/g,'<span class="kw">$1</span>')
    .replace(/'([^']*)'/g,"<span class='str'>'$1'</span>")
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>')
    .replace(/([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g,'<span class="key">$1</span>$2');
}

function renderPrev(){
  const s=gsk(curId);const w=$('outWrap');
  if(!s){w.innerHTML='<div style="padding:14px;color:var(--text-dim);font-size:10px;">스킬을 선택하세요</div>';return;}
  const dtc={physical:'#e07850',fire:'#e05838',lightning:'#e0d438',holy:'#e0c850',none:'var(--text-muted)'}[s.damageType]||'var(--text-dim)';
  const e=s.effect;let rows='';
  if(s.type==='active')rows+=`<div class="sr"><span class="sk">쿨다운</span><span class="sv">${fms(s.cooldown)}</span></div><div class="sr"><span class="sk">이동</span><span class="sv">${s.movement||'—'}</span></div>`;
  else rows+=`<div class="sr"><span class="sk">발동</span><span class="sv">${s.trigger||'—'}</span></div>${s.trigger==='interval'?`<div class="sr"><span class="sk">주기</span><span class="sv">${fms(s.triggerInterval)}</span></div>`:''}`;
  rows+=`<div class="sr"><span class="sk">필요 레벨</span><span class="sv">${s.requireLevel}</span></div><div class="sr"><span class="sk">최대 레벨</span><span class="sv">${s.maxLevel}</span></div><div class="sr"><span class="sk">대상</span><span class="sv g">${e?.target||'—'}</span></div>`;
  if(e?.type==='damage')rows+=`<div class="sr"><span class="sk">배율</span><span class="sv o">${s.atkType||'?'} × ${e.coef} (+${e.levelCoef}/Lv)</span></div>`;
  else if(e?.type==='heal')rows+=`<div class="sr"><span class="sk">회복량</span><span class="sv g">+${e.value} HP</span></div>`;
  else if(e)rows+=`<div class="sr"><span class="sk">${e.type}(${e.stat})</span><span class="sv o">${Math.round((e.value||0)*100)}% / ${fms(e.duration)}</span></div>`;
  const cb=(s.learnableBy||[]).map(c=>`<span style="font-size:8px;padding:1px 5px;border-radius:2px;font-family:var(--font-m);border:1px solid ${CCOL[c]||'#888'}50;color:${CCOL[c]||'#888'};background:${CCOL[c]||'#888'}15;">${c}</span>`).join('');
  w.innerHTML=`<div class="pcard"><div class="pdh">
    <img src="assets/sprites/skills/${s.id}.png" class="pico-img" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="pico" style="display:none">${s.sprite||'✨'}</span>
    <div class="pname">${s.name}</div>
    <div class="pbadges"><span class="badge ${s.type==='active'?'bact':'bpas'}">${s.type}</span>${s.damageType!=='none'?`<span style="font-size:8px;color:${dtc};font-family:var(--font-m);">${s.damageType}</span>`:''}${cb}</div>
  </div>${s.desc?`<div class="pdesc">${s.desc}</div>`:''}<div class="pstats">${rows}</div></div>`;
}

// CRUD
function newSkill(){const id='skill_'+Date.now();skills.push({id,name:'새 스킬',type:'active',atkType:'meleeAtk',damageType:'physical',learnableBy:[],requireLevel:1,maxLevel:5,cooldown:3000,movement:'fly_to_enemy',origin:null,speed:400,trigger:null,triggerInterval:null,levelScale:null,effect:{type:'damage',target:'front_enemy',baseDmg:0,coef:1.0,levelCoef:0.2},sprite:'⚡',desc:''});selectSkill(id);persist();updateSS();toast('새 스킬 생성');}
function delSkill(){if(!curId)return;if(!confirm(`"${gsk(curId)?.name}" 삭제?`))return;skills=skills.filter(s=>s.id!==curId);curId=skills[0]?.id||null;renderSB();if(curId)selectSkill(curId);else{$('edBody').innerHTML='<div class="empty"><div class="eico">✨</div><div class="etxt">스킬을 선택하거나 새로 만드세요</div></div>';$('editingId').textContent='— 선택 없음';refreshOut();}persist();updateSS();toast('삭제');}
function dupeSkill(){if(!curId)return;const src=dc(gsk(curId));src.id+='_copy';src.name+=' (복사)';skills.push(src);selectSkill(src.id);persist();updateSS();toast('복제');}
function saveSkill(){readForm();persist();updateSS();toast('저장됨 ✓');}

function exportAll(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([fmtJS(skills)],{type:'text/javascript'}));a.download='skills.js';a.click();toast('skills.js 다운로드');}
function copyOut(){const s=gsk(curId);navigator.clipboard.writeText(curTab==='single'?fmtJS(s?[s]:[]):fmtJS(skills)).then(()=>toast('복사됨 ✓'));}

$('btnNew').onclick=newSkill;$('btnDel').onclick=delSkill;$('btnDupe').onclick=dupeSkill;$('btnSave').onclick=saveSkill;$('btnExport').onclick=exportAll;$('btnCopy').onclick=copyOut;
$('searchInput').addEventListener('input',e=>renderSB(e.target.value));
$('btnToggleOut').onclick=()=>$('outputPanel').classList.toggle('collapsed');
$('btnReset').onclick=()=>{if(!confirm('초기화?'))return;localStorage.removeItem(LS);skills=dc(SEED);curId=skills[0].id;renderSB();selectSkill(curId);updateSS();toast('초기화');};
$('btnImport').onclick=()=>{$('importModal').style.display='flex';};
['closeImp','closeImp2'].forEach(id=>$(id).onclick=()=>{$('importModal').style.display='none';});
$('doImp').onclick=()=>{
  const raw=$('impTA').value.trim();
  try{const cl=raw.replace(/^var\s+\w+\s*=\s*/,'').replace(/;?\s*$/,'');let p=Function('"use strict"; return ('+cl+')')();if(!Array.isArray(p))p=[p];
  const merge=confirm('추가?\n(취소=전체교체)');skills=merge?[...skills,...p]:p;
  $('importModal').style.display='none';renderSB();if(skills.length)selectSkill(skills[0].id);persist();updateSS();toast(`${p.length}개 가져옴`);}
  catch(e){alert('파싱 오류: '+e.message);}
};

document.querySelectorAll('.chip[data-f]').forEach(c=>{c.addEventListener('click',()=>{
  filterType=c.dataset.f;
  document.querySelectorAll('.chip[data-f]').forEach(x=>x.classList.remove('ca','cact','cpas'));
  c.classList.add(filterType==='all'?'ca':filterType==='active'?'cact':'cpas');
  renderSB($('searchInput').value);
});});

document.querySelectorAll('.outtab').forEach(t=>{t.addEventListener('click',()=>{
  document.querySelectorAll('.outtab').forEach(x=>x.classList.remove('on'));t.classList.add('on');curTab=t.dataset.tab;refreshOut();
});});

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveSkill();}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();dupeSkill();}
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();newSkill();}
});

// INIT
const sv=loadLS();
if(sv){skills=sv.skills;const t=(sv.curId&&skills.find(s=>s.id===sv.curId))?sv.curId:skills[0]?.id;renderSB();if(t)selectSkill(t);updateSS();toast(`${skills.length}개 불러옴`);}
else{skills=dc(SEED);renderSB();selectSkill(skills[0].id);updateSS();}
refreshOut();
</script>
</body>
