<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="tool-name" content="Law Body Viewer">
  <meta name="tool-tag" content="Law API">
  <meta name="tool-description" content="국가법령정보 OPEN API를 이용해 법령명을 검색하고 본문만 빠르게 조회하는 초경량 HTML 도구">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Law Body Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap">
  <script src="parser.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --bg:          #f1f5f9;
      --surface:     #ffffff;
      --border:      #e2e8f0;
      --border-2:    #f1f5f9;
      --text:        #0f172a;
      --muted:       #64748b;
      --subtle:      #94a3b8;
      --accent:      #1d4ed8;
      --accent-h:    #1e40af;
      --accent-bg:   #eff6ff;
      --accent-bd:   #bfdbfe;
      --ok:          #15803d;
      --ok-bg:       #f0fdf4;
      --ok-bd:       #86efac;
      --err:         #b91c1c;
      --err-bg:      #fef2f2;
      --err-bd:      #fca5a5;
      --warn-bg:     #fffbeb;
      --warn-bd:     #fde68a;
      --code-bg:     #0f172a;
      --code-text:   #e2e8f0;
      --code-muted:  #64748b;
      --r-sm:        6px;
      --r:           10px;
      --r-lg:        14px;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.06);
      --shadow:      0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:   0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
    }

    /* ── Reset & base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    button, input { font: inherit; }
    button { cursor: pointer; border: none; background: none; }

    /* ── Header ────────────────────────────────────────────── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--code-bg);
      border-bottom: 1px solid #1e293b;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      padding: 0 20px;
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      height: 58px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      color: #f8fafc;
      text-decoration: none;
    }
    .brand-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }
    .brand-name {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -.02em;
      white-space: nowrap;
    }

    .header-divider { width: 1px; height: 24px; background: #334155; flex-shrink: 0; }

    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .field-group.wide { flex: 1; min-width: 160px; }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--subtle);
    }

    .hdr-input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: var(--r-sm);
      color: #f1f5f9;
      padding: 0 10px;
      height: 32px;
      outline: none;
      width: 100%;
      min-width: 0;
      transition: border-color .15s, box-shadow .15s;
    }
    .hdr-input::placeholder { color: #475569; }
    .hdr-input:focus {
      border-color: var(--accent-h);
      box-shadow: 0 0 0 2px rgba(37,99,235,.35);
    }
    .hdr-input.narrow { width: 90px; }
    .hdr-input.xnarrow { width: 76px; }

    .header-actions { display: flex; align-items: flex-end; gap: 6px; }

    .btn {
      height: 32px;
      padding: 0 12px;
      border-radius: var(--r-sm);
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      transition: opacity .12s, background .12s;
    }
    .btn:hover { opacity: .88; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #334155; color: #cbd5e1; }
    .btn-outline:hover { background: #1e293b; opacity: 1; }

    /* dropdown */
    .dropdown { position: relative; }
    .dropdown-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-md);
      min-width: 140px;
      overflow: hidden;
      z-index: 100;
    }
    .dropdown.open .dropdown-menu { display: block; }
    .dropdown-item {
      display: block;
      width: 100%;
      padding: 8px 14px;
      text-align: left;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background .1s;
    }
    .dropdown-item:hover { background: var(--accent-bg); color: var(--accent); }

    /* ── Status bar ────────────────────────────────────────── */
    .status-bar {
      padding: 10px 20px;
      font-size: 13px;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
    }
    .status-bar.ok    { background: var(--ok-bg);  border-color: var(--ok-bd);  color: var(--ok); }
    .status-bar.error { background: var(--err-bg); border-color: var(--err-bd); color: var(--err); }

    /* ── App body layout ───────────────────────────────────── */
    .app-body {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    .sidebar {
      width: 270px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 16px 10px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--subtle);
      border-bottom: 1px solid var(--border-2);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .result-item {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      transition: border-color .1s, background .1s;
    }
    .result-item:hover { background: var(--accent-bg); border-color: var(--accent-bd); }
    .result-item.active { background: var(--accent-bg); border-color: var(--accent); }

    .result-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 4px;
    }
    .result-item.active .result-title { color: var(--accent); }

    .result-meta {
      font-size: 11px;
      color: var(--subtle);
    }

    .sidebar-empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--subtle);
      font-size: 13px;
    }

    /* ── Main content ──────────────────────────────────────── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 16px;
      gap: 0;
      flex-shrink: 0;
    }
    .tab {
      height: 42px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* Panes */
    .tab-content { flex: 1; overflow: hidden; position: relative; }
    .tab-pane {
      display: none;
      height: 100%;
      overflow-y: auto;
    }
    .tab-pane.active { display: block; }

    /* ── Empty / placeholder ───────────────────────────────── */
    .pane-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--subtle);
      font-size: 14px;
      padding: 40px;
      text-align: center;
    }
    .pane-empty-icon { font-size: 36px; opacity: .4; }

    /* ── Code block ────────────────────────────────────────── */
    .code-block {
      display: block;
      background: var(--code-bg);
      color: var(--code-text);
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 20px 24px;
      min-height: 100%;
      tab-size: 2;
    }

    /* ── View bar (on-demand) ──────────────────────────────── */
    .view-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .view-bar-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--subtle);
      margin-right: 4px;
    }
    .view-btn {
      height: 30px;
      padding: 0 12px;
      border-radius: var(--r-sm);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all .12s;
    }
    .view-btn:hover  { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-bd); }
    .view-btn.active { background: var(--accent);    color: #fff;          border-color: var(--accent); }
    .view-btn:disabled { opacity: .4; cursor: not-allowed; }

    .view-content {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    .view-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--subtle);
      font-size: 13px;
      text-align: center;
      padding: 40px;
    }
    .view-placeholder-icon { font-size: 32px; opacity: .35; }

    /* ── Law viewer ────────────────────────────────────────── */
    .law-viewer {
      padding: 24px 28px;
      max-width: 860px;
    }

    .law-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .law-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }
    .law-meta-chip {
      padding: 3px 10px;
      background: var(--border-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    /* Articles */
    .law-section {
      margin-bottom: 32px;
    }
    .section-heading {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--subtle);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .article {
      margin-bottom: 20px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
    }
    .article-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }
    .article-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .article-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .article-body {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* Appendices */
    .appendix {
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      background: var(--surface);
      overflow: hidden;
    }
    .appendix-header {
      padding: 14px 18px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .appendix-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-bd);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .appendix-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }
    .appendix-body {
      padding: 18px 20px;
    }

    /* Appendix items (항목목록) */
    .ai {
      display: flex;
      gap: 0;
      line-height: 1.78;
      font-size: 13.5px;
    }
    .ai-marker {
      flex-shrink: 0;
      font-weight: 700;
      color: var(--accent);
      margin-right: 0.45em;
    }
    .ai-content { flex: 1; min-width: 0; }
    .ai-text    { flex: 1; min-width: 0; }

    /* depth 0 title (■) */
    .ai.type-title {
      font-weight: 700;
      font-size: 14px;
      background: #f1f5f9;
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 10px 14px 10px 12px;
      margin: 12px 0 10px;
    }
    .ai.type-title .ai-marker { color: #1e3a5f; }

    /* depth 0 note (비고) */
    .ai.type-note {
      background: var(--warn-bg);
      border: 1px solid var(--warn-bd);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      margin: 8px 0;
      font-size: 13px;
    }
    .ai.type-note .ai-marker { color: #92400e; }

    /* depth 0 number (1.) */
    .ai.type-number {
      font-weight: 700;
      color: #1e40af;
      margin-top: 14px;
      margin-bottom: 2px;
    }

    /* depth-based indentation */
    .ai.depth-1  { padding-left: 1.4em; }
    .ai.depth-2  { padding-left: 2.8em; }
    .ai.depth-3  { padding-left: 4.2em; color: #1e293b; }
    .ai.depth-4  { padding-left: 5.6em; color: #334155; }
    .ai.depth-5  { padding-left: 7.0em; color: #475569; }
    .ai.depth-6  { padding-left: 8.4em; color: #64748b; }
    .ai.depth-text { padding-left: 1.4em; color: #475569; font-size: 13px; }

    /* Continuation text */
    .ai.type-text {
      padding-left: 1.4em;
      color: #64748b;
      font-size: 13px;
    }

    /* ── Tabs (removed — using view-bar instead) ──────────── */
    .tab, .tab-pane, .tab-content { display: none !important; }

    /* ── Embedded table ────────────────────────────────────── */
    .law-table-wrap {
      overflow-x: auto;
      margin: 6px 0 4px;
    }
    .law-table {
      border-collapse: collapse;
      font-size: 12.5px;
      min-width: max-content;
    }
    .law-table th, .law-table td {
      border: 1px solid var(--border);
      padding: 5px 12px;
      text-align: left;
      white-space: nowrap;
    }
    .law-table thead th {
      background: #f1f5f9;
      font-weight: 700;
      color: var(--text);
    }
    .law-table tbody tr:nth-child(even) { background: #f8fafc; }
    .tbl-prefix {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .tbl-suffix {
      margin-top: 6px;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.6;
    }
    .tbl-bullets {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .tbl-bullets li {
      padding: 2px 0;
      line-height: 1.55;
    }
    .tbl-bullets li + li {
      border-top: 1px solid var(--border-2);
    }

    /* ── Word Export Panel ─────────────────────────────────── */
    .export-panel {
      padding: 20px 28px;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    .export-panel h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .export-panel .ep-sub {
      font-size: 12px;
      color: var(--subtle);
      margin-bottom: 20px;
    }
    .ep-cols {
      display: flex;
      gap: 16px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }
    .ep-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .ep-col .ep-section-label { margin-top: 0; }
    .ep-col .ep-list { flex: 1; max-height: none; }
    .ep-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--subtle);
      margin: 16px 0 6px;
    }
    .ep-list {
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
    }
    .ep-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border-2);
      transition: background .1s;
    }
    .ep-item:last-child { border-bottom: none; }
    .ep-item:hover { background: var(--accent-bg); }
    .ep-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .ep-item label { cursor: pointer; font-size: 13px; flex: 1; line-height: 1.5; }
    .ep-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ep-sel-btns {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .btn-sm {
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      border-radius: var(--r-sm);
      font-weight: 600;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 900px) {
      .sidebar { width: 220px; }
      .hdr-input.narrow  { width: 72px; }
      .hdr-input.xnarrow { width: 64px; }
    }

    @media (max-width: 700px) {
      .app-body { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 200px;
      }
      .header-inner {
        flex-wrap: wrap;
        height: auto;
        padding: 10px 0;
      }
      .search-row { flex-wrap: wrap; }
      .hdr-input.wide { width: 100%; }
      .brand-name { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">⚖</span>
      <span class="brand-name">법령 뷰어</span>
    </div>
    <div class="header-divider"></div>
    <div class="search-row">
      <div class="field-group">
        <span class="field-label">OC</span>
        <input id="ocInput" class="hdr-input xnarrow" type="text" placeholder="OC키">
      </div>
      <div class="field-group wide">
        <span class="field-label">법령명</span>
        <input id="queryInput" class="hdr-input" type="text" placeholder="예: 폐기물관리법">
      </div>
      <div class="field-group">
        <span class="field-label">조문</span>
        <input id="joInput" class="hdr-input narrow" type="text" placeholder="000300">
      </div>
      <div class="field-group">
        <span class="field-label">시행일</span>
        <input id="efYdInput" class="hdr-input narrow" type="text" placeholder="20240401">
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="searchBtn">검색</button>
      <button class="btn btn-outline" id="copyBtn">URL 복사</button>
      <div class="dropdown" id="dlDropdown">
        <button class="btn btn-outline" id="downloadMenuBtn">다운로드 ▾</button>
        <div class="dropdown-menu">
          <button class="dropdown-item" id="downloadCleanJsonBtn">정리 JSON</button>
          <button class="dropdown-item" id="downloadJsonBtn">JSON</button>
          <button class="dropdown-item" id="downloadXmlBtn">XML</button>
          <button class="dropdown-item" id="downloadHtmlBtn">HTML</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ── Status bar ─────────────────────────────────────────── -->
<div class="status-bar" id="statusBar">
  법령명을 입력하고 검색하면, 목록에서 법령 식별자를 찾은 뒤 본문을 조회합니다.
</div>

<!-- ── App body ────────────────────────────────────────────── -->
<div class="app-body">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">검색 결과</div>
    <div class="sidebar-list" id="resultsBox">
      <div class="sidebar-empty">검색 결과가 없습니다</div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-content">
    <!-- 온디맨드 뷰 선택바 -->
    <div class="view-bar">
      <span class="view-bar-label">보기</span>
      <button class="view-btn" id="vbViewer"  data-view="viewer">⚖ 법령 뷰어</button>
      <button class="view-btn" id="vbClean"   data-view="clean">{ } 정리 JSON</button>
      <button class="view-btn" id="vbRaw"     data-view="raw">📄 원문 JSON</button>
      <button class="view-btn" id="vbUrl"     data-view="url">🔗 요청 URL</button>
      <button class="view-btn" id="vbWord"   data-view="word">📝 Word 내보내기</button>
    </div>

    <!-- 단일 뷰 영역 — 선택 시에만 렌더링 -->
    <div class="view-content" id="viewContent">
      <div class="view-placeholder">
        <div class="view-placeholder-icon">⚖</div>
        <div>법령을 검색하고 위 버튼으로 보기를 선택하세요</div>
      </div>
    </div>
  </div>
</div>

<script>
  'use strict';

  /* ── State ────────────────────────────────────────────────── */
  const STORAGE_KEY = 'law-body-viewer-v3';

  const state = {
    searchItems:     [],
    selectedItem:    null,
    activeItemIndex: -1,
    lastBodyUrl:     '',
    lastRaw:         '',
    lastBodyPayload: null,
    lastCleanJson:   null,
    currentView:     null   // 현재 렌더링된 뷰 타입
  };

  /* ── DOM refs ─────────────────────────────────────────────── */
  const $  = id => document.getElementById(id);
  const oc         = $('ocInput');
  const query      = $('queryInput');
  const jo         = $('joInput');
  const efYd       = $('efYdInput');
  const statusBar  = $('statusBar');
  const resultsBox = $('resultsBox');
  const viewContent= $('viewContent');

  /* ── Utilities ────────────────────────────────────────────── */
  function esc(v) {
    return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function setStatus(msg, kind = '') {
    statusBar.className = `status-bar${kind ? ' ' + kind : ''}`;
    statusBar.textContent = msg;
  }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      oc: oc.value.trim(), query: query.value.trim(),
      jo: jo.value.trim(), efYd: efYd.value.trim()
    }));
  }

  function restore() {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (s.oc)    oc.value    = s.oc;
      if (s.query) query.value = s.query;
      if (s.jo)    jo.value    = s.jo;
      if (s.efYd)  efYd.value  = s.efYd;
    } catch (_) {}
  }

  /* ── URL builders ─────────────────────────────────────────── */
  function buildSearchUrl(q) {
    const p = new URLSearchParams({ OC: oc.value.trim(), target: 'law', type: 'JSON', search: '1', display: '20', query: q.trim() });
    return `https://www.law.go.kr/DRF/lawSearch.do?${p}`;
  }

  function buildBodyUrl(item, fmt = 'JSON') {
    const p = new URLSearchParams({ OC: oc.value.trim(), target: 'eflaw', type: fmt });
    if (item.id) {
      p.set('ID', item.id);
    } else if (item.mst) {
      p.set('MST', item.mst);
      if (efYd.value.trim()) p.set('efYd', efYd.value.trim());
    }
    const joVal = jo.value.trim();
    if (joVal) p.set('JO', joVal);
    return `https://www.law.go.kr/DRF/lawService.do?${p}`;
  }

  /* ── Fetch helpers ────────────────────────────────────────── */
  async function fetchJson(url) {
    const res  = await fetch(url, { headers: { Accept: 'application/json' } });
    const text = await res.text();
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return { parsed: JSON.parse(text), text };
  }

  async function fetchText(url) {
    const res  = await fetch(url);
    const text = await res.text();
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return text;
  }

  /* ── On-demand view system ────────────────────────────────── */
  function showView(type) {
    state.currentView = type;

    // 버튼 활성화
    document.querySelectorAll('.view-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.view === type)
    );

    switch (type) {
      case 'viewer':
        renderViewerInto();
        break;
      case 'clean':
        if (!state.lastCleanJson) {
          viewContent.innerHTML = `<div class="view-placeholder"><div class="view-placeholder-icon">{ }</div><div>XML→JSON 버튼을 먼저 실행하세요</div></div>`;
        } else {
          viewContent.innerHTML = `<pre class="code-block">${esc(JSON.stringify(state.lastCleanJson, null, 2))}</pre>`;
        }
        break;
      case 'raw':
        if (!state.lastRaw) {
          viewContent.innerHTML = `<div class="view-placeholder"><div class="view-placeholder-icon">📄</div><div>아직 불러온 원문이 없습니다</div></div>`;
        } else {
          viewContent.innerHTML = `<pre class="code-block">${esc(state.lastRaw)}</pre>`;
        }
        break;
      case 'url':
        if (!state.lastBodyUrl) {
          viewContent.innerHTML = `<div class="view-placeholder"><div class="view-placeholder-icon">🔗</div><div>아직 생성된 URL이 없습니다</div></div>`;
        } else {
          viewContent.innerHTML = `<pre class="code-block">${esc(state.lastBodyUrl)}</pre>`;
        }
        break;
      case 'word':
        renderExportView();
        break;
    }
  }

  document.querySelector('.view-bar').addEventListener('click', e => {
    const btn = e.target.closest('[data-view]');
    if (btn) showView(btn.dataset.view);
  });

  /* ── Dropdown ─────────────────────────────────────────────── */
  $('downloadMenuBtn').addEventListener('click', e => {
    e.stopPropagation();
    $('dlDropdown').classList.toggle('open');
  });
  document.addEventListener('click', () => $('dlDropdown').classList.remove('open'));

  /* ── Render: search results ───────────────────────────────── */
  function renderResults() {
    if (!state.searchItems.length) {
      resultsBox.innerHTML = '<div class="sidebar-empty">검색 결과가 없습니다</div>';
      return;
    }
    resultsBox.innerHTML = state.searchItems.map((item, i) => `
      <div class="result-item${state.activeItemIndex === i ? ' active' : ''}" data-index="${i}">
        <div class="result-title">${esc(item.title)}</div>
        <div class="result-meta">${item.date ? '시행 ' + item.date : ''}${item.id ? ' · ID ' + item.id : ''}</div>
      </div>
    `).join('');
    resultsBox.querySelectorAll('[data-index]').forEach(el => {
      el.addEventListener('click', () => fetchBody(state.searchItems[Number(el.dataset.index)], Number(el.dataset.index)));
    });
  }

  /* ── Render: law viewer (on demand) ──────────────────────── */

  // item.table = [{헤더1: 값, 헤더2: 값, ...}, ...] 형태
  // 값이 배열이면 ○ 불릿 목록으로 렌더링
  function renderCellValue(v) {
    if (v === undefined || v === null || v === '') return '';
    if (Array.isArray(v)) {
      return `<ul class="tbl-bullets">${v.map(s => `<li>${esc(s)}</li>`).join('')}</ul>`;
    }
    return esc(String(v));
  }

  function renderTableHtml(item) {
    const data = item.table;
    if (!data || !data.length) return '';
    // 모든 행의 키를 수집해 헤더 완성 (행마다 열 수가 다를 수 있음)
    const headerSet = [];
    data.forEach(row => Object.keys(row).forEach(k => { if (!headerSet.includes(k)) headerSet.push(k); }));
    const thead  = `<thead><tr>${headerSet.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>`;
    const tbody  = `<tbody>${data.map(row =>
      `<tr>${headerSet.map(h => `<td>${renderCellValue(row[h])}</td>`).join('')}</tr>`
    ).join('')}</tbody>`;
    const prefix = item.text ? `<span class="tbl-prefix">${esc(item.text)}</span>` : '';
    const note   = item.note ? `<div class="tbl-suffix">${esc(item.note)}</div>` : '';
    return `${prefix}<div class="law-table-wrap"><table class="law-table">${thead}${tbody}</table></div>${note}`;
  }

  function renderAppendixItems(items) {
    if (!items || !items.length) return '';
    return items.map(item => {
      const depthCls = item.depth !== null ? `depth-${item.depth}` : 'depth-text';
      const typeCls  = `type-${item.type}`;
      const marker   = item.marker ? `<span class="ai-marker">${esc(item.marker)}</span>` : '';
      const content  = item.table
        ? renderTableHtml(item)
        : `<span class="ai-text">${esc(item.text)}</span>`;
      return `<div class="ai ${depthCls} ${typeCls}">${marker}<div class="ai-content">${content}</div></div>`;
    }).join('');
  }

  function renderValueNode(value, keyName = '') {
    if (!value && value !== 0) return '';

    /* 별표내용 = 항목목록 배열 직접 */
    if (keyName === '별표내용' && Array.isArray(value)) {
      return renderAppendixItems(value);
    }

    /* 별표 unit */
    if (typeof value === 'object' && !Array.isArray(value) &&
        (value['별표번호'] || value['별표제목'] || value['별표내용'])) {
      const num   = value['별표번호']  || '';
      const title = value['별표제목']  || '';
      const inner = value['별표내용']  ? renderValueNode(value['별표내용'], '별표내용') : '';
      return `
        <div class="appendix">
          <div class="appendix-header">
            ${num ? `<span class="appendix-badge">별표 ${esc(num)}</span>` : ''}
            <span class="appendix-title">${esc(title)}</span>
          </div>
          <div class="appendix-body">${inner || '<span style="color:var(--subtle)">내용 없음</span>'}</div>
        </div>`;
    }

    /* 조문 unit */
    if (typeof value === 'object' && !Array.isArray(value) &&
        (value['조문번호'] || value['조문제목'])) {
      const num     = value['조문번호']     || '';
      const branch  = value['조문가지번호'] || '';
      const title   = value['조문제목']     || '';
      const content = value['조문내용']     || '';
      const label   = num ? `제${num}${branch ? `의${branch}` : ''}조` : '';
      return `
        <div class="article">
          <div class="article-header">
            ${label ? `<span class="article-num">${esc(label)}</span>` : ''}
            ${title ? `<span class="article-title">${esc(title)}</span>` : ''}
          </div>
          ${content ? `<div class="article-body">${esc(content)}</div>` : ''}
        </div>`;
    }

    /* Array */
    if (Array.isArray(value)) {
      return value.map(v => renderValueNode(v, keyName)).join('');
    }

    /* Generic object — recurse, skip boring keys */
    if (typeof value === 'object') {
      const SKIP_RENDER = new Set(['_text']);
      return Object.entries(value)
        .filter(([k]) => !SKIP_RENDER.has(k))
        .map(([k, v]) => renderValueNode(v, k))
        .join('');
    }

    return '';
  }

  function renderViewerInto() {
    const cleanJson  = state.lastCleanJson;
    const rawPayload = state.lastBodyPayload;
    const payload    = cleanJson || rawPayload;

    if (!payload) {
      viewContent.innerHTML = `<div class="view-placeholder"><div class="view-placeholder-icon">⚖</div><div>법령을 검색하고 선택하세요</div></div>`;
      return;
    }

    const title = LawParser.extractLawTitle(payload, state.selectedItem);
    const root  = (cleanJson && cleanJson['법령']) || (rawPayload && rawPayload['법령']) || payload;

    /* metadata chips */
    const metaKeys   = ['공포번호','공포일자','시행일자','법령ID','법령일련번호'];
    const metaLabels = { 공포번호:'공포번호', 공포일자:'공포일', 시행일자:'시행일', 법령ID:'ID', 법령일련번호:'MST' };
    const chips = metaKeys
      .filter(k => root[k] || (root['기본정보'] && root['기본정보'][k]))
      .map(k => {
        const v = root[k] || (root['기본정보'] && root['기본정보'][k]);
        return `<span class="law-meta-chip">${metaLabels[k]}: ${esc(String(v))}</span>`;
      }).join('');

    /* body content */
    const SKIP_TOP = new Set(['기본정보','법령명','법령명한글','법령명_한글','공포번호','공포일자','시행일자','법령ID','법령일련번호']);
    const bodyHtml = Object.entries(root)
      .filter(([k]) => !SKIP_TOP.has(k))
      .map(([k, v]) => renderValueNode(v, k))
      .join('');

    const notice = !cleanJson
      ? `<div style="margin-bottom:16px;padding:10px 14px;background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:var(--r);font-size:13px;color:#92400e;">XML→JSON을 실행하면 별표 구조가 계층적으로 표시됩니다.</div>`
      : '';

    viewContent.innerHTML = `
      <div class="law-viewer">
        <h2 class="law-title">${esc(title)}</h2>
        ${chips ? `<div class="law-meta">${chips}</div>` : ''}
        ${notice}
        ${bodyHtml.trim() || `<div style="color:var(--subtle);padding:16px 0;">렌더링할 본문 구조가 없습니다.</div>`}
      </div>`;
  }

  /* ── Search ───────────────────────────────────────────────── */
  async function searchLaws() {
    persist();
    const ocVal = oc.value.trim();
    const qVal  = query.value.trim();
    if (!ocVal) { setStatus('OC 값을 입력해 주세요.', 'error'); return; }
    if (!qVal)  { setStatus('법령명을 입력해 주세요.', 'error'); return; }

    setStatus('법령명 검색 중...');
    resultsBox.innerHTML = '<div class="sidebar-empty">검색 중...</div>';

    try {
      const { parsed } = await fetchJson(buildSearchUrl(qVal));
      const items = LawParser.extractLawItems(parsed);
      state.searchItems = items;
      state.activeItemIndex = -1;
      renderResults();

      if (!items.length) { setStatus('검색 결과가 없습니다.', 'error'); return; }
      setStatus(`${items.length}건 검색됨 — 목록에서 법령을 클릭하세요.`, 'ok');
    } catch (err) {
      setStatus('검색 실패 — CORS 또는 API 인증 설정을 확인하세요.', 'error');
      resultsBox.innerHTML = `<div class="sidebar-empty" style="color:var(--err)">${esc(String(err.message || err))}</div>`;
    }
  }

  /* ── Fetch body ───────────────────────────────────────────── */
  async function fetchBody(item, index = -1) {
    state.selectedItem    = item;
    state.activeItemIndex = index;
    state.lastCleanJson   = null;
    renderResults();

    const url = buildBodyUrl(item);
    state.lastBodyUrl = url;
    persist();
    setStatus(`"${item.title}" 본문 불러오는 중...`);

    try {
      const { parsed, text } = await fetchJson(url);
      state.lastBodyPayload = parsed;
      state.lastRaw = text;
      setStatus(`"${item.title}" 본문을 불러왔습니다. XML 파싱 중...`);
      if (state.currentView) showView(state.currentView);
      await parseXmlToCleanJson(/* silent */ true);
      setStatus(`"${item.title}" 로드 완료.`, 'ok');
      if (state.currentView) showView(state.currentView);
    } catch (err) {
      state.lastBodyPayload = null;
      state.lastRaw = '';
      setStatus(`본문 조회 실패 — ID/MST 및 API 인증 설정을 확인하세요. (${err.message || err})`, 'error');
      if (state.currentView) showView(state.currentView);
    }
  }

  /* ── XML → Clean JSON ─────────────────────────────────────── */
  async function parseXmlToCleanJson(silent = false) {
    if (!state.selectedItem) { setStatus('먼저 법령을 선택해 주세요.', 'error'); return; }
    const url = buildBodyUrl(state.selectedItem, 'XML');
    try {
      if (!silent) setStatus('XML 파싱 중...');
      const xmlText = await fetchText(url);
      const doc     = new DOMParser().parseFromString(xmlText, 'application/xml');
      if (doc.querySelector('parsererror')) throw new Error('XML 파싱 오류');
      const root = doc.documentElement;
      const json = { [root.nodeName]: LawParser.compactValue(LawParser.xmlElementToJson(root)) };
      state.lastCleanJson = json;
      if (!silent) {
        setStatus('XML → 정리 JSON 변환 완료. 위 버튼으로 보기를 선택하세요.', 'ok');
        if (state.currentView) showView(state.currentView);
      }
    } catch (err) {
      state.lastCleanJson = null;
      if (!silent) {
        setStatus(`XML → 정리 JSON 변환 실패: ${err.message || err}`, 'error');
        if (state.currentView === 'clean') showView('clean');
      }
    }
  }

  /* ── Download helpers ─────────────────────────────────────── */
  function downloadBlob(filename, content, mime) {
    const blob = new Blob([content], { type: mime || 'text/plain;charset=utf-8' });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  }

  function downloadCleanJson() {
    if (!state.lastCleanJson) { setStatus('먼저 XML→JSON을 실행해 주세요.', 'error'); return; }
    downloadBlob('law-body-clean.json', JSON.stringify(state.lastCleanJson, null, 2), 'application/json;charset=utf-8');
    setStatus('정리 JSON 다운로드 완료', 'ok');
  }

  async function downloadBody(fmt) {
    if (!state.selectedItem) { setStatus('먼저 법령을 선택해 주세요.', 'error'); return; }
    try {
      const text = await fetchText(buildBodyUrl(state.selectedItem, fmt));
      downloadBlob(`law-body.${fmt.toLowerCase()}`, text);
      setStatus(`${fmt} 다운로드 완료`, 'ok');
    } catch (err) {
      setStatus(`${fmt} 다운로드 실패`, 'error');
    }
  }

  async function copyBodyUrl() {
    if (!state.lastBodyUrl) { setStatus('먼저 법령을 선택해 주세요.', 'error'); return; }
    try {
      await navigator.clipboard.writeText(state.lastBodyUrl);
      setStatus('URL 복사 완료', 'ok');
    } catch (_) {
      setStatus('클립보드 복사 실패', 'error');
    }
  }

  /* ── Word Export ──────────────────────────────────────────── */

  function collectExportItems() {
    const cleanJson = state.lastCleanJson;
    if (!cleanJson) return { articles: [], appendices: [] };
    const articles = [], appendices = [];
    function visit(node, depth) {
      if (!node || typeof node !== 'object' || depth > 10) return;
      if (Array.isArray(node)) { node.forEach(n => visit(n, depth)); return; }
      if (node['조문번호'] !== undefined && node['조문번호'] !== null && node['조문번호'] !== '') {
        articles.push(node); return;
      }
      if ((node['별표번호'] !== undefined || node['별표제목'] !== undefined) && node['별표내용']) {
        appendices.push(node); return;
      }
      for (const v of Object.values(node)) visit(v, depth + 1);
    }
    visit(cleanJson, 0);
    return { articles, appendices };
  }

  function getArticleLabel(a) {
    const num = a['조문번호'] || '';
    const branch = a['조문가지번호'] || '';
    const title = a['조문제목'] || '';
    const label = num ? `제${num}${branch ? `의${branch}` : ''}조` : '';
    return label + (title ? ` (${title})` : '');
  }

  function stripZeros(s) {
    if (!s) return '';
    const n = parseInt(s, 10);
    return isNaN(n) ? s : String(n);
  }

  function getAppendixNumStr(a) {
    const num    = Number(a['별표번호']    || 0);
    const branch = Number(a['별표가지번호'] || 0);
    return `별표 ${num}${branch > 0 ? `의${branch}` : ''}`;
  }

  function getAppendixLabel(a) {
    const numStr = getAppendixNumStr(a);
    const title  = a['별표제목'] || '';
    return `${numStr}${title ? `  ${title}` : ''}`;
  }

  // Returns [{text, depth, bold}]
  function getArticleRowObjects(article) {
    const content = String(article['조문내용'] || '').trim();
    if (!content) return [];
    return content.split('\n').map(l => l.trim()).filter(Boolean)
      .map(text => ({ text, depth: 0, bold: false }));
  }

  function getAppendixRowObjects(appendix) {
    const items = appendix['별표내용'];
    if (!Array.isArray(items)) return [];
    const rows = [];
    for (const item of items) {
      if (item.type === 'table-block') {
        if (item.table && Array.isArray(item.table)) {
          for (const row of item.table) {
            const vals = Object.values(row).map(v => Array.isArray(v) ? v.join(', ') : String(v || ''));
            rows.push({ text: vals.join(' | '), depth: 0, bold: false });
          }
        }
      } else {
        const text = ((item.marker ? item.marker + ' ' : '') + (item.text || '')).trim();
        if (text) rows.push({
          text,
          depth: item.depth || 0,
          bold: item.type === 'title' || item.type === 'number'
        });
      }
    }
    return rows;
  }

  function renderExportView() {
    if (!state.lastCleanJson) {
      viewContent.innerHTML = `<div class="view-placeholder"><div class="view-placeholder-icon">📝</div><div>XML→JSON을 먼저 실행해야 Word 내보내기가 가능합니다</div></div>`;
      return;
    }
    const { articles, appendices } = collectExportItems();
    const title = LawParser.extractLawTitle(state.lastCleanJson, state.selectedItem);

    let html = `<div class="export-panel">
      <div class="ep-actions" style="margin-top:0;margin-bottom:14px;">
        <div>
          <h3 style="margin-bottom:2px;">Word 내보내기</h3>
          <div class="ep-sub" style="margin-bottom:0;">${esc(title)}</div>
        </div>
        <button class="btn btn-primary" id="doExportBtn" style="margin-left:auto;">Word 문서 생성</button>
        <div class="ep-sel-btns">
          <button class="btn btn-outline btn-sm" id="epSelectAll">전체 선택</button>
          <button class="btn btn-outline btn-sm" id="epDeselectAll">전체 해제</button>
        </div>
      </div>
      <div class="ep-cols">`;

    if (articles.length) {
      html += `<div class="ep-col">
        <div class="ep-section-label">조문 (${articles.length}건)</div>
        <div class="ep-list">`;
      articles.forEach((a, i) => {
        html += `<div class="ep-item"><input type="checkbox" id="ea${i}" data-type="article" data-index="${i}">
          <label for="ea${i}">${esc(getArticleLabel(a))}</label></div>`;
      });
      html += `</div></div>`;
    }
    if (appendices.length) {
      html += `<div class="ep-col">
        <div class="ep-section-label">별표 (${appendices.length}건)</div>
        <div class="ep-list">`;
      appendices.forEach((a, i) => {
        html += `<div class="ep-item"><input type="checkbox" id="eb${i}" data-type="appendix" data-index="${i}">
          <label for="eb${i}">${esc(getAppendixLabel(a))}</label></div>`;
      });
      html += `</div></div>`;
    }

    if (!articles.length && !appendices.length) {
      html += `<div style="color:var(--subtle);padding:16px 0;">조문 또는 별표 데이터가 없습니다.</div>`;
    }

    html += `</div></div>`; // ep-cols / export-panel

    viewContent.innerHTML = html;
    viewContent._epArticles = articles;
    viewContent._epAppendices = appendices;

    $('doExportBtn').addEventListener('click', exportToWord);
    $('epSelectAll').addEventListener('click', () =>
      viewContent.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true));
    $('epDeselectAll').addEventListener('click', () =>
      viewContent.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false));
  }

  function loadDocxLib() {
    if (typeof docx === 'undefined') throw new Error('docx 라이브러리가 로드되지 않았습니다. 페이지를 새로고침해 주세요.');
  }

  async function exportToWord() {
    setStatus('Word 문서 생성 중...', 'ok');
    try { loadDocxLib(); } catch (e) { setStatus(e.message, 'error'); return; }

    const { Document, Packer, Table, TableRow, TableCell, Paragraph, TextRun,
            WidthType, AlignmentType, BorderStyle } = docx;

    const articles   = viewContent._epArticles   || [];
    const appendices = viewContent._epAppendices || [];
    const selArticles = [], selAppendices = [];
    viewContent.querySelectorAll('input[data-type=article]:checked')
      .forEach(cb => selArticles.push(articles[Number(cb.dataset.index)]));
    viewContent.querySelectorAll('input[data-type=appendix]:checked')
      .forEach(cb => selAppendices.push(appendices[Number(cb.dataset.index)]));

    if (!selArticles.length && !selAppendices.length) {
      setStatus('내보낼 항목을 선택해 주세요.', 'error'); return;
    }

    const lawTitle = LawParser.extractLawTitle(state.lastCleanJson, state.selectedItem);

    /* ── 테두리 상수 ── */
    const OUTER = { style: BorderStyle.THICK,  size: 12, color: '000000' };
    const INNER = { style: BorderStyle.SINGLE, size: 6,  color: '000000' };
    const NIL   = { style: BorderStyle.NIL };

    // 바깥 4선 두껍게, insideH NIL (셀 레벨에서도 보조)
    const tableBorders = { top: OUTER, bottom: OUTER, left: OUTER, right: OUTER, insideH: NIL };

    // 헤더/서브헤더 셀 경계 — top/외곽 미지정으로 테이블 외곽선 상속
    const hdrBorder = { bottom: INNER };
    const subL      = { bottom: INNER, right: INNER };
    const subR      = { bottom: INNER };

    /* ── 날짜 포맷 YYYYMMDD → YYYY. M. D. ── */
    function fmtDate(d) {
      if (!d || d.length !== 8) return '';
      return `${d.slice(0,4)}. ${parseInt(d.slice(4,6))}. ${parseInt(d.slice(6,8))}.`;
    }

    /* ── 헤더 행: line1 좌측정렬(+날짜 파란색), line2 가운데정렬 ── */
    function headerRow(line1, line2, dateStr) {
      const p1runs = [new TextRun({ text: line1, bold: true, size: 18 })];
      if (dateStr) p1runs.push(new TextRun({ text: `  <${dateStr}>`, color: '1d4ed8', size: 18 }));
      const children = [new Paragraph({ children: p1runs })]; // 좌측정렬 (기본값)
      if (line2) children.push(new Paragraph({
        alignment: AlignmentType.CENTER,
        children: [new TextRun({ text: line2, bold: true, size: 22 })]
      }));
      return new TableRow({
        children: [new TableCell({ columnSpan: 2, borders: hdrBorder, children })]
      });
    }

    /* ── 서브헤더 행: 기준 | 준수계획 ── */
    function subHeaderRow() {
      return new TableRow({ children: [
        new TableCell({ borders: subL, width: { size: 50, type: WidthType.PERCENTAGE },
          children: [new Paragraph({ alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: '기준', bold: true, size: 21 })] })] }),
        new TableCell({ borders: subR, width: { size: 50, type: WidthType.PERCENTAGE },
          children: [new Paragraph({ alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: '준수계획', bold: true, size: 21 })] })] })
      ]});
    }

    /* ── 데이터 행
         isLast=false : top+bottom 모두 NIL → 행 사이 가로선 없음
         isLast=true  : top만 NIL, bottom 미지정 → 테이블 bottom:OUTER 상속 (하단 굵은 선)
    ── */
    function dataRow({ text, depth, bold }, isLast) {
      const bL = isLast ? { top: NIL, right: INNER } : { top: NIL, bottom: NIL, right: INNER };
      const bR = isLast ? { top: NIL }               : { top: NIL, bottom: NIL };
      return new TableRow({ children: [
        new TableCell({ borders: bL, width: { size: 50, type: WidthType.PERCENTAGE },
          children: [new Paragraph({
            indent: depth ? { left: depth * 150 } : undefined,
            children: [new TextRun({ text, bold, size: 20 })]
          })] }),
        new TableCell({ borders: bR, width: { size: 50, type: WidthType.PERCENTAGE },
          children: [new Paragraph({})] })
      ]});
    }

    function buildTable(line1, line2, dateStr, rowObjects) {
      const last = rowObjects.length - 1;
      return new Table({
        width: { size: 100, type: WidthType.PERCENTAGE },
        borders: tableBorders,
        rows: [
          headerRow(line1, line2, dateStr),
          subHeaderRow(),
          ...rowObjects.map((r, i) => dataRow(r, i === last))
        ]
      });
    }

    /* ── [시행일] 및 날짜 줄 필터 ── */
    function isSkippedRow(item) {
      const t = item.text || '';
      if (t.includes('[시행일]')) return true;
      if (/:\s*\d{4}년\s*\d{1,2}월\s*\d{1,2}일\s*$/.test(t)) return true;
      return false;
    }

    /* ── 별표: 필드에서 헤더 직접 조립 ── */
    function appendixExport(a) {
      const numStr  = getAppendixNumStr(a);               // "별표 5의4"
      const line1   = `■ ${lawTitle} [${numStr}]`;        // 좌측
      const line2   = a['별표제목'] || '';                  // 가운데
      const dateStr = fmtDate(a['별표시행일자'] || '');
      const items   = Array.isArray(a['별표내용']) ? a['별표내용'] : [];
      // 첫 title(■) 항목 및 [시행일]/날짜 줄 제외
      const firstTitle = items.find(it => it.type === 'title');
      const dataItems  = (firstTitle ? items.filter(it => it !== firstTitle) : items)
                         .filter(it => !isSkippedRow(it));
      const rows = [];
      for (const item of dataItems) {
        if (item.type === 'table-block') {
          if (item.table) item.table.forEach(r => {
            const vals = Object.values(r).map(v => Array.isArray(v) ? v.join(', ') : String(v || ''));
            rows.push({ text: vals.join(' | '), depth: 0, bold: false });
          });
        } else {
          const text = ((item.marker ? item.marker + ' ' : '') + (item.text || '')).trim();
          if (text) rows.push({ text, depth: item.depth || 0,
            bold: item.type === 'title' || item.type === 'number' });
        }
      }
      return { line1, line2, dateStr, rows };
    }

    /* ── 조문 ── */
    function articleExport(a) {
      const num    = a['조문번호']     || '';
      const branch = a['조문가지번호'] || '';
      const title  = a['조문제목']     || '';
      const ref    = num ? `제${num}${branch ? `의${branch}` : ''}조` : '';
      const line1  = `${lawTitle} [${ref}]`;
      const rows   = (String(a['조문내용'] || '').trim())
        .split('\n').map(l => l.trim()).filter(Boolean)
        .map(text => ({ text, depth: 0, bold: false }));
      return { line1, line2: title, dateStr: '', rows };
    }

    const allSelected = [
      ...selArticles.map(articleExport),
      ...selAppendices.map(appendixExport)
    ].filter(s => s.rows.length > 0);

    if (!allSelected.length) {
      setStatus('선택된 항목에 내용이 없습니다.', 'error'); return;
    }

    const doc = new Document({
      sections: allSelected.map(sel => ({
        children: [buildTable(sel.line1, sel.line2, sel.dateStr, sel.rows)]
      }))
    });

    const blob = await Packer.toBlob(doc);
    downloadBlob(`${lawTitle || 'law'}-준수계획.docx`, blob,
      'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
    setStatus('Word 문서 다운로드 완료', 'ok');
  }

  /* ── Event bindings ───────────────────────────────────────── */
  $('searchBtn').addEventListener('click', searchLaws);
  $('copyBtn').addEventListener('click', copyBodyUrl);
  $('downloadCleanJsonBtn').addEventListener('click', downloadCleanJson);
  $('downloadJsonBtn').addEventListener('click', () => downloadBody('JSON'));
  $('downloadXmlBtn').addEventListener('click', () => downloadBody('XML'));
  $('downloadHtmlBtn').addEventListener('click', () => downloadBody('HTML'));

  [oc, query, jo, efYd].forEach(el => {
    el.addEventListener('input', persist);
    el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); searchLaws(); } });
  });

  /* ── Init ─────────────────────────────────────────────────── */
  restore();
</script>
</body>
