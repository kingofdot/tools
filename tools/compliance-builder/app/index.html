<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준수계획서 작성 도구</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;font-size:13px;background:#f0f2f5;color:#222}
header{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:600}
#code-bar{background:#0d2b45;color:#7ec8e3;font-family:monospace;font-size:12px;padding:6px 20px;letter-spacing:.5px;min-height:28px}
.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 70px)}
.panel{overflow-y:auto;padding:14px}
.panel-left{background:#fff;border-right:1px solid #dde}
.panel-right{background:#f8f9fb}
.section{margin-bottom:14px}
.section-title{font-size:11px;font-weight:700;color:#1a3a5c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e0e4ea}
.field{margin-bottom:8px}
.field label{display:block;font-size:11px;color:#555;margin-bottom:3px}
select,input[type=text]{width:100%;padding:5px 8px;border:1px solid #ccd;border-radius:4px;font-size:12px;font-family:inherit}
select:focus,input:focus{outline:none;border-color:#1a3a5c}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.checkbox-grid.three{grid-template-columns:1fr 1fr 1fr}
.cb-item{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 0}
.cb-item input{margin:0;flex-shrink:0}
.ft-group{margin-bottom:8px}
.ft-group-title{font-size:10px;font-weight:700;color:#888;margin-bottom:3px}
.btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-primary{background:#1a3a5c;color:#fff}
.btn-primary:hover{background:#245080}
.btn-secondary{background:#e8ecf0;color:#333}
.btn-secondary:hover{background:#d8dce0}
.btn-row{display:flex;gap:6px;margin-top:6px}
#result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#result-count{font-size:12px;color:#666}
.item-card{background:#fff;border:1px solid #e0e4ea;border-radius:6px;margin-bottom:8px;overflow:hidden}
.item-card.selected{border-color:#1a3a5c;background:#f0f5ff}
.item-header{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;cursor:pointer}
.item-cb{margin-top:2px;flex-shrink:0}
.item-marker{font-size:11px;font-weight:700;color:#1a3a5c;min-width:30px}
.item-text{font-size:12px;line-height:1.6;flex:1}
.item-answer{font-size:12px;color:#2a6;background:#f5fff8;border-top:1px solid #ddeedd;padding:8px 10px 8px 48px;line-height:1.6;display:none}
.item-card.open .item-answer{display:block}
.item-tags{font-size:10px;color:#aaa;padding:0 10px 6px 48px;display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{background:#e8ecf0;border-radius:10px;padding:1px 6px}
.tag-pill.action{background:#e8f0fe;color:#1a4a9c}
.tag-pill.facility{background:#fff3cd;color:#7a5c00}
#export-bar{position:sticky;bottom:0;background:#fff;border-top:1px solid #dde;padding:8px 14px;display:flex;gap:8px;align-items:center}
#selected-count{font-size:12px;color:#666;flex:1}
.wastevar{font-weight:600;color:#c06000}
</style>
</head>
<body>
<header>
  <h1>폐기물 준수계획서 작성 도구</h1>
  <span style="font-size:11px;opacity:.7">별표5 기준 검토 · 별표5 항목 선택 · 텍스트 내보내기</span>
</header>
<div id="code-bar">상황코드: —</div>
<div class="layout">
  <div class="panel panel-left" id="left-panel">
    <div class="section">
      <div class="section-title">분류 정보</div>
      <div class="field">
        <label>대분류 (category)</label>
        <select id="f-category">
          <option value="">선택</option>
          <option value="W01">W01 — 폐기물처리업 허가</option>
          <option value="W02">W02 — 폐기물처리 신고</option>
          <option value="W03">W03 — 폐기물처분·재활용시설 설치 승인</option>
          <option value="W04">W04 — 사업장폐기물배출자 신고</option>
          <option value="W05">W05 — 폐기물처분·재활용시설 설치 신고</option>
        </select>
      </div>
      <div class="field">
        <label>업종·신고유형 (bizType)</label>
        <select id="f-bizType"><option value="">— 대분류 먼저 선택 —</option></select>
      </div>
      <div class="field">
        <label>문서 종류 (docType)</label>
        <select id="f-docType"><option value="">— 대분류 먼저 선택 —</option></select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">폐기물 정보</div>
      <div class="field">
        <label>폐기물 대분류 (wasteClass)</label>
        <select id="f-wasteClass">
          <option value="">선택</option>
          <option value="D">D — 지정폐기물 (01-xx ~ 11-xx, 의료폐기물 10-xx 포함)</option>
          <option value="GO">GO — 사업장배출시설계폐기물 (51-xx 중, 대기·수질 등 배출시설 허가사업장에서 발생)</option>
          <option value="GN">GN — 사업장비배출시설계폐기물 (51-xx 중, 배출시설 허가 대상이 아닌 사업장에서 발생)</option>
          <option value="L">L — 생활폐기물 (91-xx)</option>
        </select>
      </div>
      <div class="field">
        <label>폐기물 코드 (wasteCode, 복수 가능)</label>
        <input type="text" id="f-wasteCode" placeholder="예: 01-06+01-07  (없으면 0)">
      </div>
      <div class="field">
        <label>폐기물 물리적 상태 (physicalState)</label>
        <select id="f-physicalState">
          <option value="">선택 안 함 (전체)</option>
          <option value="S">S — 고상 (고체 상태)</option>
          <option value="L">L — 액상 (액체 상태)</option>
          <option value="SL">S+L — 고상+액상 (둘 다)</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">처리 행위 (action)</div>
      <div class="checkbox-grid">
        <label class="cb-item"><input type="checkbox" class="cb-action" value="CT"> CT 수집·운반</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="ST"> ST 보관</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="MI"> MI 중간처분</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="FI"> FI 최종처분</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="RCY"> RCY 재활용</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">재활용 유형 (rCode)</div>
      <div class="checkbox-grid">
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R1"> R1</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R2"> R2</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R3"> R3</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R4"> R4</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R5"> R5</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R6"> R6</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R7"> R7</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R8"> R8</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R9"> R9</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R10"> R10</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R11"> R11</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">처리시설 종류 (facilityType)</div>
      
      <div class="ft-group">
        <div class="ft-group-title">소각</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="일반소각시설"><input type="checkbox" class="cb-ft" value="INC_G"> INC_G</label>
          <label class="cb-item" title="고온소각시설"><input type="checkbox" class="cb-ft" value="INC_H"> INC_H</label>
          <label class="cb-item" title="열분해소각시설"><input type="checkbox" class="cb-ft" value="INC_P"> INC_P</label>
          <label class="cb-item" title="고온용융시설"><input type="checkbox" class="cb-ft" value="INC_F"> INC_F</label>
          <label class="cb-item" title="열처리조합시설"><input type="checkbox" class="cb-ft" value="INC_C"> INC_C</label>
          <label class="cb-item" title="소각열회수시설 (200kg/h 이상)"><input type="checkbox" class="cb-ft" value="INC_R"> INC_R</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">기계적 처분</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="압축시설 (처분, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCD_CMP"> MCD_CMP</label>
          <label class="cb-item" title="파쇄·분쇄시설 (처분, 15kW↑)"><input type="checkbox" class="cb-ft" value="MCD_SHR"> MCD_SHR</label>
          <label class="cb-item" title="절단시설 (처분, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCD_CUT"> MCD_CUT</label>
          <label class="cb-item" title="용융시설 (처분, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCD_MLT"> MCD_MLT</label>
          <label class="cb-item" title="증발·농축시설 (처분)"><input type="checkbox" class="cb-ft" value="MCD_EVP"> MCD_EVP</label>
          <label class="cb-item" title="정제시설 (처분) - 분리·증류·추출·여과"><input type="checkbox" class="cb-ft" value="MCD_PUR"> MCD_PUR</label>
          <label class="cb-item" title="유수분리시설 (처분)"><input type="checkbox" class="cb-ft" value="MCD_OWS"> MCD_OWS</label>
          <label class="cb-item" title="탈수·건조시설 (처분)"><input type="checkbox" class="cb-ft" value="MCD_DRY"> MCD_DRY</label>
          <label class="cb-item" title="멸균분쇄시설"><input type="checkbox" class="cb-ft" value="MCD_STR"> MCD_STR</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">기계적 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="압축·압출·성형·주조시설 (재활, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCR_CMP"> MCR_CMP</label>
          <label class="cb-item" title="파쇄·분쇄·탈피시설 (재활, 15kW↑)"><input type="checkbox" class="cb-ft" value="MCR_SHR"> MCR_SHR</label>
          <label class="cb-item" title="절단시설 (재활, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCR_CUT"> MCR_CUT</label>
          <label class="cb-item" title="용융·용해시설 (재활, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCR_MLT"> MCR_MLT</label>
          <label class="cb-item" title="연료화시설"><input type="checkbox" class="cb-ft" value="MCR_FUL"> MCR_FUL</label>
          <label class="cb-item" title="증발·농축시설 (재활)"><input type="checkbox" class="cb-ft" value="MCR_EVP"> MCR_EVP</label>
          <label class="cb-item" title="정제시설 (재활) - 분리·증류·추출·여과"><input type="checkbox" class="cb-ft" value="MCR_PUR"> MCR_PUR</label>
          <label class="cb-item" title="유수분리시설 (재활)"><input type="checkbox" class="cb-ft" value="MCR_OWS"> MCR_OWS</label>
          <label class="cb-item" title="탈수·건조시설 (재활)"><input type="checkbox" class="cb-ft" value="MCR_DRY"> MCR_DRY</label>
          <label class="cb-item" title="세척시설 (철도용 폐목재 받침목 한정)"><input type="checkbox" class="cb-ft" value="MCR_WSH"> MCR_WSH</label>
          <label class="cb-item" title="선별시설"><input type="checkbox" class="cb-ft" value="MCR_SRT"> MCR_SRT</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">화학적 처분</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="고형화·고화·안정화시설 (처분)"><input type="checkbox" class="cb-ft" value="CCD_SOL"> CCD_SOL</label>
          <label class="cb-item" title="반응시설 (처분) - 중화·산화·환원 등"><input type="checkbox" class="cb-ft" value="CCD_RXN"> CCD_RXN</label>
          <label class="cb-item" title="응집·침전시설 (처분)"><input type="checkbox" class="cb-ft" value="CCD_CGP"> CCD_CGP</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">화학적 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="고형화·고화시설 (재활)"><input type="checkbox" class="cb-ft" value="CCR_SOL"> CCR_SOL</label>
          <label class="cb-item" title="반응시설 (재활) - 중화·산화·환원 등"><input type="checkbox" class="cb-ft" value="CCR_RXN"> CCR_RXN</label>
          <label class="cb-item" title="응집·침전시설 (재활)"><input type="checkbox" class="cb-ft" value="CCR_CGP"> CCR_CGP</label>
          <label class="cb-item" title="열분해시설 (가스화 포함)"><input type="checkbox" class="cb-ft" value="CCR_PYR"> CCR_PYR</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">생물학적 처분</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="소멸화시설 (100kg/일↑)"><input type="checkbox" class="cb-ft" value="BCD_SMZ"> BCD_SMZ</label>
          <label class="cb-item" title="호기성·혐기성 분해시설 (처분)"><input type="checkbox" class="cb-ft" value="BCD_BIO"> BCD_BIO</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">생물학적 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="부숙·발효시설 (100kg/일↑)"><input type="checkbox" class="cb-ft" value="BCR_DIG"> BCR_DIG</label>
          <label class="cb-item" title="사료화시설"><input type="checkbox" class="cb-ft" value="BCR_FED"> BCR_FED</label>
          <label class="cb-item" title="퇴비화시설"><input type="checkbox" class="cb-ft" value="BCR_CPT"> BCR_CPT</label>
          <label class="cb-item" title="동애등에분변토 생산시설"><input type="checkbox" class="cb-ft" value="BCR_BSF"> BCR_BSF</label>
          <label class="cb-item" title="부숙토 생산시설"><input type="checkbox" class="cb-ft" value="BCR_HMF"> BCR_HMF</label>
          <label class="cb-item" title="버섯재배시설"><input type="checkbox" class="cb-ft" value="BCR_MSH"> BCR_MSH</label>
          <label class="cb-item" title="호기성·혐기성 분해시설 (재활)"><input type="checkbox" class="cb-ft" value="BCR_BIO"> BCR_BIO</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">매립</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="차단형 매립시설"><input type="checkbox" class="cb-ft" value="LF_BLK"> LF_BLK</label>
          <label class="cb-item" title="관리형 매립시설"><input type="checkbox" class="cb-ft" value="LF_MGD"> LF_MGD</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">기타 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="시멘트 소성로"><input type="checkbox" class="cb-ft" value="KLN"> KLN</label>
          <label class="cb-item" title="용해로 (비철금속 추출)"><input type="checkbox" class="cb-ft" value="SMT"> SMT</label>
          <label class="cb-item" title="소성·탄화시설"><input type="checkbox" class="cb-ft" value="CAL"> CAL</label>
          <label class="cb-item" title="골재가공시설"><input type="checkbox" class="cb-ft" value="AGG"> AGG</label>
          <label class="cb-item" title="의약품 제조시설"><input type="checkbox" class="cb-ft" value="PHR"> PHR</label>
          <label class="cb-item" title="수은회수시설"><input type="checkbox" class="cb-ft" value="MRC"> MRC</label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">시설 설치 절차 (facilityApproval)</div>
      <select id="f-approval">
        <option value="0">0 — 해당없음</option>
        <option value="A">A — 설치승인 대상</option>
        <option value="R">R — 설치신고 대상</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-filter">검토 항목 조회</button>
      <button class="btn btn-secondary" id="btn-reset">초기화</button>
    </div>
  </div>

  <div class="panel panel-right" id="right-panel">
    <div id="result-header">
      <span id="result-count">조회 전</span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary" id="btn-select-all">전체 선택</button>
        <button class="btn btn-secondary" id="btn-deselect-all">전체 해제</button>
      </div>
    </div>
    <div id="items-container">
      <div style="color:#aaa;text-align:center;margin-top:60px">왼쪽에서 조건을 선택하고<br>「검토 항목 조회」를 눌러주세요.</div>
    </div>
    <div id="export-bar">
      <span id="selected-count">선택된 항목: 0개</span>
      <button class="btn btn-secondary" id="btn-copy">클립보드 복사</button>
      <button class="btn btn-primary" id="btn-download">Word 다운로드 (.docx)</button>
    </div>
  </div>
</div>

<script>

ren","marker":"1)","text":"재활용이 가능한 폐기물은 법 제13조의2에 따라 재활용하여야 한다.","answer":"재활용이 가능한 음식물류 폐기물은 폐기물관리법 제13조의2에 따라 재활용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":45},{"depth":2,"type":"number-paren","marker":"3)","text":"영 제8조의4 각 호의 어느 하나에 해당하는 자가 음식물류 폐기물을스스로 감량하는 경우에는 단독이나 공동으로 다음의 어느 하나에 해당하는 방법으로 감량하여야 하며, 감량된 음식물류 폐기물은 법 제13조의2에 따라 재활용하여야 한다.","answer":"폐기물관리법 시행령 제8조의4 각 호에 해당하는 자로서 음식물류 폐기물을 스스로 감량하는 경우, 단독 또는 공동으로 아래 방법 중 하나로 감량하겠으며, 감량된 음식물류 폐기물은 법 제13조의2에 따라 재활용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["51-38","91-02"]},"_idx":47},{"depth":3,"type":"korean-paren","marker":"가)","text":"가열에 의한 건조의 방법으로 부산물의 수분함량을 25퍼센트 미만으로 감량하여야 한다.","answer":"가열에 의한 건조 방법으로 부산물의 수분함량을 25% 미만으로 감량하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":48},{"depth":3,"type":"korean-paren","marker":"나)","text":"발효 또는 발효건조나 퇴비화ㆍ사료화 또는 부숙의 방법으로 처리하여 부산물의 수분함량을 40퍼센트 미만으로 하여야 한다.","answer":"발효 또는 발효건조, 퇴비화·사료화 또는 부숙 방법으로 처리하여 부산물의 수분함량을 40% 미만으로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":49},{"depth":2,"type":"number-paren","marker":"4)","text":"외국에서 들어오는 선박·항공기에서 발생하는 음식물류 폐기물은 소각하여야 한다.","answer":"외국 선박·항공기에서 발생하는 음식물류 폐기물은 소각하여 처리하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["51-38","91-02"]},"_idx":50},{"depth":2,"type":"number-paren","marker":"5)","text":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는음식물류 폐기물은 바로 매립하여서는 아니되며, 소각, 퇴비화, 사료화,부숙, 탄화, 소화 또는 부숙토 생산 등의 공정에서 발생하는 재활용 용도에 맞지 아니한 협잡물(挾雜物)과 잔재물만을 매립하여야 한다. 다만, 특별시·광역시·특별자치시·특별자치도 또는 시 지역 중 기후에너지환경부장관이 고시하여 정하는 산간·오지 또는 도서 지역에서 발생하는 음식물류 폐기물은 그러하지 아니하다.","answer":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는 음식물류 폐기물은 바로 매립하지 않고, 소각·퇴비화·사료화·부숙·탄화·소화 또는 부숙토 생산 등의 공정을 거쳐 재활용 용도에 맞지 않는 협잡물과 잔재물만 매립하겠음. 다만, 기후에너지환경부장관이 고시하는 산간·오지·도서 지역은 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["51-38","91-02"]},"_idx":51},{"depth":2,"type":"number-paren","marker":"8)","text":"음식물류 폐기물 처분시설 또는 재활용시설을 설치·운영하는 경우에는 해당 시설에 유입된 음식물류에 포함된 고형물 중에서 무게 기준으로 2012년 12월 31일까지는 60퍼센트 이상, 2013년 1월 1일부터는70퍼센트 이상을 동물 등의 먹이, 퇴비 등의 재활용제품의 원료로 사용(에너지 생산, 액비 생산 등을 위하여 다른 시설로 옮겨서 재활용하는 경우를 포함한다)하여야 한다.","answer":"음식물류 폐기물 처분시설 또는 재활용시설 설치·운영 시, 유입된 음식물류 고형물의 70% 이상(2013년 1월 1일 기준)을 동물 먹이, 퇴비 등의 재활용제품 원료로 사용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["51-38","91-02"],"physicalState":["S"]},"_idx":54},{"depth":2,"type":"number-paren","marker":"1)","text":"법 제2조제3호에 따른 배출시설 또는 영 제2조제1호부터 제5호까지의 규정에 따른 시설의 운영으로 배출되는 폐기물(이하 \"사업장배출시설계 폐기물\"이라 한다)은 해당 사업장에서 배출되는 사업장배출시설계폐기물 외의 폐기물 및 영 제2조제7호 및 제9호에 따른 사업장에서 배출되는 폐기물(이하 \"사업장비배출시설계 폐기물\"이라 한다)과 혼합되지 않도록 해야 한다.","answer":"사업장배출시설계 폐기물과 사업장비배출시설계 폐기물이 혼합되지 않도록 분리 관리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":57},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 처리할 수 있는 폐기물은 특별자치시, 특별자치도, 시·군·구의 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있다.","answer":"사업장비배출시설계 폐기물로서 생활폐기물과 성질·상태가 비슷한 경우, 해당 지자체 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GN"],"action":null,"rCode":null,"facilityType":null},"_idx":58},{"depth":2,"type":"number-paren","marker":"3)","text":"사업장배출시설계 폐기물 중 생활폐기물을 재활용하기 위하여 분리ㆍ선별ㆍ압축ㆍ파쇄ㆍ세척하는 등의 과정에서 발생한 폐기물(별표 1 제1호가목부터 타목까지 및 같은 표 제2호가목부터 다목까지의 규정에 따른 유해물질을 폐기물의 종류와 관계없이 같은 표에서 정한 기준 이상으로 들어 있는 폐기물은 제외한다)은 관할 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장이 제1호에 따른 생활폐기물의 기준 및 방법에 따라 처리할 수 있다.","answer":"사업장배출시설계 폐기물 중 재활용 과정에서 발생한 폐기물(유해물질 기준 이하)의 경우, 관할 지자체장이 생활폐기물의 기준 및 방법에 따라 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO"],"action":null,"rCode":null,"facilityType":null},"_idx":59},{"depth":2,"type":"number-paren","marker":"4)","text":"사업장일반폐기물 중 레미콘·콘크리트·아스팔트콘크리트 제품의 제조공정에서 발생하거나 건설현장 등에서 반품한 폐레미콘·폐콘크리트·폐아스팔트콘크리트 제품 및 영 제2조제9호에 따른 일련의 공사또는 작업으로 발생하는 폐콘크리트, 폐아스팔트콘크리트, 폐벽돌, 폐블록, 폐기와 및 건설폐토석은 「건설폐기물의 재활용촉진에 관한 법률시행규칙」 별표 1의2에 따른 기준 및 방법으로 재활용할 수 있다. 이경우 「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른건설폐기물 처리업자에게 위탁하여 처리하여야 한다.","answer":"이경우 「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른건설폐기물 처리업자에게 위탁하여 처리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":60},{"depth":2,"type":"number-paren","marker":"1)","text":"사업장배출시설계 폐기물은 사업장배출시설계 폐기물 수집·운반업자가 수집·운반하고, 사업장비배출시설계 폐기물은 사업장비배출시설계폐기물 수집·운반업자가 수집?운반해야 한다.","answer":"사업장배출시설계 폐기물은 사업장배출시설계 폐기물 수집·운반업자가, 사업장비배출시설계 폐기물은 사업장비배출시설계 폐기물 수집·운반업자가 각각 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":62},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 수집·운반할 수 있는 폐기물은 특별자치시, 특별자치도, 시·군·구의 조례로 정하는 바에 따라 생활폐기물 수집·운반업자가 수집·운반할 수 있다.","answer":"생활폐기물과 성질·상태가 비슷한 사업장비배출시설계 폐기물의 경우, 해당 지자체 조례에서 정하는 바에 따라 생활폐기물 수집·운반업자가 수집·운반할 수 있음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":63},{"depth":2,"type":"number-paren","marker":"3)","text":"액체상태의 사업장일반폐기물은 누출의 우려가 없는 전용의 탱크·용기·파이프 또는 이와 비슷한 설비를 사용하여야 한다.","answer":"액체상태의 사업장일반폐기물은 누출 우려가 없는 전용 탱크·용기·파이프 또는 이와 비슷한 설비를 사용하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":n ategory":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":205},{"depth":3,"type":"korean-paren","marker":"다)","text":"드럼 등 보관용기나 보관탱크에 폐기물을 보관하는 경우로서 내용물이 흘러나올 우려가 없고, 보관용기나 보관탱크 외부에 지정폐기물이 묻어 있지 않은 경우(이 경우에는 폐기물의 최대량 보관 시의적재무게를 견딜 수 있고, 지정폐기물 취급 과정에서 또는 보관용기·보관탱크의 손상 등의 사유로 내용물이 주변 토양이나 외부에흘러나오지 않도록 시멘트·아스팔트 등으로 바닥을 포장하고, 충분한 규모의 방류턱 또는 방류벽을 갖춘 시설에 보관하여야 한다)","answer":"드럼 등 보관용기·보관탱크에 보관하는 경우로서 내용물 유출 우려가 없고 외부에 지정폐기물이 묻지 않은 경우, 최대 적재무게에 견디고 시멘트·아스팔트 바닥 포장 및 방류턱·방류벽을 갖춘 시설에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":206},{"depth":2,"type":"number-paren","marker":"6)","text":"지정폐기물배출자는 그의 사업장에서 발생하는 지정폐기물 중 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약,폴리클로리네이티드비페닐 함유폐기물, 폐수처리 오니 중 유기성 오니는 보관이 시작된 날부터 45일을 초과하여 보관하여서는 아니되며, 그 밖의 지정폐기물은 60일을 초과하여 보관하여서는 아니 된","answer":"사업장에서 발생하는 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약·PCBs 함유폐기물 및 유기성 오니는 보관 시작일로부터 45일, 그 밖의 지정폐기물은 60일을 초과하여 보관하지 않겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐유기용제":["01-04"],"폐알칼리":["01-02"],"폐흡착제":["01-03"],"폐흡수제":["01-03"],"폐농약":["01-09"],"폐촉매":["01-03"],"오니":["51-01"],"폐유":["01-06"],"폐산":["01-02"]},"wasteCode":["01-04","01-02","01-03","01-09","51-01","01-06"]},"_idx":207},{"depth":1,"type":"korean-dot","marker":"다.","text":"다만, 제17조 및 별표 5의7에 따라 폐기물의 처리 위탁을 중단해야 하는 경우로서 시ㆍ도지사나 지방환경관서의 장이 기간을 정하여 인정하는 경우 또는 천재지변이나 그 밖의 부득이한 사유로 장기보관할 필요성이 있다고 관할 시·도지사나 지방환경관서의 장이 인정하는 경우와, 1년간 배출하는 지정폐기물의 총량이 3톤(2013년12월 31일까지는 4톤) 미만인 사업장의 경우에는 1년의 기간 내에서 보관할 수 있다.","answer":"처리 위탁 중단 사유, 천재지변 등 부득이한 사유로 시·도지사 등이 인정하는 경우, 또는 연간 지정폐기물 총량 3톤 미만 사업장의 경우에는 1년 이내 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":208},{"depth":2,"type":"number-paren","marker":"7)","text":"제31조 및 6)에도 불구하고 폴리클로리네이티드비페닐 함유폐기물을보관하려 집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null,"physicalState":["S"]},"slots":[{"key":"vehicles","label":"밀폐형 압축·압착·암롤차량","type":"filter_join","from":"document.formData.vehicles","display":"vehicleType","join":", "}],"_idx":9},{"depth":2,"type":"number-paren","marker":"2)","text":"1)에도 불구하고 다음의 경우에는 적재함에 금속, 플라스틱 또는 폐기물의 유출 또는 악취가 누출되는 것을 방지할 수 있는 재질, 구조,형태 등으로서 기후에너지환경부장관이 정하여 고시하는 기준에 따른밀폐형 덮개를 설치한 차량(이하 \"밀폐형 덮개 설치차량\"이라 한다)으로 수집·운반할 수 있다.","answer":"밀폐형 차량 원칙에도 불구하고, ① 폐전기전자제품류·폐가구류 등 일정한 형태를 갖춘 폐기물을 원형 그대로 수집·운반하는 경우, ② 시행규칙 제66조제3항 각 호 등에 해당하는 폐기물을 수집·운반하는 경우, ③ 흩날릴 우려가 없고 침출수가 없는 덩어리 형태 폐기물을 집게 등 기계식으로 적재하는 경우, ④ 종량제 봉투로 배출된 폐기물을 최대적재량 1톤 이하 차량으로 수집·운반하는 경우에는 적재함에 유출·악취 누출 방지 가능한 재질·구조·형태의 덮개를 설치한 차량으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteVars":{"폐전기전자제품류":["51-18"]},"wasteCode":["51-18"]},"slots":[{"key":"vehicles","label":"밀폐형 덮개 설치차량","type":"filter_join","from":"document.formData.vehicles","display":"vehicleType","join":", "}],"_idx":10},{"depth":3,"type":"korean-paren","marker":"가)","text":"폐전기전자제품류, 폐가구류 등 일정한 형태를 갖춘 폐기물을 원형그대로 수집ㆍ운반하는 경우","answer":"","tags":null,"_idx":11},{"depth":3,"type":"korean-paren","marker":"나)","text":"제66조제3항 각 호, 같은 조 제6항제1호부터 제4호까지, 제6호부터 제8호까지 및 제10호의 폐기물을 수집ㆍ운반하는 경우. 다만,적재량이 2톤 이하인 경우에는 폐기물이 흩날리거나 유출되지 않도록 적재함에 합성수지 등으로 제작된 포장으로 덮개를 설치한 최대적재량 2톤 이하의 차량으로 수집ㆍ운반할 수 있다.","answer":"","tags":null,"_idx":12},{"depth":3,"type":"korean-paren","marker":"다)","text":"수집ㆍ운반 과정에서 흩날릴 우려가 없고, 침출수가 발생되지 않는폐목재류, 폐합성수지류, 폐합성고무류 등 덩어리 형태의 폐기물을집게 등 기계식으로 폐기물을 적재함에 실을 수 있는 장치가 부착된 차량으로 수집ㆍ운반하는 경우","answer":"","tags":null,"_idx":13},{"depth":3,"type":"korean-paren","marker":"라)","text":"폐기물 종량제(從量制) 봉투로 배출된 폐기물을 최대적재량 1톤이하의 차량으로 수집ㆍ운반하는 경우","answer":"","tags":null,"_idx":14},{"depth":2,"type":"number-paren","marker":"3)","text":"1) 및 2)에도 불구하고 고체상태의 폐기물(폐기물 종 하는 재활용 용도에 맞지 아니한 협잡물(挾雜物)과 잔재물만을 매립하여야 한다. 다만, 특별시·광역시·특별자치시·특별자치도 또는 시 지역 중 기후에너지환경부장관이 고시하여 정하는 산간·오지 또는 도서 지역에서 발생하는 음식물류 폐기물은 그러하지 아니하다.","answer":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는 음식물류 폐기물은 바로 매립하지 않고, 소각·퇴비화·사료화·부숙·탄화·소화 또는 부숙토 생산 등의 공정을 거쳐 재활용 용도에 맞지 않는 협잡물과 잔재물만 매립하겠음. 다만, 기후에너지환경부장관이 고시하는 산간·오지·도서 지역은 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["51-38","91-02"]},"_idx":51},{"depth":2,"type":"number-paren","marker":"6)","text":"삭제 <2011.9.29>","answer":"","tags":null,"_idx":52},{"depth":2,"type":"number-paren","marker":"7)","text":"삭제 <2011.9.29>","answer":"","tags":null,"_idx":53},{"depth":2,"type":"number-paren","marker":"8)","text":"음식물류 폐기물 처분시설 또는 재활용시설을 설치·운영하는 경우에는 해당 시설에 유입된 음식물류에 포함된 고형물 중에서 무게 기준으로 2012년 12월 31일까지는 60퍼센트 이상, 2013년 1월 1일부터는70퍼센트 이상을 동물 등의 먹이, 퇴비 등의 재활용제품의 원료로 사용(에너지 생산, 액비 생산 등을 위하여 다른 시설로 옮겨서 재활용하는 경우를 포함한다)하여야 한다.","answer":"음식물류 폐기물 처분시설 또는 재활용시설 설치·운영 시, 유입된 음식물류 고형물의 70% 이상(2013년 1월 1일 기준)을 동물 먹이, 퇴비 등의 재활용제품 원료로 사용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["51-38","91-02"],"physicalState":["S"]},"_idx":54},{"depth":0,"type":"number","marker":"3.","text":"사업장일반폐기물의 기준 및 방법","answer":"","tags":null,"_idx":55},{"depth":1,"type":"korean-dot","marker":"가.","text":"공통사항","answer":"","tags":null,"_idx":56},{"depth":2,"type":"number-paren","marker":"1)","text":"법 제2조제3호에 따른 배출시설 또는 영 제2조제1호부터 제5호까지의 규정에 따른 시설의 운영으로 배출되는 폐기물(이하 \"사업장배출시설계 폐기물\"이라 한다)은 해당 사업장에서 배출되는 사업장배출시설계폐기물 외의 폐기물 및 영 제2조제7호 및 제9호에 따른 사업장에서 배출되는 폐기물(이하 \"사업장비배출시설계 폐기물\"이라 한다)과 혼합되지 않도록 해야 한다.","answer":"사업장배출시설계 폐기물과 사업장비배출시설계 폐기물이 혼합되지 않도록 분리 관리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":57},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 처리할 수 있는 폐기물은 특별자치시, 특별자치도, 시·군·구의 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있다.","answer":"사업장비배출시설계 폐기물로서 생활폐기물과 성질·상태가 비슷한 경우, 해당 지자체 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GN"],"action":null,"rCode":null,"facilityType":null},"_idx":58},{"depth":2,"type":"number-paren","marker":"3)","text":"사업장배출시설계 폐기물 중 생활폐기물을 재활용하기 위하여 분리ㆍ선별ㆍ압축ㆍ파쇄ㆍ세척하는 등의 과정에서 발생한 폐기물(별표 1 제1호가목부터 타목까지 및 같은 표 제2호가목부터 다목까지의 규정에 따른 유해물질을 폐기물의 종류와 관계없이 같은 표에서 정한 기준 이상으로 들어 있는 폐기물은 제외한다)은 관할 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장이 제1호에 따른 생활폐기물의 기준 및 방법에 따라 처리할 수 있다.","answer":"사업장배출시설계 폐기물 중 재활용 과정에서 발생한 폐기물(유해물질 기준 이하)의 경우, 관할 지자체장이 생활폐기물의 기준 및 방법에 따라 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO"],"action":null,"rCode":null,"facilityType":null},"_idx":59},{"depth":2,"type":"number-paren","marker":"4)","text":"사업장일반폐기물 중 레미콘·콘크리트·아스팔트콘크리트 제품의 제조공정에서 발생하거나 건설현장 등에서 반품한 폐레미콘·폐콘크리트·폐아스팔트콘크리트 제품 및 영 제2조제9호에 따른 일련의 공사또는 작업으로 발생하는 폐콘크리트, 폐아스팔트콘크리트, 폐벽돌, 폐블록, 폐기와 및 건설폐토석은 「건설폐기물의 재활용촉진에 관한 법률시행규칙」 별표 1의2에 따른 기준 및 방법으로 재활용할 수 있다. 이경우 「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른건설폐기물 처리업자에게 위탁하여 처리하여야 한다.","answer":"이경우 「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른건설폐기물 처리업자에게 위탁하여 처리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":60},{"depth":1,"type":"korean-dot","marker":"나.","text":"수집·운반의 경우","answer":"","tags":null,"_idx":61},{"depth":2,"type":"number-paren","marker":"1)","text":"사업장배출시설계 폐기물은 사업장배출시설계 폐기물 수집·운반업자가 수집·운반하고, 사업장비배출시설계 폐기물은 사업장비배출시설계폐기물 수집·운반업자가 수집?운반해야 한다.","answer":"사업장배출시설계 폐기물은 사업장배출시설계 폐기물 수집·운반업자가, 사업장비배출시설계 폐기물은 사업장비배출시설계 폐기물 수집·운반업자가 각각 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":62},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 수집·운반할 수 있는 폐기물은 특별자치시, 특별자치도, 시·군 일반폐기물 수집·운반 시 폐기물의 일부 또는 전부를 해체하거나 의도적으로 파손하지 않겠으며, 파손·낙하·붕괴 방지를 위한 필요한 조치를 취하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":75},{"depth":2,"type":"number-paren","marker":"6)","text":"별표 3에 따른 의료기관 및 시험ㆍ검사기관 등에서 발생한 일회용 기저귀(같은 표 제14호에 따른 노인요양시설에서 발생한 일회용 기저귀는 제외한다. 이하 \"의료기관 일회용기저귀\"라 한다)의 경우 섭씨 4도이하의 냉장 적재함이 설치된 차량으로 수집ㆍ운반해야 하며, 수집ㆍ운반 중에는 적재함의 내부 온도를 섭씨 4도 이하로 유지해야 한다. 다만, 적재함을 열고 차량에 폐기물을 싣거나 내릴 때에는 제외한다.","answer":"의료기관 일회용기저귀는 섭씨 4도 이하의 냉장 적재함이 설치된 차량으로 수집·운반하겠으며, 수집·운반 중에는 적재함 내부 온도를 섭씨 4도 이하로 유지하겠음(폐기물을 싣거나 내릴 때 제외)","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":76},{"depth":2,"type":"number-paren","marker":"7)","text":"의료기관 일회용기저귀의 경우 비닐로 개별 밀폐 포장한 후, 기후에너지환경부장관이 고시하는 전용 봉투에 담아 다른 사업장일반폐기물과는 분리하여 수집ㆍ운반해야 한다.","answer":"의료기관 일회용기저귀는 비닐로 개별 밀폐 포장한 후 전용 봉투에 담아 다른 사업장일반폐기물과 분리하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":77},{"depth":2,"type":"number-paren","marker":"8)","text":"전기자동차 폐이차전지는 배터리 단자, 연결케이블 등을 절연처리한 후 불연성ㆍ비전도성 재질의 파렛트(Pallet)에 개별 포장하거나 밀폐된운반 상자에 담아서 다른 종류의 폐기물과 분리하여 수집ㆍ운반해야한다.","answer":"전기자동차 폐이차전지는 배터리 단자·연결케이블 등을 절연처리한 후 불연성·비전도성 재질의 파렛트에 개별 포장하거나 밀폐된 운반 상자에 담아 다른 폐기물과 분리하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-41-05"]},"_idx":78},{"depth":1,"type":"korean-dot","marker":"다.","text":"보관의 경우","answer":"","tags":null,"_idx":79},{"depth":2,"type":"number-paren","marker":"1)","text":"사업장일반폐기물은 해당 폐기물에 의하여 부식되거나 파손되지 아니하는 재질로 된 보관용기에 보관하여야 한다.","answer":"사업장일반폐기물은 해당 폐기물에 의해 부식·파손되지 않는 재질의 보관용기에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"was pe":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":205},{"depth":3,"type":"korean-paren","marker":"다)","text":"드럼 등 보관용기나 보관탱크에 폐기물을 보관하는 경우로서 내용물이 흘러나올 우려가 없고, 보관용기나 보관탱크 외부에 지정폐기물이 묻어 있지 않은 경우(이 경우에는 폐기물의 최대량 보관 시의적재무게를 견딜 수 있고, 지정폐기물 취급 과정에서 또는 보관용기·보관탱크의 손상 등의 사유로 내용물이 주변 토양이나 외부에흘러나오지 않도록 시멘트·아스팔트 등으로 바닥을 포장하고, 충분한 규모의 방류턱 또는 방류벽을 갖춘 시설에 보관하여야 한다)","answer":"드럼 등 보관용기·보관탱크에 보관하는 경우로서 내용물 유출 우려가 없고 외부에 지정폐기물이 묻지 않은 경우, 최대 적재무게에 견디고 시멘트·아스팔트 바닥 포장 및 방류턱·방류벽을 갖춘 시설에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":206},{"depth":2,"type":"number-paren","marker":"6)","text":"지정폐기물배출자는 그의 사업장에서 발생하는 지정폐기물 중 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약,폴리클로리네이티드비페닐 함유폐기물, 폐수처리 오니 중 유기성 오니는 보관이 시작된 날부터 45일을 초과하여 보관하여서는 아니되며, 그 밖의 지정폐기물은 60일을 초과하여 보관하여서는 아니 된","answer":"사업장에서 발생하는 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약·PCBs 함유폐기물 및 유기성 오니는 보관 시작일로부터 45일, 그 밖의 지정폐기물은 60일을 초과하여 보관하지 않겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐유기용제":["01-04"],"폐알칼리":["01-02"],"폐흡착제":["01-03"],"폐흡수제":["01-03"],"폐농약":["01-09"],"폐촉매":["01-03"],"오니":["51-01"],"폐유":["01-06"],"폐산":["01-02"]},"wasteCode":["01-04","01-02","01-03","01-09","51-01","01-06"]},"_idx":207},{"depth":1,"type":"korean-dot","marker":"다.","text":"다만, 제17조 및 별표 5의7에 따라 폐기물의 처리 위탁을 중단해야 하는 경우로서 시ㆍ도지사나 지방환경관서의 장이 기간을 정하여 인정하는 경우 또는 천재지변이나 그 밖의 부득이한 사유로 장기보관할 필요성이 있다고 관할 시·도지사나 지방환경관서의 장이 인정하는 경우와, 1년간 배출하는 지정폐기물의 총량이 3톤(2013년12월 31일까지는 4톤) 미만인 사업장의 경우에는 1년의 기간 내에서 보관할 수 있다.","answer":"처리 위탁 중단 사유, 천재지변 등 부득이한 사유로 시·도지사 등이 인정하는 경우, 또는 연간 지정폐기물 총량 3톤 미만 사업장의 경우에는 1년 이내 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":208},{"depth":2,"type":"number-paren","marker":"7)","text":"제31조 및 6)에도 불구하고 폴리클로리네이티드비페닐 함유폐기물을보관하려는 배출자 및 처리업자는 시·도지사나 const DOCTYPE_VALS = {"PL":"사업계획","CP":"사업변경계획","AP":"허가신청","CA":"변경허가신청","CR":"변경신고","RP":"신고"};

const state = {
  category: '', bizType: '', docType: '',
  wasteClass: '', wasteCode: '', physicalState: '',
  action: [], rCode: [], facilityType: [],
  approval: '0'
};
let filteredItems = [];
let selectedIds = new Set();

function buildCode() {
  const wc  = state.wasteCode.trim() || '0';
  const act = state.action.length  ? state.action.join('+')       : '0';
  const rc  = state.rCode.length   ? state.rCode.join('+')        : '0';
  const ft  = state.facilityType.length ? state.facilityType.join('+') : '0';
  return [state.category||'?', state.bizType||'?', state.docType||'?',
          state.wasteClass||'?', wc, act, rc, ft, state.approval||'0'].join('-');
}

function matchTag(itemVal, stateVals) {
  if (itemVal === null) return true;
  if (!stateVals || !stateVals.length) return true;
  return itemVal.some(v => stateVals.includes(v));
}

function normalizeWasteCodes(raw) {
  if (!raw || !raw.trim()) return [];
  return raw.trim().split('+').map(s => {
    s = s.trim();
    if (s.length === 4 && /^\d{4}$/.test(s)) return s.slice(0,2) + '-' + s.slice(2);
    return s;
  }).filter(Boolean);
}

function filterItems() {
  const userWasteCodes = normalizeWasteCodes(state.wasteCode);
  return B5_ITEMS.filter(item => {
    if (/^삭제[\s<(]/.test(item.text || '')) return false;
    const t = item.tags;
    if (!matchTag(t.category,    state.category ? [state.category] : [])) return false;
    if (!matchTag(t.bizType,     state.bizType  ? [state.bizType]  : [])) return false;
    if (!matchTag(t.wasteClass,  state.wasteClass ? [state.wasteClass] : [])) return false;
    if (!matchTag(t.action,      state.action))    return false;
    if (!matchTag(t.facilityType, state.facilityType)) return false;
    if (t.physicalState && state.physicalState && state.physicalState !== 'SL') {
      if (!t.physicalState.includes(state.physicalState)) return false;
    }
    if (t.wasteCode !== null && t.wasteCode !== undefined) {
      if (userWasteCodes.length === 0) return true;
      const matches = t.wasteCode.some(ic =>
        userWasteCodes.some(uc => uc === ic || uc.startsWith(ic + '-') || ic.startsWith(uc + '-'))
      );
      if (!matches) return false;
    }
    return true;
  });
}

function renderAnswer(item) {
  let text = item.answer || '';
  if (!item.tags.wasteVars) return escHtml(text);
  for (const [varName, codes] of Object.entries(item.tags.wasteVars)) {
    const display = '<span class="wastevar">' + escHtml(varName) + '(' + codes.join(',') + ')</span>';
    text = text.replace(new RegExp('{' + varName + '}', 'g'), display);
  }
  return text;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function tagPill(label, cls) {
  return '<span class="tag-pill ' + (cls||'') + '">' + escHtml(label) + '</span>';
}

function renderItems() {
  const container = document.getElementById('items-container');
  if (!filteredItems.length) {
    container.innerHTML = '<div style="color:#aaa;text-align:center;margin-top:60px">조건에 맞는 항목이 없습니다.</div>';
    document.getElementById('result-count').textContent = '결과: 0건';
    return;
  }
  document.getElementById('result-count').textContent = '결과: ' + filteredItems.length + '건';

  container.innerHTML = filteredItems.map((item, idx) => {
    const id = 'item-' + idx;
    const isSel = selectedIds.has(idx);
    const tags = item.tags;
    const actionPills = tags.action ? tags.action.map(a => tagPill(a,'action')).join('') : '';
    const ftPills = tags.facilityType ? tags.facilityType.map(f => tagPill(FT_LABEL[f]||f,'facility')).join('') : '';
    return `<div class="item-card${isSel?' selected':''}" id="${id}">
  <div class="item-header" onclick="toggleCard(${idx})">
    <input type="checkbox" class="item-cb" ${isSel?'checked':''} onclick="event.stopPropagation();toggleSelect(${idx})">
    <span class="item-marker">${escHtml(item.marker)}</span>
    <span class="item-text">${escHtml(item.text)}</span>
  </div>
  <div class="item-answer">${renderAnswer(item)}</div>
  <div class="item-tags">${actionPills}${ftPills}</div>
</div>`;
  }).join('');

  updateSelectedCount();
}

function toggleCard(idx) {
  const el = document.getElementById('item-' + idx);
  el.classList.toggle('open');
}
function toggleSelect(idx) {
  if (selectedIds.has(idx)) selectedIds.delete(idx);
  else selectedIds.add(idx);
  const el = document.getElementById('item-' + idx);
  if (el) el.classList.toggle('selected', selectedIds.has(idx));
  updateSelectedCount();
}
function updateSelectedCount() {
  document.getElementById('selected-count').textContent = '선택된 항목: ' + selectedIds.size + '개';
}

function buildExportText() {
  const code = buildCode();
  const lines = ['[준수계획서 검토 항목]', '상황코드: ' + code, '생성일시: ' + new Date().toLocaleString('ko-KR'), ''];
  const ordered = [...selectedIds].sort((a,b)=>a-b);
  ordered.forEach((idx, n) => {
    const item = filteredItems[idx];
    if (!item) return;
    lines.push((n+1) + '. ' + item.text);
    let ans = item.answer || '';
    if (item.tags.wasteVars) {
      for (const [varName, codes] of Object.entries(item.tags.wasteVars)) {
        ans = ans.replace(new RegExp('{'+varName+'}','g'), varName + '(' + codes.join(',') + ')');
      }
    }
    lines.push('   → ' + ans);
    lines.push('');
  });
  return lines.join('\n');
}

function syncState() {
  state.category   = document.getElementById('f-category').value;
  state.bizType    = document.getElementById('f-bizType').value;
  state.docType    = document.getElementById('f-docType').value;
  state.wasteClass = document.getElementById('f-wasteClass').value;
  state.wasteCode  = document.getElementById('f-wasteCode').value.replace(/\s/g,'');
  state.physicalState = document.getElementById('f-physicalState').value;
  state.action     = [...document.querySelectorAll('.cb-action:checked')].map(e=>e.value);
  state.rCode      = [...document.querySelectorAll('.cb-rCode:checked')].map(e=>e.value);
  state.facilityType = [...document.querySelectorAll('.cb-ft:checked')].map(e=>e.value);
  state.approval   = document.getElementById('f-approval').value;
}

function updateCodeBar() {
  syncState();
  document.getElementById('code-bar').textContent = '상황코드: ' + buildCode();
}

  if (cat && BTYPE_MAP[cat]) {
    for (const [k,v] of Object.entries(BTYPE_MAP[cat])) {
      sel.innerHTML += '<option value="'+k+'">'+k+' — '+v+'</option>';
    }
  }
  updateDocTypeSelect();
}

function updateDocTypeSelect() {
  const cat = document.getElementById('f-category').value;
  const sel = document.getElementById('f-docType');
  sel.innerHTML = '<option value="">선택</option>';
  const allowed = DOCTYPE_BY_CAT[cat] || [];
  for (const k of allowed) {
    const v = DOCTYPE_VALS[k] || k;
    sel.innerHTML += '<option value="'+k+'">'+k+' — '+v+'</option>';
  }
}

document.getElementById('f-category').addEventListener('change', () => {
  updateBizTypeSelect();
  updateCodeBar();
});
document.getElementById('f-bizType').addEventListener('change', updateCodeBar);
document.getElementById('f-docType').addEventListener('change', updateCodeBar);
document.getElementById('f-wasteClass').addEventListener('change', updateCodeBar);
document.getElementById('f-wasteCode').addEventListener('input', updateCodeBar);
document.getElementById('f-physicalState').addEventListener('change', updateCodeBar);
document.getElementById('f-approval').addEventListener('change', updateCodeBar);
document.querySelectorAll('.cb-action,.cb-rCode,.cb-ft').forEach(cb => {
  cb.addEventListener('change', updateCodeBar);
});

document.getElementById('btn-filter').addEventListener('click', () => {
  syncState();
  selectedIds.clear();
  filteredItems = filterItems();
  renderItems();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
  document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
  document.getElementById('f-wasteCode').value = '';
  updateBizTypeSelect();
  updateCodeBar();
  filteredItems = [];
  selectedIds.clear();
  document.getElementById('items-container').innerHTML = '<div style="color:#aaa;text-align:center;margin-top:60px">왼쪽에서 조건을 선택하고<br>「검토 항목 조회」를 눌러주세요.</div>';
  document.getElementById('result-count').textContent = '조회 전';
  updateSelectedCount();
});

document.getElementById('btn-select-all').addEventListener('click', () => {
  filteredItems.forEach((_,i) => selectedIds.add(i));
  renderItems();
});
document.getElementById('btn-deselect-all').addEventListener('click', () => {
  selectedIds.clear();
  renderItems();
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const text = buildExportText();
  navigator.clipboard.writeText(text).then(() => alert('클립보드에 복사되었습니다.')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('복사 완료');
  });
});

document.getElementById('btn-download').addEventListener('click', exportToWord);

async function exportToWord() {
  if (!selectedIds.size) { alert('내보낼 항목을 선택해주세요.'); return; }
  if (typeof docx === 'undefined') { alert('docx 라이브러리 로드 중입니다. 잠시 후 다시 시도해주세요.'); return; }

  const { Document, Packer, Table, TableRow, TableCell, Paragraph, TextRun,
          WidthType, AlignmentType, BorderStyle } = docx;

  const OUTER = { style: BorderStyle.THICK,  size: 12, color: '000000' };
  const INNER = { style: BorderStyle.SINGLE, size: 6,  color: '000000' };
  const NIL   = { style: BorderStyle.NIL };
  const tableBorders = { top: OUTER, bottom: OUTER, left: OUTER, right: OUTER, insideH: NIL };

  function headerRow(code) {
    const p1 = [new TextRun({ text: '■ 폐기물관리법 시행규칙 [별표5]', bold: true, size: 18 })];
    p1.push(new TextRun({ text: '  <' + code + '>', color: '1d4ed8', size: 16 }));
    return new TableRow({
      children: [new TableCell({
        columnSpan: 2,
        borders: { bottom: INNER },
        children: [new Paragraph({ children: p1 }),
                   new Paragraph({ alignment: AlignmentType.CENTER,
                     children: [new TextRun({ text: '폐기물의 처리에 관한 구체적 기준 및 방법', bold: true, size: 22 })] })]
      })]
    });
  }

  function subHeaderRow() {
    return new TableRow({ children: [
      new TableCell({ borders: { bottom: INNER, right: INNER }, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: '기준', bold: true, size: 21 })] })] }),
      new TableCell({ borders: { bottom: INNER }, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: '준수계획', bold: true, size: 21 })] })] })
    ]});
  }

  const code = buildCode();

  const selectedOrigIdx = new Set(
    [...selectedIds].map(i => filteredItems[i]?._idx).filter(v => v !== undefined)
  );

  const B5_WORD_FILTERED = B5_ALL_FOR_WORD.filter(i => !i.noWord);

  const emptyTopSectionIdx = new Set();
  {
    let curTopIdx = null, curTopHas = false;
    for (const item of B5_WORD_FILTERED) {
      if (item.tags === null && item.depth === 0) {
        if (curTopIdx !== null && !curTopHas) emptyTopSectionIdx.add(curTopIdx);
        curTopIdx = item._idx; curTopHas = false;
      } else if (item.tags !== null && selectedOrigIdx.has(item._idx)) {
        curTopHas = true;
      }
    }
    if (curTopIdx !== null && !curTopHas) emptyTopSectionIdx.add(curTopIdx);
  }

  const wordRows = [];
  let pendingHeader = null;
  let sectionHasItems = false;
  let inEmptyTopSection = false;

  function flushPendingHeader(header, isNA = false) {
    const text = (header.marker ? header.marker + ' ' : '') + (header.text || '');
    wordRows.push({ leftText: text, rightText: isNA ? '해당하지 않으므로 기재하지 않음' : '', depth: header.depth, isHeader: true, isNA });
  }

  for (const item of B5_WORD_FILTERED) {
    if (item.tags === null) {
      if (item.depth === 0) {
        if (pendingHeader !== null && !sectionHasItems && !inEmptyTopSection) {
          flushPendingHeader(pendingHeader, true);
        }
        pendingHeader = null; sectionHasItems = false;
        if (emptyTopSectionIdx.has(item._idx)) {
          flushPendingHeader(item, true);
          inEmptyTopSection = true;
        } else {
          inEmptyTopSection = false;
          pendingHeader = item;
        }
      } else {
        if (inEmptyTopSection) continue;
        if (pendingHeader !== null && !sectionHasItems) {
          flushPendingHeader(pendingHeader, pendingHeader.depth > 0);
        }
        pendingHeader = item;
        sectionHasItems = false;
      }
    } else {
      if (inEmptyTopSection) continue;
      if (!selectedOrigIdx.has(item._idx)) continue;
      if (pendingHeader !== null) {
        flushPendingHeader(pendingHeader);
        pendingHeader = null;
      }
      let answerText = item.answer || '';
      if (item.tags && item.tags.wasteVars) {
        for (const [varName, codes] of Object.entries(item.tags.wasteVars)) {
          answerText = answerText.replace(new RegExp('{'+varName+'}','g'), varName+'('+codes.join(',')+')');
        }
      }
      wordRows.push({
        leftText: (item.marker ? item.marker + ' ' : '') + (item.text || ''),
        rightText: answerText,
        depth: item.depth,
        isHeader: false
      });
      sectionHasItems = true;
    }
  }
  if (pendingHeader !== null && !sectionHasItems && !inEmptyTopSection) {
    flushPendingHeader(pendingHeader, pendingHeader.depth > 0);
  }

  function buildDataRow(r, isLast) {
    const bL = isLast ? { top: NIL, right: INNER } : { top: NIL, bottom: NIL, right: INNER };
    const bR = isLast ? { top: NIL }               : { top: NIL, bottom: NIL };
    const indent = r.depth ? { left: r.depth * 150 } : undefined;
    return new TableRow({ children: [
      new TableCell({ borders: bL, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ indent,
          children: [new TextRun({ text: r.leftText, bold: r.isHeader, size: r.isHeader ? 21 : 20 })] })] }),
      new TableCell({ borders: bR, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({
          children: [new TextRun({ text: r.rightText, color: r.isNA ? '888888' : '000000', size: 20 })] })] })
    ]});
  }

  const rows = wordRows.map((r, i) => buildDataRow(r, i === wordRows.length - 1));

  const doc = new Document({
    sections: [{ children: [
      new Table({
        width: { size: 100, type: WidthType.PERCENTAGE },
        borders: tableBorders,
        rows: [headerRow(code), subHeaderRow(), ...rows]
      })
    ]}]
  });

  const blob = await Packer.toBlob(doc);
  const safeCode = code.replace(/[^A-Za-z0-9_+\-]/g,'');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'compliance_' + safeCode + '.docx';
  a.click();
}
</script>
