<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준수계획서 작성 도구</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;font-size:13px;background:#f0f2f5;color:#222}
header{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:600}
#code-bar{background:#0d2b45;color:#7ec8e3;font-family:monospace;font-size:12px;padding:6px 20px;letter-spacing:.5px;min-height:28px}
.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 70px)}
.panel{overflow-y:auto;padding:14px}
.panel-left{background:#fff;border-right:1px solid #dde}
.panel-right{background:#f8f9fb;display:flex;flex-direction:column}
.panel-right > #items-container{flex:1;overflow-y:auto}
.section{margin-bottom:14px}
.section-title{font-size:11px;font-weight:700;color:#1a3a5c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e0e4ea}
.field{margin-bottom:8px}
.field label{display:block;font-size:11px;color:#555;margin-bottom:3px}
select,input[type=text]{width:100%;padding:5px 8px;border:1px solid #ccd;border-radius:4px;font-size:12px;font-family:inherit}
select:focus,input:focus{outline:none;border-color:#1a3a5c}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.checkbox-grid.three{grid-template-columns:1fr 1fr 1fr}
.cb-item{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 0}
.cb-item input{margin:0;flex-shrink:0}
.ft-group{margin-bottom:8px}
.ft-group-title{font-size:10px;font-weight:700;color:#888;margin-bottom:3px}
.btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-primary{background:#1a3a5c;color:#fff}
.btn-primary:hover{background:#245080}
.btn-secondary{background:#e8ecf0;color:#333}
.btn-secondary:hover{background:#d8dce0}
.btn-row{display:flex;gap:6px;margin-top:6px}
/* right panel */
#result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
#result-count{font-size:12px;color:#666}
.source-group{margin-bottom:18px}
.source-header{position:sticky;top:0;background:#1a3a5c;color:#fff;padding:6px 12px;border-radius:4px 4px 0 0;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:space-between;z-index:1}
.source-header .src-meta{font-weight:400;font-size:11px;opacity:.85;margin-left:8px}
.source-header .src-actions{display:flex;gap:4px}
.src-actions .btn{padding:2px 8px;font-size:11px}
.item-card{background:#fff;border:1px solid #e0e4ea;border-radius:6px;margin-bottom:6px;overflow:hidden}
.item-card.selected{border-color:#1a3a5c;background:#f0f5ff}
.item-header{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;cursor:pointer}
.item-cb{margin-top:2px;flex-shrink:0}
.item-marker{font-size:11px;font-weight:700;color:#1a3a5c;min-width:30px}
.item-text{font-size:12px;line-height:1.6;flex:1}
.item-answer{font-size:12px;color:#2a6;background:#f5fff8;border-top:1px solid #ddeedd;padding:8px 10px 8px 48px;line-height:1.6;display:none}
.item-card.open .item-answer{display:block}
.item-tags{font-size:10px;color:#aaa;padding:0 10px 6px 48px;display:flex;flex-wrap:wrap;gap:4px}
.tag-pill{background:#e8ecf0;border-radius:10px;padding:1px 6px}
.tag-pill.action{background:#e8f0fe;color:#1a4a9c}
.tag-pill.facility{background:#fff3cd;color:#7a5c00}
#export-bar{background:#fff;border-top:1px solid #dde;padding:8px 14px;display:flex;gap:8px;align-items:center}
#selected-count{font-size:12px;color:#666;flex:1}
.wastevar{font-weight:600;color:#c06000}
/* 전체 보기 모달 */
#all-view-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;overflow:auto}
#all-view-inner{background:#fff;margin:32px auto;max-width:1100px;border-radius:8px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3)}
#all-view-header{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
#all-view-header h2{font-size:14px;font-weight:700}
#btn-close-all{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:12px}
#btn-close-all:hover{background:rgba(255,255,255,.15)}
.av-filter-bar{padding:8px 16px;background:#f0f4f8;border-bottom:1px solid #dde;display:flex;gap:10px;align-items:center;font-size:12px}
.av-filter-bar label{color:#555}
#av-filter-src{padding:3px 6px;border:1px solid #ccd;border-radius:4px;font-size:12px;font-family:inherit}
#av-no-answer-toggle{margin:0}
#all-view-content{padding:16px}
.av-source-block{margin-bottom:24px}
.av-source-title{font-size:12px;font-weight:700;color:#fff;background:#1a3a5c;padding:5px 12px;border-radius:4px;margin-bottom:8px}
.av-table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.6}
.av-table th{background:#e8ecf2;color:#1a3a5c;font-weight:700;padding:6px 10px;border:1px solid #ccd;text-align:left;font-size:11px}
.av-table td{padding:7px 10px;border:1px solid #e0e4ea;vertical-align:top}
.av-table td.av-marker{color:#1a3a5c;font-weight:700;white-space:nowrap;width:36px}
.av-table td.av-text{background:#fff;width:48%}
.av-table td.av-answer{background:#f5fff8;color:#1a5c2a;width:48%}
.av-table td.av-answer.empty{color:#bbb;font-style:italic}
.av-tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:3px}
.av-tags span{font-size:10px;color:#666;background:#eef0f4;border-radius:9px;padding:1px 7px;line-height:1.6}
</style>
</head>
<body>
<header>
  <h1>폐기물 준수계획서 작성 도구</h1>
  <span style="font-size:11px;opacity:.7">시행규칙 별표5/5의4/6/7/8/9/17의2 통합</span>
  <button class="btn" id="btn-all-view" style="margin-left:auto;background:#2c5f8a;color:#fff;font-size:12px;padding:5px 14px">전체 보기</button>
</header>
<div id="code-bar">상황코드: —</div>
<div class="layout">
  <!-- ── 왼쪽 입력 패널 ── -->
  <div class="panel panel-left" id="left-panel">
    <div class="section">
      <div class="section-title">분류 정보</div>
      <div class="field">
        <label>대분류 (category)</label>
        <select id="f-category">
          <option value="">선택</option>
          <option value="W01">W01 — 폐기물처리업 허가</option>
          <option value="W02">W02 — 폐기물처리 신고</option>
          <option value="W03">W03 — 폐기물처분·재활용시설 설치 승인</option>
          <option value="W04">W04 — 사업장폐기물배출자 신고</option>
          <option value="W05">W05 — 폐기물처분·재활용시설 설치 신고</option>
        </select>
      </div>
      <div class="field">
        <label>업종·신고유형 (bizType)</label>
        <select id="f-bizType"><option value="">— 대분류 먼저 선택 —</option></select>
      </div>
      <div class="field">
        <label>문서 종류 (docType)</label>
        <select id="f-docType"><option value="">— 대분류 먼저 선택 —</option></select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">폐기물 정보</div>
      <div class="field">
        <label>폐기물 대분류 (wasteClass)</label>
        <select id="f-wasteClass">
          <option value="">선택</option>
          <option value="D">D — 지정폐기물 (01-xx ~ 11-xx, 의료폐기물 10-xx 포함)</option>
          <option value="GO">GO — 사업장배출시설계폐기물 (51-xx 중, 대기·수질 등 배출시설 허가사업장에서 발생)</option>
          <option value="GN">GN — 사업장비배출시설계폐기물 (51-xx 중, 배출시설 허가 대상이 아닌 사업장에서 발생)</option>
          <option value="L">L — 생활폐기물 (91-xx)</option>
        </select>
      </div>
      <div class="field">
        <label>폐기물 코드 (wasteCode, 복수 가능)</label>
        <input type="text" id="f-wasteCode" placeholder="예: 01-06+01-07  (없으면 0)">
      </div>
      <div class="field">
        <label>폐기물 물리적 상태 (physicalState)</label>
        <select id="f-physicalState">
          <option value="">선택 안 함 (전체)</option>
          <option value="S">S — 고상 (고체 상태)</option>
          <option value="L">L — 액상 (액체 상태)</option>
          <option value="SL">S+L — 고상+액상 (둘 다)</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">처리 행위 (action)</div>
      <div class="checkbox-grid">
        <label class="cb-item"><input type="checkbox" class="cb-action" value="CT"> CT 수집·운반</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="ST"> ST 보관</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="MI"> MI 중간처분</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="FI"> FI 최종처분</label>
        <label class="cb-item"><input type="checkbox" class="cb-action" value="RCY"> RCY 재활용</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">재활용 유형 (rCode)</div>
      <div class="checkbox-grid">
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R1"> R1</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R2"> R2</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R3"> R3</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R4"> R4</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R5"> R5</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R6"> R6</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R7"> R7</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R8"> R8</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R9"> R9</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R10"> R10</label>
        <label class="cb-item"><input type="checkbox" class="cb-rCode" value="R11"> R11</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">처리시설 종류 (facilityType)</div>
      
      <div class="ft-group">
        <div class="ft-group-title">소각</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="일반소각시설"><input type="checkbox" class="cb-ft" value="INC_G"> INC_G</label>
          <label class="cb-item" title="고온소각시설"><input type="checkbox" class="cb-ft" value="INC_H"> INC_H</label>
          <label class="cb-item" title="열분해소각시설"><input type="checkbox" class="cb-ft" value="INC_P"> INC_P</label>
          <label class="cb-item" title="고온용융시설"><input type="checkbox" class="cb-ft" value="INC_F"> INC_F</label>
          <label class="cb-item" title="열처리조합시설"><input type="checkbox" class="cb-ft" value="INC_C"> INC_C</label>
          <label class="cb-item" title="소각열회수시설 (200kg/h 이상)"><input type="checkbox" class="cb-ft" value="INC_R"> INC_R</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">기계적 처분</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="압축시설 (처분, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCD_CMP"> MCD_CMP</label>
          <label class="cb-item" title="파쇄·분쇄시설 (처분, 15kW↑)"><input type="checkbox" class="cb-ft" value="MCD_SHR"> MCD_SHR</label>
          <label class="cb-item" title="절단시설 (처분, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCD_CUT"> MCD_CUT</label>
          <label class="cb-item" title="용융시설 (처분, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCD_MLT"> MCD_MLT</label>
          <label class="cb-item" title="증발·농축시설 (처분)"><input type="checkbox" class="cb-ft" value="MCD_EVP"> MCD_EVP</label>
          <label class="cb-item" title="정제시설 (처분) - 분리·증류·추출·여과"><input type="checkbox" class="cb-ft" value="MCD_PUR"> MCD_PUR</label>
          <label class="cb-item" title="유수분리시설 (처분)"><input type="checkbox" class="cb-ft" value="MCD_OWS"> MCD_OWS</label>
          <label class="cb-item" title="탈수·건조시설 (처분)"><input type="checkbox" class="cb-ft" value="MCD_DRY"> MCD_DRY</label>
          <label class="cb-item" title="멸균분쇄시설"><input type="checkbox" class="cb-ft" value="MCD_STR"> MCD_STR</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">기계적 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="압축·압출·성형·주조시설 (재활, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCR_CMP"> MCR_CMP</label>
          <label class="cb-item" title="파쇄·분쇄·탈피시설 (재활, 15kW↑)"><input type="checkbox" class="cb-ft" value="MCR_SHR"> MCR_SHR</label>
          <label class="cb-item" title="절단시설 (재활, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCR_CUT"> MCR_CUT</label>
          <label class="cb-item" title="용융·용해시설 (재활, 7.5kW↑)"><input type="checkbox" class="cb-ft" value="MCR_MLT"> MCR_MLT</label>
          <label class="cb-item" title="연료화시설"><input type="checkbox" class="cb-ft" value="MCR_FUL"> MCR_FUL</label>
          <label class="cb-item" title="증발·농축시설 (재활)"><input type="checkbox" class="cb-ft" value="MCR_EVP"> MCR_EVP</label>
          <label class="cb-item" title="정제시설 (재활) - 분리·증류·추출·여과"><input type="checkbox" class="cb-ft" value="MCR_PUR"> MCR_PUR</label>
          <label class="cb-item" title="유수분리시설 (재활)"><input type="checkbox" class="cb-ft" value="MCR_OWS"> MCR_OWS</label>
          <label class="cb-item" title="탈수·건조시설 (재활)"><input type="checkbox" class="cb-ft" value="MCR_DRY"> MCR_DRY</label>
          <label class="cb-item" title="세척시설 (철도용 폐목재 받침목 한정)"><input type="checkbox" class="cb-ft" value="MCR_WSH"> MCR_WSH</label>
          <label class="cb-item" title="선별시설"><input type="checkbox" class="cb-ft" value="MCR_SRT"> MCR_SRT</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">화학적 처분</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="고형화·고화·안정화시설 (처분)"><input type="checkbox" class="cb-ft" value="CCD_SOL"> CCD_SOL</label>
          <label class="cb-item" title="반응시설 (처분) - 중화·산화·환원 등"><input type="checkbox" class="cb-ft" value="CCD_RXN"> CCD_RXN</label>
          <label class="cb-item" title="응집·침전시설 (처분)"><input type="checkbox" class="cb-ft" value="CCD_CGP"> CCD_CGP</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">화학적 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="고형화·고화시설 (재활)"><input type="checkbox" class="cb-ft" value="CCR_SOL"> CCR_SOL</label>
          <label class="cb-item" title="반응시설 (재활) - 중화·산화·환원 등"><input type="checkbox" class="cb-ft" value="CCR_RXN"> CCR_RXN</label>
          <label class="cb-item" title="응집·침전시설 (재활)"><input type="checkbox" class="cb-ft" value="CCR_CGP"> CCR_CGP</label>
          <label class="cb-item" title="열분해시설 (가스화 포함)"><input type="checkbox" class="cb-ft" value="CCR_PYR"> CCR_PYR</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">생물학적 처분</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="소멸화시설 (100kg/일↑)"><input type="checkbox" class="cb-ft" value="BCD_SMZ"> BCD_SMZ</label>
          <label class="cb-item" title="호기성·혐기성 분해시설 (처분)"><input type="checkbox" class="cb-ft" value="BCD_BIO"> BCD_BIO</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">생물학적 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="부숙·발효시설 (100kg/일↑)"><input type="checkbox" class="cb-ft" value="BCR_DIG"> BCR_DIG</label>
          <label class="cb-item" title="사료화시설"><input type="checkbox" class="cb-ft" value="BCR_FED"> BCR_FED</label>
          <label class="cb-item" title="퇴비화시설"><input type="checkbox" class="cb-ft" value="BCR_CPT"> BCR_CPT</label>
          <label class="cb-item" title="동애등에분변토 생산시설"><input type="checkbox" class="cb-ft" value="BCR_BSF"> BCR_BSF</label>
          <label class="cb-item" title="부숙토 생산시설"><input type="checkbox" class="cb-ft" value="BCR_HMF"> BCR_HMF</label>
          <label class="cb-item" title="버섯재배시설"><input type="checkbox" class="cb-ft" value="BCR_MSH"> BCR_MSH</label>
          <label class="cb-item" title="호기성·혐기성 분해시설 (재활)"><input type="checkbox" class="cb-ft" value="BCR_BIO"> BCR_BIO</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">매립</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="차단형 매립시설"><input type="checkbox" class="cb-ft" value="LF_BLK"> LF_BLK</label>
          <label class="cb-item" title="관리형 매립시설"><input type="checkbox" class="cb-ft" value="LF_MGD"> LF_MGD</label>
        </div>
      </div>
      <div class="ft-group">
        <div class="ft-group-title">기타 재활</div>
        <div class="checkbox-grid three">
          <label class="cb-item" title="시멘트 소성로"><input type="checkbox" class="cb-ft" value="KLN"> KLN</label>
          <label class="cb-item" title="용해로 (비철금속 추출)"><input type="checkbox" class="cb-ft" value="SMT"> SMT</label>
          <label class="cb-item" title="소성·탄화시설"><input type="checkbox" class="cb-ft" value="CAL"> CAL</label>
          <label class="cb-item" title="골재가공시설"><input type="checkbox" class="cb-ft" value="AGG"> AGG</label>
          <label class="cb-item" title="의약품 제조시설"><input type="checkbox" class="cb-ft" value="PHR"> PHR</label>
          <label class="cb-item" title="수은회수시설"><input type="checkbox" class="cb-ft" value="MRC"> MRC</label>
        </div>
      </div>

const ITEMS_BY_SOURCE = {"b5":[{"depth":2,"type":"number-paren","marker":"1)","text":"생활폐기물은 특별자치시장, 특별자치도지사, 시장·군수·구청장 또는 법 제14조제2항에 따라 생활폐기물의 처리를 대행하는 자, 법 제46조제1항에 따라 폐기물처리 신고를 한 자(수집·운반 또는 재활용으로 한정한다)가 이를 처리하여야 한다. 다만, 생활폐기물 중 일련의공사·작업 등으로 인하여 5톤 미만으로 발생되는 폐기물(이하 \"공사장 생활폐기물\"이라 한다)을 배출하는 자(최초로 공사의 전부를 도급받은 자를 포함한다)는 특별자치시, 특별자치도, 시·군·구의 조례에서 정하는 바에 따라 그 폐기물의 처리를 대행하는 자나 폐기물 처분시설 또는 재활용시설의 설치·운영자에게 운반할 수 있다.","answer":"허가된 처리 대행자 또는 신고자(수집·운반·재활용)만이 생활폐기물을 처리하도록 하겠음. 공사장 생활폐기물(5톤 미만)은 조례에서 정하는 바에 따라 처분·재활용시설로 운반하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":null,"rCode":null,"facilityType":null},"_idx":5,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른 건설폐기물처리업자가 공사장 생활폐기물을 처리하는 경우에는 특별자치시,특별자치도, 시·군·구의 조례에서 정하는 바에 따라 건설폐기물에 관한 기준과 방법으로 처리할 수 있다.","answer":"건설폐기물처리업자로서 공사장 생활폐기물을 처리하는 경우, 해당 지자체 조례에서 정하는 바에 따라 건설폐기물의 재활용촉진에 관한 법률에서 정한 기준과 방법으로 처리하겠음","tags":{"category":["W01"],"bizType":["IR","CR","FR","ID","FD"],"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":6,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"폐가전제품을 수집·운반·보관하는 과정에서 일부 또는 전부를 해체하거나 의도적으로 파손하지 않아야 하며, 파손·낙하·붕괴 등이 일어나지 아니하도록 필요한 조치를 하여야 한다.","answer":"폐가전제품 수집·운반·보관 시 일부 또는 전부를 해체하거나 의도적으로 파손하지 않겠으며, 파손·낙하·붕괴 방지를 위한 필요한 조치를 취하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT","ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐가전제품":["91-09"]},"wasteCode":["91-09"]},"_idx":7,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"고체상태의 생활폐기물은 압축·압착차량이나 암롤차량 등으로서 적재함이 밀폐된 차량(이하 \"밀폐형 차량\"이라 한다)으로 수집·운반하여야 한다.","answer":"고체상태의 생활폐기물은 {{vehicles}}(밀폐형 차량)으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null,"physicalState":["S"]},"slots":[{"key":"vehicles","label":"밀폐형 압축·압착·암롤차량","type":"filter_join","f 을 방지할 수 있는 시설에 보관하겠음","tags":{"category":["W02"],"bizType":["RTR","RREC"],"wasteClass":["L"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":22,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"재활용이 가능한 폐기물은 법 제13조의2에 따라 재활용하여야 한다.","answer":"재활용이 가능한 생활폐기물은 폐기물관리법 제13조의2에 따라 재활용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":25,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"매립되는 생활폐기물로 인하여 매립층 안에 공간이 생길 수 있는 건설폐재류·폐합성고분자화합물 및 폐고무류(가연성은 제외한다)에 해당하는 생활폐기물은 매립 시 공간이 최소화되도록 해체·압축·파쇄·절단 또는 용융한 후 매립하여야 하며, 오니의 경우에는 탈수·건조 등에의하여 수분함량 85퍼센트 이하로 사전처리를 한 후에 매립하여야 한다.","answer":"건설폐재류·폐합성고분자화합물 및 폐고무류(가연성 제외) 등 매립 시 공간이 생길 수 있는 생활폐기물은 매립 전 해체·압축·파쇄·절단 또는 용융하여 공간이 최소화되도록 한 후 매립하겠음. 오니의 경우에는 탈수·건조 등으로 수분함량 85% 이하로 사전처리한 후 매립하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteVars":{"폐합성고분자화합물":["91-05"]},"wasteCode":["91-05"]},"_idx":26,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"폐타이어, 폐가구류 및 폐가전제품은 매립공간이 최소화되도록 해체·압축·파쇄·절단 등을 한 후 매립하되, 그 잔재물 중 가연성폐기물은 소각하여야 한다.","answer":"폐타이어, 폐가구류 및 폐가전제품은 매립공간이 최소화되도록 해체·압축·파쇄·절단 등을 한 후 매립하겠으며, 그 잔재물 중 가연성폐기물은 소각하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteVars":{"폐가전제품":["91-09"],"폐타이어":["91-07"],"폐가구류":["91-10"]},"wasteCode":["91-09","91-07","91-10"]},"_idx":27,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"사용이 끝난 폐가전제품 중에 염화불화탄소 등의 냉매물질(오존층 파괴지수가 0인 물질은 제외한다)이 함유된 경우 이를 안전하게 회수하여야 한다.","answer":"사용이 끝난 폐가전제품 중 염화불화탄소 등의 냉매물질(오존층 파괴지수 0인 물질 제외)이 함유된 경우에는 안전하게 회수하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteVars":{"폐가전제품":["91-09"]},"wasteCode":["91-09"]},"_idx":30,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"폐의약품과 폐농약은 소각하여야 한다.","answer":"폐의약품과 폐농약은 소각하여 처리하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteVars":{"폐의약품":["51-10"],"폐농약":["01-09"]}},"_idx":31,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"천연방사성제품생활폐기물은 제4호다목1) 및 2)러)에 따른 방법으로처리해야 한다.","answer":"천연방사성제품생활폐기물은 지정폐기물 처리 기준(시행규칙 제4호 다목 1) 및 2)러))에 따른 방법으로 처리하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-20-00"]},"_idx":32,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"1)부터 6)까지 외의 생활폐기물은 바로 매립해서는 안 되며, 소각이나 재활용과정을 거친 후 그 과정에서 발생한 협잡물(挾雜物)ㆍ잔재물(가연성은 제외한다)만을 매립해야 한다. 다만, 기후에너지환경부장관이 정하여 고시하는 산간ㆍ오지 또는 도서 지역에서 발생하는 생활폐기물, 「재난 및 안전관리 기본법」 제3조제1호에 따른 재난으로 발생하는 생활폐기물, 폐기물처리시설 가동 중지로 인해 처리가 곤란한 생활폐기물, 그 밖에 기후에너지환경부장관이 정하여 고시하는 생활폐기물은 그렇지 않다.","answer":"1)~6) 이외의 생활폐기물은 바로 매립하지 않고, 소각 또는 재활용 과정을 거친 후 그 과정에서 발생한 협잡물·잔재물(가연성 제외)만을 매립하겠음. 다만, 산간·오지·도서 지역 생활폐기물, 재난으로 발생한 생활폐기물, 폐기물처리시설 가동 중지로 처리가 곤란한 생활폐기물 등 기후에너지환경부장관 고시 해당 생활폐기물은 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":33,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"음식물류 폐기물을 재활용하기 위하여 수집·운반하는 경우에는 악취가 나거나 오수가 흘러나오는 것을 방지하기 위하여 적재함이 밀폐된전용 운반차량으로 수집·운반하거나 밀폐된 전용 수거용기에 담아 운반하여야 한다.","answer":"음식물류 폐기물을 재활용하기 위해 수집·운반하는 경우, 악취 및 오수 유출 방지를 위해 적재함이 밀폐된 전용 운반차량으로 수집·운반하거나 밀폐된 전용 수거용기에 담아 운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":36,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"음식물류 폐기물은 탱크로리로 수집·운반하여야 한다. 다만, 밀폐된전용 수거용기에 담아 수집·운반하는 경우에는 폐기물의 유출 또는 악취가 누출되지 않도록 적재함에 합성수지 등으로 제작된 포장으로 덮개를 설치하고, 침출수나 액상의 물질이 유출 또는 누출되지 않도록 방지턱 등을 설치한 차량으로 수집·운반할 수 있다.","answer":"음식물류 폐기물은 탱크로리로 수집·운반하겠음. 다만, 밀폐된 전용 수거용기에 담아 수집·운반하는 경우에는 합성수지 덮개를 설치하고 방지턱 등이 설치된 차량으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"],"physicalState":["L"]},"_idx":37,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"음식물류 폐기물의 전용 운반차량 및 전용 수거용기는 씻거나 소독하여 청결을 유지하여야 한다.","answer":"음식물류 폐기물의 전용 운반차량 및 전용 수거용기는 사용 후 씻거나 소독하여 청결을 유지하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":38,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"외국에서 들어오는 선박·항공기에서 발생하는 음식물류 폐기물은 방역을 위하여 소독을 철저히 하여야 한다.","answer":"외국 선박·항공기에서 발생하는 음식물류 폐기물은 방역을 위해 소독을 철저히 하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":39,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"제3호가목1)에 따른 사업장비배출시설계 폐기물의 수집ㆍ운반업자가법 제15조의2제3항에 따른 음식물류 폐기물 배출자가 배출하는 음식물류 폐기물을 수집ㆍ운반하는 경우에는 특별자치시, 특별자치도 또는 시ㆍ군ㆍ구의 조례에서 정하는 바에 따라 제3호가목 및 나목에 따른 사업장비배출시설계 폐기물의 수집ㆍ운반 기준 및 방법으로 수집ㆍ운반할 수 있다.","answer":"사업장비배출시설계 폐기물 수집·운반업자로서 음식물류 폐기물 배출자의 음식물류 폐기물을 수집·운반하는 경우, 해당 지자체 조례에서 정하는 바에 따라 사업장비배출시설계 폐기물 수집·운반 기준 및 방법으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":40,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"음식물류 폐기물은 특별자치시, 특별자치도, 시·군·구의 조례에서정하는 바에 따라 전용봉투 또는 전용 수거용기에 분리하여 보관하여야한다.","answer":"음식물류 폐기물은 해당 지자체 조례에서 정하는 바에 따라 전용봉투 또는 전용 수거용기에 분리하여 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":42,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"음식물류 폐기물을 재활용하는 자는 악취가 나거나 오수가 흘러나오지 아니하도록 밀폐된 보관용기 또는 보관시설에 보관하여야 한다.","answer":"음식물류 폐기물을 재활용하는 경우, 악취 및 오수 유출이 없도록 밀폐된 보관용기 또는 보관시설에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":43,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"재활용이 가능한 폐기물은 법 제13조의2에 따라 재활용하여야 한다.","answer":"재활용이 가능한 음식물류 폐기물은 폐기물관리법 제13조의2에 따라 재활용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":45,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"영 제8조의4 각 호의 어느 하나에 해당하는 자가 음식물류 폐기물을스스로 감량하는 경우에는 단독이나 공동으로 다음의 어느 하나에 해당하는 방법으로 감량하여야 하며, 감량된 음식물류 폐기물은 법 제13조의2에 따라 재활용하여야 한다.","answer":"폐기물관리법 시행령 제8조의4 각 호에 해당하는 자로서 음식물류 폐기물을 스스로 감량하는 경우, 단독 또는 공동으로 아래 방법 중 하나로 감량하겠으며, 감량된 음식물류 폐기물은 법 제13조의2에 따라 재활용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":47,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"가열에 의한 건조의 방법으로 부산물의 수분함량을 25퍼센트 미만으로 감량하여야 한다.","answer":"가열에 의한 건조 방법으로 부산물의 수분함량을 25% 미만으로 감량하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":48,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"발효 또는 발효건조나 퇴비화ㆍ사료화 또는 부숙의 방법으로 처리하여 부산물의 수분함량을 40퍼센트 미만으로 하여야 한다.","answer":"발효 또는 발효건조, 퇴비화·사료화 또는 부숙 방법으로 처리하여 부산물의 수분함량을 40% 미만으로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":49,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"외국에서 들어오는 선박·항공기에서 발생하는 음식물류 폐기물은 소각하여야 한다.","answer":"외국 선박·항공기에서 발생하는 음식물류 폐기물은 소각하여 처리하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":50,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는음식물류 폐기물은 바로 매립하여서는 아니되며, 소각, 퇴비화, 사료화,부숙, 탄화, 소화 또는 부숙토 생산 등의 공정에서 발생하는 재활용 용도에 맞지 아니한 협잡물(挾雜物)과 잔재물만을 매립하여야 한다. 다만, 특별시·광역시·특별자치시·특별자치도 또는 시 지역 중 기후에너지환경부장관이 고시하여 정하는 산간·오지 또는 도서 지역에서 발생하는 음식물류 폐기물은 그러하지 아니하다.","answer":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는 음식물류 폐기물은 바로 매립하지 않고, 소각·퇴비화·사료화·부숙·탄화·소화 또는 부숙토 생산 등의 공정을 거쳐 재활용 용도에 맞지 않는 협잡물과 잔재물만 매립하겠음. 다만, 기후에너지환경부장관이 고시하는 산간·오지·도서 지역은 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":51,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"음식물류 폐기물 처분시설 또는 재활용시설을 설치·운영하는 경우에는 해당 시설에 유입된 음식물류에 포함된 고형물 중에서 무게 기준으로 2012년 12월 31일까지는 60퍼센트 이상, 2013년 1월 1일부터는70퍼센트 이상을 동물 등의 먹이, 퇴비 등의 재활용제품의 원료로 사용(에너지 생산, 액비 생산 등을 위하여 다른 시설로 옮겨서 재활용하는 경우를 포함한다)하여야 한다.","answer":"음식물류 폐기물 처분시설 또는 재활용시설 설치·운영 시, 유입된 음식물류 고형물의 70% 이상(2013년 1월 1일 기준)을 동물 먹이, 퇴비 등의 재활용제품 원료로 사용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"],"physicalState":["S"]},"_idx":54,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"법 제2조제3호에 따른 배출시설 또는 영 제2조제1호부터 제5호까지의 규정에 따른 시설의 운영으로 배출되는 폐기물(이하 \"사업장배출시설계 폐기물\"이라 한다)은 해당 사업장에서 배출되는 사업장배출시설계폐기물 외의 폐기물 및 영 제2조제7호 및 제9호에 따른 사업장에서 배출되는 폐기물(이하 \"사업장비배출시설계 폐기물\"이라 한다)과 혼합되지 않도록 해야 한다.","answer":"사업장배출시설계 폐기물과 사업장비배출시설계 폐기물이 혼합되지 않도록 분리 관리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":57,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 처리할 수 있는 폐기물은 특별자치시, 특별자치도, 시·군·구의 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있다.","answer":"사업장비배출시설계 폐기물로서 생활폐기물과 성질·상태가 비슷한 경우, 해당 지자체 조례에서 정하는 바에 따라 생활폐기물의 {"depth":2,"type":"number-paren","marker":"6)","text":"별표 3에 따른 의료기관 및 시험ㆍ검사기관 등에서 발생한 일회용 기저귀(같은 표 제14호에 따른 노인요양시설에서 발생한 일회용 기저귀는 제외한다. 이하 \"의료기관 일회용기저귀\"라 한다)의 경우 섭씨 4도이하의 냉장 적재함이 설치된 차량으로 수집ㆍ운반해야 하며, 수집ㆍ운반 중에는 적재함의 내부 온도를 섭씨 4도 이하로 유지해야 한다. 다만, 적재함을 열고 차량에 폐기물을 싣거나 내릴 때에는 제외한다.","answer":"의료기관 일회용기저귀는 섭씨 4도 이하의 냉장 적재함이 설치된 차량으로 수집·운반하겠으며, 수집·운반 중에는 적재함 내부 온도를 섭씨 4도 이하로 유지하겠음(폐기물을 싣거나 내릴 때 제외)","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":76,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"의료기관 일회용기저귀의 경우 비닐로 개별 밀폐 포장한 후, 기후에너지환경부장관이 고시하는 전용 봉투에 담아 다른 사업장일반폐기물과는 분리하여 수집ㆍ운반해야 한다.","answer":"의료기관 일회용기저귀는 비닐로 개별 밀폐 포장한 후 전용 봉투에 담아 다른 사업장일반폐기물과 분리하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":77,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"전기자동차 폐이차전지는 배터리 단자, 연결케이블 등을 절연처리한 후 불연성ㆍ비전도성 재질의 파렛트(Pallet)에 개별 포장하거나 밀폐된운반 상자에 담아서 다른 종류의 폐기물과 분리하여 수집ㆍ운반해야한다.","answer":"전기자동차 폐이차전지는 배터리 단자·연결케이블 등을 절연처리한 후 불연성·비전도성 재질의 파렛트에 개별 포장하거나 밀폐된 운반 상자에 담아 다른 폐기물과 분리하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-41-05"]},"_idx":78,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"사업장일반폐기물은 해당 폐기물에 의하여 부식되거나 파손되지 아니하는 재질로 된 보관용기에 보관하여야 한다.","answer":"사업장일반폐기물은 해당 폐기물에 의해 부식·파손되지 않는 재질의 보관용기에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":80,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"자체하중 및 보관하려는 폐기물의 최대량 보관 시의 적재하중에 견딜수 있고 물이 스며들지 아니하도록 시멘트·아스팔트 등의 재료로 바닥이 포장되고, 지붕과 벽면을 갖춘 보관창고 또는 「건축법」 제20조제3항에 따라 축조신고를 한 가설건축물 중 폐기물이나 침출수의 누출·유출을 방지할 수 있는 구조로 된 컨테이너 또는 이와 비슷한 것으로된 임 asteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":85,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"사업장일반폐기물배출자는 그의 사업장에서 발생하는 폐기물을 보관이 시작되는 날부터 90일(중간가공 폐기물의 경우는 120일을 말한다)을 초과하여 보관하여서는 아니 된다. 다만, 다음의 어느 하나에 해당하는 경우에는 제외한다.","answer":"사업장에서 발생하는 폐기물은 보관 시작일로부터 90일(중간가공 폐기물은 120일)을 초과하여 보관하지 않겠음. 다만, 아래 가)~라)에 해당하는 경우는 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":86,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"보관하는 사업장일반폐기물의 양이 5톤 미만인 경우","answer":"보관하는 사업장일반폐기물의 양이 5톤 미만인 경우 보관기간 제한 예외","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":87,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"「자원의 절약과 재활용촉진에 관한 법률」 제25조에 따라 숙성방법을 지정하고 있는 철강슬래그를 보관하는 경우","answer":"자원재활용촉진법 제25조에 따라 숙성방법이 지정된 철강슬래그를 보관하는 경우 보관기간 제한 예외","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteVars":{"철강슬래그":["51-14"]},"wasteCode":["51-14"]},"_idx":88,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"다)","text":"「산지관리법」 제25조제1항에 따른 토석채취허가를 받아 자체 석산의 복구용으로 재활용하는 폐석분토사(폐수처리오니는 제외한다)를 보관하는 경우","answer":"토석채취허가를 받아 자체 석산 복구용으로 재활용하는 폐석분토사(폐수처리오니 제외)를 보관하는 경우 보관기간 제한 예외","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":89,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"라)","text":"제17조 및 별표 5의7에 따라 폐기물의 처리 위탁을 중단해야 하거나 천재지변 또는 그 밖의 부득이한 사유로 장기보관 할 필요성이있다고 시·도지사가 기간을 정하여 인정하는 경우","answer":"처리 위탁 중단 또는 천재지변 등 부득이한 사유로 시·도지사가 기간을 정하여 인정하는 경우 보관기간 제한 예외","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":90,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"3)에도 불구하고, 의료기관 일회용기저귀 배출자는 의료기관 일회용기저귀의 보관이 시작되는 날부터 15일(섭씨 4도 이하로 냉장보관하는 경우에는 30일)을 초과하여 보관해서는 안된다. 다만, 천재지변,휴업, 시설의 보수, 그 밖의 부득이한 경우로서 시ㆍ도지사나 지방환경관서의 장이 기간을 정하여 인정하는 경우는 예외로 한다.","answer":"의료기관 일회용기저귀는 보관 시작일로부터 15일(섭씨 4도 이하 냉장보관 시 30일)을 초과하여 보관하지 않겠음. 다만, 천재지변·휴업·시설 보수 등 부득이한 사유로 시·도지사 등이 인정하는 경우는 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":91,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"의료기관 일회용기저귀 배출자는 의료기관 일회용기저귀를 별도의 보관장소에 보관하고, 보관장소를 주 1회 이상 약물소독의 방법으로 소독해야 한다.","answer":"의료기관 일회용기저귀는 별도의 보관장소에 보관하고, 보관장소를 주 1회 이상 약물소독 방법으로 소독하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":92,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"의료기관 일회용기저귀 배출자는 의료기관 일회용기저귀의 발생ㆍ처리상황 등 다음의 사항을 기록하여 보관장소에 비치해야 하며, 기록내용은 기록한 날부터 3년간 보존해야 한다.","table":[{"발생일시":"┃"}],"answer":"의료기관 일회용기저귀의 발생·처리상황 등 관련 사항을 기록하여 보관장소에 비치하겠으며, 기록 내용은 기록한 날로부터 3년간 보존하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":93,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"석면(뿜칠로 사용된 것은 제외한다)의 해체·제거작업에 사용된 비닐시트중 바닥용으로 사용된 것이 아닌 것은 포대에 담아 보관하여야 한다.비고: 3)에 따른 사업장일반폐기물의 양 산정 시 2012년 11월 1일부터 2014년 12월 31일까지는 별표 4에 따른 사업장폐기물의 분류번호에 해당하는 폐기물별로 각각 산정한다. 다만, 영 제7조제1항제1호 각목의 어느 하나에 해당되어 혼합하여 보관하고 있는 경우에는 그 혼합하여 보관하고 있는 양으로 산정한다.","answer":"석면(뿜칠 사용 제외) 해체·제거작업에 사용된 비닐시트 중 바닥용이 아닌 것은 포대에 담아 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":94,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"전기자동차 폐이차전지는 배터리 단자, 연결케이블 등을 절연처리한 후 고온, 화기, 직사광선 및 수분 등에 노출되지 않고 환기가 잘되는건조한 장소에 보관해야 한다.","answer":"전기 하여 보관하여야 한다.","answer":"고형화되어 흩날릴 우려가 없는 폐석면은 폴리에틸렌 등 유사 재질 포대로 포장하여 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐석면":["01-07"]},"wasteCode":["01-07"],"physicalState":["S"]},"_idx":201,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"지정폐기물은 지정폐기물에 의하여 부식되거나 파손되지 아니하는 재질로 된 보관시설 또는 보관용기를 사용하여 보관하여야 한다.","answer":"지정폐기물은 지정폐기물에 의해 부식·파손되지 않는 재질의 보관시설 또는 보관용기를 사용하여 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":202,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"자체 무게 및 보관하려는 폐기물의 최대량 보관 시의 적재무게에 견딜 수 있고 물이 스며들지 아니하도록 시멘트·아스팔트 등의 재료로바닥을 포장하고 지붕과 벽면을 갖추며, 보관 중인 폐기물이 외부로 흘러나올 우려가 없는 충분한 규모의 유출방지시설이 설치되어 있는 보관창고에 보관하여야 한다. 다만, 다음의 어느 하나에 해당하는 경우에는그러하지 아니하다.","answer":"자체 무게 및 최대 적재무게에 견디고 방수 처리된 바닥과 지붕·벽면을 갖춘 보관창고에 보관하겠음. 다만, 아래 가)~다) 경우는 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":203,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"침출수가 발생하지 아니한다고 관할 시·도지사나 지방환경관서의장이 인정하는 경우","answer":"침출수가 발생하지 않는다고 관할 시·도지사 등이 인정하는 경우 보관창고 예외","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":204,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"침출수의 발생으로 주변 환경오염의 우려가 없다고 관할 시·도지사나 지방환경관서의 장이 인정하는 경우","answer":"침출수 발생으로 주변 환경오염 우려가 없다고 관할 시·도지사 등이 인정하는 경우 보관창고 예외","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":205,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"다)","text":"드럼 등 보관용기나 보관탱크에 폐기물을 보관하는 경우로서 내용물이 흘러나올 우려가 없고, 보관용기나 보관탱크 외부에 지정폐기물이 묻어 있지 않은 경우(이 경우에는 폐기물의 최대량 보관 시의적재무게를 견딜 수 있고, 지정폐기물 취급 과정에서 또는 보관용기·보관탱크의 손상 등의 사유로 내용물이 주변 토양이나 외부에흘러나오지 않도록 시멘트·아스팔트 등으로 바닥을 포장하고, 충분한 규모의 방류턱 또는 방류벽을 갖춘 시설에 보관하여야 한다)","answer":"드럼 등 보관용기·보관탱크에 보관하는 경우로서 내용물 유출 우려가 없고 외부에 지정폐기물이 묻지 않은 경우, 최대 적재무게에 견디고 시멘트·아스팔트 바닥 포장 및 방류턱·방류벽을 갖춘 시설에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":206,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"지정폐기물배출자는 그의 사업장에서 발생하는 지정폐기물 중 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약,폴리클로리네이티드비페닐 함유폐기물, 폐수처리 오니 중 유기성 오니는 보관이 시작된 날부터 45일을 초과하여 보관하여서는 아니되며, 그 밖의 지정폐기물은 60일을 초과하여 보관하여서는 아니 된","answer":"사업장에서 발생하는 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약·PCBs 함유폐기물 및 유기성 오니는 보관 시작일로부터 45일, 그 밖의 지정폐기물은 60일을 초과하여 보관하지 않겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐유기용제":["01-04"],"폐알칼리":["01-02"],"폐흡착제":["01-03"],"폐흡수제":["01-03"],"폐농약":["01-09"],"폐촉매":["01-03"],"오니":["51-01"],"폐유":["01-06"],"폐산":["01-02"]},"wasteCode":["02-01","02-02","06","04","03-07","03-08","01-03","01-02"]},"_idx":207,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"다.","text":"다만, 제17조 및 별표 5의7에 따라 폐기물의 처리 위탁을 중단해야 하는 경우로서 시ㆍ도지사나 지방환경관서의 장이 기간을 정하여 인정하는 경우 또는 천재지변이나 그 밖의 부득이한 사유로 장기보관할 필요성이 있다고 관할 시·도지사나 지방환경관서의 장이 인정하는 경우와, 1년간 배출하는 지정폐기물의 총량이 3톤(2013년12월 31일까지는 4톤) 미만인 사업장의 경우에는 1년의 기간 내에서 보관할 수 있다.","answer":"처리 위탁 중단 사유, 천재지변 등 부득이한 사유로 시·도지사 등이 인정하는 경우, 또는 연간 지정폐기물 총량 3톤 미만 사업장의 경우에는 1년 이내 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":208,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"제31조 및 6)에도 불구하고 폴리클로리네이티드비페닐 함유폐기물을보관하려는 배출자 및 처리업자는 시·도지사나 지방환경관서의 장의승인을 받아 1년 단위로 보관기간을 연장할 수 있다.","answer":"PCBs 함유폐기물의 경우 시·도지사 등의 승인을 받아 1년 단위로 보관기간을 연장하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["08-01-00","08-02-00","08-03-00","08-04-00"]},"_idx":209,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"7)에 따라 보관기간을 연장받으려는 배출자 및 처리업자는 별지 제69호서식에 따라 폐기물 보관기간 연장승인 신청서를 작성하여 제출하여야 하며, 시·도지사나 지방환경관서의 장이 폐기물의 보관기간 연장을 승인하는 경우에는 별지 제70호서식의 폐기물 보관기간 연장승인서를 신청인에게 발급하여야 한다.","answer":"PCBs 함유폐기물 보관기간 연장 시 별지 제69호서식에 따라 보관기간 연장승인 신청서를 제출하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["08-01-00","08-02-00","08-03-00","08-04-00"]},"_idx":210,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"9)","text":"지정폐기물의 보관창고에는 보관 중인 지정폐기물의 종류, 보관가능용량, 취급 시 주의사항 및 관리책임자 등을 적어 넣은 표지판을 다음과 같이 설치하여야 한다. 다만, 드럼 등 보관용기를 사용하여 보관하는 경우에는 용기별로 폐기물의 종류·양 및 배출업소 등을, 지정폐기물의 종류가 같은 용기가 여러 개 있는 경우에는 폐기물의 종류별로 폐기물의 종류·양 및 배출업소 등을 각각 알 수 있도록 표지판에 적어넣어야 한다.","answer":"지정폐기물 보관창고에 보관 중인 지정폐기물의 종류·보관가능용량·주의사항·관리책임자를 적은 표지판을 설치하겠음. 드럼 등 용기 보관 시에는 용기별(또는 종류별)로 폐기물 종류·양·배출업소를 표지판에 기재하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":211,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"보관창고에는 표지판을 사람이 쉽게 볼 수 있는 위치에 설치하여야 한다.","answer":"보관창고 표지판은 사람이 쉽게 볼 수 있는 위치에 설치하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":212,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"표지의 규격: 가로 60센티미터 이상×세로 40센티미터 이상(드럼등 소형용기에 붙이는 경우에는 가로 15센티미터 이상×세로 10센티미터 이상)","answer":"표지판 규격: 가로 60cm 이상×세로 40cm 이상(소형용기용은 가로 15cm 이상×세로 10cm 이상)으로 제작·부착하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":213,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"다)","text":"표지의 색깔: 노란색 바탕에 검은색 선 및 검은색 글자","answer":"표지판 색깔: 노란색 바탕에 검은색 선 및 검은색 글자로 제작하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":214,"_source":"b5"} paren","marker":"가)","text":"인체조직물은 「장사 등에 관한 법률」 제17조에 따른 묘지 등의설치제한지역이 아닌 곳으로서 같은 법 제13조제1항에 따른 공설묘지중 시·도지사가 인정한 장소에 1미터 이상의 깊이로 파묻거나 같은법 제2조제8호에 따른 화장시설에서 화장할 수 있다.","answer":"인체조직물은 해당 법령에서 정하는 공설묘지·장사시설 등 적합한 장소에서 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":null,"rCode":null,"facilityType":null,"wasteCode":["10-12-01"]},"_idx":349,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"동물의 사체는 「동물보호법」 제15조제2항에 따른 동물장묘업의등록을 한 자가 설치·운영하는 동물장묘시설에서 처리할 수 있다.","answer":"동물의 사체는 동물장묘시설에서 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":null,"rCode":null,"facilityType":null,"wasteCode":["10-13-00"]},"_idx":350,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"의료폐기물 중 태반을 재활용하기 위하여 배출자, 폐기물 수집·운반업자, 폐기물 재활용업자가 태반을 인계·인수하는 경우에는 제5호 다목1)의 규정에도 불구하고 전용용기를 풀어서 수량, 무게(g)를 확인한 후 그 내용을 전자정보처리프로그램에 입력하여야 한다.","answer":"의료폐기물 중 태반을 재활용하기 위하여 배출자, 폐기물 수집·운반업자, 폐기물 재활용업자가 태반을 인계·인수하는 경우에는 제5호 다목1)의 규정에도 불구하고 전용용기를 풀어서 수량를 준수하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":null,"rCode":null,"facilityType":null,"wasteCode":["10-12-06"]},"_idx":351,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"한번 사용한 전용용기는 다시 사용하여서는 아니 된다.","answer":"한번 사용한 전용용기는 다시 사용하여서는 않겠음.","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":null,"rCode":null,"facilityType":null,"wasteCode":["10-11-00","10-12","10-13-00"]},"_idx":354,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"의료폐기물은 발생한 때(해당 진찰·치료 및 시험·검사행위가 끝났을 때를 말한다. 이하 같다)부터 전용용기에 넣어 내용물이 새어 나오지 아니하도록 보관하여야 하며, 의료폐기물의 투입이 끝난 전용용기는밀폐 포장하여야 한다. 다만, 대형 조직물류폐기물과 같이 전용용기에넣기 어려운 의료폐기물은 내용물이 보이지 아니하도록 개별 포장하여내용물이 새어 나오지 아니하도록 밀폐 포장하여야 한다.","answer":"이하 같다)부터 전용용기에 넣어 내용물이 새어 나오지 아니하도록 보관하고,, 의료폐기물의 투입이 끝난 전용용기는밀폐 포장하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":null,"rCode":null,"facilityType":null,"wasteCode":["10-11-00","10-12","10-13-0  시장ㆍ군수ㆍ구청장 또는 지방환경관서의 장은 「수도법」 제7조에 따른 상수원보호구역의 수질이 악화되거나, 「환경정책기본법」 제12조에 따른 환경기준 또는 「토양환경보전법」 제4조의2에 따른 토양오염의 우려기준을 준수하기 어렵게 되는 등 폐기물의 재활용으로 인하여 사람의 건강 또는 주변 환경에 미치는 영향이 크다고 인정하는 경우에는 폐기물을 재활용하는 자로 하여금 1)에 따른 오염예방 및 저감방법 이외의 필요한 오염예방 및 저감조치를 하게 할 수 있다.","answer":"상수원보호구역 수질 악화, 환경기준·토양오염 우려기준 준수 곤란 등의 사유로 시·도지사, 시장·군수·구청장 또는 지방환경관서의 장이 추가 오염예방·저감조치를 명할 경우 해당 조치를 이행하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":11,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"1)","text":"대기오염물질: 「대기환경보전법 시행규칙」 별표 8에 따른 대기오염물질 배출허용기준 이내","answer":{"applicable":"{대기오염방지시설}을 설치·운영하여 대기오염물질이 배출허용기준 이내로 배출되도록 관리하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facilityVars":{"대기오염방지시설":[]}},"applicabilityFlag":"대기오염물질발생","_idx":13,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"2)","text":"소음ㆍ진동: 「소음ㆍ진동관리법 시행규칙」 별표 5에 따른 공장소음ㆍ진동의 배출허용기준 및 같은 법 시행규칙 별표 8에 따른 생활소음ㆍ진동의 규제기준 이내","answer":{"applicable":"{소음진동방지시설}을 설치·운영하여 소음·진동이 공장소음·진동 배출허용기준 및 생활소음·진동 규제기준 이내로 관리되도록 하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facilityVars":{"소음진동방지시설":[]}},"applicabilityFlag":"소음진동발생","_idx":14,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"3)","text":"수질오염물질: 「물환경보전법 시행규칙」 별표 13에 따른 수질오염물질 배출허용기준 이내","answer":{"applicable":"{수질오염방지시설}을 설치·운영하여 수질오염물질이 배출허용기준 이내로 배출되도록 관리하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facilityVars":{"수질오염방지시설":[]}},"applicabilityFlag":"수질오염물질발생","_idx":15,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"4)","text":"악취: 「악취방지법 시행규칙」 별표 3에 따른 악취 배출허용기준 이내","answer":{"applicable":"{악취방지시설}을 설치·운영하여 악취가 배출허용기준 이내로 관리되도록 하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facilityVars":{"악취방지시설":[]}},"applicabilityFlag":"악취발생","_idx":16,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"5)","text":"침출수: 별표 11 제2호나목2)가)에 따른 침출수 배출허용기준 이내","answer":{"applicable":"{침출수처리시설}을 설치·운영하여 침출수가 배출허용기준 이내로 처리·배출되도록 관리하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null,"facilityVars":{"침출수처리시설":[]}},"applicabilityFlag":"침출수발생","_idx":17,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"6)","text":"토양오염물질: 「토양환경보전법 시행규칙」 별표 3에 따른 지역별 토양오염우려기준 이내(별표 4의2 제4호가목, 나목 및 바목의 경우에는 재활용 대상 부지는 제외한다)","answer":{"applicable":"{토양오염방지시설}을 설치·운영하여 토양오염물질이 지역별 토양오염우려기준 이내로 관리되도록 하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null,"facilityVars":{"토양오염방지시설":[]}},"applicabilityFlag":"토양오염물질발생","_idx":18,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"1)","text":"영 별표 4의2 제3호에 따라 기후에너지환경부장관이 정하여 고시하는 폐기물의 유해특성 허용 기준을 초과하는 폐기물(이하 \"유해폐기물\"이라 한다)을 재활용하는 자는 폐기물이 지하로 침투하거나 주변 지역으로 유출ㆍ누출되지 않도록 유해폐기물을 보관ㆍ저장ㆍ취급 또는 사용하는 장소에 바닥 포장, 유출방지장치 설치 등 필요한 조치를 해야 한다.","answer":"영 별표 4의2 제3호에 따라 기후에너지환경부장관이 정하여 고시하는 폐기물의 유해특성 허용기준을 초과하는 폐기물(유해폐기물)을 재활용하는 경우, 보관·저장·취급 또는 사용 장소에 바닥 포장 및 유출방지장치를 설치하여 폐기물이 지하 침투하거나 주변 지역으로 유출·누출되지 않도록 하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":21,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"2)","text":"분말ㆍ미립자 형태의 고상상태 또는 액체상태인 폐기물은 비산되거나 외부로 유출ㆍ누출되지 않도록 적절한 용기나 탱크, 상자(벌크백을 포함한다)에 넣어 보관해야 한다.","answer":"분말·미립자 형태의 고상 또는 액체상태인 폐기물은 비산되거나 외부로 유출·누출되지 않도록 적절한 용기, 탱크 또는 상자(벌크백 포함)에 넣어 보관하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":22,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"3)","text":"재활용 대상 유해폐기물을 탱크나 용기에 보관하는 경우에는 유해폐기물 성상에 따라 적당한 재질, 두께 및 구조를 갖춘 탱크나 용기에 보관해야 하며, 탱크나 용기 등이 부식ㆍ손상ㆍ노후화되지 아니하도록 유지ㆍ관리해야 한다.","answer":"재활용 대상 유해폐기물을 탱크나 용기에 보관하는 경우 폐기물 성상에 적합한 재질·두께·구조의 탱크·용기를 사용하고, 부식·손상·노후화되지 않도록 유지·관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":23,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"4)","text":"재활용 대상 유해폐기물은 유해특성을 고려하여 구분하여 별도의 분리된 장소에 보관해야 하며, 유해폐기물임을 알 수 있도록 폐기물의 종류와 유해특성, 취급 시 주의사항을 기재한 표지판을 보관장소에 설치해야 한다.","answer":"재활용 대상 유해폐기물은 유해특성별로 구분하여 별도의 분리된 장소에 보관하고, 폐기물의 종류·유해특성·취급 시 주의사항을 기재한 표지판을 보관장소에 설치하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":24,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"5)","text":"유해폐기물은 보관 또는 재활용 과정에서 화재ㆍ폭발, 유해가스 발생 등의 사고를 예방하기 위하여 화기ㆍ물 등과 접촉되지 않도록 적절하게 관리해야 하며, 유해가스 등이 발생할 경우 이를 중화 또는 배출할 수 있는 시설ㆍ 장치 등을 갖추어야 한다.","answer":"유해폐기물은 보관 및 재활용 과정에서 화재·폭발, 유해가스 발생 등의 사고를 예방하기 위해 화기·물 등과 접촉되지 않도록 관리하고, 유해가스가 발생할 경우 이를 중화·배출할 수 있는 시설·장치를 갖추겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":25,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"6)","text":"별표 4의3 비고 제3호에 따라 별표 5의3에 따른 폐기물의 구체적인 재활용 기준에 따라 재활용이 가능한 폐기물인지 여부 등을 사전 분석․확인하는 경우에는 그 분석․확인 결과를 배출자(생활폐기물배출자는 제외한다)에게 통보하여 배출자가 재활용 기준의 준수 여부를 확인할 수 있도록 해야 한다.","answer":"별표 4의3 비고 제3호에 따라 별표 5의3에 따른 폐기물의 구체적 재활용 기준에 따라 재활용 가능 여부를 사전 분석·확인하는 경우, 그 결과를 배출자(생활폐기물배출자 제외)에게 통보하여 배출자가 재활용 기준 준수 여부를 확인할 수 있도록 하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":26,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"1)","text":"폭발성이 있는 폐기물은 소량으로 분리ㆍ보관하고, 다른 폐기물이나 산화제와 혼합ㆍ접촉하지 않아야 하며, 불티ㆍ불꽃ㆍ정전기 또는 고온체와의 접근이나 충격ㆍ마찰을 피하고, 폐기물을 보관ㆍ취급 또는 사용하는 장소가 폭발이 유발되는 온도 이상으로 과열되지 않도록 해야 한다.","answer":"폭발성이 있는 폐기물은 소량으로 분리·보관하고 다른 폐기물이나 산화제와 혼합·접촉되지 않도록 하겠으며, 불티·불꽃·정전기·고온체와의 접근이나 충격·마찰을 피하고 보관·취급·사용 장소가 폭발 유발 온도 이상으로 과열되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":28,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"2)","text":"인화성이 있는 폐기물은 불티ㆍ불꽃ㆍ정전기 또는 고온체와의 접근이나 충격ㆍ마찰을 피하고, 폐기물을 보관ㆍ취급 또는 사용하는 장소가 화재가 유발되는 온도 이상으로 과열되지 않도록 해야 한다.","answer":"인화성이 있는 폐기물은 불티·불꽃·정전기·고온체와의 접근이나 충격·마찰을 피하고, 보관·취급·사용 장소가 화재 유발 온도 이상으로 과열되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":29,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"3)","text":"자연발화성이 있는 폐기물은 불티ㆍ불꽃ㆍ정전기 또는 고온체 등 발화유발 가능성이 있는 물질 및 공기와의 접촉을 피하고, 직사광선에 직접 노출되지 않도록 해야 한다.","answer":"자연발화성이 있는 폐기물은 불티·불꽃·정전기·고온체 등 발화유발 가능 물질 및 공기와의 접촉을 피하고, 직사광선에 직접 노출되지 않도록 보관·관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":30,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"4)","text":"금수성이 있는 폐기물은 밀폐된 용기에 보관하는 등 물이나 증기와 접촉되지 않도록 해야 한다.","answer":"금수성이 있는 폐기물은 밀폐된 용기에 보관하는 등 물이나 증기와 접촉되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":31,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"5)","text":"산화성이 있는 폐기물은 가연물 또는 분해를 촉진하는 물질과 접촉ㆍ혼합되지 않도록 하고, 과열ㆍ충격ㆍ마찰 등이 발생되지 않도록 해야 한다.","answer":"산화성이 있는 폐기물은 가연물 또는 분해를 촉진하는 물질과 접촉·혼합되지 않도록 하고, 과열·충격·마찰 등이 발생되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":32,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"6)","text":"용출독성 또는 생태독성이 있는 폐기물은 유해물질이 누출ㆍ유출 또는 비산되지 않도록 별도의 용기 등에 담아 보관해야 한다.","answer":"용출독성 또는 생태독성이 있는 폐기물은 유해물질이 누출·유출 또는 비산되지 않도록 별도의 용기 등에 담아 보관하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":33,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"7)","text":"부식성이 있는 폐기물은 내부식성을 갖는 용기에 보관하고, 누출ㆍ유출 또는 비산되지 않도록 해야 한다.","answer":"부식성이 있는 폐기물은 내부식성을 갖는 용기에 보관하고, 누출·유출 또는 비산되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":34,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"8)","text":"매체접촉형 재활용의 경우에는 다음의 사항을 준수해야 한다.","answer":"매체접촉형 재활용(R6 토질개선·R7 토목재활용)의 경우 아래의 사항을 준수하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":35,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"가)","text":"대상폐기물과 재활용 할 수 없는 다른 폐기물이나 이물질 등을 혼합하여 재활용 대상 부지에 반입하지 아니하고, 재활용하기 전에 이물질 등을 최대한 분리ㆍ제거해야 한다.","answer":"대상폐기물과 재활용할 수 없는 다른 폐기물이나 이물질 등을 혼합하여 재활용 대상 부지에 반입하지 않겠으며, 재활용 전에 이물질 등을 최대한 분리·제거하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":36,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"나)","text":"혼합이 필요한 경우에는 지형 여건, 환경 위해성 여부, 공사 안전성 등을 종합적으로 고려하여 일반 토사류 등과 혼합하여 사용해야 하며, 폐기물의 비산 또는 유ㆍ누출 등으로 인한 오염이나 피해가 발생되지 않는 장소에서 혼합해야 한다.","answer":"혼합이 필요한 경우에는 지형 여건, 환경 위해성, 공사 안전성 등을 종합적으로 고려하여 일반 토사류 등과 혼합 사용하겠으며, 폐기물 비산이나 유·누출 등 오염·피해가 발생하지 않는 장소에서 혼합하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":37,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"다)","text":"재활용 과정 또는 재활용한 후 침출수로 인한 2차 환경오염이 발생하지 않아야 하며, 재활용 이후 지반의 안정성이 유지되고 재활용 대상 폐기물 또는 폐기물과 토양 등과의 혼합물이 유실되지 않도록 해야 한다.","answer":"재활용 과정 또는 재활용 후 침출수로 인한 2차 환경오염이 발생하지 않도록 하고, 재활용 이후 지반의 안정성이 유지되며 재활용 대상 폐기물 또는 폐기물·토양 혼합물이 유실되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":38,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"라)","text":"재활용 대상 폐기물을 사업 부지 등에 보관할 경우 비산, 누ㆍ유출 등이 발생되지 않는 장소를 선정하여 보관해야 하며, 바닥포장, 덮개설치 등을 통해 폐기물의 비산, 누ㆍ유출 등을 방지해야 한다.","answer":"재활용 대상 폐기물을 사업 부지 등에 보관할 경우 비산, 누·유출 등이 발생하지 않는 장소를 선정하여 보관하겠으며, 바닥포장·덮개설치 등을 통해 폐기물의 비산·누·유출 등을 방지하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":39,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"마)","text":"수소이온농도를 중성수준으로 낮추기 위한 선별ㆍ파쇄ㆍ혼합ㆍ중화 등의 재활용과정에서 새로운 부산물이 생성되는 경우에는 대상 폐기물과 부산물이 환경에 미치는 영향 등을 검토하여 오염 등의 영향이 없도록 혼합ㆍ중화해 사용해야 한다.","answer":"수소이온농도를 중성수준으로 낮추기 위한 선별·파쇄·혼합·중화 등의 재활용과정에서 새로운 부산물이 생성되는 경우, 대상 폐기물과 부산물이 환경에 미치는 영향 등을 검토하여 오염 영향이 없도록 혼합·중화하여 사용하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":40,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"바)","text":"고화제 등을 혼합하여 처리한 고화처리물을 사용하는 경우에는 혼합된 고화처리물의 건조ㆍ양생 등 안정화기간을 거쳐 사용해야 한다.","answer":"고화제 등을 혼합하여 처리한 고화처리물을 사용하는 경우, 혼합된 고화처리물의 건조·양생 등 안정화 기간을 거친 후 사용하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":41,"_source":"b5_4"},{"depth":0,"type":"number","marker":"3.","text":"기후에너지환경부장관은 폐기물의 재활용과정에서 오염예방 및 방지 등을 위하여 필요한 경우 폐기물을 재활용하는 자가 지켜야 할 구체적인 준수사항을 별도로 정하여 고시할 수 있다.","answer":"기후에너지환경부장관이 폐기물 재활용과정에서 오염예방 및 방지를 위하여 별도로 고시하는 구체적 준수사항이 있을 경우 해당 사항을 준수하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":42,"_source":"b5_4"}],"b6":[{"depth":0,"type":"number","marker":"1.","text":"폐기물 인계ㆍ인수 사항과 폐기물처리현장정보는 다음 각 목의 어느 하나에 해당하는 매체를 이용한 방법으로 전자정보처리프로그램에 입력하여야 한다.","answer":"전자정보처리프로그램에 컴퓨터, 이동형 통신수단 또는 ARS를 이용하여 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":1,"_source":"b6"},{"depth":0,"type":"number","marker":"2.","text":"한국환경공단은 시스템 및 통신망 등의 장애가 발생한 경우에는 그 사유와 복구시간 등을 지체없이 사용자에게 통보하여야 하며, 사용자는 장애기간동안 입력하지 못한 인계ㆍ인수 사항과 폐기물처리현장정보를 장애복구 후 입력ㆍ전송해야 한다. 다만, 사용자가 전자정보처리프로그램 및 무선주파수인식기구의 오류, 천재지변 또는 화재 등의 사유로 법 제18조제3항에 따른 폐기물의 인계ㆍ인수 사항과 폐기물처리현장정보를 전자정보처리프로그램에 입력하지 못할 경우에는 기후에너지환경부장관이 정하여 고시하는 방법 및 절차에 따라 입력하여야 한다.","answer":"시스템·통신망 장애 또는 천재지변·화재 등으로 입력하지 못한 경우 장애복구 후 또는 환경부장관 고시에 따라 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":5,"_source":"b6"},{"depth":0,"type":"number","marker":"3.","text":"사업장폐기물을 배출, 수집ㆍ운반, 처분 또는 재활용하는 자는 인계ㆍ인수하는 폐기물의 종류와 양 등의 내용을 전자정보처리프로그램에 입력하여야 한다.","answer":"인계·인수하는 폐기물의 종류와 양 등을 전자정보처리프로그램에 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":6,"_source":"b6"},{"depth":1,"type":"korean","marker":"가.","text":"배출자는 운반자에게 폐기물을 인계하기 전에 폐기물의 종류 및 양 등을 전자정보처리프로그램에 확정 또는 예약입력하여야 하며, 예약입력한 경우에는 처분 또는 재활용하는 자가 폐기물을 인수한 후 2일 이내에 확정입력하여야 한다","answer":"배출자로서 폐기물 인계 전에 종류·양 등을 확정 또는 예약입력하고, 예약입력 시에는 처분·재활용자가 인수 후 2일 이내에 확정입력하겠음.","tags":{"category":["W04"],"bizType":["06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":7,"_source":"b6"},{"depth":1,"type":"korean","marker":"나.","text":"운반자는 배출자로부터 폐기물을 인수받은 날부터 2일 이내에 전달받은 인계번호를 확인하여 전자정보처리프로그램에 입력하여야 한다. 다만, 적재능력이 작은 차량으로 폐기물을 수집하여 적재능력이 큰 차량으로 옮겨 싣기 위하여 임시보관장소를 경유하여 운반하는 경우에는 처분 또는 재활용하는 자에게 인계한 후 2일 이내에 입력하여야 한다.","answer":"운반자로서 배출자로부터 폐기물을 인수받은 날부터 2일 이내에 인계번호를 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["TR","RTR"],"wasteClass":["D","GO","GN"],"action":["CT"],"rCode":null,"facilityType":null},"_idx":8,"_source":"b6"},{"depth":1,"type":"korean","marker":"다.","text":"처분 또는 재활용하는 자는 운반자로부터 폐기물을 인수한 때에는 인수한 날부터 2일 이내에 인계번호, 인계일자, 인수량 등을 전자정보처리프로그램에 입력하여야 한다. 다만, 수도권매립지관리공사에 반입되는 폐기물 중 「수도권매립지관리공사의 설립 및 운영 등에 관한 법률」에 따라 성분검사 등을 실시하는 폐기물에 대하여는 한국환경공단이 인정하는 경우에 한하여 입력기한을 30일로 연장할 수 있다.","answer":"처분·재활용자로서 운반자로부터 폐기물을 인수한 날부터 2일 이내에 인계번호·인계일자·인수량 등을 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","RREC"],"wasteClass":["D","GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":9,"_source":"b6"},{"depth":1,"type":"korean","marker":"라.","text":"처분 또는 재활용하는 자는 다목에 따라 입력한 폐기물을 처리한 후 2일 이내에 처리량 및 처리일자 등을 전자정보처리프로그램에 입력하여야 한다. 이 경우 처리기간을 초과하여서는 아니 된다.","answer":"처분·재활용자로서 인수한 폐기물을 처리한 후 2일 이내에 처리량·처리일자 등을 입력하겠음(처리기간 초과 금지).","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","RREC"],"wasteClass":["D","GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":10,"_source":"b6"},{"depth":0,"type":"number","marker":"4.","text":"사업장폐기물을 수집ㆍ운반, 처분 또는 재활용하는 자는 다음 각 목의 구분에 따라 해당 목의 폐기물처리현장정보를 전자정보처리프로그램에 전송해야 한다.","answer":"폐기물처리현장정보를 전자정보처리프로그램에 전송하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":11,"_source":"b6"},{"depth":2,"type":"korean","marker":"가.","text":"수집ㆍ운반하는 자: 수집ㆍ운반차량의 위성항법장치(GPS) 등을 통해 확인한 실시간 위치정보","answer":"수집·운반차량 GPS 등을 통한 실시간 위치정보를 전송하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["TR","RTR"],"wasteClass":["D","GO","GN"],"action":["CT"],"rCode":null,"facilityType":null},"_idx":12,"_source":"b6"},{"depth":2,"type":"korean","marker":"나.","text":"처분 또는 재활용하는 자: 수집ㆍ운반자로부터 폐기물을 인수할 때 계량시설에서 측정되는 계량값, 진입로 및 계량시설에 설치한 영상정보처리기기의 영상정보 및 보관시설에 설치한 영상정보처리기기의 영상정보","answer":"계량시설 측정 계량값, 진입로·계량시설·보관시설 영상정보처리기기의 영상정보를 전송하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","RREC"],"wasteClass":["D","GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":13,"_source":"b6"},{"depth":0,"type":"number","marker":"5.","text":"사업장폐기물을 수집ㆍ운반, 처분 또는 재활용하는 자는 제4호 각 목에 따른 폐기물처리현장정보를 전송하기 위한 장치를 각각 설치ㆍ운영하고, 전송장치가 정상적으로 작동하는지를 항상 점검 및 관리해야 하며, 정상작동이 되지 않을 경우에는 즉시 정상작동이 되도록 필요한 조치를 해야 한다.","answer":"현장정보 전송장치를 설치·운영하고 정상작동 여부를 점검·관리하며, 이상 시 즉시 조치하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":14,"_source":"b6"},{"depth":0,"type":"number","marker":"6.","text":"그 밖에 전자정보처리프로그램에 폐기물 인계ㆍ인수 사항 입력과 제4호에 따른 폐기물처리현장정보의 전송을 위한 장치의 규격, 설치기준 및 전송 대상 폐기물처리현장정보의 범위 등 세부적인 사항은 기후에너지환경부장관이 정하여 고시한다.","answer":"그 밖의 세부사항은 기후에너지환경부장관 고시에 따르겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06",
