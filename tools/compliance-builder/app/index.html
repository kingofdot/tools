e":"number-paren","marker":"3)","text":"영 제8조의4 각 호의 어느 하나에 해당하는 자가 음식물류 폐기물을스스로 감량하는 경우에는 단독이나 공동으로 다음의 어느 하나에 해당하는 방법으로 감량하여야 하며, 감량된 음식물류 폐기물은 법 제13조의2에 따라 재활용하여야 한다.","answer":"폐기물관리법 시행령 제8조의4 각 호에 해당하는 자로서 음식물류 폐기물을 스스로 감량하는 경우, 단독 또는 공동으로 아래 방법 중 하나로 감량하겠으며, 감량된 음식물류 폐기물은 법 제13조의2에 따라 재활용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":47,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"가열에 의한 건조의 방법으로 부산물의 수분함량을 25퍼센트 미만으로 감량하여야 한다.","answer":"가열에 의한 건조 방법으로 부산물의 수분함량을 25% 미만으로 감량하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":48,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"발효 또는 발효건조나 퇴비화ㆍ사료화 또는 부숙의 방법으로 처리하여 부산물의 수분함량을 40퍼센트 미만으로 하여야 한다.","answer":"발효 또는 발효건조, 퇴비화·사료화 또는 부숙 방법으로 처리하여 부산물의 수분함량을 40% 미만으로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":49,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"외국에서 들어오는 선박·항공기에서 발생하는 음식물류 폐기물은 소각하여야 한다.","answer":"외국 선박·항공기에서 발생하는 음식물류 폐기물은 소각하여 처리하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":50,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는음식물류 폐기물은 바로 매립하여서는 아니되며, 소각, 퇴비화, 사료화,부숙, 탄화, 소화 또는 부숙토 생산 등의 공정에서 발생하는 재활용 용도에 맞지 아니한 협잡물(挾雜物)과 잔재물만을 매립하여야 한다. 다만, 특별시·광역시·특별자치시·특별자치도 또는 시 지역 중 기후에너지환경부장관이 고시하여 정하는 산간·오지 또는 도서 지역에서 발생하는 음식물류 폐기물은 그러하지 아니하다.","answer":"특별시·광역시·특별자치시·특별자치도 또는 시 지역에서 발생하는 음식물류 폐기물은 바로 매립하지 않고, 소각·퇴비화·사료화·부숙·탄화·소화 또는 부숙토 생산 등의 공정을 거쳐 재활용 용도에 맞지 않는 협잡물과 잔재물만 매립하겠음. 다만, 기후에너지환경부장관이 고시하는 산간·오지·도서 지역은 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"]},"_idx":51,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"삭제 <2011.9.29>","answer":"","tags":null,"_idx":52,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"삭제 <2011.9.29>","answer":"","tags":null,"_idx":53,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"음식물류 폐기물 처분시설 또는 재활용시설을 설치·운영하는 경우에는 해당 시설에 유입된 음식물류에 포함된 고형물 중에서 무게 기준으로 2012년 12월 31일까지는 60퍼센트 이상, 2013년 1월 1일부터는70퍼센트 이상을 동물 등의 먹이, 퇴비 등의 재활용제품의 원료로 사용(에너지 생산, 액비 생산 등을 위하여 다른 시설로 옮겨서 재활용하는 경우를 포함한다)하여야 한다.","answer":"음식물류 폐기물 처분시설 또는 재활용시설 설치·운영 시, 유입된 음식물류 고형물의 70% 이상(2013년 1월 1일 기준)을 동물 먹이, 퇴비 등의 재활용제품 원료로 사용하겠음","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":["91-02-00"],"physicalState":["S"]},"_idx":54,"_source":"b5"},{"depth":0,"type":"number","marker":"3.","text":"사업장일반폐기물의 기준 및 방법","answer":"","tags":{"category":null,"bizType":null,"docType":null,"wasteClass":["GO","GN"],"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":55,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"가.","text":"공통사항","answer":"","tags":null,"_idx":56,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"법 제2조제3호에 따른 배출시설 또는 영 제2조제1호부터 제5호까지의 규정에 따른 시설의 운영으로 배출되는 폐기물(이하 \"사업장배출시설계 폐기물\"이라 한다)은 해당 사업장에서 배출되는 사업장배출시설계폐기물 외의 폐기물 및 영 제2조제7호 및 제9호에 따른 사업장에서 배출되는 폐기물(이하 \"사업장비배출시설계 폐기물\"이라 한다)과 혼합되지 않도록 해야 한다.","answer":"사업장배출시설계 폐기물과 사업장비배출시설계 폐기물이 혼합되지 않도록 분리 관리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":57,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 처리할 수 있는 폐기물은 특별자치시, 특별자치도, 시·군·구의 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있다.","answer":"사업장비배출시설계 폐기물로서 생활폐기물과 성질·상태가 비슷한 경우, 해당 지자체 조례에서 정하는 바에 따라 생활폐기물의 기준 및 방법으로 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GN"],"action":null,"rCode":null,"facilityType":null},"_idx":58,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"사업장배출시설계 폐기물 중 생활폐기물을 재활용하기 위하여 분리ㆍ선별ㆍ압축ㆍ파쇄ㆍ세척하는 등의 과정에서 발생한 폐기물(별표 1 제1호가목부터 타목까지 및 같은 표 제2호가목부터 다목까지의 규정에 따른 유해물질을 폐기물의 종류와 관계없이 같은 표에서 정한 기준 이상으로 들어 있는 폐기물은 제외한다)은 관할 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장이 제1호에 따른 생활폐기물의 기준 및 방법에 따라 처리할 수 있다.","answer":"사업장배출시설계 폐기물 중 재활용 과정에서 발생한 폐기물(유해물질 기준 이하)의 경우, 관할 지자체장이 생활폐기물의 기준 및 방법에 따라 처리할 수 있음을 숙지하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO"],"action":null,"rCode":null,"facilityType":null},"_idx":59,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"사업장일반폐기물 중 레미콘·콘크리트·아스팔트콘크리트 제품의 제조공정에서 발생하거나 건설현장 등에서 반품한 폐레미콘·폐콘크리트·폐아스팔트콘크리트 제품 및 영 제2조제9호에 따른 일련의 공사또는 작업으로 발생하는 폐콘크리트, 폐아스팔트콘크리트, 폐벽돌, 폐블록, 폐기와 및 건설폐토석은 「건설폐기물의 재활용촉진에 관한 법률시행규칙」 별표 1의2에 따른 기준 및 방법으로 재활용할 수 있다. 이경우 「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른건설폐기물 처리업자에게 위탁하여 처리하여야 한다.","answer":"이경우 「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른건설폐기물 처리업자에게 위탁하여 처리하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":60,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"나.","text":"수집·운반의 경우","answer":"","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null},"isHeader":true,"_idx":61,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"사업장배출시설계 폐기물은 사업장배출시설계 폐기물 수집·운반업자가 수집·운반하고, 사업장비배출시설계 폐기물은 사업장비배출시설계폐기물 수집·운반업자가 수집?운반해야 한다.","answer":"사업장배출시설계 폐기물은 사업장배출시설계 폐기물 수집·운반업자가, 사업장비배출시설계 폐기물은 사업장비배출시설계 폐기물 수집·운반업자가 각각 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":62,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"사업장비배출시설계 폐기물로서 생활 요한 조치를 하여야 한다.","answer":"사업장일반폐기물 수집·운반 시 폐기물의 일부 또는 전부를 해체하거나 의도적으로 파손하지 않겠으며, 파손·낙하·붕괴 방지를 위한 필요한 조치를 취하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":75,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"별표 3에 따른 의료기관 및 시험ㆍ검사기관 등에서 발생한 일회용 기저귀(같은 표 제14호에 따른 노인요양시설에서 발생한 일회용 기저귀는 제외한다. 이하 \"의료기관 일회용기저귀\"라 한다)의 경우 섭씨 4도이하의 냉장 적재함이 설치된 차량으로 수집ㆍ운반해야 하며, 수집ㆍ운반 중에는 적재함의 내부 온도를 섭씨 4도 이하로 유지해야 한다. 다만, 적재함을 열고 차량에 폐기물을 싣거나 내릴 때에는 제외한다.","answer":"의료기관 일회용기저귀는 섭씨 4도 이하의 냉장 적재함이 설치된 차량으로 수집·운반하겠으며, 수집·운반 중에는 적재함 내부 온도를 섭씨 4도 이하로 유지하겠음(폐기물을 싣거나 내릴 때 제외)","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":76,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"의료기관 일회용기저귀의 경우 비닐로 개별 밀폐 포장한 후, 기후에너지환경부장관이 고시하는 전용 봉투에 담아 다른 사업장일반폐기물과는 분리하여 수집ㆍ운반해야 한다.","answer":"의료기관 일회용기저귀는 비닐로 개별 밀폐 포장한 후 전용 봉투에 담아 다른 사업장일반폐기물과 분리하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":77,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"전기자동차 폐이차전지는 배터리 단자, 연결케이블 등을 절연처리한 후 불연성ㆍ비전도성 재질의 파렛트(Pallet)에 개별 포장하거나 밀폐된운반 상자에 담아서 다른 종류의 폐기물과 분리하여 수집ㆍ운반해야한다.","answer":"전기자동차 폐이차전지는 배터리 단자·연결케이블 등을 절연처리한 후 불연성·비전도성 재질의 파렛트에 개별 포장하거나 밀폐된 운반 상자에 담아 다른 폐기물과 분리하여 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["GO","GN"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["51-41-05"]},"_idx":78,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"다.","text":"보관의 경우","answer":"","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":79,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"사업장일반폐기 ":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":89,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"라)","text":"제17조 및 별표 5의7에 따라 폐기물의 처리 위탁을 중단해야 하거나 천재지변 또는 그 밖의 부득이한 사유로 장기보관 할 필요성이있다고 시·도지사가 기간을 정하여 인정하는 경우","answer":"처리 위탁 중단 또는 천재지변 등 부득이한 사유로 시·도지사가 기간을 정하여 인정하는 경우 보관기간 제한 예외","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":90,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"3)에도 불구하고, 의료기관 일회용기저귀 배출자는 의료기관 일회용기저귀의 보관이 시작되는 날부터 15일(섭씨 4도 이하로 냉장보관하는 경우에는 30일)을 초과하여 보관해서는 안된다. 다만, 천재지변,휴업, 시설의 보수, 그 밖의 부득이한 경우로서 시ㆍ도지사나 지방환경관서의 장이 기간을 정하여 인정하는 경우는 예외로 한다.","answer":"의료기관 일회용기저귀는 보관 시작일로부터 15일(섭씨 4도 이하 냉장보관 시 30일)을 초과하여 보관하지 않겠음. 다만, 천재지변·휴업·시설 보수 등 부득이한 사유로 시·도지사 등이 인정하는 경우는 예외로 하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":91,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"의료기관 일회용기저귀 배출자는 의료기관 일회용기저귀를 별도의 보관장소에 보관하고, 보관장소를 주 1회 이상 약물소독의 방법으로 소독해야 한다.","answer":"의료기관 일회용기저귀는 별도의 보관장소에 보관하고, 보관장소를 주 1회 이상 약물소독 방법으로 소독하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":92,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"의료기관 일회용기저귀 배출자는 의료기관 일회용기저귀의 발생ㆍ처리상황 등 다음의 사항을 기록하여 보관장소에 비치해야 하며, 기록내용은 기록한 날부터 3년간 보존해야 한다.","table":[{"발생일시":"┃"}],"answer":"의료기관 일회용기저귀의 발생·처리상황 등 관련 사항을 기록하여 보관장소에 비치하겠으며, 기록 내용은 기록한 날로부터 3년간 보존하겠음","tags":{"category":null,"bizType":null,"wasteClass":["GO","GN"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["51-27-04"]},"_idx":93,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"석면(뿜칠로 사용된 것은 제외한다)의 해체·제거작업에 사용된 비닐시트중 바닥용으로 사용된 것이 아닌 것은 포대에 담아 보관하여야 한다.비고: 3)에 따른 사업장일반폐기물의 양 산정 시 2012년 11월 1일부터 2014년 1 변 환경오염의 우려가 없다고 관할 시·도지사나 지방환경관서의 장이 인정하는 경우","answer":"침출수 발생으로 주변 환경오염 우려가 없다고 관할 시·도지사 등이 인정하는 경우 보관창고 예외","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":205,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"다)","text":"드럼 등 보관용기나 보관탱크에 폐기물을 보관하는 경우로서 내용물이 흘러나올 우려가 없고, 보관용기나 보관탱크 외부에 지정폐기물이 묻어 있지 않은 경우(이 경우에는 폐기물의 최대량 보관 시의적재무게를 견딜 수 있고, 지정폐기물 취급 과정에서 또는 보관용기·보관탱크의 손상 등의 사유로 내용물이 주변 토양이나 외부에흘러나오지 않도록 시멘트·아스팔트 등으로 바닥을 포장하고, 충분한 규모의 방류턱 또는 방류벽을 갖춘 시설에 보관하여야 한다)","answer":"드럼 등 보관용기·보관탱크에 보관하는 경우로서 내용물 유출 우려가 없고 외부에 지정폐기물이 묻지 않은 경우, 최대 적재무게에 견디고 시멘트·아스팔트 바닥 포장 및 방류턱·방류벽을 갖춘 시설에 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":206,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"6)","text":"지정폐기물배출자는 그의 사업장에서 발생하는 지정폐기물 중 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약,폴리클로리네이티드비페닐 함유폐기물, 폐수처리 오니 중 유기성 오니는 보관이 시작된 날부터 45일을 초과하여 보관하여서는 아니되며, 그 밖의 지정폐기물은 60일을 초과하여 보관하여서는 아니 된","answer":"사업장에서 발생하는 폐산·폐알칼리·폐유·폐유기용제·폐촉매·폐흡착제·폐흡수제·폐농약·PCBs 함유폐기물 및 유기성 오니는 보관 시작일로부터 45일, 그 밖의 지정폐기물은 60일을 초과하여 보관하지 않겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐유기용제":["01-04"],"폐알칼리":["01-02"],"폐흡착제":["01-03"],"폐흡수제":["01-03"],"폐농약":["01-09"],"폐촉매":["01-03"],"오니":["51-01"],"폐유":["01-06"],"폐산":["01-02"]},"wasteCode":["02-01","02-02","06","04","03-07","03-08","01-03","01-02"]},"_idx":207,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"다.","text":"다만, 제17조 및 별표 5의7에 따라 폐기물의 처리 위탁을 중단해야 하는 경우로서 시ㆍ도지사나 지방환경관서의 장이 기간을 정하여 인정하는 경우 또는 천재지변이나 그 밖의 부득이한 사유로 장기보관할 필요성이 있다고 관할 시·도지사나 지방환경관서의 장이 인정하는 경우와, 1년간 배출하는 지정폐기물의 총량이 3톤(2013년12월 31일까지는 4톤) 미만인 사업장의 경우에는 1년의 기간 내에서 보관할 수 있다.","answer":"처리 위탁 중단 사유, 천재지변 등 부득이한 사유로 시·도지사 등이 인정하는 경우, 또는 연간 지정폐기물 총량 3톤 미만 사업장의 경우에는 1년 이내 보관하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":208,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"7)","text":"제31조 및 6)에도 불구하고 폴리클로리네이티드비페닐 함유폐기물을보관하려는 배출자 및 처리업자는 시·도지사나 지방환경관서의 장의승인을 받아 1년 단위로 보관기간을 연장할 수 있다.","answer":"PCBs 함유폐기물의 경우 시·도지사 등의 승인을 받아 1년 단위로 보관기간을 연장하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["08-01-00","08-02-00","08-03-00","08-04-00"]},"_idx":209,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"8)","text":"7)에 따라 보관기간을 연장받으려는 배출자 및 처리업자는 별지 제69호서식에 따라 폐기물 보관기간 연장승인 신청서를 작성하여 제출하여야 하며, 시·도지사나 지방환경관서의 장이 폐기물의 보관기간 연장을 승인하는 경우에는 별지 제70호서식의 폐기물 보관기간 연장승인서를 신청인에게 발급하여야 한다.","answer":"PCBs 함유폐기물 보관기간 연장 시 별지 제69호서식에 따라 보관기간 연장승인 신청서를 제출하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":["08-01-00","08-02-00","08-03-00","08-04-00"]},"_idx":210,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"9)","text":"지정폐기물의 보관창고에는 보관 중인 지정폐기물의 종류, 보관가능용량, 취급 시 주의사항 및 관리책임자 등을 적어 넣은 표지판을 다음과 같이 설치하여야 한다. 다만, 드럼 등 보관용기를 사용하여 보관하는 경우에는 용기별로 폐기물의 종류·양 및 배출업소 등을, 지정폐기물의 종류가 같은 용기가 여러 개 있는 경우에는 폐기물의 종류별로 폐기물의 종류·양 및 배출업소 등을 각각 알 수 있도록 표지판에 적어넣어야 한다.","answer":"지정폐기물 보관창고에 보관 중인 지정폐기물의 종류·보관가능용량·주의사항·관리책임자를 적은 표지판을 설치하겠음. 드럼 등 용기 보관 시에는 용기별(또는 종류별)로 폐기물 종류·양·배출업소를 표지판에 기재하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":211,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"보관창고에는 표지판을 사람이 쉽게 볼 수 있는 위치에 설치하여야 한다.","answer":"보관창고 표지판은 사람이 쉽게 볼 수 있는 위치에 설치하겠음","tags":{"category":null,"bizType":null,"wasteClass":["D"],"action":["ST"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":212,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"표지의 규격: 가로 60센티미터 이상×세로 40센티미터 이상(드럼등 소형용기에 붙이는 경우에는 가로 15센티미터 이상×세로 10센티미터 이상)","answer":"표지판 규격: 장ㆍ군수ㆍ구청장 또는 지방환경관서의 장은 「수도법」 제7조에 따른 상수원보호구역의 수질이 악화되거나, 「환경정책기본법」 제12조에 따른 환경기준 또는 「토양환경보전법」 제4조의2에 따른 토양오염의 우려기준을 준수하기 어렵게 되는 등 폐기물의 재활용으로 인하여 사람의 건강 또는 주변 환경에 미치는 영향이 크다고 인정하는 경우에는 폐기물을 재활용하는 자로 하여금 1)에 따른 오염예방 및 저감방법 이외의 필요한 오염예방 및 저감조치를 하게 할 수 있다.","answer":"상수원보호구역 수질 악화, 환경기준·토양오염 우려기준 준수 곤란 등의 사유로 시·도지사, 시장·군수·구청장 또는 지방환경관서의 장이 추가 오염예방·저감조치를 명할 경우 해당 조치를 이행하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":11,"_source":"b5_4"},{"depth":1,"type":"korean","marker":"나.","text":"오염예방 및 저감의 정도","answer":"","tags":null,"_idx":12,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"1)","text":"대기오염물질: 「대기환경보전법 시행규칙」 별표 8에 따른 대기오염물질 배출허용기준 이내","answer":{"applicable":"{대기오염방지시설}을 설치·운영하여 대기오염물질이 배출허용기준 이내로 배출되도록 관리하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facilityVars":{"대기오염방지시설":[]}},"applicabilityFlag":"대기오염물질발생","_idx":13,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"2)","text":"소음ㆍ진동: 「소음ㆍ진동관리법 시행규칙」 별표 5에 따른 공장소음ㆍ진동의 배출허용기준 및 같은 법 시행규칙 별표 8에 따른 생활소음ㆍ진동의 규제기준 이내","answer":{"applicable":"{소음진동방지시설}을 설치·운영하여 소음·진동이 공장소음·진동 배출허용기준 및 생활소음·진동 규제기준 이내로 관리되도록 하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facilityVars":{"소음진동방지시설":[]}},"applicabilityFlag":"소음진동발생","_idx":14,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"3)","text":"수질오염물질: 「물환경보전법 시행규칙」 별표 13에 따른 수질오염물질 배출허용기준 이내","answer":{"applicable":"{수질오염방지시설}을 설치·운영하여 수질오염물질이 배출허용기준 이내로 배출되도록 관리하겠음.","notApplicable":"해당사항 없음."},"tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null,"facili 허용기준을 초과하는 폐기물(유해폐기물)을 재활용하는 경우, 보관·저장·취급 또는 사용 장소에 바닥 포장 및 유출방지장치를 설치하여 폐기물이 지하 침투하거나 주변 지역으로 유출·누출되지 않도록 하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":21,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"2)","text":"분말ㆍ미립자 형태의 고상상태 또는 액체상태인 폐기물은 비산되거나 외부로 유출ㆍ누출되지 않도록 적절한 용기나 탱크, 상자(벌크백을 포함한다)에 넣어 보관해야 한다.","answer":"분말·미립자 형태의 고상 또는 액체상태인 폐기물은 비산되거나 외부로 유출·누출되지 않도록 적절한 용기, 탱크 또는 상자(벌크백 포함)에 넣어 보관하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":22,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"3)","text":"재활용 대상 유해폐기물을 탱크나 용기에 보관하는 경우에는 유해폐기물 성상에 따라 적당한 재질, 두께 및 구조를 갖춘 탱크나 용기에 보관해야 하며, 탱크나 용기 등이 부식ㆍ손상ㆍ노후화되지 아니하도록 유지ㆍ관리해야 한다.","answer":"재활용 대상 유해폐기물을 탱크나 용기에 보관하는 경우 폐기물 성상에 적합한 재질·두께·구조의 탱크·용기를 사용하고, 부식·손상·노후화되지 않도록 유지·관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":23,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"4)","text":"재활용 대상 유해폐기물은 유해특성을 고려하여 구분하여 별도의 분리된 장소에 보관해야 하며, 유해폐기물임을 알 수 있도록 폐기물의 종류와 유해특성, 취급 시 주의사항을 기재한 표지판을 보관장소에 설치해야 한다.","answer":"재활용 대상 유해폐기물은 유해특성별로 구분하여 별도의 분리된 장소에 보관하고, 폐기물의 종류·유해특성·취급 시 주의사항을 기재한 표지판을 보관장소에 설치하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":24,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"5)","text":"유해폐기물은 보관 또는 재활용 과정에서 화재ㆍ폭발, 유해가스 발생 등의 사고를 예방하기 위하여 화기ㆍ물 등과 접촉되지 않도록 적절하게 관리해야 하며, 유해가스 등이 발생할 경우 이를 중화 또는 배출할 수 있는 시설ㆍ 장치 등을 갖추어야 한다.","answer":"유해폐기물은 보관 및 재활용 과정에서 화재·폭발, 유해가스 발생 등의 사고를 예방하기 위해 화기·물 등과 접촉되지 않도록 관리하고, 유해가스가 발생할 경우 이를 중화·배출할 수 있는 시설·장치를 갖추겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":25,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"6)","text":"별표 4의3 비고 제3호에 따라 별표 5의3에 따른 폐기물의 구체적인 재활용 기준에 따라 재활용이 가능한 폐기물인지 여부 등을 사전 분석․확인하는 경우에는 그 분석․확인 결과를 배출자(생활폐기물배출자는 제외한다)에게 통보하여 배출자가 재활용 기준의 준수 여부를 확인할 수 있도록 해야 한다.","answer":"별표 4의3 비고 제3호에 따라 별표 5의3에 따른 폐기물의 구체적 재활용 기준에 따라 재활용 가능 여부를 사전 분석·확인하는 경우, 그 결과를 배출자(생활폐기물배출자 제외)에게 통보하여 배출자가 재활용 기준 준수 여부를 확인할 수 있도록 하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":26,"_source":"b5_4"},{"depth":1,"type":"korean","marker":"나.","text":"개별사항","answer":"","tags":null,"_idx":27,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"1)","text":"폭발성이 있는 폐기물은 소량으로 분리ㆍ보관하고, 다른 폐기물이나 산화제와 혼합ㆍ접촉하지 않아야 하며, 불티ㆍ불꽃ㆍ정전기 또는 고온체와의 접근이나 충격ㆍ마찰을 피하고, 폐기물을 보관ㆍ취급 또는 사용하는 장소가 폭발이 유발되는 온도 이상으로 과열되지 않도록 해야 한다.","answer":"폭발성이 있는 폐기물은 소량으로 분리·보관하고 다른 폐기물이나 산화제와 혼합·접촉되지 않도록 하겠으며, 불티·불꽃·정전기·고온체와의 접근이나 충격·마찰을 피하고 보관·취급·사용 장소가 폭발 유발 온도 이상으로 과열되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":28,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"2)","text":"인화성이 있는 폐기물은 불티ㆍ불꽃ㆍ정전기 또는 고온체와의 접근이나 충격ㆍ마찰을 피하고, 폐기물을 보관ㆍ취급 또는 사용하는 장소가 화재가 유발되는 온도 이상으로 과열되지 않도록 해야 한다.","answer":"인화성이 있는 폐기물은 불티·불꽃·정전기·고온체와의 접근이나 충격·마찰을 피하고, 보관·취급·사용 장소가 화재 유발 온도 이상으로 과열되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":29,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"3)","text":"자연발화성이 있는 폐기물은 불티ㆍ불꽃ㆍ정전기 또는 고온체 등 발화유발 가능성이 있는 물질 및 공기와의 접촉을 피하고, 직사광선에 직접 노출되지 않도록 해야 한다.","answer":"자연발화성이 있는 폐기물은 불티·불꽃·정전기·고온체 등 발화유발 가능 물질 및 공기와의 접촉을 피하고, 직사광선에 직접 노출되지 않도록 보관·관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":30,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"4)","text":"금수성이 있는 폐기물은 밀폐된 용기에 보관하는 등 물이나 증기와 접촉되지 않도록 해야 한다.","answer":"금수성이 있는 폐기물은 밀폐된 용기에 보관하는 등 물이나 증기와 접촉되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":31,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"5)","text":"산화성이 있는 폐기물은 가연물 또는 분해를 촉진하는 물질과 접촉ㆍ혼합되지 않도록 하고, 과열ㆍ충격ㆍ마찰 등이 발생되지 않도록 해야 한다.","answer":"산화성이 있는 폐기물은 가연물 또는 분해를 촉진하는 물질과 접촉·혼합되지 않도록 하고, 과열·충격·마찰 등이 발생되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":32,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"6)","text":"용출독성 또는 생태독성이 있는 폐기물은 유해물질이 누출ㆍ유출 또는 비산되지 않도록 별도의 용기 등에 담아 보관해야 한다.","answer":"용출독성 또는 생태독성이 있는 폐기물은 유해물질이 누출·유출 또는 비산되지 않도록 별도의 용기 등에 담아 보관하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":33,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"7)","text":"부식성이 있는 폐기물은 내부식성을 갖는 용기에 보관하고, 누출ㆍ유출 또는 비산되지 않도록 해야 한다.","answer":"부식성이 있는 폐기물은 내부식성을 갖는 용기에 보관하고, 누출·유출 또는 비산되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":34,"_source":"b5_4"},{"depth":2,"type":"paren-number","marker":"8)","text":"매체접촉형 재활용의 경우에는 다음의 사항을 준수해야 한다.","answer":"매체접촉형 재활용(R6 토질개선·R7 토목재활용)의 경우 아래의 사항을 준수하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":35,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"가)","text":"대상폐기물과 재활용 할 수 없는 다른 폐기물이나 이물질 등을 혼합하여 재활용 대상 부지에 반입하지 아니하고, 재활용하기 전에 이물질 등을 최대한 분리ㆍ제거해야 한다.","answer":"대상폐기물과 재활용할 수 없는 다른 폐기물이나 이물질 등을 혼합하여 재활용 대상 부지에 반입하지 않겠으며, 재활용 전에 이물질 등을 최대한 분리·제거하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":36,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"나)","text":"혼합이 필요한 경우에는 지형 여건, 환경 위해성 여부, 공사 안전성 등을 종합적으로 고려하여 일반 토사류 등과 혼합하여 사용해야 하며, 폐기물의 비산 또는 유ㆍ누출 등으로 인한 오염이나 피해가 발생되지 않는 장소에서 혼합해야 한다.","answer":"혼합이 필요한 경우에는 지형 여건, 환경 위해성, 공사 안전성 등을 종합적으로 고려하여 일반 토사류 등과 혼합 사용하겠으며, 폐기물 비산이나 유·누출 등 오염·피해가 발생하지 않는 장소에서 혼합하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":37,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"다)","text":"재활용 과정 또는 재활용한 후 침출수로 인한 2차 환경오염이 발생하지 않아야 하며, 재활용 이후 지반의 안정성이 유지되고 재활용 대상 폐기물 또는 폐기물과 토양 등과의 혼합물이 유실되지 않도록 해야 한다.","answer":"재활용 과정 또는 재활용 후 침출수로 인한 2차 환경오염이 발생하지 않도록 하고, 재활용 이후 지반의 안정성이 유지되며 재활용 대상 폐기물 또는 폐기물·토양 혼합물이 유실되지 않도록 관리하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":38,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"라)","text":"재활용 대상 폐기물을 사업 부지 등에 보관할 경우 비산, 누ㆍ유출 등이 발생되지 않는 장소를 선정하여 보관해야 하며, 바닥포장, 덮개설치 등을 통해 폐기물의 비산, 누ㆍ유출 등을 방지해야 한다.","answer":"재활용 대상 폐기물을 사업 부지 등에 보관할 경우 비산, 누·유출 등이 발생하지 않는 장소를 선정하여 보관하겠으며, 바닥포장·덮개설치 등을 통해 폐기물의 비산·누·유출 등을 방지하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":39,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"마)","text":"수소이온농도를 중성수준으로 낮추기 위한 선별ㆍ파쇄ㆍ혼합ㆍ중화 등의 재활용과정에서 새로운 부산물이 생성되는 경우에는 대상 폐기물과 부산물이 환경에 미치는 영향 등을 검토하여 오염 등의 영향이 없도록 혼합ㆍ중화해 사용해야 한다.","answer":"수소이온농도를 중성수준으로 낮추기 위한 선별·파쇄·혼합·중화 등의 재활용과정에서 새로운 부산물이 생성되는 경우, 대상 폐기물과 부산물이 환경에 미치는 영향 등을 검토하여 오염 영향이 없도록 혼합·중화하여 사용하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":40,"_source":"b5_4"},{"depth":3,"type":"korean-paren","marker":"바)","text":"고화제 등을 혼합하여 처리한 고화처리물을 사용하는 경우에는 혼합된 고화처리물의 건조ㆍ양생 등 안정화기간을 거쳐 사용해야 한다.","answer":"고화제 등을 혼합하여 처리한 고화처리물을 사용하는 경우, 혼합된 고화처리물의 건조·양생 등 안정화 기간을 거친 후 사용하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":["R6","R7"],"facilityType":null},"_idx":41,"_source":"b5_4"},{"depth":0,"type":"number","marker":"3.","text":"기후에너지환경부장관은 폐기물의 재활용과정에서 오염예방 및 방지 등을 위하여 필요한 경우 폐기물을 재활용하는 자가 지켜야 할 구체적인 준수사항을 별도로 정하여 고시할 수 있다.","answer":"기후에너지환경부장관이 폐기물 재활용과정에서 오염예방 및 방지를 위하여 별도로 고시하는 구체적 준수사항이 있을 경우 해당 사항을 준수하겠음.","tags":{"category":["W01","W02","W03","W05"],"bizType":["IR","CR","FR","RREC","DP"],"wasteClass":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":42,"_source":"b5_4"}],"b6":[{"depth":0,"type":"number","marker":"1.","text":"폐기물 인계ㆍ인수 사항과 폐기물처리현장정보는 다음 각 목의 어느 하나에 해당하는 매체를 이용한 방법으로 전자정보처리프로그램에 입력하여야 한다.","answer":"전자정보처리프로그램에 컴퓨터, 이동형 통신수단 또는 ARS를 이용하여 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":1,"_source":"b6"},{"depth":0,"type":"number","marker":"2.","text":"한국환경공단은 시스템 및 통신망 등의 장애가 발생한 경우에는 그 사유와 복구시간 등을 지체없이 사용자에게 통보하여야 하며, 사용자는 장애기간동안 입력하지 못한 인계ㆍ인수 사항과 폐기물처리현장정보를 장애복구 후 입력ㆍ전송해야 한다. 다만, 사용자가 전자정보처리프로그램 및 무선주파수인식기구의 오류, 천재지변 또는 화재 등의 사유로 법 제18조제3항에 따른 폐기물의 인계ㆍ인수 사항과 폐기물처리현장정보를 전자정보처리프로그램에 입력하지 못할 경우에는 기후에너지환경부장관이 정하여 고시하는 방법 및 절차에 따라 입력하여야 한다.","answer":"시스템·통신망 장애 또는 천재지변·화재 등으로 입력하지 못한 경우 장애복구 후 또는 환경부장관 고시에 따라 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":5,"_source":"b6"},{"depth":0,"type":"number","marker":"3.","text":"사업장폐기물을 배출, 수집ㆍ운반, 처분 또는 재활용하는 자는 인계ㆍ인수하는 폐기물의 종류와 양 등의 내용을 전자정보처리프로그램에 입력하여야 한다.","answer":"인계·인수하는 폐기물의 종류와 양 등을 전자정보처리프로그램에 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":6,"_source":"b6"},{"depth":1,"type":"korean","marker":"가.","text":"배출자는 운반자에게 폐기물을 인계하기 전에 폐기물의 종류 및 양 등을 전자정보처리프로그램에 확정 또는 예약입력하여야 하며, 예약입력한 경우에는 처분 또는 재활용하는 자가 폐기물을 인수한 후 2일 이내에 확정입력하여야 한다","answer":"배출자로서 폐기물 인계 전에 종류·양 등을 확정 또는 예약입력하고, 예약입력 시에는 처분·재활용자가 인수 후 2일 이내에 확정입력하겠음.","tags":{"category":["W04"],"bizType":["06","07","08"],"wasteClass":["D","GO","GN"],"action":null,"rCode":null,"facilityType":null},"_idx":7,"_source":"b6"},{"depth":1,"type":"korean","marker":"나.","text":"운반자는 배출자로부터 폐기물을 인수받은 날부터 2일 이내에 전달받은 인계번호를 확인하여 전자정보처리프로그램에 입력하여야 한다. 다만, 적재능력이 작은 차량으로 폐기물을 수집하여 적재능력이 큰 차량으로 옮겨 싣기 위하여 임시보관장소를 경유하여 운반하는 경우에는 처분 또는 재활용하는 자에게 인계한 후 2일 이내에 입력하여야 한다.","answer":"운반자로서 배출자로부터 폐기물을 인수받은 날부터 2일 이내에 인계번호를 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["TR","RTR"],"wasteClass":["D","GO","GN"],"action":["CT"],"rCode":null,"facilityType":null},"_idx":8,"_source":"b6"},{"depth":1,"type":"korean","marker":"다.","text":"처분 또는 재활용하는 자는 운반자로부터 폐기물을 인수한 때에는 인수한 날부터 2일 이내에 인계번호, 인계일자, 인수량 등을 전자정보처리프로그램에 입력하여야 한다. 다만, 수도권매립지관리공사에 반입되는 폐기물 중 「수도권매립지관리공사의 설립 및 운영 등에 관한 법률」에 따라 성분검사 등을 실시하는 폐기물에 대하여는 한국환경공단이 인정하는 경우에 한하여 입력기한을 30일로 연장할 수 있다.","answer":"처분·재활용자로서 운반자로부터 폐기물을 인수한 날부터 2일 이내에 인계번호·인계일자·인수량 등을 입력하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","RREC"],"wasteClass":["D","GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":9,"_source":"b6"},{"depth":1,"type":"korean","marker":"라.","text":"처분 또는 재활용하는 자는 다목에 따라 입력한 폐기물을 처리한 후 2일 이내에 처리량 및 처리일자 등을 전자정보처리프로그램에 입력하여야 한다. 이 경우 처리기간을 초과하여서는 아니 된다.","answer":"처분·재활용자로서 인수한 폐기물을 처리한 후 2일 이내에 처리량·처리일자 등을 입력하겠음(처리기간 초과 금지).","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","RREC"],"wasteClass":["D","GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":10,"_source":"b6"},{"depth":0,"type":"number","marker":"4.","text":"사업장폐기물을 수집ㆍ운반, 처분 또는 재활용하는 자는 다음 각 목의 구분에 따라 해당 목의 폐기물처리현장정보를 전자정보처리프로그램에 전송해야 한다.","answer":"폐기물처리현장정보를 전자정보처리프로그램에 전송하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06","07","08"],"wasteClass":["D","GO","GN"],"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":11,"_source":"b6"},{"depth":2,"type":"korean","marker":"가.","text":"수집ㆍ운반하는 자: 수집ㆍ운반차량의 위성항법장치(GPS) 등을 통해 확인한 실시간 위치정보","answer":"수집·운반차량 GPS 등을 통한 실시간 위치정보를 전송하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["TR","RTR"],"wasteClass":["D","GO","GN"],"action":["CT"],"rCode":null,"facilityType":null},"_idx":12,"_source":"b6"},{"depth":2,"type":"korean","marker":"나.","text":"처분 또는 재활용하는 자: 수집ㆍ운반자로부터 폐기물을 인수할 때 계량시설에서 측정되는 계량값, 진입로 및 계량시설에 설치한 영상정보처리기기의 영상정보 및 보관시설에 설치한 영상정보처리기기의 영상정보","answer":"계량시설 측정 계량값, 진입로·계량시설·보관시설 영상정보처리기기의 영상정보를 전송하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","RREC"],"wasteClass":["D","GO","GN"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null},"_idx":13,"_source":"b6"},{"depth":0,"type":"number","marker":"5.","text":"사업장폐기물을 수집ㆍ운반, 처분 또는 재활용하는 자는 제4호 각 목에 따른 폐기물처리현장정보를 전송하기 위한 장치를 각각 설치ㆍ운영하고, 전송장치가 정상적으로 작동하는지를 항상 점검 및 관리해야 하며, 정상작동이 되지 않을 경우에는 즉시 정상작동이 되도록 필요한 조치를 해야 한다.","answer":"현장정보 전송장치를 설치·운영하고 정상작동 여부를 점검·관리하며, 이상 시 즉시 조치하겠음.","tags":{"category":["W01","W02","W04"],"bizType":["IR","CR","FR","ID","FD","TR","RTR","RREC","06", b7"},{"depth":1,"type":"number","marker":"12.","text":"폐기물을 재활용하는 자 중 제10조에 따라 재활용시설이 필요하지 아니하다고 시·도지사가 인정하는 경우에는 재활용시설 및 기술능력의 전부 또는 일부를 갖추지 아니할 수 있다.","answer":"제10조에 따라 재활용시설이 필요하지 아니하다고 시·도지사가 인정하는 경우 재활용시설·기술능력 전부 또는 일부 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":249,"_source":"b7"}],"b8":[{"depth":0,"type":"number","marker":"1.","text":"공통기준","answer":"","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":1,"_source":"b8"},{"depth":1,"type":"korean","marker":"가.","text":"폐기물처리업자는 폐기물수집·운반 전용차량 및 임시차량 외의 차량으로 폐기물을 수집·운반하여서는 아니되며, 같은 차량에 폐기물과 폐기물 외의 물건을 함께 실어서는 아니 된다. 다만, 폐기물의 수집·운반에 필요한 장비 등은 그러하지 아니하다.","answer":"폐기물수집·운반 전용차량 및 임시차량 외의 차량으로 폐기물을 수집·운반하지 않고, 같은 차량에 폐기물과 폐기물 외의 물건을 함께 싣지 않겠음(수집·운반에 필요한 장비는 제외).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":2,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"폐기물처리업자는 폐기물의 처리를 위탁한 자와 상호·소재지·대표자 및 위탁계약기간, 폐기물의 종류별 수량, 폐기물의 성질과 상태 및 취급 시 주의사항, 폐기물의 종류별 운반장소(출발지 및 도착지) 및 운반단가 또는 운반비(운반의 경우만 해당한다), 폐기물의 종류별 처분 또는 재활용장소와 처분 또는 재활용방법 및 처분 또는 재활용단가나 처분 또는 재활용비(처분 또는 재활용의 경우만 해당한다) 등의 내용을 기재한 폐기물 위(수)탁운반(처리)계약서를 작성·체결하여야 하고, 그 계약서를 3년간 보관하여야 한다. 다만, 폐기물처리업자가 배출자와 하나의 계약서로 동시에 폐기물의 처리의 위탁계약을 체결하는 경우에는 운반단가와 처분단가 또는 재활용단가를 구분하여 기재하여야 한다.","answer":"위탁자 상호·소재지·대표자·계약기간, 폐기물 종류별 수량·성질·취급주의사항, 운반장소(출발지·도착지)·운반단가, 처분/재활용 장소·방법·단가 등을 기재한 위(수)탁운반(처리)계약서를 작성·체결하고 3년간 보관하겠음(배출자와 동시 계약 시 운반·처분·재활용 단가 구분 기재).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":3,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"폐기물처리업자는 위탁받은 폐기물을 처리하는 경우 환경오염 ode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":14,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"1)","text":"법 제4조와 법 제5조에 따른 폐기물 처분시설 또는 재활용시설(이하 \"공공처리시설\"이라 한다)의 설치·운영자가 배출자로부터 직접 폐기물의 처리를 수탁하지 아니하는 경우","answer":"","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":15,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"2)","text":"폐기물수집·운반업자와 공공처리시설의 설치·운영자간에 폐기물의 반입계약이 체결되어 있는 경우","answer":"","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":16,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물수집·운반업자가 공공처리시설에 폐기물을 반입한 후 1개월 이내에 그 처분비 또는 재활용비에 관하여 배출자와 사후정산하는 경우","answer":"","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":17,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"위탁받은 폐기물의 운반을 재위탁하거나 재위탁을 받아서는 아니 된다. 다만, 영업정지, 허가취소 등으로 법 제39조의3에 따른 폐기물 처리명령 사유가 발생한 경우 시·도지사나 지방환경관서의 장의 승인을 받아 재위탁할 수 있다.","answer":"위탁받은 폐기물의 운반을 재위탁하거나 재위탁받지 않겠음(영업정지·허가취소 등 법 제39조의3 처리명령 사유 발생 시 시·도지사·지방환경관서장 승인 받아 재위탁 가능함을 숙지하겠음).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":18,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"수집·운반능력을 초과하여 폐기물의 수집·운반을 위탁받아서는 아니 된다.","answer":"수집·운반능력을 초과하여 폐기물의 수집·운반을 위탁받지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":19,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"위탁받은 폐기물을 배출자가 지정한 적절한 처분장소 또는 재활용장소(수출자의 경우에는 배출자가 지정한 선적장소)로 운반하지 아니하고 다른 장소에 보관하여서는 아니 된다. 다만, 제9조제1항에 따라 승인받은 임시보관장소에 보관하는 경우는 제외한다.","answer":"위탁받은 폐기물을 배출자가 지정한 적절한 처분장소·재활용장소(수출자는 지정 선적장소)로 운반하고 다른 장소에 보관하지 않겠음(제9조제1항 승인 임시보관장소 제외).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":20,"_source":"b8"},{"depth":0,"type":"number","marker":"3.","text":"폐기물 중간처분업자·최종처분업자·종합처분업자의 경우","answer":"","tags":{"category":null,"bizType":["ID","FD"],"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":21,"_source":"b8"},{"depth":1,"type":"korean","marker":"가.","text":"위탁받은 폐기물을 위탁받은 성질과 상태 그대로 재위탁하거나 재위탁을 받아서는 아니된다. 다만, 천재지변·폐업 등 폐기물을 처분할 수 없는 사유가 발생한 경우에 시·도지사나 지방환경관서의 장의 승인을 받아 재위탁할 수 있으며, 폐기물처분시설의 설치검사 또는 정기검사를 위한 검사용 폐기물의 확보가 곤란하여 시·도지사나 지방환경관서의 장의 승인을 받은 경우 검사용만 재위탁을 받을 수 있다.","answer":"위탁받은 폐기물을 위탁받은 성질·상태 그대로 재위탁하거나 재위탁받지 않겠음(천재지변·폐업 등 처분 불가 사유 발생 시 시·도지사·지방환경관서장 승인 받아 재위탁 가능, 처분시설 설치·정기검사용 폐기물 확보 곤란 시 승인 받아 검사용만 재위탁 받을 수 있음을 숙지하겠음).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":null,"bizType":["ID","FD"]},"_idx":22,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"허가받은 처분공정을 임의로 변경하여 위탁받은 폐기물을 처분하거나, 처분공정의 전부 또는 일부를 거치지 아니하고 그 처분를 종료하여서는 아니 된다.","answer":"허가받은 처분공정을 임의로 변경하여 위탁받은 폐기물을 처분하거나, 처분공정의 전부·일부를 거치지 않고 처분을 종료하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":null,"bizType":["ID","FD"]},"_idx":23,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"건설현장이나 건설폐기물 중간처리 과정에서 발생한 폐기물을 위탁받아 소각하려는 경우 「건설폐기물의 재활용촉진에 관한 법률 시행규칙」 별표 1의2 제1호라목 후단 및 제3호 바목의 위탁기준을 준수한 폐기물만을 위탁받아야 한다.","answer":"건설현장·건설폐기물 중간처리 과정에서 발생한 폐기물을 위탁받아 소각하려는 경우 「건설폐기물의 재활용촉진법 시행규칙」 별표 1의2 제1호라목 후단 및 제3호 바목의 위탁기준을 준수한 폐기물만을 위탁받겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F","INC_C"],"bizType":["ID","FD"]},"_idx":24,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"가목 및 나목에도 불구하고 소각전문 폐기물 중간처분업자 또는 폐기물 종합처분업자가 위탁받은 폐기물을 운반, 보관 및 처분하는 과정에서 배출된 불연물은 재위탁할 수 있다. 다만, 연간 재위탁하는 불연물의 양은 연간 폐기물 반입량의 무게 기준으로 10퍼센트를 초과할 수 없다.","answer":"가목·나목에도 불구하고 소각전문 중간처분업자 또는 종합처분업자로서 위탁받은 폐기물의 운반·보관·처분 과정에서 배출된 불연물은 재위탁 가능함을 숙지하겠음(연간 재위탁 불연물 양은 연간 폐기물 반입량의 무게 기준 10% 이내).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F","INC_C","INC_R"],"bizType":["ID","FD"]},"_idx":25,"_source":"b8"},{"depth":0,"type":"number","marker":"4.","text":"폐기물 재활용업자의 경우","answer":"","tags":{"category":null,"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":26,"_source":"b8"},{"depth":1,"type":"korean","marker":"가.","text":"위탁받은 폐기물을 위탁받은 성질과 상태 그대로 재위탁하거나 재위탁을 받아서는 아니 된다. 다만, 천재지변, 영업정지, 휴업, 폐업 등 정당한 사유가 있거나, 재활용시설의 검사를 받기 위한 폐기물의 확보가 곤란한 경우에는 시·도지사나 지방환경관서의 장의 승인을 받아 재위탁하거나 재위탁 받을 수 있다.","answer":"위탁받은 폐기물을 위탁받은 성질·상태 그대로 재위탁하거나 재위탁받지 않겠음(천재지변·영업정지·휴업·폐업 등 정당한 사유 또는 재활용시설 검사용 폐기물 확보 곤란 시 시·도지사·지방환경관서장 승인 받아 재위탁/재위탁받기 가능함을 숙지하겠음).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":27,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"허가받은 재활용 공정을 임의로 변경하여 위탁받은 폐기물을 재활용하거나, 재활용 공정의 전부 또는 일부를 거치지 아니하고 그 재활용을 종료하여서는 아니 된다.","answer":"허가받은 재활용 공정을 임의로 변경하여 위탁받은 폐기물을 재활용하거나, 재활용 공정의 전부·일부를 거치지 않고 재활용을 종료하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":28,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"제품의 본래의 용도로 다시 사용할 수 있도록 수리·수선하여 제품을 판매할 때에는 수리·수선한 업체명, 소재지, 전화번호 및 수리·수선한 제품임을 소비자가 알 수 있도록 표시하여야 한다.","answer":"제품의 본래 용도로 다시 사용할 수 있도록 수리·수선하여 제품을 판매할 때에는 수리·수선 업체명·소재지·전화번호 및 수리·수선 제품임을 소비자가 알 수 있도록 표시하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R2"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":29,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"유기성 오니를 화력발전소에서 연료로 사용하기 위하여 가공하는 자는 유기성 오니 연료의 저위발열량, 수분 함유량, 회분 함유량, 황분 함유량, 길이 및 금속성분을 매 분기당 1회 이상 측정하여 그 결과를 시·도지사에게 제출하여야 한다.","answer":"유기성 오니를 화력발전소에서 연료로 사용하기 위하여 가공하는 자로서 유기성 오니 연료의 저위발열량·수분·회분·황분·길이·금속성분을 매 분기 1회 이상 측정하여 결과를 시·도지사에게 제출하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-01","01-02"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":30,"_source":"b8"},{"depth":1,"type":"korean","marker":"마.","text":"폐유기용제를 정제유기용제로 재활용하는 자는 폐유기용제 배출공정의 변경, 폐유기용제 수집·배출업소의 변경 등으로 인하여 폐유기용제의 성질과 상태가 변경될 때에는 그 성분을 분석하고 그 분석결과를 3년간 갖추어 두어야 한다.","answer":"폐유기용제를 정제유기용제로 재활용하는 자로서 폐유기용제 배출공정·수집·배출업소 변경 등으로 성질·상태 변경 시 성분을 분석하고 분석결과를 3년간 보관하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["04"],"action":["RCY"],"rCode":["R3"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":31,"_source":"b8"},{"depth":1,"type":"korean","marker":"바.","text":"폐유를 정제연료유로 재활용하는 자는 별표 5의3 제2호마목2)가)(2)(가)에서 정한 기준항목을 분기 1회 이상 측정하고 그 결과를 기록한 후 3년 동안 보관하여야 한다.","answer":"폐유를 정제연료유로 재활용하는 자로서 별표 5의3 제2호마목2)가)(2)(가) 기준항목을 분기 1회 이상 측정하고 결과를 기록하여 3년간 보관하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["06"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":32,"_source":"b8"},{"depth":1,"type":"korean","marker":"사.","text":"별표 5의3 제2호마목2)가)(3)에 따라 폐유, 할로겐족을 제외한 폐유기용제, 폐페인트 및 폐래커를 재생연료유로 재활용하는 자는 같은 목 2)가)(3)(나)에서 정한 기준 항목을 분기 1회 이상 측정하고 그 결과를 기록한 후 3년 동안 보관하여야 한다.","answer":"별표 5의3 제2호마목2)가)(3)에 따라 폐유·할로겐족 제외 폐유기용제·폐페인트·폐래커를 재생연료유로 재활용하는 자로서 같은 목 2)가)(3)(나) 기준항목을 분기 1회 이상 측정하고 결과를 기록하여 3년간 보관하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["04","05","06"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":33,"_source":"b8"},{"depth":1,"type":"korean","marker":"아.","text":"폐유로 정제연료유 또는 윤활기유의 원료물질을 생산하는 자, 폐유기용제로 정제유기용제를 생산하는 자, 폐유 등으로 재생연료유를 생산하는 자 또는 폐오일필터를 파쇄·증류하여 고철 및 폐유를 공급하는 자는 기후에너지환경부장관이 정하여 고시하는 바에 따라 정제연료유, 윤활기유의 원료물질, 정제유기용제, 재생연료유 또는 고철에 대한 공급계획서(사용시설·공급량·공급기간이 포함되어야 한다)를 관할 지방환경관서의 장에게 제출하여 적합 통보를 받은 후 공급하여야 한다. 제출한 사항을 변경하려는 때에도 또한 같다.","answer":"폐유로 정제연료유·윤활기유 원료물질 생산자, 폐유기용제로 정제유기용제 생산자, 폐유 등으로 재생연료유 생산자 또는 폐오일필터 파쇄·증류로 고철·폐유 공급자로서 기후에너지환경부장관 고시에 따라 공급계획서(사용시설·공급량·공급기간 포함)를 관할 지방환경관서장에게 제출하여 적합 통보 받은 후 공급하겠음(변경 시 동일).","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["04","06"],"action":["RCY"],"rCode":["R3","R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":34,"_source":"b8"},{"depth":1,"type":"korean","marker":"자.","text":"폐플라스틱 및 폐고무를 사용하여 별표 5의3 제2호마목2)가)(2)(가)에 따른 정제연료유의 기준에 맞는 유류를 제조하는 자의 경우 공급계획서를 작성하여 시·도지사에게 제출하여 적합 통보를 받은 후 공급하여야 한다. 제출한 사항을 변경하려는 때에도 또한 같다.","answer":"폐플라스틱·폐고무로 별표 5의3 제2호마목2)가)(2)(가)에 따른 정제연료유 기준에 맞는 유류를 제조하는 자로서 공급계획서를 작성하여 시·도지사에게 제출하여 적합 통보 받은 후 공급하겠음(변경 시 동일).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-03"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":35,"_source":"b8"},{"depth":1,"type":"korean","marker":"차.","text":"음식물류 폐기물을 재활용하여 사료·퇴비 등의 제품을 생산하는 자는 생산한 사료·퇴비 등의 제품을 빗물 등으로 인한 유출 등 주변 환경을 오염시키지 않도록 적정하게 보관하여야 한다.","answer":"음식물류 폐기물을 재활용하여 사료·퇴비 등의 제품을 생산하는 자로서 생산한 제품을 빗물 등으로 인한 유출 등 주변 환경을 오염시키지 않도록 적정하게 보관하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-38","91-02"],"action":["RCY"],"rCode":["R5"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":36,"_source":"b8"},{"depth":1,"type":"korean","marker":"카.","text":"음식물류 폐기물을 부숙토나 지렁이 분변토를 만들어 토지개량제로 사용하는 자는 기후에너지환경부장관이 정하여 고시하는 바에 따라 그 제품명·원료 등을 표시하고, 제품의 제조에 관한 기록을 보존하여야 한다.","answer":"음식물류 폐기물을 부숙토·지렁이 분변토로 만들어 토지개량제로 사용하는 자로서 기후에너지환경부장관 고시에 따라 제품명·원료 등을 표시하고 제품 제조 기록을 보존하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-38","91-02"],"action":["RCY"],"rCode":["R6"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":37,"_source":"b8"},{"depth":1,"type":"korean","marker":"타.","text":"폐기물을 이용하여「산업표준화법」제15조제1항에 따른 인증을 받은 시멘트(클링커를 포함한다)를 제조하는 자는 다음 사항을 준수하여야 한다.","answer":"폐기물을 이용하여 「산업표준화법」 제15조제1항에 따른 인증을 받은 시멘트(클링커 포함)를 제조하는 자로서 아래 1)~4) 사항을 준수하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":38,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"1)","text":"폐기물을 운반·보관·투입할 경우 외부 유출 및 비산방지를 위하여 밀폐시설, 덮개설치 등의 조치를 취하여야 한다.","answer":"폐기물 운반·보관·투입 시 외부 유출·비산방지를 위한 밀폐시설·덮개설치 등의 조치를 하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":39,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"2)","text":"대체원료, 보조연료로 사용한 폐기물(수입폐기물을 포함한다) 및 폐기물을 재활용하여 제조한 제품 사용량을 매 반기 종료 후 15일 이내에 별지 제57호의3서식에 따라 작성하여 해당 특별자치시장, 특별자치도지사, 시장·군수·구청장에게 보고하여야 한다. 이 경우 전자정보처리프로그램에 보고내용을 입력한 경우에는 보고한 것으로 본다.","answer":"대체원료·보조연료로 사용한 폐기물(수입폐기물 포함) 및 폐기물 재활용 제조 제품 사용량을 매 반기 종료 후 15일 이내에 별지 제57호의3서식에 따라 작성하여 특별자치시장·특별자치도지사·시장·군수·구청장에게 보고하겠음(전자정보처리프로그램 입력 시 보고로 봄).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":40,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물 배출자 및 폐기물 중간재활용업자로부터 수탁받은 폐기물의 성질 및 상태와 유통흐름을 명확히 파악하고 정보를 공개하여야 한다.","answer":"폐기물 배출자 및 폐기물 중간재활용업자로부터 수탁받은 폐기물의 성질·상태와 유통흐름을 명확히 파악하고 정보를 공개하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":41,"_source":"b8"},{"depth":2,"type":"korean-paren","marker":"가)","text":"폐기물 배출자 또는 폐기물 중간재활용업자(이하 이 호에서 \"폐기물 공급자\"라 한다)와 위·수탁계약을 체결하기 전에 해당 폐기물에 대한 배출공정 및 중금속 함량 등의 특성을 조사하고 관할 행정기관에 보고 후 재활용하여야 한다.","answer":"폐기물 공급자(폐기물 배출자·중간재활용업자)와 위·수탁계약 체결 전 해당 폐기물 배출공정·중금속 함량 등의 특성을 조사하고 관할 행정기관에 보고 후 재활용하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":42,"_source":"b8"},{"depth":2,"type":"korean-paren","marker":"나)","text":"재활용 대상 폐기물을 당해 사업장에 반입하기 전에 중금속 함량 등을 분석하여 재활용기준에 적합한 폐기물만을 반입하여야 한다. 다만, 폐기물 공급자와 폐기물의 종류가 변경이 없는 경우에는 반입 전 중금속 함량 등의 분석 주기를 분기 1회로 조정할 수 있다.","answer":"재활용 대상 폐기물을 사업장 반입 전 중금속 함량 등을 분석하여 재활용기준 적합 폐기물만 반입하겠음(공급자·종류 변경 없을 시 반입 전 분석 주기 분기 1회 조정 가능).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":43,"_source":"b8"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"재활용 대상 폐기물에 대한 중금속 함량 등의 분석결과 재활용기준을 초과하는 경우에는 폐기물 공급자를 통하여 정확한 원인을 파악하고, 재사용 가능 여부가 결정되기 전까지는 반입하여서는 아니 된다.","answer":"재활용 대상 폐기물 중금속 함량 등 분석결과 재활용기준 초과 시 폐기물 공급자를 통하여 정확한 원인을 파악하고, 재사용 가능 여부 결정 전까지 반입하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":44,"_source":"b8"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"재활용기준을 초과하여 폐기물 반입이 중단된 폐기물 공급자에 대한 폐기물 재반입은 재활용기준을 안정적으로 준수할 수 있다고 판단되는 경우에만 관할 행정기관에 보고한 후 다시 반입할 수 있다.","answer":"재활용기준 초과로 반입 중단된 폐기물 공급자에 대한 폐기물 재반입은 재활용기준을 안정적으로 준수할 수 있다고 판단되는 경우에만 관할 행정기관 보고 후 다시 반입하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":45,"_source":"b8"},{"depth":2,"type":"korean-paren","marker":"다)","text":"별지 제4호의15서식에 따른 분기별 폐기물사용시멘트정보를 매 분기 다음달 15일까지 전자정보처리프로그램을 이용하여 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장에게 제출해야 한다. 이 경우 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장은 제출받은 정보를 해당 지방자치단체의 인터넷 홈페이지에 공개할 수 있다.","answer":"별지 제4호의15서식에 따른 분기별 폐기물사용시멘트정보를 매 분기 다음달 15일까지 전자정보처리프로그램으로 특별자치시장·특별자치도지사·시장·군수·구청장에게 제출하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":46,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"4)","text":"관할 행정기관에서 폐기물 재활용의 적정성 여부 평가 등을 위하여 필요한 자료나 정보를 요청할 경우 특별한 사유가 없으면 요청에 따라야 한다.","answer":"관할 행정기관에서 폐기물 재활용 적정성 평가 등을 위해 자료·정보를 요청할 경우 특별한 사유가 없으면 요청에 따르겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":47,"_source":"b8"},{"depth":1,"type":"korean","marker":"파.","text":"소각열회수시설에서 제3조제1항제1호에 따른 에너지 회수기준에 맞게 에너지를 회수하는 자는 다음 사항을 준수하여야 한다.","answer":"소각열회수시설에서 제3조제1항제1호에 따른 에너지 회수기준에 맞게 에너지를 회수하는 자로서 아래 1)~2) 사항을 준수하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"],"bizType":["IR","CR","FR"]},"_idx":48,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"1)","text":"재활용 대상 폐기물의 공급자가 변경되는 경우에는 해당 폐기물에 대하여 제3조제1항제1호가목의 기준에 적합한지를 검사하여 적합한 폐기물만을 반입하여야 한다. 이 경우 검사결과는 3년간 보존하여야 한다.","answer":"재활용 대상 폐기물 공급자가 변경되는 경우 해당 폐기물에 대하여 제3조제1항제1호가목 기준 적합 여부를 검사하여 적합한 폐기물만 반입하고, 검사결과를 3년간 보존하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"],"bizType":["IR","CR","FR"]},"_idx":49,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"2)","text":"반입되는 폐기물은 폐기물의 종류 및 공급자(폐기물을 배출한 자가 스스로 재활용하는 경우에는 해당 배출자를 공급자로 본다)별로 매 분기 1회 이상 제3조제1항제1호가목의 기준에 적합한지를 검사하고 그 검사결과를 3년간 보존하여야 한다. 다만, 폐기물 공급자의 변경이 없는 경우에는 검사 주기를 반기 1회 이상으로 조정할 수 있다.","answer":"반입되는 폐기물은 종류 및 공급자(자가재활용 시 배출자=공급자)별로 매 분기 1회 이상 제3조제1항제1호가목 기준 적합 여부를 검사하고 검사결과를 3년간 보존하겠음(공급자 변경 없을 시 검사 주기 반기 1회 조정 가능).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"],"bizType":["IR","CR","FR"]},"_idx":50,"_source":"b8"},{"depth":1,"type":"korean","marker":"하.","text":"위탁받은 폐기물을 허가받은 폐기물 재활용시설과 같은 사업장에 있는 보관시설 외의 장소에 보관하여서는 아니 된다. 다만, 제11조제1항제1호부터 제5호까지의 규정에 따라 승인받은 임시보관시설이나 기후에너지환경부장관 또는 지방자치단체의 장이 설치ㆍ운영하는 비축 시설에 보관하는 경우는 제외한다.","answer":"위탁받은 폐기물을 허가받은 폐기물 재활용시설과 같은 사업장에 있는 보관시설 외의 장소에 보관하지 않겠음(제11조제1항제1호~제5호 승인 임시보관시설 또는 기후에너지환경부장관·지자체장 설치·운영 비축 시설 보관은 제외).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":51,"_source":"b8"},{"depth":1,"type":"korean","marker":"거.","text":"법 제13조의2에 따른 폐기물의 재활용 원칙 및 준수사항에 따라 별표 4의3에 따른 폐기물의 종류별 재활용 가능 유형에 해당하는 유형으로 재활용하여야 하며, 법 제13조의3제3항에 따라 재활용환경성평가에 따른 재활용의 승인을 받아 재활용하는 경우에는 승인 기간 및 재활용 유형 등의 승인 내용을 준수하여 재활용하여야 한다.","answer":"법 제13조의2에 따른 폐기물 재활용 원칙 및 준수사항에 따라 별표 4의3 폐기물 종류별 재활용 가능 유형으로 재활용하고, 법 제13조의3제3항 재활용환경성평가에 따른 재활용 승인 시 승인 기간·재활용 유형 등 승인내용을 준수하여 재활용하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":52,"_source":"b8"},{"depth":1,"type":"korean","marker":"너.","text":"전기자동차 폐이차전지를 에너지저장장치 등 재사용 제품의 제조에 재활용하는 자는 기후에너지환경부장관 및 산업통상부장관이 공동으로 정하여 고시하는 바에 따라 전기자동차 폐이차전지의 잔존용량 및 잔존수명 등을 측정해야 한다.","answer":"전기자동차 폐이차전지를 에너지저장장치 등 재사용 제품 제조에 재활용하는 자로서 기후에너지환경부장관·산업통상부장관 공동 고시에 따라 잔존용량·잔존수명 등을 측정하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-41"],"action":["RCY"],"rCode":["R1","R2"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":53,"_source":"b8"}],"b9":[{"depth":0,"type":"number","marker":"1.","text":"중간처분시설의 경우","answer":"1. 중간처분시설","tags":{"category":null,"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"isHeader":true,"_idx":1,"_source":"b9"},{"depth":1,"type":"korean","marker":"가.","text":"공통기준","answer":"가. 공통기준","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":2,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"소각시설은 자체 무게와 적재무게, 그 밖의 무게에 견딜 수 있어야 하고, 처분에 사용하는 처리약품과 처분과정에서 발생하는 열·습기·배기가스·배출수 및 충격 등에 견딜 수 있는 재질을 사용하여야 한다.","answer":"소각시설은 자체 무게·적재무게 등에 견딜 수 있는 구조로 설치하고, 처리약품·열·습기·배기가스·배출수 등에 부식·손상되지 아니하는 재질로 시공하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":3,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"폐기물이 흩날리거나 흘러나오는 것을 방지하는 데에 필요한 설비를 하여야 한다.","answer":"폐기물의 흩날림·유출 방지에 필요한 설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":4,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물의 처분과정에서 발생하는 대기오염물질·수질오염물질 등을 처분할 수 있는 시설을 갖추어야 한다. 다만, 「물환경보전법 시행규칙」 별표 2 및 별표 3에 따른 수질오염물질 또는 특정수질유해물질을 「물환경보전법」 제62조에 따른 폐수처리업자에게 위탁처리하는 경우와 매립시설의 침출수 처리시설, 「물환경보전법」 제2조제12호에 따른 수질오염방지시설(자가수질오염방지시설만 해당한다), 「물환경보전법」 제48조에 따른 공공폐수처리시설, 「하수도법」 제2조제9호에 따른 공공하수처리시설 또는 「하수도법」 제2조제11호에 따른 분뇨처리시설에서 처리하는 오염물질을 그 시설에 옮겨 처리하는 경우와 영 제5조에 따른 폐기물 재활용시설 중 혐기성분해시설에 유입하여 에너지를 생산(음식물류 폐기물을 재활용하는 과정에서 발생되는 경우만 해당한다)하는 경우에는 수질오염물질 처리시설의 일부 또는 전부를 갖추지 아니할 수 있다.","answer":"처분과정에서 발생하는 대기오염물질·수질오염물질 등을 처분할 수 있는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":5,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"처분시설의 바닥은 시멘트·아스팔트 등 물이 스며들지 아니하는 재료로 포장하여야 한다.","answer":"처분시설 바닥은 시멘트·아스팔트 등 물이 스며들지 아니하는 재료로 포장하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":6,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"음식물류 폐기물 처분시설을 설치하는 때에는 음식물류 폐기물의 저장ㆍ투입ㆍ이송 및 처리 등의 과정에서 발생하는 악취가 외부로 새어 나가지 아니하도록 밀폐된 구조로 설치하여야 하며, 발생되는 악취물질을 저감할 수 있는 별도의 시설을 갖추어야 한다.","answer":"음식물류 폐기물 처분시설 설치 시 저장·투입·이송·처리 과정에서 발생하는 악취가 외부로 새어 나가지 아니하도록 밀폐·악취방지시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":["51-19"],"action":["MI"],"rCode":null,"facilityType":null},"_idx":7,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"「순환경제사회 전환 촉진법」 제36조제2항제2호에 따라 폐자원에너지를 일정 기준 이상 회수하여 폐기물처분부담금을 감면받으려는 경우에는 제3조제2항에 따라 기후에너지환경부장관이 정하여 고시하는 바에 따라 폐자원에너지의 회수ㆍ이용률의 검증에 필요한 설비를 갖추어야 한다.","answer":"폐기물처분부담금 감면을 위해 폐자원에너지를 회수하는 경우 제3조제2항 기준에 적합한 회수설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":8,"_source":"b9"},{"depth":1,"type":"korean","marker":"나.","text":"소각시설","answer":"나. 소각시설","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F","INC_C"]},"isHeader":true,"_idx":9,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"공통기준","answer":"1) 공통기준","tags":null,"_idx":10,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"연소실·열분해실(가스화실을 포함한다. 이하 이 목에서 같다) 및 고온용융실의 예열 및 온도를 조절할 수 있도록 보조버너 등 충분한 용량의 보조연소장치를 설치하여야 한다.","answer":"연소실·열분해실(가스화실 포함)·고온용융실의 예열 및 온도 조절을 위한 충분한 용량의 보조연소장치(보조버너 등)를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":11,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"연소실·열분해실 및 고온용융실의 연소용 공기 또는 산소 등이 안정적으로 공급될 수 있는 장치(공급량을 조절할 수 있는 기능을 갖는 것만 해당한다)를 설치하여야 한다.","answer":"연소실·열분해실·고온용융실의 연소용 공기·산소 등 안정 공급장치(공급량 조절 기능 포함)를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":12,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"다)","text":"굴뚝을 설치하는 경우에는 통풍력과 배기가스의 대기확산을 고려한 높이와 구조를 가져야 한다.","answer":"굴뚝 설치 시 통풍력과 배기가스 대기확산을 고려한 높이·구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":13,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"라)","text":"폭발사고와 화재 등에 대비한 안전한 구조이어야 하며, 소화기 등 필요한 장비를 갖추어야 한다.","answer":"폭발·화재 등에 안전한 구조로 설치하고 소화기 등 필요 장비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":14,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"마)","text":"시설규모, 처분대상 폐기물의 종류, 소각방식, 설계·시공자명 및 연락처 등 필요한 사항을 지워지지 아니하고 파손되지 아니하는 방법으로 표시한 표지를 붙여야 한다.","answer":"시설규모·처분대상 폐기물 종류·소각방식·설계시공자명·연락처 등 표지를 지워지거나 파손되지 않는 방법으로 표시하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":15,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"바)","text":"연소실·열분해실 및 고온용융실에는 시설 내의 압력변화를 감지할 수 있는 압력측정계를 설치하여야 한다. 다만, 생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 시설의 경우에는 그러하지 아니하다.","answer":"연소실·열분해실·고온용융실에 압력측정계를 설치하겠음(도서지역 생활폐기물 200kg/h 미만 제외).","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":16,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"사)","text":"시간당 처분능력이 2톤 이상인 경우에는 반입되는 폐기물의 무게를 측정할 수 있는 계량시설을 설치하여야 한다. 다만, 시·도지사나 지방환경관서의 장이 인정하는 경우와 다른 곳의 계량시설을 이용하여 반입되는 폐기물의 무게를 측정할 수 있는 경우에는 그러하지 아니하다.","answer":"시간당 처분능력 2톤 이상 시 반입 폐기물 무게 측정 계량시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":17,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"아)","text":"연소실·열분해실 및 고온용융실의 최종 출구에는 출구온도 측정공을 설치하고, 각 시설의 출구온도 기준보다 섭씨 300도 이상까지, 대기오염 방지시설 중 최초 집진시설의 입구에는 섭씨600도 이상 측정할 수 있는 온도지시계 및 온도변화를 연속적으로 기록할 수 있는 자동온도기록계를 붙여야 한다. 다만, 최초 집진시설의 입구에 붙여야 하는 온도 지시계 및 자동온도기록계의 경우 시간당 처분능력이 2톤 이상인 시설의 경우만 해당한다.","answer":"연소실·열분해실·고온용융실 최종 출구에 출구온도 측정공을 설치하고, 출구온도 기준보다 섭씨 300도 이상 측정 가능한 온도지시계 및 자동기록장치를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":18,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"자)","text":"연소실·열분해실 및 고온용융실의 외부를 철판으로 덮은 경우에는 본체의 고온부위를 내열도료로 색칠 또는 단열처리하거나 내화단열벽돌, 캐스터블내화물 등으로 시공하여 그 외부표면온도를 섭씨 80도 이하(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 시설의 경우에는 섭씨 120도 이하)로 유지할 수 있는 구조이어야 한다. 다만, 회전식소각시설 등 구조상 단열을 충분히 할 수 없는 경우에는 그러하지 아니하다.","answer":"연소실·열분해실·고온용융실 외부 철판 부위는 내열도료 색칠 또는 단열처리하거나 내화단열벽돌·캐스터블내화물 등으로 시공하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":19,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"차)","text":"대기오염 방지시설 중 최초 집진시설(전기ㆍ여과집진시설이 설치되어 있는 경우에는 전기ㆍ여과집진시설을 최초 집진시설로 본다)에 흘러 들어오는 연소가스를 섭씨 200도 이하(시간당 처분능력이 2톤 미만인 시설의 경우에는 섭씨 250도 이하)로 냉각시키기 위한 냉각시설이나 폐열회수시설을 설치하여야 한다. 다만, 생활폐기물을 대상으로 도서지역에 설치하는 시간당 처분능력이 200킬로그램 미만인 시설로서 대기오염 방지시설의 처리공정상 연소가스의 냉각이 필요하지 아니하는 경우에는 그러하지 아니한다.","answer":"대기오염방지시설 중 최초 집진시설(전기·여과집진시설 우선)에 흘러 들어오는 연소가스 온도를 섭씨 200도 이하로 냉각시키기 위한 냉각시설 또는 폐열회수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":20,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"카)","text":"「대기환경보전법 시행령」 제17조에 따른 굴뚝 자동측정기기 부착하여야 하는 소각시설은 같은 법 시행령 제17조 및 같은 법 시행규칙 제37조에 따라 굴뚝 자동측정기기를 설치하고 운영ㆍ관리하여야 하며, 대기오염 방지시설의 입·출구 및 굴뚝에는 배출가스의 온도, 대기오염물질의 농도 등을 측정할 수 있는 측정공을 대기오염공정 시험방법에 맞게 설치하여야 한다.","answer":"「대기환경보전법 시행령」 제17조 대상 소각시설은 같은 법 시행규칙 제37조에 따라 굴뚝 자동측정기기를 부착하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":21,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"타)","text":"폐기물 투입구 및 청소구는 고온에 견딜 수 있는 재질로 만들어야 하며, 외부공기가 흘러 들어오거나 연소가스가 새어 나가는 것을 방지할 수 있는 구조이어야 한다.","answer":"폐기물 투입구·청소구는 고온에 견디는 재질로 만들고, 외부공기 유입 및 연소가스 누출을 방지할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":22,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"파)","text":"내부의 연소상태를 볼 수 있는 구조이어야 하며, 소각재의 제거 시 재의 흩날림을 방지할 수 있는 구조이어야 한다.","answer":"내부 연소상태를 확인할 수 있는 구조로 하고, 소각재 제거 시 재 흩날림을 방지할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":23,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"하)","text":"폐기물반입장·저장조 등에서 발생하는 악취가 처분시설의 외부로 새어나가는 것을 방지할 수 있는 시설을 설치하여야 한다. 다만, 시간당 처분능력이 2톤 미만인 시설인 경우에는 공기차단시설 등 간이시설을 설치할 수 있다.","answer":"폐기물 반입장·저장조 등에서 발생하는 악취가 외부로 새어 나가지 아니하도록 악취방지시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":24,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"거)","text":"시간당 처분능력이 25킬로그램 이상인 소각시설은 「잔류성유기오염물질 관리법 시행규칙」 별표 3 제4호가목에 따른 다이옥신 배출기준을 지킬 수 있는 시설을 설치하여야 한다.","answer":"시간당 처분능력 25kg 이상 소각시설은 「잔류성유기오염물질 관리법 시행규칙」 별표3 제4호가목 다이옥신 배출기준을 지킬 수 있는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":25,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"너)","text":"허가ㆍ승인을 받거나 신고한 시간당 처분능력을 초과하여 설치하여서는 아니 된다.","answer":"허가·승인·신고된 시간당 처분능력을 초과하여 설치하지 않겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":26,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"더)","text":"폐냉매물질 등 기체상 폐기물을 처분하는 경우에는 기체상 폐기물이 외부로 새어 나가지 아니하고 연소실ㆍ열분해실ㆍ고온용융실로 직접 투입할 수 있는 설비를 갖추어야 한다.","answer":"폐냉매물질 등 기체상 폐기물 처분 시 외부 누출 없이 연소실·열분해실·고온용융실로 직접 투입할 수 있는 밀폐 투입설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":["07"],"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":27,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"개별기준","answer":"2) 개별기준","tags":null,"_idx":28,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"일반소각시설","answer":"가) 일반소각시설","tags":null,"_idx":29,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(1)","text":"연소실(연소실이 둘 이상인 경우에는 최종 연소실)의 출구온도는 섭씨 850도 이상(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 경우에는 섭씨 800도 이상)이어야 한다. 다만, 종이, 목재류만을 소각하는 경우에는 섭씨 450도 이상이어야 한다.","answer":"연소실(연소실이 둘 이상인 경우 최종 연소실) 출구온도를 섭씨 850도 이상(도서지역 생활폐기물 200kg/h 미만은 800도 이상)으로 유지하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":30,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(2)","text":"연소실은 연소가스가 2초 이상(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만의 경우에는 0.5초 이상. 시간당 처분능력이 200킬로그램 이상 2톤 미만인 경우에는 1초 이상) 체류할 수 있고, 충분하게 혼합될 수 있는 구조이어야 한다. 이 경우 체류시간은 섭씨 850도(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 경우에는 섭씨 800도, 종이ㆍ목재류 및 마늘피 등 초근목피류를 소각하는 경우에는 섭씨 450도)에서의 부피로 환산한 연소가스의 체적으로 계산한다.","answer":"연소실은 연소가스가 2초 이상(도서지역 생활폐기물 200kg/h 미만은 0.5초 이상) 체류하고 충분히 혼합될 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":31,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(3)","text":"바닥재의 강열감량(强熱減量)이 10퍼센트 이하가 될 수 있는 소각 성능을 갖추어야 한다. 다만, 2008년 1월 1일 이후 가동 개시되는 생활폐기물 소각 시설은 강열감량이 5퍼센트(시간당 처분능력이 200킬로그램 미만의 경우에는 10퍼센트) 이하가 될 수 있는 소각 성능을 갖추어야 한다.","answer":"바닥재 강열감량이 10퍼센트 이하가 될 수 있는 소각 성능을 갖추겠음(2008년 1월 1일 이후 가동 생활폐기물 소각시설은 5퍼센트 이하).","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":32,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(4)","text":"2차 연소실이 없는 연소방식 중 연속투입방식의 경우에는 폐기물을 투입할 연소실과 외부공기가 차단되도록 이중문 등의 구조이어야 하며, 이 경우의 연소실은 출구기준 온도 이상이 유지될 수 있는 구조이어야 한다.","answer":"2차 연소실이 없는 연속투입방식의 경우 폐기물 투입 연소실과 외부공기가 차단되도록 이중문 등의 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":33,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(5)","text":"폐기물을 일괄 투입하여 연소하는 방식의 경우에는 소량의 공기로 가스화시키는 가스화실과 이에 접속된 연소실을 가진 구조이어야 하며, 이 경우 가스화실은 연소가스체류시간을 산정할 때에 연소실로 보지 아니한다.","answer":"폐기물 일괄 투입 연소방식의 경우 가스화실과 이에 접속된 연소실 구조로 설치하고, 가스화실은 적정 가스화 성능을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":34,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(6)","text":"의료폐기물을 대상으로 하는 소각시설(시간당 처분능력이 200킬로그램 이상인 시설만 해당한다)에는 폐기물을 자동으로 투입하는 장치와 투입되는 폐기물의 양을 자동계측하는 장치를 갖추어야 한다.","answer":"의료폐기물 소각시설(200kg/h 이상)에는 폐기물 자동 투입장치 및 투입량 자동계측장치를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":["10"],"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":35,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"고온소각시설","answer":"나) 고온소각시설","tags":null,"_idx":36,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(1)","text":"2차 연소실의 출구온도는 섭씨 1,100도 이상이어야 한다.","answer":"2차 연소실 출구온도를 섭씨 1,100도 이상으로 유지하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_H"]},"_idx":37,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(2)","text":"2차 연소실은 연소가스가 2초 이상 체류할 수 있고, 충분하게 혼합될 수 있는 구조이어야 한다. 이 경우 체류시간은
