만드는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["BCD_BIO"]},"_idx":126,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"분해과정에서 발생하는 가스를 처리하는 시설을 갖추어야 한다.","answer":"분해과정에서 발생하는 가스를 처리하는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["BCD_BIO"]},"_idx":127,"_source":"b9"},{"depth":0,"type":"number","marker":"2.","text":"최종처분시설의 경우","answer":"2. 최종처분시설","tags":{"category":null,"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":null},"isHeader":true,"_idx":128,"_source":"b9"},{"depth":1,"type":"korean","marker":"가.","text":"매립시설의 공통기준","answer":"가. 매립시설의 공통기준","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"isHeader":true,"_idx":129,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"매립시설의 주위에 사람이나 가축 등의 출입을 방지할 수 있는 철망 등의 외곽시설을 지상 1.5미터 이상의 높이로 설치하여야 한다. 다만, 매립시설이 사람 등이 무단으로 출입할 수 없는 사업장 안에 있는 경우와 그 주위가 사람 등의 출입이 곤란한 해변·하천·절벽 등의 지형인 경우에는 그러하지 아니하다.","answer":"매립시설 주위에 사람·가축의 출입을 방지할 수 있는 철망 등 외곽시설을 지상 1.5미터 이상 높이로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":130,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"매립시설 입구에 폐기물매립시설임을 표시하는 가로 100센티미터 이상, 세로 50센티미터 이상의 표지판을 지상 100센티미터 이상의 높이에 설치하여야 한다. 이 경우 표지판에는 매립시설명, 매립대상폐기물의 종류, 관리자의 주소·성명·전화번호·설계·시공·감리자명 등을 적어야 한다.","answer":"매립시설 입구에 폐기물매립시설 표지판(가로 100cm 이상 × 세로 50cm 이상)을 지상 100cm 이상 높이에 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":131,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물의 흘러 나감을 방지할 수 있는 축대벽 및 둑은 매립되는 폐기물의 무게, 매립단면 및 침출수위 등을 고려하여 안전하게 설치하여야 한다. 이 경우 축대벽은 저면(底面)활동에 대한 안전율이 1.5 이상, 쓰러짐에 대한 안전율이 2.0 이상, 지지력에 대한 안전율이 3.0 이상이어야 하며, 둑은 사면(斜面)활동에 대한 안전율이 1.3 이상이어야 한다.","answer":"폐기물 유출 방지용 축대벽·둑은 매립 폐기물 무게·매립단면·침출수위 등을 고려하여 안전하게 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":132,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"매립시설의 기초지반이 연약한 경우에는 지반침하 등의 우려가 없도록 지반보강을 위한 필요한 조치를 하여야 하며, 암반이 드러난 경우 암반의 요철 등으로 차수시설이 손상되지 아니하도록 적절한 조치를 하여야 한다.","answer":"기초지반이 연약한 경우 지반침하 우려가 없도록 지반보강 조치를 하고, 암반 노출 시 암반 요철을 고르게 처리하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":133,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"매립시설의 외부에서 빗물이 흘러들지 아니하고 매립시설의 내부에 떨어진 빗물이 폐기물을 매립 중인 구역에 흘러들지 아니하도록 빗물배제시설을 갖추어야 한다. 다만, 빗물이 매립시설로 흘러들거나 떨어지는 것을 방지할 수 있는 시설을 설치하는 경우에는 그러하지 아니하다.","answer":"매립시설 외부 빗물 유입 방지 및 내부 빗물의 매립구역 유입 방지를 위한 빗물배제시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":134,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"반입되는 폐기물의 무게를 측정할 수 있는 계량시설을 설치하여야 한다. 다만, 시·도지사나 지방환경관서의 장이 필요하지 아니하다고 인정하는 경우와 다른 곳의 계량시설을 이용하여 반입되는 폐기물의 무게를 측정할 수 있는 경우에는 그러하지 아니하다.","answer":"반입 폐기물 무게를 측정할 수 있는 계량시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":135,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"7)","text":"폐기물운반차량의 세륜·세차시설을 갖추어야 한다. 다만, 시·도지사나 지방환경관서의 장이 처분대상 폐기물을 고려하여 필요하지 아니하다고 인정하는 경우에는 그러하지 아니하다.","answer":"폐기물운반차량의 세륜·세차시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":136,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"8)","text":"폐기물의 매립으로 인하여 침출수가 발생하는 경우에는 지하수오염 여부를 확인할 수 있는 지하수 검사정을 사용시작 신고일 2개월 전까지 매립시설의 주변 지하수흐름층 상류에 1개소 이상, 하류에 2개소 이상 설치하여야 한다. 이 경우 지하수 검사정은 직경이 10센티미터 이상이고, 재질은 테프론·스테인레스강 또는 합성수지관을 사용하여야 하며, 지하수 검사정의 지표면으로부터 오염물질이 흘러들지 아니하는 구조로 설치하여야 한다. 다만, 매립시설의 경계선이 해수면과 가까이 있어 지하수 검사정 설치가 어려운 시설로서 해수면 가까운 지역에 지하수 검사정 대신 해수수질검사를 할 수 있는 일정한 지점을 2개소 이상 선정한 시설의 경우에는 그러하지 아니하다.","answer":"침출수 발생 시 지하수오염 여부를 확인할 수 있는 지하수 검사정을 사용시작 신고일 2개월 전까지 매립시설의 상·하류에 각각 1개 이상 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":137,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"9)","text":"조성면적이 15만제곱미터 이상인 매립시설은 기후에너지환경부장관이 정하여 고시하는 바에 따라 지진에 대한 안전성을 고려해야 하고, 조성면적이 15만제곱미터 미만인 매립시설은 해당 매립시설을 설치하려는 자가 매립시설 지반의 연약정도, 매립높이 등을 고려하여 필요하다고 인정하면 지진에 대한 안전성을 고려할 수 있다.","answer":"조성면적 15만㎡ 이상 매립시설은 기후에너지환경부장관 고시에 따라 지진 안전성을 고려하여 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":138,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"10)","text":"폐기물 최종처분업자 또는 폐기물 종합처분업자가 설치한 매립시설에는 안전사고 예방 등을 위하여 기후에너지환경부장관이 고시하는 바에 따라 「개인정보 보호법」 제2조제7호에 따른 영상정보처리기기를 설치하여야 한다.","answer":"폐기물 최종처분업자·종합처분업자 매립시설은 안전사고 예방을 위해 영상정보처리기기를 설치·운영하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":139,"_source":"b9"},{"depth":1,"type":"korean","marker":"나.","text":"매립시설의 개별기준","answer":"나. 매립시설의 개별기준","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"isHeader":true,"_idx":140,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"차단형 매립시설","answer":"1) 차단형 매립시설","tags":null,"_idx":141,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"바닥과 외벽은 한국산업규격 F2405(콘크리트의 압축강도 시험방법)에 따라 측정한 압축강도(이하 \"압축강도\"라 한다)가 210kg/㎠이상인 철근콘크리트로서 두께가 15센티미터 이상 또는 이와 같은 차단효력을 가진 구조물로 설치하되 방수처리하여야 한다.","answer":"바닥과 외벽은 압축강도 210kg/㎠ 이상 철근콘크리트 구조이며 두께 15cm 이상으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["D"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK"]},"_idx":142,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"내부막의 1개 구획의 면적은 매립가능면적 50제곱미터 이하 또는 매립가능용적 250세제곱미터 이하가 되도록 하고, 내부막의 두께는 10센티미터 이상으로 하되, 압축강도 210kg/㎠ 이상의 콘크리트로 설치하여야 한다.","answer":"내부막 1개 구획 면적은 매립가능면적 50㎡ 이하 또는 매립가능용적 250㎥ 이하, 내부막 두께는 10cm 이상으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["D"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK"]},"_idx":143,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"다)","text":"매립시설 주변에 떨어진 빗물이 흘러드는 것을 방지할 수 있는 시설과 빗물을 차단할 수 있는 덮개를 설치하여야 한다.","answer":"매립시설 주변 빗물 유입 방지시설과 빗물 차단 덮개를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["D"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK"]},"_idx":144,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"관리형 매립시설","answer":"2) 관리형 매립시설","tags":null,"_idx":145,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"침출수가 매립시설에서 흘러 나가는 것을 방지하기 위하여 매립시설의 바닥과 측면은 폐기물의 성질·상태, 매립 높이, 지형조건 등을 고려하여 점토·점토광물혼합토 등 점토류 라이너, 고밀도폴리에틸렌 또는 이에 준하는 재질의 토목합성수지 라이너를 사용하여 다음의 방법에 따라 차수시설을 설치하여야 하며, 고밀도폴리에틸렌이나 이에 준하는 재질의 토목합성수지 라이너를 사용하는 경우에는 폐기물의 무게 등에 대한 안정성을 검토하여 항복인장강도(降伏引張强度)의 안전율이 2.0이상이 되도록 설계·시공하여야 한다. 다만, 매립시설의 바닥 및 측면이 점토류 라이너를 사용하여 차수시설을 설치한 것과 같은 수준 이상의 차수효과를 가지는 경우 또는 「환경기술 및 환경산업 지원법」 제7조제2항에 따른 기술검증(이하 \"환경기술검증\"이라 한다)을 받은 매립시설의 설치공법으로 토목합성수지 라이너, 점토류 라이너를 사용하여 차수시설을 설치한 것과 같은 수준 이상의 침출수유출 방지효과가 있는 경우로서 시·도지사나 지방환경관서의 장이 인정하는 경우에는 그러하지 아니하다.","answer":"침출수 누출 방지를 위해 매립시설 바닥·측면에 점토·점토광물혼합토·고밀도폴리에틸렌 라이너 등 차수시설을 폐기물 성질·매립 높이·지형조건을 고려하여 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":146,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"고밀도폴리에틸렌이나 이에 준하는 재질의 토목합성수지 라이너를 사용하는 경우 ㄱ. 두께 2.0밀리미터(지정폐기물을 매립하는 경우에는 2.5밀리미터) 이상의 것을 1겹 이상 포설(鋪設)할 것 ㄴ. 토목합성수지 라이너 하부에는 점토·점토광물혼합토 등 점토류를 다져 투수(透水)계수가 1초당 1천만분의 1센티미터 이하이고 두께가 50센티미터 이상(지정폐기물을 매립하는 경우에는 1미터 이상)인 라이너를 설치할 것. 다만, 매립시설 측면 및 내부 진입도로의 경사가 급하여 토목합성수지 라이너 하부에 점토류 라이너를 설치하는 것이 불가능하면 토목합성수지 라이너 하부에 같은 수준 이상의 차수효과를 가지는 토목합성수지 점토라이너 등으로 포설할 수 있다. ㄷ. 고밀도폴리에틸렌라이너 중 매끄러운 고밀도폴리에틸렌라이너를 사용하는 경우에는 아래 표(고밀도폴리에틸렌 라이너 기준)의 기준에 적합한 것을 사용할 것","answer":"고밀도폴리에틸렌·이에 준하는 토목합성수지 라이너 사용 시 두께 2.0mm(지정폐기물 매립 시 2.5mm) 이상의 라이너를 차수시설로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":147,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"점토·점토광물혼합토 등 점토류를 사용하는 경우 투수계수가 1초당 1천만분의 1센티미터 이하이고 두께가 1미터 이상(지정폐기물을 매립하는 경우에는 1.5미터 이상)인 라이너를 설치할 것","answer":"점토·점토광물혼합토 등 점토류 사용 시 투수계수 1×10⁻⁷cm/s 이하, 두께 1m 이상(지정폐기물 매립 시 2m 이상)의 차수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":148,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(3)","text":"그 밖의 차수재료를 사용하는 경우 (1)이나 (2)와 동등한 차수효과를 가지도록 차수시설을 설치할 것","answer":"그 밖의 차수재료 사용 시 (1)·(2)와 동등한 차수효과를 가지도록 차수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":149,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"나)","text":"그 밖에 다음의 기준에 적합하여야 한다.","answer":"나) 그 밖의 기준","tags":null,"_idx":151,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"매립시설 바닥의 차수시설 위(토목합성수지 라이너를 차수시설로 사용하는 경우에는 토목합성수지 라이너 위에 지오컴포지트·지오텍스타일 등을 설치한 후 그 위를 말한다)에는 침출수 집배수층(투수계수가 1초당 1백분의 1센티미터 이상이고 두께가 30센티미터 이상이어야 한다), 집배수관로 등 수평 집배수시설 및 수직집수정 등의 침출수 집배수시설을 설치할 것","answer":"매립시설 바닥 차수시설 위(토목합성수지 라이너 위에는 지오컴포지트·지오텍스타일 설치 후) 침출수 집·배수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":152,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"매립시설 측면에 토목합성수지 라이너로 차수시설을 설치한 경우에는 토목합성수지 라이너 위에 매립무게 상태에서 투과능(透過能)계수가 1초당 3만분의 1제곱미터 이상(빗물이 매립시설로 흘러들거나 떨어지는 것을 방지할 수 있는 시설을 설치한 경우는 제외한다)인 지오컴포지트·지오네트 또는 지오텍스타일 등 토목합성수지 배수층을 설치할 것","answer":"매립시설 측면에 토목합성수지 라이너 차수시설 설치 시 라이너 위에 매립무게 상태 투과능계수 1/30,000 cm/s 이상 보호층을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":153,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(3)","text":"매립시설 측면에 점토류 라이너로 차수시설을 설치한 경우에는  점토류 라이너 위에 투수계수(透水係數)가 1초당 1백분의 1센티미터 이상이고 두께가 30센티미터 이상인 모래 등을 포설할 것","answer":"매립시설 측면에 점토류 라이너 차수시설 설치 시 라이너 위에 투수계수 1/100 cm/s 이상, 두께 30cm 이상의 보호층을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":154,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(4)","text":"집배수관로의 주변에는 집배수관로가 막히지 아니하도록 충분한 공극(空隙)을 가지는 골재(골재의 최대치수는 50밀리미터 이하이어야 하며, 최소치수는 5밀리미터 체의 통과량이 5퍼센트 이하이어야 한다) 등을 설치할 것","answer":"집배수관로 주변에는 막힘 방지를 위한 충분한 공극을 가진 골재(최대치수 50mm 이하·최소치수 5mm 이상)를 사용하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":155,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(5)","text":"침출수집 배수시설의 바닥기울기는 2퍼센트 이상(침출수집 배수시설이 매립지 내외부의 침출수 이송시설과 연결되어 있어 침출수의 수위를 저감할 수 있는 경우에는 적용하지 아니한다)이 되도록 할 것","answer":"침출수집 배수시설 바닥기울기를 2퍼센트 이상으로 설치하겠음(외부 이송시설 연결로 수위 저감 시 예외).","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":156,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(6)","text":"환경기술검증을 받은 매립시설의 설치공법으로 토목합성수지 배수층 등을 설치할 필요가 없는 구조로 매립시설을 설치하는 경우에는 (1)부터 (5)까지의 규정을 적용하지 아니한다.","answer":"환경기술검증을 받은 매립시설 설치공법으로 토목합성수지 배수층 등 설치가 불요한 구조의 경우 (1)~(5) 기준 일부를 적용하지 않을 수 있음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":157,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"다)","text":"매립시설 바닥과 측면의 라이너 밑에는 주변에서 집수된 빗물 또는 지하수를 배제할 수 있는 시설을 설치하여야 한다. 다만, 빗물이 흘러들지 아니하거나 지하수가 발생하지 아니하는 지역에 매립시설을 설치하거나 빗물 또는 지하수배제시설을 설치할 필요가 없는 구조로 매립시설을 설치하는 경우에는 그러하지 아니하다.","answer":"매립시설 바닥·측면 라이너 밑에 주변 집수 빗물·지하수를 배제할 수 있는 시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":158,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"라)","text":"침출수량 등의 변동에 대응하기 위하여 침출수유량조정조를 설치하여야 하며, 침출수유량조정조는 최근 10년간 1일 강우량이 10밀리미터 이상인 강우일수 중 최다빈도의 1일 강우량의 7배 이상에 해당하는 침출수를 저장할 수 있는 규모로 설치하되, 유량조정조 내부를 방수처리하고 유량조정조 유입구에는 유량계를 설치하여야 한다.","answer":"침출수량 변동에 대응하기 위해 침출수유량조정조를 최근 10년간 1일 강우량 10mm 이상 강우일수의 평균치를 고려한 용량으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":159,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"마)","text":"침출수를 별표 11 제2호나목2)가)에 따른 배출허용기준 이하로 처리할 수 있는 시설을 설치해야 한다. 다만, 매립시설의 인근에 「물환경보전법」 제48조에 따른 공공폐수처리시설 또는 「하수도법」 제2조제9호에 따른 공공하수처리시설이 있는 경우에는 침출수 처리시설의 일부 또는 전부를 설치하지 않고, 공공폐수처리시설 또는 공공하수처리시설에서 처리하는 오염물질을 그 시설로 옮겨 처리하는 것을 원칙으로 하며, 다음의 경우에는 침출수 처리시설의 일부 또는 전부를 설치하지 않을 수 있다.","answer":"침출수를 별표11 제2호나목2)가) 배출허용기준 이하로 처리할 수 있는 침출수처리시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":160,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"다른 매립시설의 침출수 처리시설 및 「물환경보전법」 제2조제12호에 따른 수질오염방지시설(자가수질오염방지시설만 해당한다)에서 처리하는 오염물질을 그 시설로 옮겨 처리하거나 「물환경보전법」 제62조에 따른 폐수처리업자에게 위탁하여 처리하는 경우","answer":"다른 매립시설 침출수처리시설 또는 「물환경보전법」 자가수질오염방지시설에서 위탁 처리하는 경우 해당시설로 이송 처리하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":161,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"매립시설의 인근에 위치한 「하수도법」 제2조제11호에 따른 분뇨처리시설에서 처리하는 오염물질을 그 시설에 옮겨 처리하는 경우","answer":"매립시설 인근 「하수도법」 분뇨처리시설에서 처리하는 경우 해당시설로 이송 처리하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":162,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"바)","text":"매립시설의 주입관로[침출수 또는 침출수 처리시설에서 생물학적 처리 등을 거친 처리수(이하 “침출수 등”이라 한다)를 매립시설에 주입하는 경우만 해당한다] 및 침출수 처리시설 배출구에는 각각 유량계를 설치해야 한다.","answer":"매립시설 침출수 등 주입관로(주입하는 경우)는 매립층 함수율 적정 유지를 위해 설치하고 운영하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":163,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"사)","text":"유기성폐기물을 매립하여 가스가 발생하는 경우에는 매립시설에서 발생하는 가스를 모아 소각하는 등 처리시설을 설치하거나 발전·연료화처리시설 등의 활용시설을 설치하여야 한다.","answer":"유기성폐기물 매립으로 가스 발생 시 매립가스 포집·소각 처리시설 또는 발전·연료화처리시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":164,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"아)","text":"폐기물의 반입과정에서 차수시설 등의 손상을 방지할 수 있는 구조로 내부 진입도로를 설치하여야 한다. 다만, 물 등을 이용하여 폐기물을 운반하는 경우에는 그러하지 아니하다.","answer":"폐기물 반입과정에서 차수시설 손상 방지 구조로 내부 진입도로를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":165,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"자)","text":"침출수의 수위를 측정할 수 있는 시설은 매립시설 바닥에 설치한 차수시설 위의 가장 낮은 지점에 설치하여야 한다.","answer":"침출수 수위를 측정할 수 있는 시설을 매립시설 바닥 차수시설 위 가장 낮은 지점에 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":166,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"차)","text":"매립시설 중 일부구역을 정하여 폐석면을 매립할 때에는 다른 폐기물과 혼합되지 아니하도록 제방 등 적절한 구조나 설비를 갖추어야 한다.","answer":"폐석면 매립 시 다른 폐기물과 혼합되지 아니하도록 일부 구역을 정하여 제방 등 적절한 구조·설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":["51-31"],"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":167,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"카)","text":"발전ㆍ연료화처리시설을 설치ㆍ운영하는 생활폐기물 매립시설로서 폐기물 매립층의 높이가 6미터 이상인 매립시설의 경우에는 매립층의 적정 함수율(含水率)을 유지하기 위하여 주입관로, 주입펌프, 함수율 측정기 등 침출수 등을 매립시설에 주입할 수 있는 설비(이하 \"침출수매립시설환원정화설비\"라 한다)를 설치할 수 있다. 이 경우 다음 (1)부터 (4)까지의 방법 및 그 밖에 기후에너지환경부장관이 정하여 고시하는 방법에 따라 침출수매립시설환원정화설비를 설치하여야 한다.","answer":"발전·연료화처리시설을 설치·운영하는 생활폐기물 매립시설(매립층 6m 이상)은 매립층 적정 함수율 유지를 위한 시설(주입관로·함수율 측정장치 등)을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":168,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"주입관로는 침출수 등을 매립층에 골고루 주입할 수 있도록 최종복토층 아래의 매립층 내부에 수평 또는 수직으로 설치하여야 한다. 이 경우 발전ㆍ연료화처리시설용 가스배제관의 일부 또는 전부를 주입관로로 활용할 수 있다.","answer":"주입관로는 침출수 등을 매립층에 골고루 주입할 수 있도록 최종복토층 아래 매립층 내부에 수평·수직으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":169,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"매립층에는 매립층 함수율을 상시 측정할 수 있는 장치를 매립시설의 면적을 고려하여 설치하여야 한다.","answer":"매립층 함수율을 상시 측정할 수 있는 장치를 매립시설 면적을 고려하여 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":170,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(3)","text":"매립층 함수율 등이 안정적으로 유지될 수 있도록 침출수 등의 주입량을 조절하거나 주입관로 중 일부를 선택하여 개폐할 수 있는 구조로 설치하여야 한다.","answer":"매립층 함수율 안정 유지를 위해 침출수 주입량 조절·주입관로 일부 개폐가 가능한 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":171,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(4)","text":"침출수 등의 주입에 따라 매립가스 발생량이 증가하는 경우에는 매립가스가 외부로 배출되지 아니하도록 매립가스 포집시설을 추가로 설치하는 등의 조치를 하여야 한다.","answer":"침출수 등 주입에 따라 매립가스 발생량 증가 시 외부 배출 방지를 위해 매립가스 포집시설을 추가 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":172,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"타)","text":"매립시설 상부는 시설물 등으로 덮는 형태로 설치･운영해서는 안 된다. 다만, 매립시설 인근에 대규모 주거시설이 위치하거나 「환경영향평가법」 제25조에 따른 주민 등의 의견 수렴 결과 주변 환경 여건 등으로 매립시설 상부에 덮는 시설물 등의 설치가 불가피하다고 인･허가기관이 인정하는 경우에는 기후에너지환경부장관이 정하여 고시하는 설치기준에 따라 시설물 등을 설치할 수 있다.","answer":"매립시설 상부는 시설물 등으로 덮는 형태로 설치·운영하지 않겠음(인근 대규모 주거시설·환경영향평가 대상 등 예외 시에는 해당 기준 충족).","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":173,"_source":"b9"},{"depth":0,"type":"number","marker":"3.","text":"재활용시설의 경우","answer":"3. 재활용시설","tags":{"category":null,"bizType":["IR","CR","FR"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"isHeader":true,"_idx":174,"_source":"b9"},{"depth":1,"type":"korean","marker":"가.","text":"공통기준","answer":"가. 공통기준","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":175,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"폐기물이 흩날리거나 흘러나오는 것을 방지하는 데에 필요한 설비를 하여야 한다.","answer":"폐기물 흩날림·유출 방지에 필요한 설비를 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":176,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"폐기물의 재활용과정에서 발생하는 대기오염물질ㆍ수질오염물질 등을 처리할 수 있는 시설을 갖추어야 한다. 다만, 「물환경보전법 시행규칙」 별표 2 및 별표 3에 따른 수질오염물질 또는 특정수질유해물질을 「물환경보전법」 제62조에 따른 폐수처리업자에게 위탁 처리하는 경우와 매립시설의 침출수 처리시설, 「물환경보전법」 제2조제12호에 따른 수질오염방지시설(자가 수질오염 방지시설만 해당한다), 「물환경보전법」 제48조에 따른 공공폐수처리시설, 「하수도법」 제2조제9호에 따른 공공하수처리시설 또는 「하수도법」 제2조제11호에 따른 분뇨처리시설에서 처리하는 오염물질을 그 시설에 옮겨 처리하는 경우와 영 제5조에 따른 폐기물 재활용시설 중 혐기성분해시설에 유입하여 에너지를 생산(음식물류 폐기물을 재활용하는 과정에서 발생되는 경우만 해당한다)하는 경우에는 수질오염물질 처리시설의 일부 또는 전부를 갖추지 아니할 수 있다.","answer":"재활용과정에서 발생하는 대기오염물질·수질오염물질 등을 처리할 수 있는 시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":177,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"재활용시설의 바닥은 시멘트ㆍ아스팔트ㆍ우레탄ㆍ에폭시 등 물이 스며들지 아니하는 재료로 포장해야 한다.","answer":"재활용시설 바닥은 시멘트·아스팔트·우레탄·에폭시 등 물이 스며들지 아니하는 재료로 포장하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":178,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"음식물류 폐기물 재활용시설을 설치하는 때에는 음식물류 폐기물의 저장ㆍ투입ㆍ이송 및 재활용 등의 과정에서 발생하는 악취가 외부로 새어 나가지 아니하도록 밀폐된 구조로 설치하여야 하며, 발생되는 악취물질을 저감할 수 있는 별도의 시설을 갖추어야 한다.","answer":"음식물류 폐기물 재활용시설 설치 시 저장·투입·이송·재활용 과정 발생 악취가 외부로 새어 나가지 아니하도록 밀폐·악취방지시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-19"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":179,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"폐가전제품을 재활용하는 경우 다음 가)부터 라)까지의 규정에 적합한 시설을 갖추어야 한다.","answer":"폐가전제품 재활용 시 다음 ":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"]},"_idx":266,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"8)","text":"대기오염 방지시설 중 최초 집진시설(전기ㆍ여과집진시설이 설치되어 있는 경우에는 전기ㆍ여과집진시설을 최초 집진시설로 본다)에 유입되는 연소가스를 섭씨 200도 이하로 냉각시키기 위한 냉각시설 또는 폐열회수시설을 설치하여야 한다.","answer":"대기오염방지시설 중 최초 집진시설(전기·여과집진시설 우선)에 유입되는 연소가스를 섭씨 200도 이하로 냉각시키는 냉각시설 또는 폐열회수시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"]},"_idx":267,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"9)","text":"굴뚝에서 배출되는 가스중의 산소ㆍ먼지농도를 연속적으로 측정ㆍ기록할 수 있는 장치로서 「환경분야 시험ㆍ검사 등에 관한 법률」에 따라 형식승인 및 정도검사를 받은 것을 적합하게 설치하여야 하며, 대기오염방지시설의 입ㆍ출구 및 굴뚝에는 배출가스의 온도, 대기오염물질의 농도 등을 측정할 수 있는 측정공을 대기오염공정시험기준에 적합하게 설치하여야 한다.","answer":"굴뚝 배출가스 중 산소·먼지농도를 연속 측정·기록할 수 있는 형식승인된 자동측정기기를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"]},"_idx":268,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"10)","text":"폐기물 투입구 및 청소구는 고온에 견딜 수 있는 재질로 만들어야 하며, 외부공기가 흘러 들어오거나 연소가스가 새어 나가는 것을 방지할 수 있는 구조이어야 한다.","answer":"폐기물 투입구·청소구는 고온에 견디는 재질로 만들고 외부공기 유입 및 연소가스 누출 방지 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"]},"_idx":269,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"11)","text":"폐기물반입장ㆍ저장조 등에서 발생되는 악취가 재활용시설의 외부로 새어 나가는 것을 방지할 수 있는 시설을 설치하여야 한다.","answer":"폐기물 반입장·저장조 등 발생 악취가 외부로 새어 나가지 아니하도록 악취방지시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"]},"_idx":270,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"12)","text":"「대기환경보전법 시행규칙」 별표 8 제2호가목에 따른 총탄화수소(THC) 및 「잔류성유기오염물질 관리법 시행규칙」 별표3 제2호가목의 배출허용기준을 지킬 ,"text":"연소실ㆍ열분해실의 최종 출구에는 출구온도 측정공을 설치하고, 각 시설의 출구온도 기준보다 섭씨 300도 이상까지, 대기오염 방지시설 중 최초 집진시설의 입구에는 섭씨 600도 이상 측정할 수 있는 온도 지시계 및 온도변화를 연속적으로 기록할 수 있는 자동온도기록계를 붙여야 한다. 다만, 최초 집진시설의 입구에 붙여야 하는 온도 지시계 및 자동온도기록계의 경우 시간당 재활용능력이 2톤 이상인 시설의 경우만 해당한다.","answer":"연소실·열분해실 최종 출구에 출구온도 측정공을 설치하고, 출구온도 기준보다 섭씨 300도 이상 측정 가능한 온도지시계 및 자동기록장치를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":297,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"9)","text":"연소실ㆍ열분해실의 외부는 철판을 덮은 경우에는 본체의 고온부위를 내열도료로 칠하거나 단열처리 또는 내화단열벽돌, 캐스터블 내화물 등으로 시공하여 그 외부표면온도를 섭씨 80도 이하로 유지할 수 있는 구조여야 한다. 다만, 회전식시설 등 구조상 단열을 충분히 할 수 없는 경우는 제외한다.","answer":"연소실·열분해실 외부 철판 부위는 내열도료 칠하거나 단열처리하거나 내화단열벽돌·캐스터블내화물 등으로 시공하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":298,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"10)","text":"대기오염 방지시설 중 최초 집진시설(전기ㆍ여과집진시설이 설치되어 있는 경우에는 전기ㆍ여과집진시설을 최초 집진시설로 본다)에 흘러 들어오는 연소가스는 섭씨 200도 이하(시간당 재활용능력이 2톤 미만인 경우 섭씨 250도 이하)여야 한다.","answer":"대기오염방지시설 중 최초 집진시설(전기·여과집진시설 우선)에 흘러 들어오는 연소가스를 섭씨 200도 이하로 냉각시키는 냉각시설 또는 폐열회수시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":299,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"11)","text":"연소실(연소실이 둘 이상인 경우에는 최종 연소실)의 출구온도는 섭씨 850도 이상이어야 한다. 다만, 종이류 또는 접착제ㆍ폐페인트ㆍ기름 및 방부제 등이 묻어 있지 아니한 순수한 목재류만을 소각하는 경우에는 섭씨 450도 이상이어야 한다.","answer":"연소실(둘 이상인 경우 최종 연소실) 출구온도를 섭씨 850도 이상으로 유지하겠음(종이류·접착제·폐페인트·기름·방부제 등은 별도 기준).","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":300,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"12)","text":"연소실은 연소가스가 2초 이상(시간당 재활용능력이 2톤 미만인 경우에는 1초 이상) 체류할 수 있고, 충분하게 혼합될 수 있는 구조여야 한다. 이 경우 체류시간은 섭씨 850도(종이류 또는 접착제ㆍ폐페인트ㆍ기름 및 방부제 등이 묻어 있지 아니한 순수한 목재류만을 소각하는 경우 섭씨 450도 이상)에서의 부피로 환산한 연소가스의 체적으로 계산한다.","answer":"연소실은 연소가스가 2초 이상(시간당 재활용능력 2톤 미만은 1초 이상) 체류하고 충분히 혼합될 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":301,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"13)","text":"바닥재의 강열감량이 10퍼센트 이하가 될 수 있는 재활용 성능을 갖추어야 한다.","answer":"바닥재 강열감량이 10퍼센트 이하가 될 수 있는 재활용 성능을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":302,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"14)","text":"2차 연소실이 없는 연소방식 중 연속투입방식의 경우에는 폐기물을 투입할 연소실과 외부공기가 차단되도록 이중문 등의 구조여야 하며, 이 경우 연소실은 출구기준 온도 이상이 유지될 수 있는 구조여야 한다.","answer":"2차 연소실이 없는 연속투입방식의 경우 폐기물 투입 연소실과 외부공기가 차단되도록 이중문 등의 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":303,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"15)","text":"「대기환경보전법 시행령」 제17조에 따라 굴뚝 자동측정기기를 부착한 시설의 경우에는 「대기환경보전법 시행규칙」 제37조의 기준에 따라 굴뚝 자동측정기기를 운영ㆍ관리하여야 하며, 대기오염방지시설의 유입구와 유출구 및 굴뚝에는 배출가스의 온도, 대기오염물질의 농도 등을 측정할 수 있는 측정공을 대기오염공정시험기준에 적합하게 설치하여야 한다.","answer":"「대기환경보전법 시행령」 제17조에 따라 굴뚝 자동측정기기 부착 대상 시설은 같은 법 시행규칙 제37조 기준에 따라 굴뚝 자동측정기기를 부착하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":304,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"16)","text":"폐기물 투입구 및 청소구는 고온에 견딜 수 있는 재질로 만들어야 하며, 외부공기가 흘러 들어오거나 연소가스가 새어 나가는 것을 방지할 수 있는 구조여야 한다.","answer":"폐기물 투입구·청소구는 고온에 견디는 재질로 만들고 외부공기 유입 및 연소가스 누출 방지 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":305,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"17)","text":"내부의 연소상태를 볼 수 있는 구조여야 하며, 소각재를 제거할 때 재의 흩날림을 방지할 수 있는 구조여야 한다.","answer":"내부 연소상태를 확인할 수 있는 구조로 하고, 소각재 제거 시 재 흩날림을 방지할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":306,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"18)","text":"폐기물반입장ㆍ저장조 등에서 발생하는 악취가 재활용시설의 외부로 새어나가는 것을 방지할 수 있는 시설을 설치하여야 한다. 다만, 시간당 재활용능력이 2톤 미만인 시설인 경우에는 공기차단시설 등 간이시설을 설치할 수 있다.","answer":"폐기물 반입장·저장조 등 발생 악취가 외부로 새어 나가지 아니하도록 악취방지시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":307,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"19)","text":"「잔류성유기오염물질 관리법 시행규칙」 별표 3 제4호가목에 따른 소각시설에 대한 다이옥신 배출기준을 지킬 수 있는 시설을 설치하여야 한다.","answer":"「잔류성유기오염물질 관리법 시행규칙」 별표3 제4호가목 소각시설 다이옥신 배출기준을 지킬 수 있는 시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":308,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"20)","text":"제3조제1항제1호 각 목에 따른 에너지 회수기준에 적합하게 에너지를 열 또는 전기 등의 형태로 회수할 수 있는 설비(생산되는 에너지를 계량할 수 있는 설비를 포함한다)와 이를 스스로 이용하거나 다른 사람에게 공급할 수 있는 설비(에너지 이용자별로 계량할 수 있는 설비를 포함한다)를 기후에너지환경부장관이 정하여 고시하는 기준에 따라 각각 설치하여야 한다.","answer":"제3조제1항제1호 각 목 에너지 회수기준에 적합하게 에너지를 열·전기 등 형태로 회수할 수 있는 설비(에너지 계량장치 포함)를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":309,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"21)","text":"에너지를 회수ㆍ이용하는 설비에는 내부 온도와 압력의 변화를 감지할 수 있는 온도지시계ㆍ압력측정계 및 내부의 온도를 조절할 수 있는 장치를 설치하여야 한다.","answer":"에너지 회수·이용 설비에 내부 온도·압력 변화를 감지할 수 있는 온도지시계·압력측정계 및 내부 온도 조절 장치를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":310,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"22)","text":"허가ㆍ승인을 받거나 신고한 시간당 재활용능력을 초과하여 설치하여서는 아니 된다.","answer":"허가·승인·신고된 시간당 재활용능력을 초과하여 설치하지 않겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":311,"_source":"b9"},{"depth":1,"type":"korean","marker":"아.","text":"수은회수시설","answer":"아. 수은회수시설","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":null,"rCode":null,"facilityType":["MRC"]},"isHeader":true,"_idx":312,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"섭씨 600도 이상인 상태에서 수은폐기물을 배소(焙燒)할 수 있도록 가열장치(수은 회수과정에서 감압 상태를 유지할 수 있는 압력조절장치를 갖추고 있는 경우에는 섭씨 450도 이상인 상태에서 배소할 수 있는 가열장치를 말한다)를 갖춰야 한다.","answer":"섭씨 600도 이상에서 수은폐기물을 배소(焙燒)할 수 있는 가열장치(감압 상태 유지 압력조절장치 포함)를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["11"],"action":["RCY"],"rCode":["R3"],"facilityType":["MRC"]},"_idx":313,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"기화된 상태에서 수은을 회수하는 응축장치를 설치해야 한다.","answer":"기화된 상태에서 수은을 회수하는 응축장치를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["11"],"action":["RCY"],"rCode":["R3"],"facilityType":["MRC"]},"_idx":314,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"수은회수 공정 내부의 온도와 압력을 측정할 수 있는 장치를 설치해야 한다.","answer":"수은회수 공정 내부의 온도와 압력을 측정할 수 있는 장치를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RRE W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":["L"],"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":["MCR_SRT"]},"_idx":325,"_source":"b9"},{"depth":0,"type":"note-header","marker":"비고","text":"","answer":"비고","tags":null,"_idx":326,"_source":"b9"},{"depth":0,"type":"number","marker":"1.","text":"지정폐기물이 아닌 연소 잔재물 중 연탄재ㆍ석탄재, 폐유리, 수산물 가공과정에서 발생한 폐패각, 토사석광업 및 석제품제조업의 분쇄ㆍ세척ㆍ가공공정에서 발생하는 무기성오니류 중 석재ㆍ골재폐수처리오니, 폐석분토사 또는 폐석재, 건설폐재류(폐토사의 경우에는 용출시험 결과 별표 1의 유해물질 함유기준 이내인 경우 및 유기성분 등이 일반토양에 준하는 경우만 해당한다) 등의 폐기물로서 시·도지사가 침출수 발생이 없거나 발생하는 침출수가 항상 침출수배출허용기준 이하로 배출되어 수질오염방지가 필요하지 아니하다고 인정하는 폐기물만을 매립하려는 시설의 경우에는 차수시설, 집수시설, 침출수유량조정조, 침출수 처리시설, 가스소각시설 및 발전·연료화처리시설을 갖추지 아니할 수 있다.","answer":"지정폐기물이 아닌 연소 잔재물 중 연탄재·석탄재, 폐유리, 수산물 가공 폐패각, 토사석광업·석제품제조업의 분쇄·세척·가공 잔재물 등을 매립하는 경우 차수시설·집배수시설·침출수처리시설을 갖추지 아니할 수 있음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":327,"_source":"b9"},{"depth":0,"type":"number","marker":"2.","text":"무기성폐기물인 폐석고ㆍ폐석회ㆍ연소재ㆍ분진ㆍ폐주물사ㆍ폐사를 매립하는 경우에는 가스소각시설 및 발전·연료화시설을 갖추지 아니할 수 있다.","answer":"무기성폐기물인 폐석고·폐석회·연소재·분진·폐주물사·폐사를 매립하는 경우 가스소각시설 및 발전·연료화시설을 갖추지 아니할 수 있음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":328,"_source":"b9"},{"depth":0,"type":"number","marker":"3.","text":"전기분해 반응시설의 경우에는 제1호다목3)가) 및 다)에 따른 장치 및 설비를 갖추지 아니할 수 있다.","answer":"전기분해 반응시설의 경우 제1호다목3)가) 및 다)에 따른 장치 및 설비를 갖추지 아니할 수 있음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["CCD_RXN"]},"_idx":329,"_source":"b9"},{"depth":0,"type":"number","marker":"4.","text":"폐기물을 연료로 사용하지 않는 시멘트 소성로에 대하여는 제3호마목 중 (1), (5), (7)부터 (9)까지 및 (12)부터 (14)까지의 규정을 적용하지 아니한다.","answer":"폐기물을 연료로 사용하지 않는 시멘트 소성로에 대해서는 제3호마목 중 (1)·(5)·(7)~(9) 및 (12)~(14) 규정을 적용하지 아니할 수 있음.","tags":{"category":["W01","W02","W03"], const BTYPE_MAP = {"W01":{"IR":"폐기물중간재활용업","CR":"폐기물종합재활용업","FR":"폐기물최종재활용업","ID":"폐기물중간처분업","FD":"폐기물최종처분업","TR":"폐기물수집운반업"},"W02":{"RTR":"폐기물처리(수집운반) 신고","RREC":"폐기물처리(재활용) 신고"},"W03":{"DP":"폐기물처분·재활용시설 설치(승인)"},"W04":{"06":"사업장폐기물배출자 (별지 제6호서식)","07":"사업장폐기물배출자 (별지 제7호서식)","08":"사업장폐기물배출자 (별지 제8호서식)"},"W05":{"DP":"폐기물처분·재활용시설 설치(신고)"}};
const DOCTYPE_VALS = {"PL":"사업계획","CP":"사업변경계획","AP":"허가신청","CA":"변경허가신청","CR":"변경신고","RP":"신고"};
const DOCTYPE_BY_CAT = {"W01":["PL","CP","AP","CA","CR"],"W02":["RP","CR"],"W03":["AP","CA"],"W04":["RP","CR"],"W05":["RP","CR"]};

// ── 상태 ──────────────────────────────────────────────────────────
const state = {
  category: '', bizType: '', docType: '',
  wasteClass: '', wasteCode: '', physicalState: '',
  action: [], rCode: [], facilityType: [],
  approval: '0',
  sources: SOURCES.map(s => s.id),
};
let filteredItems = [];           // 통합 배열
let filteredBySource = {};        // { sourceId: [{item, fIdx}, ...] }
let selectedFIdxs = new Set();    // filteredItems 인덱스

// ── 코드 생성 ─────────────────────────────────────────────────────
function buildCode() {
  const wc  = state.wasteCode.trim() || '0';
  const act = state.action.length  ? state.action.join('+')       : '0';
  const rc  = state.rCode.length   ? state.rCode.join('+')        : '0';
  const ft  = state.facilityType.length ? state.facilityType.join('+') : '0';
  return [state.category||'?', state.bizType||'?', state.docType||'?',
          state.wasteClass||'?', wc, act, rc, ft, state.approval||'0'].join('-');
}

// ── 필터 ──────────────────────────────────────────────────────────
function matchTag(itemVal, stateVals) {
  if (itemVal === null || itemVal === undefined) return true;
  if (!stateVals || !stateVals.length) return true;
  return itemVal.some(v => stateVals.includes(v));
}

function normalizeWasteCodes(raw) {
  if (!raw || !raw.trim()) return [];
  return raw.trim().split('+').map(s => {
    s = s.trim();
    if (s.length === 4 && /^\d{4}$/.test(s)) return s.slice(0,2) + '-' + s.slice(2);
    return s;
  }).filter(Boolean);
}

function filterItems() {
  const userWasteCodes = normalizeWasteCodes(state.wasteCode);
  function passes(item) {
    if (/^삭제[\s<(]/.test(item.text || '')) return false;
    const t = item.tags;
    if (!matchTag(t.category,    state.category ? [state.category] : [])) return false;
    if (!matchTag(t.bizType,     state.bizType  ? [state.bizType]  : [])) return false;
    if (!matchTag(t.wasteClass,  state.wasteClass ? [state.wasteClass] : [])) return false;
    if (!matchTag(t.action,      state.action))    return false;
    if (!matchTag(t.facilityType, state.facilityType)) return false;
    if (!matchTag(t.rCode,       state.rCode))     return false;
    if (t.physicalState && state.physicalState && state.physicalState !== 'SL') {
      if (!t.physicalState.includes(state.physicalState)) return false;
    }
    if (t.wasteCode !== null && t.wasteCode !== undefined && userWasteCodes.length > 0) {
      const matches = t.wasteCode.some(ic =>
        userWasteCodes.some(uc => uc === ic || uc.startsWith(ic + '-') || ic.startsWith(uc + '-'))
      );
      if (!matches) return false;
    }
    return true;
  }

  // 1차: 일반 필터링
  const passedKeys = new Set();
  for (const sid of state.sources) {
    for (const item of (ITEMS_BY_SOURCE[sid] || [])) {
      if (passes(item)) passedKeys.add(sid + ':' + item._idx);
    }
  }

  // 2차: 답변 빈값 자식 자동 포함 — 부모(이전 더 낮은 depth 비-헤더 항목) 통과 시
  for (const sid of state.sources) {
    const allItems = ALL_BY_SOURCE_FOR_WORD[sid] || [];
    const parentByDepth = {};
    for (const item of allItems) {
      if (item.tags === null || item.isHeader) continue;
      if (!item.answer && item.tags) {
        for (let d = item.depth - 1; d >= 0; d--) {
          if (parentByDepth[d] !== undefined && passedKeys.has(sid + ':' + parentByDepth[d])) {
            passedKeys.add(sid + ':' + item._idx);
            break;
          }
        }
      }
      parentByDepth[item.depth] = item._idx;
      for (const d of Object.keys(parentByDepth)) {
        if (+d > item.depth) delete parentByDepth[d];
      }
    }
  }

  // 결과 수집 (원래 순서 유지)
  const result = [];
  for (const sid of state.sources) {
    for (const item of (ITEMS_BY_SOURCE[sid] || [])) {
      if (passedKeys.has(sid + ':' + item._idx)) result.push(item);
    }
  }
  return result;
}

// ── wasteVars 치환 ────────────────────────────────────────────────
function renderAnswer(item) {
  let text = item.answer || '';
  if (!item.tags || !item.tags.wasteVars) return escHtml(text);
  for (const [varName, codes] of Object.entries(item.tags.wasteVars)) {
    const display = '<span class="wastevar">' + escHtml(varName) + '(' + codes.join(',') + ')</span>';
    text = text.split('{' + varName + '}').join(display);
  }
  return text;
}

function plainAnswer(item) {
  let text = item.answer || '';
  if (!item.tags || !item.tags.wasteVars) return text;
  for (const [varName, codes] of Object.entries(item.tags.wasteVars)) {
    text = text.split('{' + varName + '}').join(varName + '(' + codes.join(',') + ')');
  }
  return text;
}

// ── 유틸 ──────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function tagPill(label, cls) {
  return '<span class="tag-pill ' + (cls||'') + '">' + escHtml(label) + '</span>';
}

// ── 렌더 ──────────────────────────────────────────────────────────
function renderItems() {
  const container = document.getElementById('items-container');
  if (!filteredItems.length) {
    container.innerHTML = '<div style="color:#aaa;text-align:center;margin-top:60px">조건에 맞는 항목이 없습니다.</div>';
    document.getElementById('result-count').textContent = '결과: 0건';
    updateSelectedCount();
    return;
  }
  document.getElementById('result-count').textContent = '결과: ' + filteredItems.length + '건 (' + Object.keys(filteredBySource).length + '개 별표)';

  let html = '';
  for (const sid of SOURCES.map(s=>s.id)) {
    const list = filteredBySource[sid];
    if (!list || !list.length) continue;
    const meta = SOURCE_TITLE_MAP[sid];
    html += '<div class="source-group">';
    html += '<div class="source-header">';
    html += '<div><span>' + escHtml(meta.short) + '</span><span class="src-meta">' + escHtml(meta.subtitle) + ' · ' + list.length + '건</span></div>';
    html += '<div class="src-actions">';
    html += '<button class="btn btn-secondary" onclick="selectGroup(\'' + sid + '\', true)">전체</button>';
    html += '<button class="btn btn-secondary" onclick="selectGroup(\'' + sid + '\', false)">해제</button>';
    html += '</div></div>';

    for (const { item, fIdx } of list) {
      const isSel = selectedFIdxs.has(fIdx);
      const tags = item.tags || {};
      const actionPills = tags.action ? tags.action.map(a => tagPill(a,'action')).join('') : '';
      const ftPills = tags.facilityType ? tags.facilityType.map(f => tagPill(FT_LABEL[f]||f,'facility')).join('') : '';
      html += '<div class="item-card' + (isSel ? ' selected' : '') + '" id="item-' + fIdx + '">' +
        '<div class="item-header" onclick="toggleCard(' + fIdx + ')">' +
          '<input type="checkbox" class="item-cb" ' + (isSel?'checked':'') + ' onclick="event.stopPropagation();toggleSelect(' + fIdx + ')">' +
          '<span class="item-marker">' + escHtml(item.marker || '') + '</span>' +
          '<span class="item-text">' + escHtml(item.text || '') + '</span>' +
        '</div>' +
        '<div class="item-answer">' + renderAnswer(item) + '</div>' +
        '<div class="item-tags">' + actionPills + ftPills + '</div>' +
      '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
  updateSelectedCount();
}

function toggleCard(fIdx) {
  const el = document.getElementById('item-' + fIdx);
  if (el) el.classList.toggle('open');
}

function toggleSelect(fIdx) {
  if (selectedFIdxs.has(fIdx)) selectedFIdxs.delete(fIdx);
  else selectedFIdxs.add(fIdx);
  const el = document.getElementById('item-' + fIdx);
  if (el) el.classList.toggle('selected', selectedFIdxs.has(fIdx));
  updateSelectedCount();
}

function selectGroup(sid, on) {
  const list = filteredBySource[sid] || [];
  for (const { fIdx } of list) {
    if (on) selectedFIdxs.add(fIdx);
    else selectedFIdxs.delete(fIdx);
  }
  renderItems();
}

function updateSelectedCount() {
  document.getElementById('selected-count').textContent = '선택된 항목: ' + selectedFIdxs.size + '개';
}

// ── 내보내기 텍스트 생성 ──────────────────────────────────────────
function buildExportText() {
  const code = buildCode();
  const lines = ['[준수계획서 검토 항목]', '상황코드: ' + code, '생성일시: ' + new Date().toLocaleString('ko-KR'), ''];
  // source 별로 그룹핑
  const bySource = {};
  for (const fIdx of [...selectedFIdxs].sort((a,b)=>a-b)) {
    const item = filteredItems[fIdx];
    if (!item) continue;
    if (!bySource[item._source]) bySource[item._source] = [];
    bySource[item._source].push(item);
  }
  for (const sid of SOURCES.map(s=>s.id)) {
    const items = bySource[sid];
    if (!items || !items.length) continue;
    const meta = SOURCE_TITLE_MAP[sid];
    lines.push('━━━ ' + meta.short + ' — ' + meta.subtitle + ' ━━━');
    items.forEach((item, n) => {
      lines.push((n+1) + '. ' + (item.marker ? item.marker + ' ' : '') + item.text);
      lines.push('   → ' + plainAnswer(item));
      lines.push('');
    });
  }
  return lines.join('\n');
}

// ── Word 내보내기 ────────────────────────────────────────────────
async function exportToWord() {
  if (!selectedFIdxs.size) { alert('내보낼 항목을 선택해주세요.'); return; }
  if (typeof docx === 'undefined') { alert('docx 라이브러리 로드 중입니다. 잠시 후 다시 시도해주세요.'); return; }

  const { Document, Packer, Table, TableRow, TableCell, Paragraph, TextRun,
          WidthType, AlignmentType, BorderStyle, PageOrientation } = docx;

  const OUTER = { style: BorderStyle.THICK,  size: 12, color: '000000' };
  const INNER = { style: BorderStyle.SINGLE, size: 6,  color: '000000' };
  const NIL   = { style: BorderStyle.NIL };
  const tableBorders = { top: OUTER, bottom: OUTER, left: OUTER, right: OUTER, insideH: NIL };

  // 선택을 source별로 묶기
  const selectedBySource = {};
  for (const fIdx of selectedFIdxs) {
    const item = filteredItems[fIdx];
    if (!item) continue;
    if (!selectedBySource[item._source]) selectedBySource[item._source] = new Set();
    selectedBySource[item._source].add(item._idx);
  }

  const code = buildCode();
  const docChildren = [];

  function headerRow(meta) {
    const p1 = [new TextRun({ text: meta.title, bold: true, size: 18 })];
    p1.push(new TextRun({ text: '  <' + code + '>', color: '1d4ed8', size: 16 }));
    return new TableRow({
      children: [new TableCell({
        columnSpan: 2,
        borders: { bottom: INNER },
        children: [new Paragraph({ children: p1 }),
                   new Paragraph({ alignment: AlignmentType.CENTER,
                     children: [new TextRun({ text: meta.subtitle, bold: true, size: 22 })] })]
      })]
    });
  }

  function subHeaderRow() {
    return new TableRow({ children: [
      new TableCell({ borders: { bottom: INNER, right: INNER }, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: '기준', bold: true, size: 21 })] })] }),
      new TableCell({ borders: { bottom: INNER }, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: '준수계획', bold: true, size: 21 })] })] })
    ]});
  }

  function buildDataRow(r, isLast) {
    const bL = isLast ? { top: NIL, right: INNER } : { top: NIL, bottom: NIL, right: INNER };
    const bR = isLast ? { top: NIL }               : { top: NIL, bottom: NIL };
    const indent = r.depth ? { left: r.depth * 150 } : undefined;
    return new TableRow({ children: [
      new TableCell({ borders: bL, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({ indent,
          children: [new TextRun({ text: r.leftText, bold: r.isHeader, size: r.isHeader ? 21 : 20 })] })] }),
      new TableCell({ borders: bR, width: { size: 50, type: WidthType.PERCENTAGE },
        children: [new Paragraph({
          children: [new TextRun({ text: r.rightText, color: r.isNA ? '888888' : '000000', size: 20 })] })] })
    ]});
  }

  function buildTableForSource(sid) {
    const meta = SOURCE_TITLE_MAP[sid];
    const allForWord = (ALL_BY_SOURCE_FOR_WORD[sid] || []).filter(i => !i.noWord);
    const selectedOrigIdx = selectedBySource[sid] || new Set();
    if (!selectedOrigIdx.size) return null;

    const isSectionHeader = item => item.isHeader || (item.tags === null);

    // 답변 빈값 자식 자동 포함: 부모(이전 더 낮은 depth 비-헤더 항목)가 선택되면 자식도 자동 포함
    // — (가)(나)(다) 같이 부모 (2)에 답변이 통합된 자식들이 카드 필터에서 떨어져도 Word에는 본문이 따라가도록
    {
      const parentByDepth = {};
      for (const item of allForWord) {
        if (isSectionHeader(item)) continue;
        if (!item.answer && item.tags) {
          for (let d = item.depth - 1; d >= 0; d--) {
            if (parentByDepth[d] !== undefined && selectedOrigIdx.has(parentByDepth[d])) {
              selectedOrigIdx.add(item._idx);
              break;
            }
          }
        }
        parentByDepth[item.depth] = item._idx;
        for (const d of Object.keys(parentByDepth)) {
          if (+d > item.depth) delete parentByDepth[d];
        }
      }
    }

    // 섹션 헤더(isHeader) 태그가 현재 필터와 매칭되는지 판단
    // 매칭 안 되면 섹션 자체를 Word 출력에서 제외 (법령 조문 구조상 우리 업체와 무관)
    function sectionMatchesFilter(item) {
      if (!item.isHeader || !item.tags) return true;
      const t = item.tags;
      const userCodes = normalizeWasteCodes(state.wasteCode);
      if (!matchTag(t.category,    state.category ? [state.category] : [])) return false;
      if (!matchTag(t.bizType,     state.bizType  ? [state.bizType]  : [])) return false;
      if (!matchTag(t.wasteClass,  state.wasteClass ? [state.wasteClass] : [])) return false;
      if (!matchTag(t.action,      state.action)) return false;
      if (!matchTag(t.facilityType, state.facilityType)) return false;
      if (!matchTag(t.rCode,       state.rCode)) return false;
      if (t.wasteCode && t.wasteCode.length && userCodes.length) {
        const matches = t.wasteCode.some(ic =>
          userCodes.some(uc => uc === ic || uc.startsWith(ic + '-') || ic.startsWith(uc + '-'))
        );
        if (!matches) return false;
      }
      // wasteCodeExclude: 사용자 코드가 전부 제외 목록에 들어가면 섹션 제외
      if (t.wasteCodeExclude && t.wasteCodeExclude.length && userCodes.length) {
        const allExcluded = userCodes.every(uc =>
          t.wasteCodeExclude.some(ec => uc === ec || uc.startsWith(ec + '-'))
        );
        if (allExcluded) return false;
      }
      return true;
    }

    // depth=0 섹션 중 선택 항목이 전혀 없는 섹션 파악 → 헤더+해당없음만 출력
    const emptyTopSectionIdx = new Set();
    {
      let curTopIdx = null, curTopHas = false;
      for (const item of allForWord) {
        if ((item.tags === null || item.isHeader) && item.depth === 0) {
          if (curTopIdx !== null && !curTopHas) emptyTopSectionIdx.add(curTopIdx);
          curTopIdx = item._idx; curTopHas = false;
        } else if (!item.isHeader && item.tags !== null && selectedOrigIdx.has(item._idx)) {
          curTopHas = true;
        }
      }
      if (curTopIdx !== null && !curTopHas) emptyTopSectionIdx.add(curTopIdx);
    }

    const wordRows = [];
    let pendingHeader = null;
    let sectionHasItems = false;
    let inEmptyTopSection = false;
    let inSkippedSection = false;  // 섹션 헤더 태그가 필터와 안 맞아 통째로 스킵

    function flushPendingHeader(header, isNA = false) {
      const text = (header.marker ? header.marker + ' ' : '') + (header.text || '');
      wordRows.push({ leftText: text, rightText: isNA ? '해당하지 않으므로 기재하지 않음' : '', depth: header.depth, isHeader: true, isNA });
    }

    for (const item of allForWord) {
      if (isSectionHeader(item)) {
        if (item.depth === 0) {
          // 이전 섹션 마감
          if (pendingHeader !== null && !sectionHasItems && !inEmptyTopSection && !inSkippedSection) {
            flushPendingHeader(pendingHeader, true);
          }
          pendingHeader = null; sectionHasItems = false;

          // 섹션 필터 매칭 체크 — 안 맞으면 섹션 통째로 Word에서 제외
          if (item.isHeader && !sectionMatchesFilter(item)) {
            inSkippedSection = true;
            inEmptyTopSection = false;
            continue;
          }
          inSkippedSection = false;

          if (emptyTopSectionIdx.has(item._idx)) {
            flushPendingHeader(item, true);
            inEmptyTopSection = true;
          } else {
            inEmptyTopSection = false;
            pendingHeader = item;
          }
        } else {
          if (inEmptyTopSection || inSkippedSection) continue;
          if (pendingHeader !== null && !sectionHasItems) {
            flushPendingHeader(pendingHeader, pendingHeader.depth > 0);
          }
          pendingHeader = item;
          sectionHasItems = false;
        }
      } else {
        if (inEmptyTopSection || inSkippedSection) continue;
        if (!selectedOrigIdx.has(item._idx)) continue;
        if (pendingHeader !== null) {
          flushPendingHeader(pendingHeader);
          pendingHeader = null;
        }
        let answerText = item.answer || '';
        if (item.tags && item.tags.wasteVars) {
          for (const [varName, codes] of Object.entries(item.tags.wasteVars)) {
            answerText = answerText.split('{' + varName + '}').join(varName + '(' + codes.join(',') + ')');
          }
        }
        wordRows.push({
          leftText: (item.marker ? item.marker + ' ' : '') + (item.text || ''),
          rightText: answerText,
          depth: item.depth,
          isHeader: false
        });
        sectionHasItems = true;
      }
    }
    if (pendingHeader !== null && !sectionHasItems && !inEmptyTopSection && !inSkippedSection) {
      flushPendingHeader(pendingHeader, pendingHeader.depth > 0);
    }

    if (!wordRows.length) return null;

    const rows = wordRows.map((r, i) => buildDataRow(r, i === wordRows.length - 1));
    return new Table({
      width: { size: 100, type: WidthType.PERCENTAGE },
      borders: tableBorders,
      rows: [headerRow(meta), subHeaderRow(), ...rows]
    });
  }

  // SOURCES 순서대로 별표별 테이블 생성
  for (const src of SOURCES) {
    const tbl = buildTableForSource(src.id);
    if (!tbl) continue;
    if (docChildren.length) {
      docChildren.push(new Paragraph({ text: '', spacing: { before: 200, after: 200 } }));
    }
    docChildren.push(tbl);
  }

  if (!docChildren.length) { alert('생성할 내용이 없습니다.'); return; }

  const doc = new Document({ sections: [{ children: docChildren }] });
  const blob = await Packer.toBlob(doc);
  const safeCode = code.replace(/[^A-Za-z0-9_+\-]/g,'');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'compliance_' + safeCode + '.docx';
  a.click();
}

// ── 전체 보기 모달 ────────────────────────────────────────────────
(function() {
  const modal = document.getElementById('all-view-modal');
  const content = document.getElementById('all-view-content');
  const srcSelect = document.getElementById('av-filter-src');
  const noAnswerToggle = document.getElementById('av-no-answer-toggle');
  const avCount = document.getElementById('av-count');

  // 태그 한글 변환 맵
  const CLASS_KO  = {D:'지정폐기물', GO:'사업장(배출시설계)', GN:'사업장(비배출시설계)', L:'생활폐기물'};
  const ACTION_KO = {CT:'수집·운반', ST:'보관', MI:'중간처분', FI:'최종처분', RCY:'재활용'};
  const STATE_KO  = {S:'고상', L:'액상', SL:'고상+액상'};
  const CAT_KO    = {W01:'처리업 허가', W02:'처리 신고', W03:'시설 설치 승인', W04:'배출자 신고', W05:'시설 설치 신고'};

  function buildTagsHtml(it) {
    const t = it.tags || {};
    const parts = [];

    // wasteClass
    const wc = [].concat(t.wasteClass || []).filter(Boolean);
    if (wc.length) parts.push(wc.map(v => CLASS_KO[v] || v).join(' · '));

    // wasteCode — 숫자 코드만
    const codes = [].concat(t.wasteCode || []).filter(Boolean);
    if (codes.length) parts.push(codes.join(', '));

    // action
    const act = [].concat(t.action || []).filter(Boolean);
    if (act.length) parts.push(act.map(v => ACTION_KO[v] || v).join(' · '));

    // physicalState
    const ps = [].concat(t.physicalState || []).filter(Boolean);
    if (ps.length) parts.push(ps.map(v => STATE_KO[v] || v).join('+'));

    // category
    const cat = [].concat(t.category || []).filter(Boolean);
    if (cat.length) parts.push(cat.map(v => CAT_KO[v] || v).join(' · '));

    // rCode
    const rc = [].concat(t.rCode || []).filter(Boolean);
    if (rc.length) parts.push(rc.join(' · '));

    if (!parts.length) return '';
    return '<div class="av-tags">' + parts.map(p => '<span>' + p + '</span>').join('') + '</div>';
  }

  // SOURCES + ITEMS_BY_SOURCE 구조 활용
  SOURCES.forEach(function(src) {
    const opt = document.createElement('option');
    opt.value = src.id;
    opt.textContent = src.title.replace('■ 폐기물관리법 시행규칙 ', '');
    srcSelect.appendChild(opt);
  });

  function renderAll() {
    const filterSrc = srcSelect.value;
    const hideNoAnswer = noAnswerToggle.checked;
    content.innerHTML = '';
    let total = 0;

    SOURCES.forEach(function(src) {
      if (filterSrc && src.id !== filterSrc) return;
      const allRows = ITEMS_BY_SOURCE[src.id] || [];
      const rows = allRows.filter(function(it) {
        return !(hideNoAnswer && !it.answer);
      });
      if (!rows.length) return;
      total += rows.length;

      const block = document.createElement('div');
      block.className = 'av-source-block';
      block.innerHTML = '<div class="av-source-title">' + src.title + ' — ' + src.subtitle + '</div>';

      const table = document.createElement('table');
      table.className = 'av-table';
      table.innerHTML = '<thead><tr><th style="width:36px">번호</th><th>법령 기준</th><th>준수계획서 답변</th></tr></thead>';
      const tbody = document.createElement('tbody');

      rows.forEach(function(it) {
        const tr = document.createElement('tr');
        const ans = it.answer || '';
        const tagsHtml = buildTagsHtml(it);
        tr.innerHTML =
          '<td class="av-marker">' + (it.marker || '') + '</td>' +
          '<td class="av-text">' + (it.text || '') + tagsHtml + '</td>' +
          '<td class="av-answer' + (ans ? '' : ' empty') + '">' + (ans || '(답변 없음)') + '</td>';
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      block.appendChild(table);
      content.appendChild(block);
    });

    avCount.textContent = '총 ' + total + '건';
  }

  document.getElementById('btn-all-view').addEventListener('click', function() {
    renderAll();
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  });

  document.getElementById('btn-close-all').addEventListener('click', function() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  });

  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    }
  });

  srcSelect.addEventListener('change', renderAll);
  noAnswerToggle.addEventListener('change', renderAll);
})();
</script>
</body>
</html>
