},{"depth":1,"type":"number","marker":"2.","text":"기술능력 중 기사는 같은 종류의 산업기사 자격을 가지고 해당 분야에 2년 이상 종사한 자로 대체할 수 있으며, 산업기사는 환경기능사 자격을 가지고 해당 분야에서 2년 이상 종사한 자로 대체할 수 있다.","answer":"기사는 동종 산업기사 자격 + 해당분야 2년 이상 종사자, 산업기사는 환경기능사 자격 + 해당분야 2년 이상 종사자로 대체 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":235,"_source":"b7"},{"depth":1,"type":"number","marker":"3.","text":"실험기기·기구에 관한 허가요건 중 시·도지사 또는 지방환경관서의 장이 해당 업종 또는 영업대상폐기물을 고려하여 필요하지 아니하다고 인정하면 그 실험기기 및 기구의 일부를 갖추지 아니하게 할 수 있다.","answer":"시·도지사 또는 지방환경관서장이 해당 업종·영업대상폐기물 고려 시 실험기기·기구 일부 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":236,"_source":"b7"},{"depth":1,"type":"number","marker":"4.","text":"수집·운반차량 외의 장비, 세차시설 및 사업장 부지는 임차(임차계약서는 임차기간을 3년 이상으로 하여 공증을 받아야 한다)하여 사용할 수 있으며, 실험실·실험기구에 관한 허가요건 중 측정항목 각각에 대하여 「환경분야 시험·검사 등에 관한 법률」 제16조에 따른 측정대행업자가 갖추어야 할 시설·장비 등을 갖춘 측정대행자 또는 국가공인시험기관과 대행계약을 한 경우에는 해당 항목의 측정에 필요한 실험기기·실험기구·장비를 갖추지 아니할 수 있으며, 전체 항목에 대하여 대행계약을 한 경우에는 실험실 및 실험기기·기구·장비를 갖추지 아니할 수 있다.","answer":"수집·운반차량 외 장비·세차시설·사업장 부지는 임차(3년 이상 공증) 사용 가능, 측정대행업자·국가공인시험기관과 대행계약 시 해당 항목 실험기기·기구·장비 면제 가능, 전체 항목 대행 시 실험실 자체 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":237,"_source":"b7"},{"depth":1,"type":"number","marker":"5.","text":"허가요건 중 1일 처리능력은 연속식시설의 경우에는 24시간, 준연속식시설의 경우에는 16시간, 비연속식시설의 경우에는 8시간을 기준으로 산정한다. 다만, 파쇄시설의 경우에는 8시간을 기준으로 산정한다.","answer":"1일 처리능력 산정: 연속식 24시간, 준연속식 16시간, 비연속식 8시간(파쇄시설은 8시간)을 기준으로 함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":238,"_source":"b7"},{"depth":1,"type":"number","marker":"6.","text":"허가요건 중 폐기물배출사업장으로부터 밀폐된 배관을 통하여 폐기물을 폐기물처리시설로 이송하는 경우와 시·도지사나 지방환경관서의 장의 인정을 받아 위탁받은 폐기물을 보관하지 아니하고 곧바로 폐기물 재활용시설로 운반하는 경우에는 보관시설을 갖추지 아니할 수 있다.","answer":"폐기물배출사업장에서 밀폐 배관으로 처리시설 이송 또는 시·도지사·지방환경관서장 인정 시 보관 없이 곧바로 재활용시설 운반 시 보관시설 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":239,"_source":"b7"},{"depth":1,"type":"number","marker":"7.","text":"고온소각 처분대상폐기물의 중간처분업을 하기 위하여 고온소각시설을 갖춘 자는 그 시설을 이용하여 일반소각 처분대상폐기물을 처분할 수 있다.","answer":"고온소각시설을 갖춘 자는 그 시설로 일반소각 처분대상폐기물도 처분 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_H"],"bizType":["ID"]},"_idx":240,"_source":"b7"},{"depth":1,"type":"number","marker":"8.","text":"장비요건 중 운반차량에 대하여는 해당 허가권자가 다음 각 목의 기준에 따라 다른 차량으로 대체하게 하거나 차량의 일부를 갖추게 하지 아니할 수 있다.","answer":"운반차량 요건은 허가권자가 아래 가.~라. 기준에 따라 다른 차량으로 대체하거나 일부 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":241,"_source":"b7"},{"depth":2,"type":"korean","marker":"가.","text":"폐기물 수집·운반업의 수집·운반차량에 대해서는 영업대상 폐기물 및 운반방법 등을 고려하여 전용차량 수량의 2분의 1 범위 내에서 수집·운반이 가능한 차량의 종류 중 다른 종류의 차량으로 대체할 수 있다.","answer":"폐기물 수집·운반업 차량은 영업대상·운반방법 고려 전용차량 수량의 1/2 범위 내에서 다른 종류 차량으로 대체 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":242,"_source":"b7"},{"depth":2,"type":"korean","marker":"나.","text":"생활폐기물을 수집·운반하는 경우에는 밀폐형 압축·압착차량을 제외한 차량을 갖추게 하지 아니할 수 있다.","answer":"생활폐기물 수집·운반 시 밀폐형 압축·압착차량 외 차량 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":["L","GN"],"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":243,"_source":"b7"},{"depth":2,"type":"korean","marker":"다.","text":"생활폐기물 또는 사업장비배출시설계 폐기물 중 폐목재류(접착제, 페인트, 기름, 콘크리트 등으로 오염되지 않은 것만 해당한다), 대형폐기물(「자원의 절약과 재활용촉진에 관한 법률」 제2조제13호에 따른 대형폐기물을 말한다) 또는 음식물류 폐기물만 수집ㆍ운반하는 경우에는 밀폐형 압축ㆍ압착차량을 밀폐형 차량 또는 밀폐형 덮개 설치차량으로 대체할 수 있다.","answer":"생활폐기물·사업장비배출시설계 폐기물 중 폐목재류(미오염)·대형폐기물·음식물류만 수집·운반 시 밀폐형 압축·압착차량을 밀폐형 차량 또는 밀폐형 덮개 설치차량으로 대체 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":["L","GN"],"wasteCode":["51-20","51-38","91-02","91-10"],"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":244,"_source":"b7"},{"depth":2,"type":"korean","marker":"라.","text":"사업장비배출시설계 폐기물을 수집ㆍ운반하는 경우로서 의료기관 일회용기저귀만을 수집ㆍ운반하는 경우에는 밀폐형 압축ㆍ압착차량 및 밀폐형 차량 또는 밀폐형 덮개 설치차량을 갖추게 하지 않을 수 있다.","answer":"사업장비배출시설계 폐기물 중 의료기관 일회용기저귀만 수집·운반 시 밀폐형 압축·압착차량 및 밀폐형(덮개) 차량 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":["GN"],"wasteCode":["51-46"],"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":245,"_source":"b7"},{"depth":1,"type":"number","marker":"9.","text":"「건설폐기물의 재활용촉진에 관한 법률 시행규칙」 별표 2에 따른 건설폐기물의 처리를 위한 시설·장비 등을 갖춘 자는 비고란 제1호 단서의 규정에도 불구하고 공사장생활폐기물의 처리를 위한 시설·장비 등을 갖춘 자로 본다.","answer":"「건설폐기물의 재활용촉진법 시행규칙」 별표2 기준 시설·장비를 갖춘 자는 비고 1호 단서에도 불구하고 공사장생활폐기물 처리 시설·장비를 갖춘 자로 봄을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":246,"_source":"b7"},{"depth":1,"type":"number","marker":"10.","text":"영 제2조 각 호에 따른 사업장에서 발생하는 사업장비배출시설계 폐기물로서 생활폐기물과 성질과 상태가 비슷하여 생활폐기물의 기준 및 방법으로 수집·운반할 수 있는 경우에는 특별자치시, 특별자치도, 시·군·구의 조례가 정하는 바에 따라 생활폐기물수집·운반업자가 수집·운반할 수 있다.","answer":"영 제2조 사업장에서 발생하는 사업장비배출시설계 폐기물로서 생활폐기물과 성질·상태가 비슷하여 생활폐기물 기준·방법으로 수집·운반 가능한 경우, 지자체 조례에 따라 생활폐기물수집·운반업자가 수집·운반 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":["L","GN"],"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":247,"_source":"b7"},{"depth":1,"type":"number","marker":"11.","text":"별표 5 제2호가목5)에 해당하는 경우 장비 및 사무실(또는 연락장소)에 관한 기준은 제1호가목에 따른 장비 및 사무실(또는 연락장소)에 관한 기준으로 한다.","answer":"별표 5 제2호가목5)에 해당하는 경우 장비 및 사무실(연락장소) 기준은 제1호가목 기준을 적용함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":["L","GN"],"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":248,"_source":"b7"},{"depth":1,"type":"number","marker":"12.","text":"폐기물을 재활용하는 자 중 제10조에 따라 재활용시설이 필요하지 아니하다고 시·도지사가 인정하는 경우에는 재활용시설 및 기술능력의 전부 또는 일부를 갖추지 아니할 수 있다.","answer":"제10조에 따라 재활용시설이 필요하지 아니하다고 시·도지사가 인정하는 경우 재활용시설·기술능력 전부 또는 일부 면제 가능함을 숙지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":249,"_source":"b7"}],"b8":[{"depth":1,"type":"korean","marker":"가.","text":"폐기물처리업자는 폐기물수집·운반 전용차량 및 임시차량 외의 차량으로 폐기물을 수집·운반하여서는 아니되며, 같은 차량에 폐기물과 폐기물 외의 물건을 함께 실어서는 아니 된다. 다만, 폐기물의 수집·운반에 필요한 장비 등은 그러하지 아니하다.","answer":"폐기물수집·운반 전용차량 및 임시차량 외의 차량으로 폐기물을 수집·운반하지 않고, 같은 차량에 폐기물과 폐기물 외의 물건을 함께 싣지 않겠음(수집·운반에 필요한 장비는 제외).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":2,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"폐기물처리업자는 폐기물의 처리를 위탁한 자와 상호·소재지·대표자 및 위탁계약기간, 폐기물의 종류별 수량, 폐기물의 성질과 상태 및 취급 시 주의사항, 폐기물의 종류별 운반장소(출발지 및 도착지) 및 운반단가 또는 운반비(운반의 경우만 해당한다), 폐기물의 종류별 처분 또는 재활용장소와 처분 또는 재활용방법 및 처분 또는 재활용단가나 처분 또는 재활용비(처분 또는 재활용의 경우만 해당한다) 등의 내용을 기재한 폐기물 위(수)탁운반(처리)계약서를 작성·체결하여야 하고, 그 계약서를 3년간 보관하여야 한다. 다만, 폐기물처리업자가 배출자와 하나의 계약서로 동시에 폐기물의 처리의 위탁계약을 체결하는 경우에는 운반단가와 처분단가 또는 재활용단가를 구분하여 기재하여야 한다.","answer":"위탁자 상호·소재지·대표자·계약기간, 폐기물 종류별 수량·성질·취급주의사항, 운반장소(출발지·도착지)·운반단가, 처분/재활용 장소·방법·단가 등을 기재한 위(수)탁운반(처리)계약서를 작성·체결하고 3년간 보관하겠음(배출자와 동시 계약 시 운반·처분·재활용 단가 구분 기재).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":3,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"폐기물처리업자는 위탁받은 폐기물을 처리하는 경우 환경오염이 발생하지 아니하도록 하여야 한다.","answer":"위탁받은 폐기물을 처리하는 경우 환경오염이 발생하지 않도록 하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":4,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"폐기물처리업자가 폐기물의 처리를 위탁받은 경우에는 제16조의12제1호에 따른 위탁자별로 수탁처리능력확인서 등을 보내야 한다.","answer":"폐기물 처리를 위탁받은 경우 제16조의12제1호에 따라 위탁자별로 수탁처리능력확인서 등을 보내겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":5,"_source":"b8"},{"depth":1,"type":"korean","marker":"마.","text":"폐기물처리업자는 수탁처리능력확인서, 폐기물처리업허가증 사본 및 방치폐기물처리 이행보증을 확인할 수 있는 서류 사본의 제출을 거부하거나 허위로 제출하여서는 아니 된다.","answer":"수탁처리능력확인서, 폐기물처리업허가증 사본 및 방치폐기물처리 이행보증 확인 서류 사본의 제출을 거부하거나 허위로 제출하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":6,"_source":"b8"},{"depth":1,"type":"korean","marker":"바.","text":"허가취소·영업정지·휴업 또는 폐업 등으로 폐기물을 수집·운반하지 못할 때에는 발급받은 폐기물수집·운반증을 허가기관에 반납하여야 한다.","answer":"허가취소·영업정지·휴업·폐업 등으로 폐기물을 수집·운반하지 못할 때에는 발급받은 폐기물수집·운반증을 허가기관에 반납하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":7,"_source":"b8"},{"depth":1,"type":"korean","marker":"사.","text":"폐기물처리업자는 휴업, 폐업, 처리능력의 초과 등 정당한 사유 없이 배출자가 요청한 폐기물의 위탁을 거부하여서는 아니된다.","answer":"휴업·폐업·처리능력 초과 등 정당한 사유 없이 배출자가 요청한 폐기물의 위탁을 거부하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":8,"_source":"b8"},{"depth":1,"type":"korean","marker":"아.","text":"폐기물처리업자는 별표 7에 따른 시설, 장비 및 기술능력을 유지하여야 한다.","answer":"별표 7에 따른 시설·장비 및 기술능력을 유지하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":9,"_source":"b8"},{"depth":1,"type":"korean","marker":"자.","text":"폐기물처리업자는 지정폐기물을 수집·운반하는 차량에 비상 시 연락처와 사고 발생 시 근무자가 조치하여야 할 사항을 적은 사고대응 매뉴얼을 비치하고, 근무자가 대응요령을 숙지하도록 하여야 한다.","answer":"지정폐기물을 수집·운반하는 차량에 비상 시 연락처와 사고 발생 시 근무자 조치사항을 적은 사고대응 매뉴얼을 비치하고, 근무자가 대응요령을 숙지하도록 하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":10,"_source":"b8"},{"depth":1,"type":"korean","marker":"차.","text":"폐기물처리업자는 폐기물의 처리를 위탁받은 경우에는 제16조의12 및 제17조 각 호에 따른 위탁자 또는 폐기물적정처리추진센터의 확인에 협조해야 한다.","answer":"폐기물 처리를 위탁받은 경우 제16조의12 및 제17조에 따른 위탁자 또는 폐기물적정처리추진센터의 확인에 협조하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":11,"_source":"b8"},{"depth":1,"type":"korean","marker":"카.","text":"사업장폐기물처리업자는 자신의 폐기물처리시설을 출입하는 폐기물 수집ㆍ운반 차량이 영상정보처리기기가 설치된 진입로 및 계량시설을 통과하도록 해야 한다.","answer":"사업장폐기물처리업자로서 자신의 폐기물처리시설을 출입하는 폐기물 수집·운반 차량이 영상정보처리기기가 설치된 진입로 및 계량시설을 통과하도록 하겠음.","tags":{"category":["W01"],"wasteClass":["GO","GN","D"],"wasteCode":null,"action":["CT","MI","FI","RCY"],"rCode":null,"facilityType":null,"bizType":["TR","ID","FD","IR","CR","FR"]},"_idx":12,"_source":"b8"},{"depth":1,"type":"korean","marker":"가.","text":"폐기물수집·운반업자는 다음의 모두에 해당하는 경우에 폐기물의 수집·운반을 위탁한 자와 폐기물의 수집·운반 및 처분 또는 재활용까지의 계약을 체결할 수 있으며, 이 경우 운반단가(또는 운반비) 및 처분단가나 재활용단가(또는 처분비나 재활용비)를 구분하여 기재하여야 한다.","answer":"아래 1)~3) 모두 해당 시 폐기물 수집·운반 위탁자와 수집·운반 및 처분/재활용까지의 계약을 체결할 수 있음을 숙지하겠음(이 경우 운반단가와 처분/재활용단가 구분 기재).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":14,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"1)","text":"법 제4조와 법 제5조에 따른 폐기물 처분시설 또는 재활용시설(이하 \"공공처리시설\"이라 한다)의 설치·운영자가 배출자로부터 직접 폐기물의 처리를 수탁하지 아니하는 경우","answer":"","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":15,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"2)","text":"폐기물수집·운반업자와 공공처리시설의 설치·운영자간에 폐기물의 반입계약이 체결되어 있는 경우","answer":"","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":16,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물수집·운반업자가 공공처리시설에 폐기물을 반입한 후 1개월 이내에 그 처분비 또는 재활용비에 관하여 배출자와 사후정산하는 경우","answer":"","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":17,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"위탁받은 폐기물의 운반을 재위탁하거나 재위탁을 받아서는 아니 된다. 다만, 영업정지, 허가취소 등으로 법 제39조의3에 따른 폐기물 처리명령 사유가 발생한 경우 시·도지사나 지방환경관서의 장의 승인을 받아 재위탁할 수 있다.","answer":"위탁받은 폐기물의 운반을 재위탁하거나 재위탁받지 않겠음(영업정지·허가취소 등 법 제39조의3 처리명령 사유 발생 시 시·도지사·지방환경관서장 승인 받아 재위탁 가능함을 숙지하겠음).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":18,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"수집·운반능력을 초과하여 폐기물의 수집·운반을 위탁받아서는 아니 된다.","answer":"수집·운반능력을 초과하여 폐기물의 수집·운반을 위탁받지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":19,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"위탁받은 폐기물을 배출자가 지정한 적절한 처분장소 또는 재활용장소(수출자의 경우에는 배출자가 지정한 선적장소)로 운반하지 아니하고 다른 장소에 보관하여서는 아니 된다. 다만, 제9조제1항에 따라 승인받은 임시보관장소에 보관하는 경우는 제외한다.","answer":"위탁받은 폐기물을 배출자가 지정한 적절한 처분장소·재활용장소(수출자는 지정 선적장소)로 운반하고 다른 장소에 보관하지 않겠음(제9조제1항 승인 임시보관장소 제외).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null,"bizType":["TR"]},"_idx":20,"_source":"b8"},{"depth":1,"type":"korean","marker":"가.","text":"위탁받은 폐기물을 위탁받은 성질과 상태 그대로 재위탁하거나 재위탁을 받아서는 아니된다. 다만, 천재지변·폐업 등 폐기물을 처분할 수 없는 사유가 발생한 경우에 시·도지사나 지방환경관서의 장의 승인을 받아 재위탁할 수 있으며, 폐기물처분시설의 설치검사 또는 정기검사를 위한 검사용 폐기물의 확보가 곤란하여 시·도지사나 지방환경관서의 장의 승인을 받은 경우 검사용만 재위탁을 받을 수 있다.","answer":"위탁받은 폐기물을 위탁받은 성질·상태 그대로 재위탁하거나 재위탁받지 않겠음(천재지변·폐업 등 처분 불가 사유 발생 시 시·도지사·지방환경관서장 승인 받아 재위탁 가능, 처분시설 설치·정기검사용 폐기물 확보 곤란 시 승인 받아 검사용만 재위탁 받을 수 있음을 숙지하겠음).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":null,"bizType":["ID","FD"]},"_idx":22,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"허가받은 처분공정을 임의로 변경하여 위탁받은 폐기물을 처분하거나, 처분공정의 전부 또는 일부를 거치지 아니하고 그 처분를 종료하여서는 아니 된다.","answer":"허가받은 처분공정을 임의로 변경하여 위탁받은 폐기물을 처분하거나, 처분공정의 전부·일부를 거치지 않고 처분을 종료하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":null,"bizType":["ID","FD"]},"_idx":23,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"건설현장이나 건설폐기물 중간처리 과정에서 발생한 폐기물을 위탁받아 소각하려는 경우 「건설폐기물의 재활용촉진에 관한 법률 시행규칙」 별표 1의2 제1호라목 후단 및 제3호 바목의 위탁기준을 준수한 폐기물만을 위탁받아야 한다.","answer":"건설현장·건설폐기물 중간처리 과정에서 발생한 폐기물을 위탁받아 소각하려는 경우 「건설폐기물의 재활용촉진법 시행규칙」 별표 1의2 제1호라목 후단 및 제3호 바목의 위탁기준을 준수한 폐기물만을 위탁받겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F","INC_C"],"bizType":["ID","FD"]},"_idx":24,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"가목 및 나목에도 불구하고 소각전문 폐기물 중간처분업자 또는 폐기물 종합처분업자가 위탁받은 폐기물을 운반, 보관 및 처분하는 과정에서 배출된 불연물은 재위탁할 수 있다. 다만, 연간 재위탁하는 불연물의 양은 연간 폐기물 반입량의 무게 기준으로 10퍼센트를 초과할 수 없다.","answer":"가목·나목에도 불구하고 소각전문 중간처분업자 또는 종합처분업자로서 위탁받은 폐기물의 운반·보관·처분 과정에서 배출된 불연물은 재위탁 가능함을 숙지하겠음(연간 재위탁 불연물 양은 연간 폐기물 반입량의 무게 기준 10% 이내).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["MI","FI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F","INC_C","INC_R"],"bizType":["ID","FD"]},"_idx":25,"_source":"b8"},{"depth":1,"type":"korean","marker":"가.","text":"위탁받은 폐기물을 위탁받은 성질과 상태 그대로 재위탁하거나 재위탁을 받아서는 아니 된다. 다만, 천재지변, 영업정지, 휴업, 폐업 등 정당한 사유가 있거나, 재활용시설의 검사를 받기 위한 폐기물의 확보가 곤란한 경우에는 시·도지사나 지방환경관서의 장의 승인을 받아 재위탁하거나 재위탁 받을 수 있다.","answer":"위탁받은 폐기물을 위탁받은 성질·상태 그대로 재위탁하거나 재위탁받지 않겠음(천재지변·영업정지·휴업·폐업 등 정당한 사유 또는 재활용시설 검사용 폐기물 확보 곤란 시 시·도지사·지방환경관서장 승인 받아 재위탁/재위탁받기 가능함을 숙지하겠음).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":27,"_source":"b8"},{"depth":1,"type":"korean","marker":"나.","text":"허가받은 재활용 공정을 임의로 변경하여 위탁받은 폐기물을 재활용하거나, 재활용 공정의 전부 또는 일부를 거치지 아니하고 그 재활용을 종료하여서는 아니 된다.","answer":"허가받은 재활용 공정을 임의로 변경하여 위탁받은 폐기물을 재활용하거나, 재활용 공정의 전부·일부를 거치지 않고 재활용을 종료하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":28,"_source":"b8"},{"depth":1,"type":"korean","marker":"다.","text":"제품의 본래의 용도로 다시 사용할 수 있도록 수리·수선하여 제품을 판매할 때에는 수리·수선한 업체명, 소재지, 전화번호 및 수리·수선한 제품임을 소비자가 알 수 있도록 표시하여야 한다.","answer":"제품의 본래 용도로 다시 사용할 수 있도록 수리·수선하여 제품을 판매할 때에는 수리·수선 업체명·소재지·전화번호 및 수리·수선 제품임을 소비자가 알 수 있도록 표시하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R2"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":29,"_source":"b8"},{"depth":1,"type":"korean","marker":"라.","text":"유기성 오니를 화력발전소에서 연료로 사용하기 위하여 가공하는 자는 유기성 오니 연료의 저위발열량, 수분 함유량, 회분 함유량, 황분 함유량, 길이 및 금속성분을 매 분기당 1회 이상 측정하여 그 결과를 시·도지사에게 제출하여야 한다.","answer":"유기성 오니를 화력발전소에서 연료로 사용하기 위하여 가공하는 자로서 유기성 오니 연료의 저위발열량·수분·회분·황분·길이·금속성분을 매 분기 1회 이상 측정하여 결과를 시·도지사에게 제출하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-01","01-02"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":30,"_source":"b8"},{"depth":1,"type":"korean","marker":"마.","text":"폐유기용제를 정제유기용제로 재활용하는 자는 폐유기용제 배출공정의 변경, 폐유기용제 수집·배출업소의 변경 등으로 인하여 폐유기용제의 성질과 상태가 변경될 때에는 그 성분을 분석하고 그 분석결과를 3년간 갖추어 두어야 한다.","answer":"폐유기용제를 정제유기용제로 재활용하는 자로서 폐유기용제 배출공정·수집·배출업소 변경 등으로 성질·상태 변경 시 성분을 분석하고 분석결과를 3년간 보관하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["04"],"action":["RCY"],"rCode":["R3"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":31,"_source":"b8"},{"depth":1,"type":"korean","marker":"바.","text":"폐유를 정제연료유로 재활용하는 자는 별표 5의3 제2호마목2)가)(2)(가)에서 정한 기준항목을 분기 1회 이상 측정하고 그 결과를 기록한 후 3년 동안 보관하여야 한다.","answer":"폐유를 정제연료유로 재활용하는 자로서 별표 5의3 제2호마목2)가)(2)(가) 기준항목을 분기 1회 이상 측정하고 결과를 기록하여 3년간 보관하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["06"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":32,"_source":"b8"},{"depth":1,"type":"korean","marker":"사.","text":"별표 5의3 제2호마목2)가)(3)에 따라 폐유, 할로겐족을 제외한 폐유기용제, 폐페인트 및 폐래커를 재생연료유로 재활용하는 자는 같은 목 2)가)(3)(나)에서 정한 기준 항목을 분기 1회 이상 측정하고 그 결과를 기록한 후 3년 동안 보관하여야 한다.","answer":"별표 5의3 제2호마목2)가)(3)에 따라 폐유·할로겐족 제외 폐유기용제·폐페인트·폐래커를 재생연료유로 재활용하는 자로서 같은 목 2)가)(3)(나) 기준항목을 분기 1회 이상 측정하고 결과를 기록하여 3년간 보관하겠음.","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["04","05","06"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":33,"_source":"b8"},{"depth":1,"type":"korean","marker":"아.","text":"폐유로 정제연료유 또는 윤활기유의 원료물질을 생산하는 자, 폐유기용제로 정제유기용제를 생산하는 자, 폐유 등으로 재생연료유를 생산하는 자 또는 폐오일필터를 파쇄·증류하여 고철 및 폐유를 공급하는 자는 기후에너지환경부장관이 정하여 고시하는 바에 따라 정제연료유, 윤활기유의 원료물질, 정제유기용제, 재생연료유 또는 고철에 대한 공급계획서(사용시설·공급량·공급기간이 포함되어야 한다)를 관할 지방환경관서의 장에게 제출하여 적합 통보를 받은 후 공급하여야 한다. 제출한 사항을 변경하려는 때에도 또한 같다.","answer":"폐유로 정제연료유·윤활기유 원료물질 생산자, 폐유기용제로 정제유기용제 생산자, 폐유 등으로 재생연료유 생산자 또는 폐오일필터 파쇄·증류로 고철·폐유 공급자로서 기후에너지환경부장관 고시에 따라 공급계획서(사용시설·공급량·공급기간 포함)를 관할 지방환경관서장에게 제출하여 적합 통보 받은 후 공급하겠음(변경 시 동일).","tags":{"category":["W01"],"wasteClass":["D"],"wasteCode":["04","06"],"action":["RCY"],"rCode":["R3","R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":34,"_source":"b8"},{"depth":1,"type":"korean","marker":"자.","text":"폐플라스틱 및 폐고무를 사용하여 별표 5의3 제2호마목2)가)(2)(가)에 따른 정제연료유의 기준에 맞는 유류를 제조하는 자의 경우 공급계획서를 작성하여 시·도지사에게 제출하여 적합 통보를 받은 후 공급하여야 한다. 제출한 사항을 변경하려는 때에도 또한 같다.","answer":"폐플라스틱·폐고무로 별표 5의3 제2호마목2)가)(2)(가)에 따른 정제연료유 기준에 맞는 유류를 제조하는 자로서 공급계획서를 작성하여 시·도지사에게 제출하여 적합 통보 받은 후 공급하겠음(변경 시 동일).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-03"],"action":["RCY"],"rCode":["R9"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":35,"_source":"b8"},{"depth":1,"type":"korean","marker":"차.","text":"음식물류 폐기물을 재활용하여 사료·퇴비 등의 제품을 생산하는 자는 생산한 사료·퇴비 등의 제품을 빗물 등으로 인한 유출 등 주변 환경을 오염시키지 않도록 적정하게 보관하여야 한다.","answer":"음식물류 폐기물을 재활용하여 사료·퇴비 등의 제품을 생산하는 자로서 생산한 제품을 빗물 등으로 인한 유출 등 주변 환경을 오염시키지 않도록 적정하게 보관하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-38","91-02"],"action":["RCY"],"rCode":["R5"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":36,"_source":"b8"},{"depth":1,"type":"korean","marker":"카.","text":"음식물류 폐기물을 부숙토나 지렁이 분변토를 만들어 토지개량제로 사용하는 자는 기후에너지환경부장관이 정하여 고시하는 바에 따라 그 제품명·원료 등을 표시하고, 제품의 제조에 관한 기록을 보존하여야 한다.","answer":"음식물류 폐기물을 부숙토·지렁이 분변토로 만들어 토지개량제로 사용하는 자로서 기후에너지환경부장관 고시에 따라 제품명·원료 등을 표시하고 제품 제조 기록을 보존하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-38","91-02"],"action":["RCY"],"rCode":["R6"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":37,"_source":"b8"},{"depth":1,"type":"korean","marker":"타.","text":"폐기물을 이용하여「산업표준화법」제15조제1항에 따른 인증을 받은 시멘트(클링커를 포함한다)를 제조하는 자는 다음 사항을 준수하여야 한다.","answer":"폐기물을 이용하여 「산업표준화법」 제15조제1항에 따른 인증을 받은 시멘트(클링커 포함)를 제조하는 자로서 아래 1)~4) 사항을 준수하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":38,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"1)","text":"폐기물을 운반·보관·투입할 경우 외부 유출 및 비산방지를 위하여 밀폐시설, 덮개설치 등의 조치를 취하여야 한다.","answer":"폐기물 운반·보관·투입 시 외부 유출·비산방지를 위한 밀폐시설·덮개설치 등의 조치를 하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":39,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"2)","text":"대체원료, 보조연료로 사용한 폐기물(수입폐기물을 포함한다) 및 폐기물을 재활용하여 제조한 제품 사용량을 매 반기 종료 후 15일 이내에 별지 제57호의3서식에 따라 작성하여 해당 특별자치시장, 특별자치도지사, 시장·군수·구청장에게 보고하여야 한다. 이 경우 전자정보처리프로그램에 보고내용을 입력한 경우에는 보고한 것으로 본다.","answer":"대체원료·보조연료로 사용한 폐기물(수입폐기물 포함) 및 폐기물 재활용 제조 제품 사용량을 매 반기 종료 후 15일 이내에 별지 제57호의3서식에 따라 작성하여 특별자치시장·특별자치도지사·시장·군수·구청장에게 보고하겠음(전자정보처리프로그램 입력 시 보고로 봄).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":40,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물 배출자 및 폐기물 중간재활용업자로부터 수탁받은 폐기물의 성질 및 상태와 유통흐름을 명확히 파악하고 정보를 공개하여야 한다.","answer":"폐기물 배출자 및 폐기물 중간재활용업자로부터 수탁받은 폐기물의 성질·상태와 유통흐름을 명확히 파악하고 정보를 공개하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":41,"_source":"b8"},{"depth":2,"type":"korean-paren","marker":"가)","text":"폐기물 배출자 또는 폐기물 중간재활용업자(이하 이 호에서 \"폐기물 공급자\"라 한다)와 위·수탁계약을 체결하기 전에 해당 폐기물에 대한 배출공정 및 중금속 함량 등의 특성을 조사하고 관할 행정기관에 보고 후 재활용하여야 한다.","answer":"폐기물 공급자(폐기물 배출자·중간재활용업자)와 위·수탁계약 체결 전 해당 폐기물 배출공정·중금속 함량 등의 특성을 조사하고 관할 행정기관에 보고 후 재활용하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":42,"_source":"b8"},{"depth":2,"type":"korean-paren","marker":"나)","text":"재활용 대상 폐기물을 당해 사업장에 반입하기 전에 중금속 함량 등을 분석하여 재활용기준에 적합한 폐기물만을 반입하여야 한다. 다만, 폐기물 공급자와 폐기물의 종류가 변경이 없는 경우에는 반입 전 중금속 함량 등의 분석 주기를 분기 1회로 조정할 수 있다.","answer":"재활용 대상 폐기물을 사업장 반입 전 중금속 함량 등을 분석하여 재활용기준 적합 폐기물만 반입하겠음(공급자·종류 변경 없을 시 반입 전 분석 주기 분기 1회 조정 가능).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":43,"_source":"b8"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"재활용 대상 폐기물에 대한 중금속 함량 등의 분석결과 재활용기준을 초과하는 경우에는 폐기물 공급자를 통하여 정확한 원인을 파악하고, 재사용 가능 여부가 결정되기 전까지는 반입하여서는 아니 된다.","answer":"재활용 대상 폐기물 중금속 함량 등 분석결과 재활용기준 초과 시 폐기물 공급자를 통하여 정확한 원인을 파악하고, 재사용 가능 여부 결정 전까지 반입하지 않겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":44,"_source":"b8"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"재활용기준을 초과하여 폐기물 반입이 중단된 폐기물 공급자에 대한 폐기물 재반입은 재활용기준을 안정적으로 준수할 수 있다고 판단되는 경우에만 관할 행정기관에 보고한 후 다시 반입할 수 있다.","answer":"재활용기준 초과로 반입 중단된 폐기물 공급자에 대한 폐기물 재반입은 재활용기준을 안정적으로 준수할 수 있다고 판단되는 경우에만 관할 행정기관 보고 후 다시 반입하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":45,"_source":"b8"},{"depth":2,"type":"korean-paren","marker":"다)","text":"별지 제4호의15서식에 따른 분기별 폐기물사용시멘트정보를 매 분기 다음달 15일까지 전자정보처리프로그램을 이용하여 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장에게 제출해야 한다. 이 경우 특별자치시장, 특별자치도지사, 시장ㆍ군수ㆍ구청장은 제출받은 정보를 해당 지방자치단체의 인터넷 홈페이지에 공개할 수 있다.","answer":"별지 제4호의15서식에 따른 분기별 폐기물사용시멘트정보를 매 분기 다음달 15일까지 전자정보처리프로그램으로 특별자치시장·특별자치도지사·시장·군수·구청장에게 제출하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":46,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"4)","text":"관할 행정기관에서 폐기물 재활용의 적정성 여부 평가 등을 위하여 필요한 자료나 정보를 요청할 경우 특별한 사유가 없으면 요청에 따라야 한다.","answer":"관할 행정기관에서 폐기물 재활용 적정성 평가 등을 위해 자료·정보를 요청할 경우 특별한 사유가 없으면 요청에 따르겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R4"],"facilityType":["KLN"],"bizType":["IR","CR","FR"]},"_idx":47,"_source":"b8"},{"depth":1,"type":"korean","marker":"파.","text":"소각열회수시설에서 제3조제1항제1호에 따른 에너지 회수기준에 맞게 에너지를 회수하는 자는 다음 사항을 준수하여야 한다.","answer":"소각열회수시설에서 제3조제1항제1호에 따른 에너지 회수기준에 맞게 에너지를 회수하는 자로서 아래 1)~2) 사항을 준수하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"],"bizType":["IR","CR","FR"]},"_idx":48,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"1)","text":"재활용 대상 폐기물의 공급자가 변경되는 경우에는 해당 폐기물에 대하여 제3조제1항제1호가목의 기준에 적합한지를 검사하여 적합한 폐기물만을 반입하여야 한다. 이 경우 검사결과는 3년간 보존하여야 한다.","answer":"재활용 대상 폐기물 공급자가 변경되는 경우 해당 폐기물에 대하여 제3조제1항제1호가목 기준 적합 여부를 검사하여 적합한 폐기물만 반입하고, 검사결과를 3년간 보존하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"],"bizType":["IR","CR","FR"]},"_idx":49,"_source":"b8"},{"depth":2,"type":"paren-number","marker":"2)","text":"반입되는 폐기물은 폐기물의 종류 및 공급자(폐기물을 배출한 자가 스스로 재활용하는 경우에는 해당 배출자를 공급자로 본다)별로 매 분기 1회 이상 제3조제1항제1호가목의 기준에 적합한지를 검사하고 그 검사결과를 3년간 보존하여야 한다. 다만, 폐기물 공급자의 변경이 없는 경우에는 검사 주기를 반기 1회 이상으로 조정할 수 있다.","answer":"반입되는 폐기물은 종류 및 공급자(자가재활용 시 배출자=공급자)별로 매 분기 1회 이상 제3조제1항제1호가목 기준 적합 여부를 검사하고 검사결과를 3년간 보존하겠음(공급자 변경 없을 시 검사 주기 반기 1회 조정 가능).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"],"bizType":["IR","CR","FR"]},"_idx":50,"_source":"b8"},{"depth":1,"type":"korean","marker":"하.","text":"위탁받은 폐기물을 허가받은 폐기물 재활용시설과 같은 사업장에 있는 보관시설 외의 장소에 보관하여서는 아니 된다. 다만, 제11조제1항제1호부터 제5호까지의 규정에 따라 승인받은 임시보관시설이나 기후에너지환경부장관 또는 지방자치단체의 장이 설치ㆍ운영하는 비축 시설에 보관하는 경우는 제외한다.","answer":"위탁받은 폐기물을 허가받은 폐기물 재활용시설과 같은 사업장에 있는 보관시설 외의 장소에 보관하지 않겠음(제11조제1항제1호~제5호 승인 임시보관시설 또는 기후에너지환경부장관·지자체장 설치·운영 비축 시설 보관은 제외).","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":51,"_source":"b8"},{"depth":1,"type":"korean","marker":"거.","text":"법 제13조의2에 따른 폐기물의 재활용 원칙 및 준수사항에 따라 별표 4의3에 따른 폐기물의 종류별 재활용 가능 유형에 해당하는 유형으로 재활용하여야 하며, 법 제13조의3제3항에 따라 재활용환경성평가에 따른 재활용의 승인을 받아 재활용하는 경우에는 승인 기간 및 재활용 유형 등의 승인 내용을 준수하여 재활용하여야 한다.","answer":"법 제13조의2에 따른 폐기물 재활용 원칙 및 준수사항에 따라 별표 4의3 폐기물 종류별 재활용 가능 유형으로 재활용하고, 법 제13조의3제3항 재활용환경성평가에 따른 재활용 승인 시 승인 기간·재활용 유형 등 승인내용을 준수하여 재활용하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":52,"_source":"b8"},{"depth":1,"type":"korean","marker":"너.","text":"전기자동차 폐이차전지를 에너지저장장치 등 재사용 제품의 제조에 재활용하는 자는 기후에너지환경부장관 및 산업통상부장관이 공동으로 정하여 고시하는 바에 따라 전기자동차 폐이차전지의 잔존용량 및 잔존수명 등을 측정해야 한다.","answer":"전기자동차 폐이차전지를 에너지저장장치 등 재사용 제품 제조에 재활용하는 자로서 기후에너지환경부장관·산업통상부장관 공동 고시에 따라 잔존용량·잔존수명 등을 측정하겠음.","tags":{"category":["W01"],"wasteClass":null,"wasteCode":["51-41"],"action":["RCY"],"rCode":["R1","R2"],"facilityType":null,"bizType":["IR","CR","FR"]},"_idx":53,"_source":"b8"}],"b9":[{"depth":2,"type":"paren-number","marker":"1)","text":"소각시설은 자체 무게와 적재무게, 그 밖의 무게에 견딜 수 있어야 하고, 처분에 사용하는 처리약품과 처분과정에서 발생하는 열·습기·배기가스·배출수 및 충격 등에 견딜 수 있는 재질을 사용하여야 한다.","answer":"소각시설은 자체 무게·적재무게 등에 견딜 수 있는 구조로 설치하고, 처리약품·열·습기·배기가스·배출수 등에 부식·손상되지 아니하는 재질로 시공하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":3,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"폐기물이 흩날리거나 흘러나오는 것을 방지하는 데에 필요한 설비를 하여야 한다.","answer":"폐기물의 흩날림·유출 방지에 필요한 설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":4,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물의 처분과정에서 발생하는 대기오염물질·수질오염물질 등을 처분할 수 있는 시설을 갖추어야 한다. 다만, 「물환경보전법 시행규칙」 별표 2 및 별표 3에 따른 수질오염물질 또는 특정수질유해물질을 「물환경보전법」 제62조에 따른 폐수처리업자에게 위탁처리하는 경우와 매립시설의 침출수 처리시설, 「물환경보전법」 제2조제12호에 따른 수질오염방지시설(자가수질오염방지시설만 해당한다), 「물환경보전법」 제48조에 따른 공공폐수처리시설, 「하수도법」 제2조제9호에 따른 공공하수처리시설 또는 「하수도법」 제2조제11호에 따른 분뇨처리시설에서 처리하는 오염물질을 그 시설에 옮겨 처리하는 경우와 영 제5조에 따른 폐기물 재활용시설 중 혐기성분해시설에 유입하여 에너지를 생산(음식물류 폐기물을 재활용하는 과정에서 발생되는 경우만 해당한다)하는 경우에는 수질오염물질 처리시설의 일부 또는 전부를 갖추지 아니할 수 있다.","answer":"처분과정에서 발생하는 대기오염물질·수질오염물질 등을 처분할 수 있는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":5,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"처분시설의 바닥은 시멘트·아스팔트 등 물이 스며들지 아니하는 재료로 포장하여야 한다.","answer":"처분시설 바닥은 시멘트·아스팔트 등 물이 스며들지 아니하는 재료로 포장하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":6,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"음식물류 폐기물 처분시설을 설치하는 때에는 음식물류 폐기물의 저장ㆍ투입ㆍ이송 및 처리 등의 과정에서 발생하는 악취가 외부로 새어 나가지 아니하도록 밀폐된 구조로 설치하여야 하며, 발생되는 악취물질을 저감할 수 있는 별도의 시설을 갖추어야 한다.","answer":"음식물류 폐기물 처분시설 설치 시 저장·투입·이송·처리 과정에서 발생하는 악취가 외부로 새어 나가지 아니하도록 밀폐·악취방지시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":["51-19"],"action":["MI"],"rCode":null,"facilityType":null},"_idx":7,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"「순환경제사회 전환 촉진법」 제36조제2항제2호에 따라 폐자원에너지를 일정 기준 이상 회수하여 폐기물처분부담금을 감면받으려는 경우에는 제3조제2항에 따라 기후에너지환경부장관이 정하여 고시하는 바에 따라 폐자원에너지의 회수ㆍ이용률의 검증에 필요한 설비를 갖추어야 한다.","answer":"폐기물처분부담금 감면을 위해 폐자원에너지를 회수하는 경우 제3조제2항 기준에 적합한 회수설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":null},"_idx":8,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"연소실·열분해실(가스화실을 포함한다. 이하 이 목에서 같다) 및 고온용융실의 예열 및 온도를 조절할 수 있도록 보조버너 등 충분한 용량의 보조연소장치를 설치하여야 한다.","answer":"연소실·열분해실(가스화실 포함)·고온용융실의 예열 및 온도 조절을 위한 충분한 용량의 보조연소장치(보조버너 등)를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":11,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"연소실·열분해실 및 고온용융실의 연소용 공기 또는 산소 등이 안정적으로 공급될 수 있는 장치(공급량을 조절할 수 있는 기능을 갖는 것만 해당한다)를 설치하여야 한다.","answer":"연소실·열분해실·고온용융실의 연소용 공기·산소 등 안정 공급장치(공급량 조절 기능 포함)를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":12,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"다)","text":"굴뚝을 설치하는 경우에는 통풍력과 배기가스의 대기확산을 고려한 높이와 구조를 가져야 한다.","answer":"굴뚝 설치 시 통풍력과 배기가스 대기확산을 고려한 높이·구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":13,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"라)","text":"폭발사고와 화재 등에 대비한 안전한 구조이어야 하며, 소화기 등 필요한 장비를 갖추어야 한다.","answer":"폭발·화재 등에 안전한 구조로 설치하고 소화기 등 필요 장비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":14,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"마)","text":"시설규모, 처분대상 폐기물의 종류, 소각방식, 설계·시공자명 및 연락처 등 필요한 사항을 지워지지 아니하고 파손되지 아니하는 방법으로 표시한 표지를 붙여야 한다.","answer":"시설규모·처분대상 폐기물 종류·소각방식·설계시공자명·연락처 등 표지를 지워지거나 파손되지 않는 방법으로 표시하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":15,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"바)","text":"연소실·열분해실 및 고온용융실에는 시설 내의 압력변화를 감지할 수 있는 압력측정계를 설치하여야 한다. 다만, 생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 시설의 경우에는 그러하지 아니하다.","answer":"연소실·열분해실·고온용융실에 압력측정계를 설치하겠음(도서지역 생활폐기물 200kg/h 미만 제외).","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":16,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"사)","text":"시간당 처분능력이 2톤 이상인 경우에는 반입되는 폐기물의 무게를 측정할 수 있는 계량시설을 설치하여야 한다. 다만, 시·도지사나 지방환경관서의 장이 인정하는 경우와 다른 곳의 계량시설을 이용하여 반입되는 폐기물의 무게를 측정할 수 있는 경우에는 그러하지 아니하다.","answer":"시간당 처분능력 2톤 이상 시 반입 폐기물 무게 측정 계량시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":17,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"아)","text":"연소실·열분해실 및 고온용융실의 최종 출구에는 출구온도 측정공을 설치하고, 각 시설의 출구온도 기준보다 섭씨 300도 이상까지, 대기오염 방지시설 중 최초 집진시설의 입구에는 섭씨600도 이상 측정할 수 있는 온도지시계 및 온도변화를 연속적으로 기록할 수 있는 자동온도기록계를 붙여야 한다. 다만, 최초 집진시설의 입구에 붙여야 하는 온도 지시계 및 자동온도기록계의 경우 시간당 처분능력이 2톤 이상인 시설의 경우만 해당한다.","answer":"연소실·열분해실·고온용융실 최종 출구에 출구온도 측정공을 설치하고, 출구온도 기준보다 섭씨 300도 이상 측정 가능한 온도지시계 및 자동기록장치를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":18,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"자)","text":"연소실·열분해실 및 고온용융실의 외부를 철판으로 덮은 경우에는 본체의 고온부위를 내열도료로 색칠 또는 단열처리하거나 내화단열벽돌, 캐스터블내화물 등으로 시공하여 그 외부표면온도를 섭씨 80도 이하(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 시설의 경우에는 섭씨 120도 이하)로 유지할 수 있는 구조이어야 한다. 다만, 회전식소각시설 등 구조상 단열을 충분히 할 수 없는 경우에는 그러하지 아니하다.","answer":"연소실·열분해실·고온용융실 외부 철판 부위는 내열도료 색칠 또는 단열처리하거나 내화단열벽돌·캐스터블내화물 등으로 시공하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":19,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"차)","text":"대기오염 방지시설 중 최초 집진시설(전기ㆍ여과집진시설이 설치되어 있는 경우에는 전기ㆍ여과집진시설을 최초 집진시설로 본다)에 흘러 들어오는 연소가스를 섭씨 200도 이하(시간당 처분능력이 2톤 미만인 시설의 경우에는 섭씨 250도 이하)로 냉각시키기 위한 냉각시설이나 폐열회수시설을 설치하여야 한다. 다만, 생활폐기물을 대상으로 도서지역에 설치하는 시간당 처분능력이 200킬로그램 미만인 시설로서 대기오염 방지시설의 처리공정상 연소가스의 냉각이 필요하지 아니하는 경우에는 그러하지 아니한다.","answer":"대기오염방지시설 중 최초 집진시설(전기·여과집진시설 우선)에 흘러 들어오는 연소가스 온도를 섭씨 200도 이하로 냉각시키기 위한 냉각시설 또는 폐열회수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":20,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"카)","text":"「대기환경보전법 시행령」 제17조에 따른 굴뚝 자동측정기기 부착하여야 하는 소각시설은 같은 법 시행령 제17조 및 같은 법 시행규칙 제37조에 따라 굴뚝 자동측정기기를 설치하고 운영ㆍ관리하여야 하며, 대기오염 방지시설의 입·출구 및 굴뚝에는 배출가스의 온도, 대기오염물질의 농도 등을 측정할 수 있는 측정공을 대기오염공정 시험방법에 맞게 설치하여야 한다.","answer":"「대기환경보전법 시행령」 제17조 대상 소각시설은 같은 법 시행규칙 제37조에 따라 굴뚝 자동측정기기를 부착하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":21,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"타)","text":"폐기물 투입구 및 청소구는 고온에 견딜 수 있는 재질로 만들어야 하며, 외부공기가 흘러 들어오거나 연소가스가 새어 나가는 것을 방지할 수 있는 구조이어야 한다.","answer":"폐기물 투입구·청소구는 고온에 견디는 재질로 만들고, 외부공기 유입 및 연소가스 누출을 방지할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":22,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"파)","text":"내부의 연소상태를 볼 수 있는 구조이어야 하며, 소각재의 제거 시 재의 흩날림을 방지할 수 있는 구조이어야 한다.","answer":"내부 연소상태를 확인할 수 있는 구조로 하고, 소각재 제거 시 재 흩날림을 방지할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":23,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"하)","text":"폐기물반입장·저장조 등에서 발생하는 악취가 처분시설의 외부로 새어나가는 것을 방지할 수 있는 시설을 설치하여야 한다. 다만, 시간당 처분능력이 2톤 미만인 시설인 경우에는 공기차단시설 등 간이시설을 설치할 수 있다.","answer":"폐기물 반입장·저장조 등에서 발생하는 악취가 외부로 새어 나가지 아니하도록 악취방지시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":24,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"거)","text":"시간당 처분능력이 25킬로그램 이상인 소각시설은 「잔류성유기오염물질 관리법 시행규칙」 별표 3 제4호가목에 따른 다이옥신 배출기준을 지킬 수 있는 시설을 설치하여야 한다.","answer":"시간당 처분능력 25kg 이상 소각시설은 「잔류성유기오염물질 관리법 시행규칙」 별표3 제4호가목 다이옥신 배출기준을 지킬 수 있는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":25,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"너)","text":"허가ㆍ승인을 받거나 신고한 시간당 처분능력을 초과하여 설치하여서는 아니 된다.","answer":"허가·승인·신고된 시간당 처분능력을 초과하여 설치하지 않겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":26,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"더)","text":"폐냉매물질 등 기체상 폐기물을 처분하는 경우에는 기체상 폐기물이 외부로 새어 나가지 아니하고 연소실ㆍ열분해실ㆍ고온용융실로 직접 투입할 수 있는 설비를 갖추어야 한다.","answer":"폐냉매물질 등 기체상 폐기물 처분 시 외부 누출 없이 연소실·열분해실·고온용융실로 직접 투입할 수 있는 밀폐 투입설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":["07"],"action":["MI"],"rCode":null,"facilityType":["INC_G","INC_H","INC_P","INC_F"]},"_idx":27,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(1)","text":"연소실(연소실이 둘 이상인 경우에는 최종 연소실)의 출구온도는 섭씨 850도 이상(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 경우에는 섭씨 800도 이상)이어야 한다. 다만, 종이, 목재류만을 소각하는 경우에는 섭씨 450도 이상이어야 한다.","answer":"연소실(연소실이 둘 이상인 경우 최종 연소실) 출구온도를 섭씨 850도 이상(도서지역 생활폐기물 200kg/h 미만은 800도 이상)으로 유지하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":30,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(2)","text":"연소실은 연소가스가 2초 이상(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만의 경우에는 0.5초 이상. 시간당 처분능력이 200킬로그램 이상 2톤 미만인 경우에는 1초 이상) 체류할 수 있고, 충분하게 혼합될 수 있는 구조이어야 한다. 이 경우 체류시간은 섭씨 850도(생활폐기물을 대상으로 도서지역에 설치하는 소각시설로서 시간당 처분능력이 200킬로그램 미만인 경우에는 섭씨 800도, 종이ㆍ목재류 및 마늘피 등 초근목피류를 소각하는 경우에는 섭씨 450도)에서의 부피로 환산한 연소가스의 체적으로 계산한다.","answer":"연소실은 연소가스가 2초 이상(도서지역 생활폐기물 200kg/h 미만은 0.5초 이상) 체류하고 충분히 혼합될 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["INC_G"]},"_idx":31,"_source":"b9"},{"depth":4,"type":"wrapped-number","marker":"(3)","text":"바닥재의 강열감량(强熱減量)이 10퍼센트 이하가 될 수 있는 소각 성능을 갖추어야 한다. 다만, 2008년 an-paren","marker":"라)","text":"응집·침전된 오니류를 배출할 수 있는 구조이어야 한다.","answer":"응집·침전된 오니류를 배출할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["CCD_CGP"]},"_idx":117,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"마)","text":"옥외에 설치된 경우 비가 올 때 빗물이 흘러드는 것을 방지할 수 있는 덮개를 갖추어야 한다.","answer":"옥외 설치 시 비가 올 때 빗물이 흘러드는 것을 방지할 수 있는 덮개를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["CCD_CGP"]},"_idx":118,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"폐기물을 선별·파쇄·혼합·발효·건조·소멸·소화 등의 공정을 거쳐 물리적·생물학적으로 안정된 상태의 물질로 만드는 시설을 갖추어야 한다.","answer":"폐기물을 선별·파쇄·혼합·발효·건조·소멸·소화 공정으로 물리적·생물학적으로 안정된 상태의 물질로 만드는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["BCD_SMZ"]},"_idx":121,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"미생물을 이용하여 생물학적으로 안정된 물질을 만드는 시설을 갖추어야 한다.","answer":"미생물을 이용하여 생물학적으로 안정된 물질을 만드는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["BCD_BIO"]},"_idx":126,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"분해과정에서 발생하는 가스를 처리하는 시설을 갖추어야 한다.","answer":"분해과정에서 발생하는 가스를 처리하는 시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["ID"],"wasteClass":null,"wasteCode":null,"action":["MI"],"rCode":null,"facilityType":["BCD_BIO"]},"_idx":127,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"매립시설의 주위에 사람이나 가축 등의 출입을 방지할 수 있는 철망 등의 외곽시설을 지상 1.5미터 이상의 높이로 설치하여야 한다. 다만, 매립시설이 사람 등이 무단으로 출입할 수 없는 사업장 안에 있는 경우와 그 주위가 사람 등의 출입이 곤란한 해변·하천·절벽 등의 지형인 경우에는 그러하지 아니하다.","answer":"매립시설 주위에 사람·가축의 출입을 방지할 수 있는 철망 등 외곽시설을 지상 1.5미터 이상 높이로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":130,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"매립시설 입구에 폐기물매립시설임을 표시하는 가로 100센티미터 이상, 세로 50센티미터 이상의 표지판을 지상 100센티미터 이상의 높이에 설치하여야 한다. 이 경우 표지판에는 매립시설명, 매립대상폐기물의 종류, 관리자의 주소·성명·전화번호·설계·시공·감리자명 등을 적어야 한다.","answer":"매립시설 입구에 폐기물매립시설 표지판(가로 100cm 이상 × 세로 50cm 이상)을 지상 100cm 이상 높이에 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":131,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"폐기물의 흘러 나감을 방지할 수 있는 축대벽 및 둑은 매립되는 폐기물의 무게, 매립단면 및 침출수위 등을 고려하여 안전하게 설치하여야 한다. 이 경우 축대벽은 저면(底面)활동에 대한 안전율이 1.5 이상, 쓰러짐에 대한 안전율이 2.0 이상, 지지력에 대한 안전율이 3.0 이상이어야 하며, 둑은 사면(斜面)활동에 대한 안전율이 1.3 이상이어야 한다.","answer":"폐기물 유출 방지용 축대벽·둑은 매립 폐기물 무게·매립단면·침출수위 등을 고려하여 안전하게 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":132,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"매립시설의 기초지반이 연약한 경우에는 지반침하 등의 우려가 없도록 지반보강을 위한 필요한 조치를 하여야 하며, 암반이 드러난 경우 암반의 요철 등으로 차수시설이 손상되지 아니하도록 적절한 조치를 하여야 한다.","answer":"기초지반이 연약한 경우 지반침하 우려가 없도록 지반보강 조치를 하고, 암반 노출 시 암반 요철을 고르게 처리하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":133,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"매립시설의 외부에서 빗물이 흘러들지 아니하고 매립시설의 내부에 떨어진 빗물이 폐기물을 매립 중인 구역에 흘러들지 아니하도록 빗물배제시설을 갖추어야 한다. 다만, 빗물이 매립시설로 흘러들거나 떨어지는 것을 방지할 수 있는 시설을 설치하는 경우에는 그러하지 아니하다.","answer":"매립시설 외부 빗물 유입 방지 및 내부 빗물의 매립구역 유입 방지를 위한 빗물배제시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":134,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"반입되는 폐기물의 무게를 측정할 수 있는 계량시설을 설치하여야 한다. 다만, 시·도지사나 지방환경관서의 장이 필요하지 아니하다고 인정하는 경우와 다른 곳의 계량시설을 이용하여 반입되는 폐기물의 무게를 측정할 수 있는 경우에는 그러하지 아니하다.","answer":"반입 폐기물 무게를 측정할 수 있는 계량시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":135,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"7)","text":"폐기물운반차량의 세륜·세차시설을 갖추어야 한다. 다만, 시·도지사나 지방환경관서의 장이 처분대상 폐기물을 고려하여 필요하지 아니하다고 인정하는 경우에는 그러하지 아니하다.","answer":"폐기물운반차량의 세륜·세차시설을 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":136,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"8)","text":"폐기물의 매립으로 인하여 침출수가 발생하는 경우에는 지하수오염 여부를 확인할 수 있는 지하수 검사정을 사용시작 신고일 2개월 전까지 매립시설의 주변 지하수흐름층 상류에 1개소 이상, 하류에 2개소 이상 설치하여야 한다. 이 경우 지하수 검사정은 직경이 10센티미터 이상이고, 재질은 테프론·스테인레스강 또는 합성수지관을 사용하여야 하며, 지하수 검사정의 지표면으로부터 오염물질이 흘러들지 아니하는 구조로 설치하여야 한다. 다만, 매립시설의 경계선이 해수면과 가까이 있어 지하수 검사정 설치가 어려운 시설로서 해수면 가까운 지역에 지하수 검사정 대신 해수수질검사를 할 수 있는 일정한 지점을 2개소 이상 선정한 시설의 경우에는 그러하지 아니하다.","answer":"침출수 발생 시 지하수오염 여부를 확인할 수 있는 지하수 검사정을 사용시작 신고일 2개월 전까지 매립시설의 상·하류에 각각 1개 이상 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":137,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"9)","text":"조성면적이 15만제곱미터 이상인 매립시설은 기후에너지환경부장관이 정하여 고시하는 바에 따라 지진에 대한 안전성을 고려해야 하고, 조성면적이 15만제곱미터 미만인 매립시설은 해당 매립시설을 설치하려는 자가 매립시설 지반의 연약정도, 매립높이 등을 고려하여 필요하다고 인정하면 지진에 대한 안전성을 고려할 수 있다.","answer":"조성면적 15만㎡ 이상 매립시설은 기후에너지환경부장관 고시에 따라 지진 안전성을 고려하여 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":138,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"10)","text":"폐기물 최종처분업자 또는 폐기물 종합처분업자가 설치한 매립시설에는 안전사고 예방 등을 위하여 기후에너지환경부장관이 고시하는 바에 따라 「개인정보 보호법」 제2조제7호에 따른 영상정보처리기기를 설치하여야 한다.","answer":"폐기물 최종처분업자·종합처분업자 매립시설은 안전사고 예방을 위해 영상정보처리기기를 설치·운영하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK","LF_MGD"]},"_idx":139,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"바닥과 외벽은 한국산업규격 F2405(콘크리트의 압축강도 시험방법)에 따라 측정한 압축강도(이하 \"압축강도\"라 한다)가 210kg/㎠이상인 철근콘크리트로서 두께가 15센티미터 이상 또는 이와 같은 차단효력을 가진 구조물로 설치하되 방수처리하여야 한다.","answer":"바닥과 외벽은 압축강도 210kg/㎠ 이상 철근콘크리트 구조이며 두께 15cm 이상으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["D"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK"]},"_idx":142,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"내부막의 1개 구획의 면적은 매립가능면적 50제곱미터 이하 또는 매립가능용적 250세제곱미터 이하가 되도록 하고, 내부막의 두께는 10센티미터 이상으로 하되, 압축강도 210kg/㎠ 이상의 콘크리트로 설치하여야 한다.","answer":"내부막 1개 구획 면적은 매립가능면적 50㎡ 이하 또는 매립가능용적 250㎥ 이하, 내부막 두께는 10cm 이상으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["D"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK"]},"_idx":143,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"다)","text":"매립시설 주변에 떨어진 빗물이 흘러드는 것을 방지할 수 있는 시설과 빗물을 차단할 수 있는 덮개를 설치하여야 한다.","answer":"매립시설 주변 빗물 유입 방지시설과 빗물 차단 덮개를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["D"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_BLK"]},"_idx":144,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"침출수가 매립시설에서 흘러 나가는 것을 방지하기 위하여 매립시설의 바닥과 측면은 폐기물의 성질·상태, 매립 높이, 지형조건 등을 고려하여 점토·점토광물혼합토 등 점토류 라이너, 고밀도폴리에틸렌 또는 이에 준하는 재질의 토목합성수지 라이너를 사용하여 다음의 방법에 따라 차수시설을 설치하여야 하며, 고밀도폴리에틸렌이나 이에 준하는 재질의 토목합성수지 라이너를 사용하는 경우에는 폐기물의 무게 등에 대한 안정성을 검토하여 항복인장강도(降伏引張强度)의 안전율이 2.0이상이 되도록 설계·시공하여야 한다. 다만, 매립시설의 바닥 및 측면이 점토류 라이너를 사용하여 차수시설을 설치한 것과 같은 수준 이상의 차수효과를 가지는 경우 또는 「환경기술 및 환경산업 지원법」 제7조제2항에 따른 기술검증(이하 \"환경기술검증\"이라 한다)을 받은 매립시설의 설치공법으로 토목합성수지 라이너, 점토류 라이너를 사용하여 차수시설을 설치한 것과 같은 수준 이상의 침출수유출 방지효과가 있는 경우로서 시·도지사나 지방환경관서의 장이 인정하는 경우에는 그러하지 아니하다.","answer":"침출수 누출 방지를 위해 매립시설 바닥·측면에 점토·점토광물혼합토·고밀도폴리에틸렌 라이너 등 차수시설을 폐기물 성질·매립 높이·지형조건을 고려하여 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":146,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"고밀도폴리에틸렌이나 이에 준하는 재질의 토목합성수지 라이너를 사용하는 경우 ㄱ. 두께 2.0밀리미터(지정폐기물을 매립하는 경우에는 2.5밀리미터) 이상의 것을 1겹 이상 포설(鋪設)할 것 ㄴ. 토목합성수지 라이너 하부에는 점토·점토광물혼합토 등 점토류를 다져 투수(透水)계수가 1초당 1천만분의 1센티미터 이하이고 두께가 50센티미터 이상(지정폐기물을 매립하는 경우에는 1미터 이상)인 라이너를 설치할 것. 다만, 매립시설 측면 및 내부 진입도로의 경사가 급하여 토목합성수지 라이너 하부에 점토류 라이너를 설치하는 것이 불가능하면 토목합성수지 라이너 하부에 같은 수준 이상의 차수효과를 가지는 토목합성수지 점토라이너 등으로 포설할 수 있다. ㄷ. 고밀도폴리에틸렌라이너 중 매끄러운 고밀도폴리에틸렌라이너를 사용하는 경우에는 아래 표(고밀도폴리에틸렌 라이너 기준)의 기준에 적합한 것을 사용할 것","answer":"고밀도폴리에틸렌·이에 준하는 토목합성수지 라이너 사용 시 두께 2.0mm(지정폐기물 매립 시 2.5mm) 이상의 라이너를 차수시설로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":147,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"점토·점토광물혼합토 등 점토류를 사용하는 경우 투수계수가 1초당 1천만분의 1센티미터 이하이고 두께가 1미터 이상(지정폐기물을 매립하는 경우에는 1.5미터 이상)인 라이너를 설치할 것","answer":"점토·점토광물혼합토 등 점토류 사용 시 투수계수 1×10⁻⁷cm/s 이하, 두께 1m 이상(지정폐기물 매립 시 2m 이상)의 차수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":148,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(3)","text":"그 밖의 차수재료를 사용하는 경우 (1)이나 (2)와 동등한 차수효과를 가지도록 차수시설을 설치할 것","answer":"그 밖의 차수재료 사용 시 (1)·(2)와 동등한 차수효과를 가지도록 차수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":149,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"매립시설 바닥의 차수시설 위(토목합성수지 라이너를 차수시설로 사용하는 경우에는 토목합성수지 라이너 위에 지오컴포지트·지오텍스타일 등을 설치한 후 그 위를 말한다)에는 침출수 집배수층(투수계수가 1초당 1백분의 1센티미터 이상이고 두께가 30센티미터 이상이어야 한다), 집배수관로 등 수평 집배수시설 및 수직집수정 등의 침출수 집배수시설을 설치할 것","answer":"매립시설 바닥 차수시설 위(토목합성수지 라이너 위에는 지오컴포지트·지오텍스타일 설치 후) 침출수 집·배수시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":152,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"매립시설 측면에 토목합성수지 라이너로 차수시설을 설치한 경우에는 토목합성수지 라이너 위에 매립무게 상태에서 투과능(透過能)계수가 1초당 3만분의 1제곱미터 이상(빗물이 매립시설로 흘러들거나 떨어지는 것을 방지할 수 있는 시설을 설치한 경우는 제외한다)인 지오컴포지트·지오네트 또는 지오텍스타일 등 토목합성수지 배수층을 설치할 것","answer":"매립시설 측면에 토목합성수지 라이너 차수시설 설치 시 라이너 위에 매립무게 상태 투과능계수 1/30,000 cm/s 이상 보호층을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":153,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(3)","text":"매립시설 측면에 점토류 라이너로 차수시설을 설치한 경우에는  점토류 라이너 위에 투수계수(透水係數)가 1초당 1백분의 1센티미터 이상이고 두께가 30센티미터 이상인 모래 등을 포설할 것","answer":"매립시설 측면에 점토류 라이너 차수시설 설치 시 라이너 위에 투수계수 1/100 cm/s 이상, 두께 30cm 이상의 보호층을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":154,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(4)","text":"집배수관로의 주변에는 집배수관로가 막히지 아니하도록 충분한 공극(空隙)을 가지는 골재(골재의 최대치수는 50밀리미터 이하이어야 하며, 최소치수는 5밀리미터 체의 통과량이 5퍼센트 이하이어야 한다) 등을 설치할 것","answer":"집배수관로 주변에는 막힘 방지를 위한 충분한 공극을 가진 골재(최대치수 50mm 이하·최소치수 5mm 이상)를 사용하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":155,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(5)","text":"침출수집 배수시설의 바닥기울기는 2퍼센트 이상(침출수집 배수시설이 매립지 내외부의 침출수 이송시설과 연결되어 있어 침출수의 수위를 저감할 수 있는 경우에는 적용하지 아니한다)이 되도록 할 것","answer":"침출수집 배수시설 바닥기울기를 2퍼센트 이상으로 설치하겠음(외부 이송시설 연결로 수위 저감 시 예외).","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":156,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(6)","text":"환경기술검증을 받은 매립시설의 설치공법으로 토목합성수지 배수층 등을 설치할 필요가 없는 구조로 매립시설을 설치하는 경우에는 (1)부터 (5)까지의 규정을 적용하지 아니한다.","answer":"환경기술검증을 받은 매립시설 설치공법으로 토목합성수지 배수층 등 설치가 불요한 구조의 경우 (1)~(5) 기준 일부를 적용하지 않을 수 있음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":157,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"다)","text":"매립시설 바닥과 측면의 라이너 밑에는 주변에서 집수된 빗물 또는 지하수를 배제할 수 있는 시설을 설치하여야 한다. 다만, 빗물이 흘러들지 아니하거나 지하수가 발생하지 아니하는 지역에 매립시설을 설치하거나 빗물 또는 지하수배제시설을 설치할 필요가 없는 구조로 매립시설을 설치하는 경우에는 그러하지 아니하다.","answer":"매립시설 바닥·측면 라이너 밑에 주변 집수 빗물·지하수를 배제할 수 있는 시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":158,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"라)","text":"침출수량 등의 변동에 대응하기 위하여 침출수유량조정조를 설치하여야 하며, 침출수유량조정조는 최근 10년간 1일 강우량이 10밀리미터 이상인 강우일수 중 최다빈도의 1일 강우량의 7배 이상에 해당하는 침출수를 저장할 수 있는 규모로 설치하되, 유량조정조 내부를 방수처리하고 유량조정조 유입구에는 유량계를 설치하여야 한다.","answer":"침출수량 변동에 대응하기 위해 침출수유량조정조를 최근 10년간 1일 강우량 10mm 이상 강우일수의 평균치를 고려한 용량으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":159,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"마)","text":"침출수를 별표 11 제2호나목2)가)에 따른 배출허용기준 이하로 처리할 수 있는 시설을 설치해야 한다. 다만, 매립시설의 인근에 「물환경보전법」 제48조에 따른 공공폐수처리시설 또는 「하수도법」 제2조제9호에 따른 공공하수처리시설이 있는 경우에는 침출수 처리시설의 일부 또는 전부를 설치하지 않고, 공공폐수처리시설 또는 공공하수처리시설에서 처리하는 오염물질을 그 시설로 옮겨 처리하는 것을 원칙으로 하며, 다음의 경우에는 침출수 처리시설의 일부 또는 전부를 설치하지 않을 수 있다.","answer":"침출수를 별표11 제2호나목2)가) 배출허용기준 이하로 처리할 수 있는 침출수처리시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":160,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"다른 매립시설의 침출수 처리시설 및 「물환경보전법」 제2조제12호에 따른 수질오염방지시설(자가수질오염방지시설만 해당한다)에서 처리하는 오염물질을 그 시설로 옮겨 처리하거나 「물환경보전법」 제62조에 따른 폐수처리업자에게 위탁하여 처리하는 경우","answer":"다른 매립시설 침출수처리시설 또는 「물환경보전법」 자가수질오염방지시설에서 위탁 처리하는 경우 해당시설로 이송 처리하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":161,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"매립시설의 인근에 위치한 「하수도법」 제2조제11호에 따른 분뇨처리시설에서 처리하는 오염물질을 그 시설에 옮겨 처리하는 경우","answer":"매립시설 인근 「하수도법」 분뇨처리시설에서 처리하는 경우 해당시설로 이송 처리하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":162,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"바)","text":"매립시설의 주입관로[침출수 또는 침출수 처리시설에서 생물학적 처리 등을 거친 처리수(이하 “침출수 등”이라 한다)를 매립시설에 주입하는 경우만 해당한다] 및 침출수 처리시설 배출구에는 각각 유량계를 설치해야 한다.","answer":"매립시설 침출수 등 주입관로(주입하는 경우)는 매립층 함수율 적정 유지를 위해 설치하고 운영하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":163,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"사)","text":"유기성폐기물을 매립하여 가스가 발생하는 경우에는 매립시설에서 발생하는 가스를 모아 소각하는 등 처리시설을 설치하거나 발전·연료화처리시설 등의 활용시설을 설치하여야 한다.","answer":"유기성폐기물 매립으로 가스 발생 시 매립가스 포집·소각 처리시설 또는 발전·연료화처리시설을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":164,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"아)","text":"폐기물의 반입과정에서 차수시설 등의 손상을 방지할 수 있는 구조로 내부 진입도로를 설치하여야 한다. 다만, 물 등을 이용하여 폐기물을 운반하는 경우에는 그러하지 아니하다.","answer":"폐기물 반입과정에서 차수시설 손상 방지 구조로 내부 진입도로를 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":165,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"자)","text":"침출수의 수위를 측정할 수 있는 시설은 매립시설 바닥에 설치한 차수시설 위의 가장 낮은 지점에 설치하여야 한다.","answer":"침출수 수위를 측정할 수 있는 시설을 매립시설 바닥 차수시설 위 가장 낮은 지점에 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":166,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"차)","text":"매립시설 중 일부구역을 정하여 폐석면을 매립할 때에는 다른 폐기물과 혼합되지 아니하도록 제방 등 적절한 구조나 설비를 갖추어야 한다.","answer":"폐석면 매립 시 다른 폐기물과 혼합되지 아니하도록 일부 구역을 정하여 제방 등 적절한 구조·설비를 갖추겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":["51-31"],"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":167,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"카)","text":"발전ㆍ연료화처리시설을 설치ㆍ운영하는 생활폐기물 매립시설로서 폐기물 매립층의 높이가 6미터 이상인 매립시설의 경우에는 매립층의 적정 함수율(含水率)을 유지하기 위하여 주입관로, 주입펌프, 함수율 측정기 등 침출수 등을 매립시설에 주입할 수 있는 설비(이하 \"침출수매립시설환원정화설비\"라 한다)를 설치할 수 있다. 이 경우 다음 (1)부터 (4)까지의 방법 및 그 밖에 기후에너지환경부장관이 정하여 고시하는 방법에 따라 침출수매립시설환원정화설비를 설치하여야 한다.","answer":"발전·연료화처리시설을 설치·운영하는 생활폐기물 매립시설(매립층 6m 이상)은 매립층 적정 함수율 유지를 위한 시설(주입관로·함수율 측정장치 등)을 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":168,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(1)","text":"주입관로는 침출수 등을 매립층에 골고루 주입할 수 있도록 최종복토층 아래의 매립층 내부에 수평 또는 수직으로 설치하여야 한다. 이 경우 발전ㆍ연료화처리시설용 가스배제관의 일부 또는 전부를 주입관로로 활용할 수 있다.","answer":"주입관로는 침출수 등을 매립층에 골고루 주입할 수 있도록 최종복토층 아래 매립층 내부에 수평·수직으로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":169,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(2)","text":"매립층에는 매립층 함수율을 상시 측정할 수 있는 장치를 매립시설의 면적을 고려하여 설치하여야 한다.","answer":"매립층 함수율을 상시 측정할 수 있는 장치를 매립시설 면적을 고려하여 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":170,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(3)","text":"매립층 함수율 등이 안정적으로 유지될 수 있도록 침출수 등의 주입량을 조절하거나 주입관로 중 일부를 선택하여 개폐할 수 있는 구조로 설치하여야 한다.","answer":"매립층 함수율 안정 유지를 위해 침출수 주입량 조절·주입관로 일부 개폐가 가능한 구조로 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":171,"_source":"b9"},{"depth":3,"type":"wrapped-number","marker":"(4)","text":"침출수 등의 주입에 따라 매립가스 발생량이 증가하는 경우에는 매립가스가 외부로 배출되지 아니하도록 매립가스 포집시설을 추가로 설치하는 등의 조치를 하여야 한다.","answer":"침출수 등 주입에 따라 매립가스 발생량 증가 시 외부 배출 방지를 위해 매립가스 포집시설을 추가 설치하겠음.","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":["L"],"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":172,"_source":"b9"},{"depth":2,"type":"korean-paren","marker":"타)","text":"매립시설 상부는 시설물 등으로 덮는 형태로 설치･운영해서는 안 된다. 다만, 매립시설 인근에 대규모 주거시설이 위치하거나 「환경영향평가법」 제25조에 따른 주민 등의 의견 수렴 결과 주변 환경 여건 등으로 매립시설 상부에 덮는 시설물 등의 설치가 불가피하다고 인･허가기관이 인정하는 경우에는 기후에너지환경부장관이 정하여 고시하는 설치기준에 따라 시설물 등을 설치할 수 있다.","answer":"매립시설 상부는 시설물 등으로 덮는 형태로 설치·운영하지 않겠음(인근 대규모 주거시설·환경영향평가 대상 등 예외 시에는 해당 기준 충족).","tags":{"category":["W01","W03"],"bizType":["FD"],"wasteClass":null,"wasteCode":null,"action":["FI"],"rCode":null,"facilityType":["LF_MGD"]},"_idx":173,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"1)","text":"폐기물이 흩날리거나 흘러나오는 것을 방지하는 데에 필요한 설비를 하여야 한다.","answer":"폐기물 흩날림·유출 방지에 필요한 설비를 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":176,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"2)","text":"폐기물의 재활용과정에서 발생하는 대기오염물질ㆍ수질오염물질 등을 처리할 수 있는 시설을 갖추어야 한다. 다만, 「물환경보전법 시행규칙」 별표 2 및 별표 3에 따른 수질오염물질 또는 특정수질유해물질을 「물환경보전법」 제62조에 따른 폐수처리업자에게 위탁 처리하는 경우와 매립시설의 침출수 처리시설, 「물환경보전법」 제2조제12호에 따른 수질오염방지시설(자가 수질오염 방지시설만 해당한다), 「물환경보전법」 제48조에 따른 공공폐수처리시설, 「하수도법」 제2조제9호에 따른 공공하수처리시설 또는 「하수도법」 제2조제11호에 따른 분뇨처리시설에서 처리하는 오염물질을 그 시설에 옮겨 처리하는 경우와 영 제5조에 따른 폐기물 재활용시설 중 혐기성분해시설에 유입하여 에너지를 생산(음식물류 폐기물을 재활용하는 과정에서 발생되는 경우만 해당한다)하는 경우에는 수질오염물질 처리시설의 일부 또는 전부를 갖추지 아니할 수 있다.","answer":"재활용과정에서 발생하는 대기오염물질·수질오염물질 등을 처리할 수 있는 시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":177,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"재활용시설의 바닥은 시멘트ㆍ아스팔트ㆍ우레탄ㆍ에폭시 등 물이 스며들지 아니하는 재료로 포장해야 한다.","answer":"재활용시설 바닥은 시멘트·아스팔트·우레탄·에폭시 등 물이 스며들지 아니하는 재료로 포장하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":null},"_idx":178,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"음식물류 폐기물 재활용시설을 설치하는 때에는 음식물류 폐기물의 저장ㆍ투입ㆍ이송 및 재활용 등의 과정에서 발생하는 악취가 외부로 새어 나가지 아니하도록 밀폐된 구조로 설치하여야 하며, 발생되는 악취물질을 저감할 수 있는 별도의 시설을 갖추어야 한다.","answer":"음식물류 폐기물 재활용시설 설치 시 저장·투입·이송·재활용 과정 발생 악취가 외부로 새어 나가지 아니하도록 밀폐·악취방지시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-19"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":179,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"폐가전제품을 재활용하는 경우 다음 가)부터 라)까지의 규정에 적합한 시설을 갖추어야 한다.","answer":"폐가전제품 재활용 시 다음 가)부터 라)까지 규정에 적합한 시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-18","91-09"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":180,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"재활용시설은 지붕과 벽면이 있고 집진설비를 갖춘 장소에 설치하여야 한다.","answer":"재활용시설은 지붕과 벽면이 있고 집진설비를 갖춘 장소에 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-18","91-09"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":181,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"나)","text":"폐가전제품 중에 포함된 염화불화탄소 등의 냉매물질이 외부로 유출되지 아니하고 안전하게 회수될 수 있도록 회수량 및 보관량을 알 수 있는 장치가 부착된 설비를 갖추어야 한다.","answer":"폐가전제품 중 염화불화탄소 등 냉매물질의 외부 유출 방지 및 안전 회수가 가능하도록 회수량·보관량 측정장치가 부착된 회수시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-18","91-09"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":182,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"다)","text":"텔레비전 및 컴퓨터 모니터를 재활용하는 경우 앞면 유리와 뒷면 유리를 분리 시 발생하는 형광물질을 회수할 수 있는 집진시설을 갖춘 밀폐시설을 갖추어야 한다.","answer":"텔레비전·컴퓨터 모니터 재활용 시 앞면·뒷면 유리 분리 시 발생 형광물질을 회수할 수 있는 집진시설을 갖춘 밀폐시설을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-18","91-09"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":183,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"라)","text":"폐기물의 파쇄ㆍ분리 등 재활용 과정에서 발생되는 폐기물을 보관하는 시설은 지붕과 벽면을 갖추고, 바닥은 시멘트ㆍ아스팔트 등의 재료로 포장되어야 한다.","answer":"폐기물 파쇄·분리 등 재활용 과정 발생 폐기물 보관시설은 지붕·벽면을 갖추고, 바닥은 시멘트·아스팔트로 포장하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":["51-18","91-09"],"action":["RCY"],"rCode":null,"facilityType":null},"_idx":184,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"소각열회수시설 및 수은회수시설은 자체 무게와 적재무게, 그 밖에 설비의 운영ㆍ관리에 따라 발생하는 무게에 견딜 수 있어야 하고, 재활용에 사용하는 처리약품과 재활용과정에서 발생하는 열ㆍ습기ㆍ배기가스ㆍ배출수 및 충격 등에 견딜 수 있는 재질을 사용하여야 한다.","answer":"소각열회수시설·수은회수시설은 자체 무게·적재무게 등에 견딜 수 있는 구조로 설치하고, 처리약품·열·습기·배기가스·배출수 등에 부식·손상되지 아니하는 재질로 시공하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":["INC_R","MRC"]},"_idx":185,"_source":"b9"},{"depth":3,"type":"korean-paren","marker":"가)","text":"파쇄ㆍ분쇄ㆍ절단조각의 크기는 최대직경 15센티미터 이하로 각각 파쇄ㆍ분쇄ㆍ절단할 수 있는 시설이어야 한다. 다만, 폐철도목재받침목을 재활용하기 위하여 절단하는 경우에는 그러하지 아니하다.","answer":"파쇄·분쇄·절단조각의 크기를 최대직경 15센티 wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":["SMT"]},"_idx":281,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"반입되는 폐기물의 무게를 측정할 수 있는 계량시설을 설치하여야 한다. 다만, 시ㆍ도지사나 지방환경관서의 장이 인정하는 경우와 다른 곳의 계량시설을 이용하여 반입되는 폐기물의 무게를 측정할 수 있는 경우에는 그러하지 아니하다.","answer":"반입 폐기물 무게 측정 계량시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":["SMT"]},"_idx":282,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"7)","text":"연소실의 최종 출구에는 출구온도 측정공을 설치하고, 각 시설의 출구온도 기준보다 섭씨 300도 이상까지, 대기오염 방지시설 중 최초 집진시설의 입구에는 섭씨600도 이상 측정할 수 있는 온도 지시계 및 온도변화를 연속적으로 기록할 수 있는 자동온도기록계를 붙여야 한다. 다만, 최초 집진시설의 입구에 붙여야 하는 온도 지시계 및 자동온도기록계의 경우 시간당 재활용능력이 2톤 이상인 시설의 경우만 해당한다.","answer":"연소실 최종 출구에 출구온도 측정공을 설치하고, 출구온도 기준보다 섭씨 300도 이상 측정 가능한 온도지시계 및 자동기록장치를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":["SMT"]},"_idx":283,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"8)","text":"대기오염 방지시설 중 최초 집진시설에 흘러 들어오는 연소가스를 섭씨 200도 이하로 냉각시키기 위한 냉각시설이나 폐열회수시설을 설치하여야 한다. 다만, 대기오염 방지시설의 처리공정상 연소가스의 냉각이 필요하지 아니하는 경우에는 그러하지 아니한다.","answer":"대기오염방지시설 중 최초 집진시설에 흘러 들어오는 연소가스를 섭씨 200도 이하로 냉각시키는 냉각시설 또는 폐열회수시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":null,"facilityType":["SMT"]},"_idx":284,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"9)","text":"「대기환경보전법 시행령」제17조에 따라 굴뚝 자동측정기기를 부착한 시설의 경우에는 「대기환경보전법 시행규칙」 제37조에 따라 굴뚝 자동측정기기를 운영ㆍ관리하여야 하며, 대기오염방지시설의 입ㆍ출구 및 굴뚝에는 배출가스의 온도, 대기오염물질의 농도 등을 측정할 수 있는 측정공을 대기오염공정시험기준에 적합하게 설치하여야 한다.","answer":"「대기환경보전법 시행령」 제17조에 따라 굴뚝 자동측정기기 부착 대상 시설은 같은 법 시행규칙 제37조 기준에 따라 굴뚝 자동측정기기를 부착하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action ,"facilityType":["INC_R"]},"_idx":291,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"3)","text":"굴뚝을 설치하는 경우에는 통풍력과 배기가스의 대기확산을 고려한 높이와 구조를 가진 것을 설치하여야 한다.","answer":"굴뚝 설치 시 통풍력과 배기가스 대기확산을 고려한 높이·구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":292,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"4)","text":"폭발사고와 화재 등에 대비한 안전한 구조여야 하며, 소화기 등 필요한 장비를 갖추어야 한다.","answer":"폭발·화재에 안전한 구조로 설치하고 소화기 등 필요 장비를 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":293,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"5)","text":"시설규모, 재활용대상 폐기물의 종류, 재활용방식, 설계ㆍ시공자명 및 연락처 등 필요한 사항을 지워지지 아니하고 파손되지 아니하는 방법으로 표시한 표지를 붙여야 한다.","answer":"시설규모·재활용대상 폐기물 종류·재활용방식·설계시공자명·연락처 등 표지를 지워지거나 파손되지 않는 방법으로 표시하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":294,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"6)","text":"연소실ㆍ열분해실에는 시설 내의 압력변화를 감지할 수 있는 압력측정계를 설치하여야 한다.","answer":"연소실·열분해실에 압력측정계를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":295,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"7)","text":"시간당 재활용능력이 2톤 이상인 경우에는 반입되는 폐기물의 무게를 측정할 수 있는 계량시설을 설치하여야 한다. 다만, 시ㆍ도지사나 지방환경관서의 장이 계량시설이 설치되지 않더라도 폐기물의 무게를 계량할 수 있다고 인정하는 경우와 다른 곳의 계량시설을 이용하여 반입되는 폐기물의 무게를 측정할 수 있는 경우는 제외한다.","answer":"시간당 재활용능력 2톤 이상 시 반입 폐기물 무게 측정 계량시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":296,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"8)","text":"연소실ㆍ열분해실의 최종 출구에는 출구온도 측정공을 설치하고, 각 시설의 출구온도 기준보다 섭씨 300도 이상까지, 대기오염 방지시설 중 최초 집진시설의 입구에는 섭씨 600도 이상 측정할 수 있는 온도 지시계 및 온도변화를 연속적으로 기록할 수 있는 자동온도기록계를 붙여야 한다. 다만, 최초 집진시설의 입구에 붙여야 하는 온도 지시계 및 자동온도기록계의 경우 시간당 재활용능력이 2톤 이상인 시설의 경우만 해당한다.","answer":"연소실·열분해실 최종 출구에 출구온도 측정공을 설치하고, 출구온도 기준보다 섭씨 300도 이상 측정 가능한 온도지시계 및 자동기록장치를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":297,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"9)","text":"연소실ㆍ열분해실의 외부는 철판을 덮은 경우에는 본체의 고온부위를 내열도료로 칠하거나 단열처리 또는 내화단열벽돌, 캐스터블 내화물 등으로 시공하여 그 외부표면온도를 섭씨 80도 이하로 유지할 수 있는 구조여야 한다. 다만, 회전식시설 등 구조상 단열을 충분히 할 수 없는 경우는 제외한다.","answer":"연소실·열분해실 외부 철판 부위는 내열도료 칠하거나 단열처리하거나 내화단열벽돌·캐스터블내화물 등으로 시공하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":298,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"10)","text":"대기오염 방지시설 중 최초 집진시설(전기ㆍ여과집진시설이 설치되어 있는 경우에는 전기ㆍ여과집진시설을 최초 집진시설로 본다)에 흘러 들어오는 연소가스는 섭씨 200도 이하(시간당 재활용능력이 2톤 미만인 경우 섭씨 250도 이하)여야 한다.","answer":"대기오염방지시설 중 최초 집진시설(전기·여과집진시설 우선)에 흘러 들어오는 연소가스를 섭씨 200도 이하로 냉각시키는 냉각시설 또는 폐열회수시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":299,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"11)","text":"연소실(연소실이 둘 이상인 경우에는 최종 연소실)의 출구온도는 섭씨 850도 이상이어야 한다. 다만, 종이류 또는 접착제ㆍ폐페인트ㆍ기름 및 방부제 등이 묻어 있지 아니한 순수한 목재류만을 소각하는 경우에는 섭씨 450도 이상이어야 한다.","answer":"연소실(둘 이상인 경우 최종 연소실) 출구온도를 섭씨 850도 이상으로 유지하겠음(종이류·접착제·폐페인트·기름·방부제 등은 별도 기준).","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":300,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"12)","text":"연소실은 연소가스가 2초 이상(시간당 재활용능력이 2톤 미만인 경우에는 1초 이상) 체류할 수 있고, 충분하게 혼합될 수 있는 구조여야 한다. 이 경우 체류시간은 섭씨 850도(종이류 또는 접착제ㆍ폐페인트ㆍ기름 및 방부제 등이 묻어 있지 아니한 순수한 목재류만을 소각하는 경우 섭씨 450도 이상)에서의 부피로 환산한 연소가스의 체적으로 계산한다.","answer":"연소실은 연소가스가 2초 이상(시간당 재활용능력 2톤 미만은 1초 이상) 체류하고 충분히 혼합될 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":301,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"13)","text":"바닥재의 강열감량이 10퍼센트 이하가 될 수 있는 재활용 성능을 갖추어야 한다.","answer":"바닥재 강열감량이 10퍼센트 이하가 될 수 있는 재활용 성능을 갖추겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":302,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"14)","text":"2차 연소실이 없는 연소방식 중 연속투입방식의 경우에는 폐기물을 투입할 연소실과 외부공기가 차단되도록 이중문 등의 구조여야 하며, 이 경우 연소실은 출구기준 온도 이상이 유지될 수 있는 구조여야 한다.","answer":"2차 연소실이 없는 연속투입방식의 경우 폐기물 투입 연소실과 외부공기가 차단되도록 이중문 등의 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":303,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"15)","text":"「대기환경보전법 시행령」 제17조에 따라 굴뚝 자동측정기기를 부착한 시설의 경우에는 「대기환경보전법 시행규칙」 제37조의 기준에 따라 굴뚝 자동측정기기를 운영ㆍ관리하여야 하며, 대기오염방지시설의 유입구와 유출구 및 굴뚝에는 배출가스의 온도, 대기오염물질의 농도 등을 측정할 수 있는 측정공을 대기오염공정시험기준에 적합하게 설치하여야 한다.","answer":"「대기환경보전법 시행령」 제17조에 따라 굴뚝 자동측정기기 부착 대상 시설은 같은 법 시행규칙 제37조 기준에 따라 굴뚝 자동측정기기를 부착하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":304,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"16)","text":"폐기물 투입구 및 청소구는 고온에 견딜 수 있는 재질로 만들어야 하며, 외부공기가 흘러 들어오거나 연소가스가 새어 나가는 것을 방지할 수 있는 구조여야 한다.","answer":"폐기물 투입구·청소구는 고온에 견디는 재질로 만들고 외부공기 유입 및 연소가스 누출 방지 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":305,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"17)","text":"내부의 연소상태를 볼 수 있는 구조여야 하며, 소각재를 제거할 때 재의 흩날림을 방지할 수 있는 구조여야 한다.","answer":"내부 연소상태를 확인할 수 있는 구조로 하고, 소각재 제거 시 재 흩날림을 방지할 수 있는 구조로 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":306,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"18)","text":"폐기물반입장ㆍ저장조 등에서 발생하는 악취가 재활용시설의 외부로 새어나가는 것을 방지할 수 있는 시설을 설치하여야 한다. 다만, 시간당 재활용능력이 2톤 미만인 시설인 경우에는 공기차단시설 등 간이시설을 설치할 수 있다.","answer":"폐기물 반입장·저장조 등 발생 악취가 외부로 새어 나가지 아니하도록 악취방지시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":307,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"19)","text":"「잔류성유기오염물질 관리법 시행규칙」 별표 3 제4호가목에 따른 소각시설에 대한 다이옥신 배출기준을 지킬 수 있는 시설을 설치하여야 한다.","answer":"「잔류성유기오염물질 관리법 시행규칙」 별표3 제4호가목 소각시설 다이옥신 배출기준을 지킬 수 있는 시설을 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType":["INC_R"]},"_idx":308,"_source":"b9"},{"depth":2,"type":"paren-number","marker":"20)","text":"제3조제1항제1호 각 목에 따른 에너지 회수기준에 적합하게 에너지를 열 또는 전기 등의 형태로 회수할 수 있는 설비(생산되는 에너지를 계량할 수 있는 설비를 포함한다)와 이를 스스로 이용하거나 다른 사람에게 공급할 수 있는 설비(에너지 이용자별로 계량할 수 있는 설비를 포함한다)를 기후에너지환경부장관이 정하여 고시하는 기준에 따라 각각 설치하여야 한다.","answer":"제3조제1항제1호 각 목 에너지 회수기준에 적합하게 에너지를 열·전기 등 형태로 회수할 수 있는 설비(에너지 계량장치 포함)를 설치하겠음.","tags":{"category":["W01","W02","W03"],"bizType":["IR","CR","FR","RREC"],"wasteClass":null,"wasteCode":null,"action":["RCY"],"rCode":["R8"],"facilityType": const ALL_BY_SOURCE_FOR_WORD = {"b5":[{"depth":0,"type":"number","marker":"1.","text":"생활폐기물의 기준 및 방법","answer":"","tags":{"category":null,"bizType":null,"docType":null,"wasteClass":["L"],"wasteCode":null,"action":null,"rCode":null,"facilityType":null},"isHeader":true,"_idx":3,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"가.","text":"공통사항","answer":"","tags":null,"_idx":4,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"생활폐기물은 특별자치시장, 특별자치도지사, 시장·군수·구청장 또는 법 제14조제2항에 따라 생활폐기물의 처리를 대행하는 자, 법 제46조제1항에 따라 폐기물처리 신고를 한 자(수집·운반 또는 재활용으로 한정한다)가 이를 처리하여야 한다. 다만, 생활폐기물 중 일련의공사·작업 등으로 인하여 5톤 미만으로 발생되는 폐기물(이하 \"공사장 생활폐기물\"이라 한다)을 배출하는 자(최초로 공사의 전부를 도급받은 자를 포함한다)는 특별자치시, 특별자치도, 시·군·구의 조례에서 정하는 바에 따라 그 폐기물의 처리를 대행하는 자나 폐기물 처분시설 또는 재활용시설의 설치·운영자에게 운반할 수 있다.","answer":"허가된 처리 대행자 또는 신고자(수집·운반·재활용)만이 생활폐기물을 처리하도록 하겠음. 공사장 생활폐기물(5톤 미만)은 조례에서 정하는 바에 따라 처분·재활용시설로 운반하겠음.","tags":{"category":null,"bizType":null,"wasteClass":["L"],"action":null,"rCode":null,"facilityType":null},"_idx":5,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"「건설폐기물의 재활용촉진에 관한 법률」 제21조제3항에 따른 건설폐기물처리업자가 공사장 생활폐기물을 처리하는 경우에는 특별자치시,특별자치도, 시·군·구의 조례에서 정하는 바에 따라 건설폐기물에 관한 기준과 방법으로 처리할 수 있다.","answer":"건설폐기물처리업자로서 공사장 생활폐기물을 처리하는 경우, 해당 지자체 조례에서 정하는 바에 따라 건설폐기물의 재활용촉진에 관한 법률에서 정한 기준과 방법으로 처리하겠음","tags":{"category":["W01"],"bizType":["IR","CR","FR","ID","FD"],"wasteClass":["L"],"action":["MI","FI","RCY"],"rCode":null,"facilityType":null,"wasteCode":null},"_idx":6,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"폐가전제품을 수집·운반·보관하는 과정에서 일부 또는 전부를 해체하거나 의도적으로 파손하지 않아야 하며, 파손·낙하·붕괴 등이 일어나지 아니하도록 필요한 조치를 하여야 한다.","answer":"폐가전제품 수집·운반·보관 시 일부 또는 전부를 해체하거나 의도적으로 파손하지 않겠으며, 파손·낙하·붕괴 방지를 위한 필요한 조치를 취하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT","ST"],"rCode":null,"facilityType":null,"wasteVars":{"폐가전제품":["91-09"]},"wasteCode":["91-09"]},"_idx":7,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"나.","text":"수집·운반의 경우","answer":"","tags":{"category":null,"bizType":null,"wasteClass":null,"wasteCode":null,"action":["CT"],"rCode":null,"facilityType":null},"isHeader":true,"_idx":8,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"1)","text":"고체상태의 생활폐기물은 압축·압착차량이나 암롤차량 등으로서 적재함이 밀폐된 차량(이하 \"밀폐형 차량\"이라 한다)으로 수집·운반하여야 한다.","answer":"고체상태의 생활폐기물은 {{vehicles}}(밀폐형 차량)으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null,"physicalState":["S"]},"slots":[{"key":"vehicles","label":"밀폐형 압축·압착·암롤차량","type":"filter_join","from":"document.formData.vehicles","display":"vehicleType","join":", "}],"_idx":9,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"2)","text":"1)에도 불구하고 다음의 경우에는 적재함에 금속, 플라스틱 또는 폐기물의 유출 또는 악취가 누출되는 것을 방지할 수 있는 재질, 구조,형태 등으로서 기후에너지환경부장관이 정하여 고시하는 기준에 따른밀폐형 덮개를 설치한 차량(이하 \"밀폐형 덮개 설치차량\"이라 한다)으로 수집·운반할 수 있다.","answer":"밀폐형 차량 원칙에도 불구하고, ① 폐전기전자제품류·폐가구류 등 일정한 형태를 갖춘 폐기물을 원형 그대로 수집·운반하는 경우, ② 시행규칙 제66조제3항 각 호 등에 해당하는 폐기물을 수집·운반하는 경우, ③ 흩날릴 우려가 없고 침출수가 없는 덩어리 형태 폐기물을 집게 등 기계식으로 적재하는 경우, ④ 종량제 봉투로 배출된 폐기물을 최대적재량 1톤 이하 차량으로 수집·운반하는 경우에는 적재함에 유출·악취 누출 방지 가능한 재질·구조·형태의 덮개를 설치한 차량으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteVars":{"폐전기전자제품류":["51-18"]}},"slots":[{"key":"vehicles","label":"밀폐형 덮개 설치차량","type":"filter_join","from":"document.formData.vehicles","display":"vehicleType","join":", "}],"_idx":10,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"가)","text":"폐전기전자제품류, 폐가구류 등 일정한 형태를 갖춘 폐기물을 원형그대로 수집ㆍ운반하는 경우","answer":"","tags":null,"_idx":11,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"나)","text":"제66조제3항 각 호, 같은 조 제6항제1호부터 제4호까지, 제6호부터 제8호까지 및 제10호의 폐기물을 수집ㆍ운반하는 경우. 다만,적재량이 2톤 이하인 경우에는 폐기물이 흩날리거나 유출되지 않도록 적재함에 합성수지 등으로 제작된 포장으로 덮개를 설치한 최대적재량 2톤 이하의 차량으로 수집ㆍ운반할 수 있다.","answer":"","tags":null,"_idx":12,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"다)","text":"수집ㆍ운반 과정에서 흩날릴 우려가 없고, 침출수가 발생되지 않는폐목재류, 폐합성수지류, 폐합성고무류 등 덩어리 형태의 폐기물을집게 등 기계식으로 폐기물을 적재함에 실을 수 있는 장치가 부착된 차량으로 수집ㆍ운반하는 경우","answer":"","tags":null,"_idx":13,"_source":"b5"},{"depth":3,"type":"korean-paren","marker":"라)","text":"폐기물 종량제(從量制) 봉투로 배출된 폐기물을 최대적재량 1톤이하의 차량으로 수집ㆍ운반하는 경우","answer":"","tags":null,"_idx":14,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"3)","text":"1) 및 2)에도 불구하고 고체상태의 폐기물(폐기물 종량제 봉투로 배출된 폐기물은 제외한다)을 밀폐된 용기에 담거나 합성수지 등으로 밀폐된 상태로 포장하여 수집ㆍ운반하는 경우에는 적재함에 합성수지 등으로 제작된 포장으로 덮개를 설치한 차량으로 수집ㆍ운반할 수 있다.","answer":"고체상태의 폐기물(종량제 봉투 배출 폐기물 제외)을 밀폐된 용기에 담거나 합성수지 등으로 밀폐된 상태로 포장하여 수집·운반하는 경우에는 합성수지 덮개 설치차량으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null,"physicalState":["S"]},"_idx":15,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"4)","text":"액체상태(수분 함량이 85%를 초과하는 것을 말한다. 이하 같다)의생활폐기물은 탱크로리로 수집ㆍ운반하여야 한다. 다만, 밀폐된 전용수거용기에 담아 수집ㆍ운반하는 경우에는 폐기물이 유출되거나 악취가 누출되지 않도록 적재함에 합성수지 등으로 제작된 포장으로덮개를 설치하고, 침출수나 액상의 물질이 유출 또는 누출되지 않도록 방지턱 등을 설치한 차량으로 수집ㆍ운반할 수 있다.","answer":"액체상태(수분 함량 85% 초과)의 생활폐기물은 {{vehicles}}으로 수집·운반하겠음. 다만, 밀폐된 전용 수거용기에 담아 운반하는 경우에는 덮개가 설치되고 방지턱이 있는 차량으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":null,"physicalState":["L"]},"slots":[{"key":"vehicles","label":"탱크로리","type":"filter_join","from":"document.formData.vehicles","display":"vehicleType","join":", "}],"_idx":16,"_source":"b5"},{"depth":2,"type":"number-paren","marker":"5)","text":"천연방사성제품생활폐기물은 제4호가목3)부터 6)까지 및 9)에 따른방법으로 수집ㆍ운반해야 한다.","answer":"천연방사성제품생활폐기물은 지정폐기물 수집·운반 기준(시행규칙 제4호 가목 3)~6) 및 9))에 따른 방법으로 수집·운반하겠음","tags":{"category":null,"bizType":["TR","RTR"],"wasteClass":["L"],"action":["CT"],"rCode":null,"facilityType":null,"wasteCode":["91-20-00"]},"_idx":17,"_source":"b5"},{"depth":1,"type":"korean-dot","marker":"다.","text":"보관의 경우","answer":"","tags":{"
